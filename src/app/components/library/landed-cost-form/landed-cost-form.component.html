        <dxi-item></dxi-item>
        <dxi-item Align="Right">
          <dx-check-box 
                  [(value)]="newLandedCost.IS_INACTIVE"
                  (onValueChanged)="onValueChangedInactive($event.value)"
                  text="Inactive"
                  
                ></dx-check-box>
          </dxi-item>
      </dxi-item>

      <dxi-item itemType="group" [colCount]="1">
          <dxi-item>
            <div *dxTemplate>
              <dx-text-box
                label="Description"
                [(value)]="newLandedCost.DESCRIPTION"
                labelMode="floating"
              >
              <dx-validator>
            <dxi-validation-rule
              type="required"
              message="Description is required"
            ></dxi-validation-rule>
            </dx-validator>
            </dx-text-box>
            </div>
            </dxi-item>
          </dxi-item>
          <dxi-item itemType="group" [colCount]="1">
            <dxi-item> 
              <div *dxTemplate> 
                <label>Currency</label>
               
                <dx-radio-group
                    [items]="currencyOptions"
                    displayExpr="text"
                    valueExpr="value"
                    [(value)]="newLandedCost.IS_LOCAL_CURRENCY"
                    
                    layout="horizontal"
                   
                  ></dx-radio-group>
              </div>
            </dxi-item>
          
            </dxi-item>
            <dxi-item itemType="group" [colCount]="3">
              <dxi-item [colSpan]="2"> 
                <div *dxTemplate> 
                  <label>Amount</label>
                  <dx-radio-group
                    [items]="amountOptions"
                    displayExpr="text"
                    valueExpr="value"
                   [(value)]="newLandedCost.IS_FIXED_AMOUNT"
                    
                    layout="horizontal"
                  ></dx-radio-group>
                </div>
              </dxi-item>

              <dxi-item [colSpan]="1">
                <div *dxTemplate>
                  <dx-number-box
                  label="Value"
                  [(value)]="newLandedCost.VALUE"
                  [min]="0"
                  [showSpinButtons]="true"
                  labelMode="floating"
                >
                  <dx-validator>
                    <dxi-validation-rule
                      type="required"
                      message="Value is required"
                    ></dxi-validation-rule>
                  </dx-validator>
                </dx-number-box>
                </div>
                </dxi-item>
              </dxi-item>
</dx-form>
