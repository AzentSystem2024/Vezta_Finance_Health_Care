<div class="view-wrapper list-page">
  <dx-data-grid
    class="grid theme-dependent"
    [dataSource]="SupplierDataSource"
    (onRowRemoving)="onRowRemoving($event)"
    [rowAlternationEnabled]="true"
    rowAlternationInterval="2"
    [showBorders]="true"
    [allowColumnReordering]="true"
    [allowColumnResizing]="true"
    (onExporting)="onExporting($event)"
    (onEditingStart)="openEditingStart($event)"
    [height]="'82vh'"
    [scrolling]="{ mode: 'virtual' }"
    [showColumnLines]="true"
  >
    <dxo-filter-row [visible]="isFilterRowVisible"></dxo-filter-row>

    <dxo-header-filter [visible]="showHeaderFilter"></dxo-header-filter>
    <dxo-editing
      mode="popup"
      [allowUpdating]="canEdit"
      [allowDeleting]="canDelete"
    >
    </dxo-editing>
    <dxo-export [enabled]="true" [formats]="['xlsx']"> </dxo-export>
    <dxo-paging [pageSize]="10"></dxo-paging>

    <dxo-toolbar>
      <dxi-item location="before">
        <div class="grid-header">Supplier</div>
      </dxi-item>

      <dxi-item
        location="after"
        widget="dxButton"
        [options]="{
          icon: 'search',
          hint: isFilterRowVisible ? 'Hide Filter Row' : 'Show Filter Row',
          onClick: toggleFilterRow,
          stylingMode: 'contained',
          elementAttr: { class: 'toolbar-icon-btn' },
        }"
      ></dxi-item>

      <dxi-item
        location="after"
        widget="dxButton"
        [options]="refreshButtonOptions"
      ></dxi-item>

      <!-- Export (built-in, kept) -->
      <dxi-item
        name="exportButton"
        location="after"
        cssClass="toolbar-icon-btn export-btn"
      ></dxi-item>
      <!-- Divider -->
      <dxi-item location="after">
        <div class="toolbar-divider"></div>
      </dxi-item>
      <!-- Add -->
      <dxi-item
        location="after"
        widget="dxButton"
        [visible]="canAdd"
        [options]="addButtonOptions"
      ></dxi-item>
    </dxo-toolbar>

    <dxo-pager
      [visible]="true"
      [allowedPageSizes]="allowedPageSizes"
      [displayMode]="displayMode"
      [showPageSizeSelector]="showPageSizeSelector"
      [showInfo]="showInfo"
      [showNavigationButtons]="showNavButtons"
    >
    </dxo-pager>
    <dxo-paging [pageSize]="10"></dxo-paging>
    <dxi-column
      dataField="SNO"
      caption="S.No"
      alignment="left"
      width="70"
    ></dxi-column>
    <dxi-column dataField="SUPP_CODE" caption="Code"></dxi-column>
    <dxi-column dataField="SUPP_NAME" caption="Supplier Name"></dxi-column>
    <dxi-column dataField="COUNTRY_NAME" caption="Country"></dxi-column>
    <dxi-column dataField="STATE_NAME" caption="State"> </dxi-column>
    <dxi-column dataField="CITY" caption="City"></dxi-column>
    <dxi-column dataField="PHONE" caption="Phone"></dxi-column>
    <dxi-column dataField="EMAIL" caption="Email"></dxi-column>
    <dxi-column type="buttons" width="110" [buttons]="allButtonsEditDelete">
    </dxi-column>
  </dx-data-grid>
  <form-popup
    [(visible)]="isAddSupplierPopupOpened"
    [showApprove]="false"
    [width]="1000"
    [height]="'90vh'"
    (save)="onClickSaveSupplier()"
    titleText="New Supplier"
    (cancel)="onCancelSupplier()"
    (onHidden)="handleFormClosed()"
  >
    <app-supplier-form #supplierForm></app-supplier-form>
  </form-popup>

  <dx-popup
    [(visible)]="isEditSupplierPopupOpened"
    [width]="1000"
    [height]="'90vh'"
    [showTitle]="true"
    title="Edit Supplier"
  >
    <app-supplier-edit
      [supplierData]="selectedSupplier"
      (formClosed)="handleFormClosed()"
    ></app-supplier-edit>
  </dx-popup>
</div>
