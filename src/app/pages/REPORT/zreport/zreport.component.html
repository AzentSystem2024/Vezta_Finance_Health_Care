<div class="view-wrapper list-page">

  <!-- ================= FILTER PANEL ================= -->
  <div
    class="paramsDiv SearchParams-container"
    [ngClass]="{ 'hide-content': !isFilterVisible }"
  >
    <dx-form>
      <dxi-item itemType="group" [colCount]="4">

        <!-- Year -->
        <dxi-item>
          <dx-select-box
            label="Year"
            labelMode="floating"
            [(value)]="selectedYear"
            [dataSource]="years"
            (onValueChanged)="onYearChanged($event)">
          </dx-select-box>
        </dxi-item>

        <!-- Month -->
        <dxi-item>
          <dx-select-box
            label="Month"
            labelMode="floating"
            [dataSource]="monthDataSource"
            displayExpr="name"
            valueExpr="value"
            [(value)]="selectedmonth"
            (onValueChanged)="onMonthValueChanged($event)">
          </dx-select-box>
        </dxi-item>

        <!-- From Date -->
        <dxi-item>
          <dx-date-box
            label="From Date"
            labelMode="floating"
            [(value)]="selected_from_date"
            displayFormat="dd-MM-yyyy"
            (onValueChanged)="onFromDateChange($event)">
          </dx-date-box>
        </dxi-item>

        <!-- To Date -->
        <dxi-item>
          <dx-date-box
            label="To Date"
            labelMode="floating"
            [(value)]="selected_To_date"
            displayFormat="dd-MM-yyyy"
            (onValueChanged)="onToDateChange($event)">
          </dx-date-box>
        </dxi-item>

        <!-- Store -->
        <dxi-item>
          <dx-tag-box
  label="Store"
  labelMode="floating"
  displayExpr="DESCRIPTION"
  valueExpr="ID"
  [items]="Store"
  [searchEnabled]="true"
  [(value)]="selectedStoreid"
  [showSelectionControls]="true"
  [maxDisplayedTags]="100"
  [showMultiTagOnly]="true"
  [multiline]="false"
  [hint]="storeHint"
  (onValueChanged)="updateStoreHint()"
></dx-tag-box>
        </dxi-item>



<!-- Empty space -->
<dxi-item [colSpan]="2"></dxi-item>

<!-- Apply button -->
<dxi-item [colSpan]="1" cssClass="apply-btn-right">
  <dx-button
    text="Apply"
    type="default"
    stylingMode="contained"
    (onClick)="load_JournalBook_data()">
  </dx-button>
</dxi-item>

      </dxi-item>
    </dx-form>
  </div>

  <!-- ================= TOGGLE BUTTON ================= -->
  <div class="button-container mt-1 mb-2">
    <dx-button
      class="toggleButton"
      [width]="200"
      [height]="13"
      stylingMode="outlined"
      type="normal"
      [icon]="isFilterVisible ? 'chevronup' : 'chevrondown'"
      (onClick)="toggleFiltersPanel()"
      [hint]="isFilterVisible ? 'Hide Filters' : 'Show Filters'">
    </dx-button>
  </div>

  <!-- ================= GRID ================= -->
  <div class="grid-container">
    <dx-data-grid
      #dataGrid
      class="grid theme-dependent"
      [dataSource]="JournalBookDataSource"
      height="79vh"
       [showBorders]="true"
      [showRowLines]="true"
      [allowColumnResizing]="false"
      [showColumnLines]="true"
      [columnAutoWidth]="true"
      [groupPanel]="{ visible: true }"
      [grouping]="{ autoExpandAll: true }"
      [rowAlternationEnabled]="true"
      rowAlternationInterval="2"
      [remoteOperations]="false"
      [scrolling]="{ mode: 'virtual' }"
      [summary]="summaryColumnsData"
      [showColumnLines]="true"
      [showRowLines]="true"
      [allowColumnReordering]="true"
      [filterRow]="{ visible: false }"
      [headerFilter]="{ visible: true }"
      (onExporting)="onExporting($event)"
    >

    <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-export [enabled]="true" [formats]="['xlsx', 'pdf']"> </dxo-export>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="true"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>

      <!-- ================= TOOLBAR ================= -->
      <dxo-toolbar>

        <dxi-item location="before">
          <div class="grid-header">Z Report</div>
        </dxi-item>

        <dxi-item
          widget="dxButton"
          [options]="searchButtonOptions">
        </dxi-item>

        <dxi-item
          widget="dxButton"
          [options]="refreshButtonOptions">
        </dxi-item>

        <dxi-item name="exportButton"></dxi-item>

      </dxo-toolbar>

      <!-- ================= COLUMNS ================= -->
      <dxi-column
        dataField="Date"
        caption="Date"
        dataType="date"
        [format]="{ type: 'custom', formatter: formatDates }">
      </dxi-column>

      <dxi-column dataField="Invoice No" caption="Invoice No"></dxi-column>
      <dxi-column dataField="Customer" caption="Customer"></dxi-column>
      <dxi-column dataField="Store" caption="Store"></dxi-column>
      <dxi-column dataField="Invoice Type" caption="Invoice Type"></dxi-column>
      <dxi-column dataField="Discount" caption="Discount"></dxi-column>
      <dxi-column
        caption="Ex. VAT Total"
        name="ExVATtotal"
        [calculateCellValue]="getExVATtotal"
        alignment="right"
        [format]="{ type: 'fixedPoint', precision: 2 }">
      </dxi-column>
      <dxi-column
        caption="VAT Amount"
        alignment="right"
        dataField="VAT Amount"
        [format]="{ type: 'fixedPoint', precision: 2 }">
      </dxi-column>
      <dxi-column
        name="netAmount"
        [calculateCellValue]="getNetAmount"
        caption="Inc.VAT Total"
        alignment="right"
        [format]="{ type: 'fixedPoint', precision: 2 }">
      </dxi-column>
      <dxi-column
        caption="CASH"
        dataField="CASH"
        alignment="right"
        [format]="{ type: 'fixedPoint', precision: 2 }">
      </dxi-column>
      <dxi-column
        caption="Bank Card"
        alignment="right"
        dataField="BANK CARD"
        [format]="{ type: 'fixedPoint', precision: 2 }">
      </dxi-column>
       <dxi-column
        caption="Fab Pos Card"
        alignment="right"
        dataField="FAB POS CARD"
        [format]="{ type: 'fixedPoint', precision: 2 }">
      </dxi-column>
      <dxi-column
        caption="Room Charge"
        dataField="ROOM CHARGE"
        alignment="right"
        [format]="{ type: 'fixedPoint', precision: 2 }">
      </dxi-column>

      <dxi-column *ngIf="journalBookCount > 0" type="buttons" [width]="100">
        <dxi-button
          icon="eyeopen"
          text="View"
          [onClick]="onViewClick.bind(this)">
        </dxi-button>
      </dxi-column>

    </dx-data-grid>
  </div>

</div>

<!-- ================= POPUP ================= -->
<dx-popup
  *ngIf="isViewInvoice"
  [(visible)]="isViewInvoice"
  [width]="'95vw'"
  [height]="'100vh'"
  title="New Invoice"
  (onHiding)="handleClose()"
>
  <!-- <ng-container *ngIf="isAddInvoice"> -->
  <app-add-invoice-retail
    [isEditing]="true"
    [EditingResponseData]="selectedInvoice"
    (popupClosed)="handleClose()"
  ></app-add-invoice-retail>
  <!-- </ng-container> -->
</dx-popup>
