<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      class="grid theme-dependent"
      [dataSource]="BalanceSheetReport"
      width="100%"
      height="82vh"
      [showBorders]="true"
      [showRowLines]="true"
      [allowColumnResizing]="false"
      [showColumnLines]="true"
      [columnAutoWidth]="true"
      [groupPanel]="{ visible: true }"
      [grouping]="{ autoExpandAll: true }"
      [rowAlternationEnabled]="true"
      rowAlternationInterval="2"
      [remoteOperations]="false"
      [scrolling]="{ mode: 'virtual' }"
      (onRowPrepared)="onRowPrepared($event)"
      [allowColumnReordering]="true"
      [filterRow]="{ visible: false }"
      (onContentReady)="onContentReady($event)"
      id="dataGrid"
      [headerFilter]="{ visible: false }"
      [columnFixing]="{
        enabled: true,
        texts: { fix: 'Freeze', unfix: 'Unfreeze' },
      }"
      (onExporting)="onExporting($event)"
      [loadPanel]="{ enabled: true, text: 'Loading...' }"
      (onCellClick)="onCellClick($event)"
    >
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-export [enabled]="true" [formats]="['xlsx']"> </dxo-export>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="true"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>

      <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="
              font-weight: 600;
              font-size: 20px;
              margin-left: 12px;
              padding: -3px;
              margin-right: 3px;
            "
          >
            Balance Sheet with Dimensions
          </div>
        </dxi-item>

        <dxi-item>
          <dx-tag-box
            labelMode="floating"
            labelLocation="left"
            label="Financial Dimension"
            [width]="170"
            [dataSource]="Diamensions"
            displayExpr="DESCRIPTION"
            valueExpr="ID"
            [searchEnabled]="true"
            [showSelectionControls]="true"
            [showMultiTagOnly]="true"
            [multiline]="false"
            [(value)]="selectedDiamensions"
            (onValueChanged)="onDimensionChange($event)"
            [hint]="getSelectedDimensionHint()"
            tagTemplate="customTag"
          >
            <div *dxTemplate="let item of 'customTag'" class="custom-tag">
              {{ item.DESCRIPTION }}{{ item.SHORT_NAME }}
              <span *ngIf="!isLastTag(item)"> - </span>
            </div>
          </dx-tag-box>
        </dxi-item>

        <dxi-item>
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="Year"
            [width]="100"
            [(value)]="selectedYear"
            [dataSource]="years"
            (onValueChanged)="onYearChanged($event)"
            placeholder="Year"
          ></dx-select-box>
        </dxi-item>

        <dxi-item>
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="Month"
            [width]="120"
            [dataSource]="monthDataSource"
            displayExpr="name"
            valueExpr="value"
            [(value)]="selectedmonth"
            (onValueChanged)="onMonthValueChanged($event)"
            [dropDownOptions]="{ width: 'auto' }"
          ></dx-select-box>
        </dxi-item>

        <dxi-item>
          <dx-date-box
            [width]="120"
            label="Date From"
            labelMode="floating"
            displayFormat="dd-MM-yyyy"
            [value]="formatted_from_date"
            (onValueChanged)="onFromDateChange($event)"
          ></dx-date-box>
        </dxi-item>

        <dxi-item>
          <dx-date-box
            [width]="120"
            label="Date To"
            labelMode="floating"
            displayFormat="dd-MM-yyyy"
            [value]="formatted_To_date"
            (onValueChanged)="onToDateChange($event)"
          ></dx-date-box>
        </dxi-item>

        <dxi-item>
          <dx-button
            text="Apply"
            type="default"
            icon="todo"
            stylingMode="contained"
            (onClick)="get_DataSource()"
          >
          </dx-button>
        </dxi-item>

        <dxi-item name="exportButton"></dxi-item>
      </dxo-toolbar>

      <dxo-grouping
        [autoExpandAll]="false"
        [contextMenuEnabled]="true"
        [expandMode]="'rowClick'"
      ></dxo-grouping>
      <dxo-header-filter [visible]="true">
        <dxo-search [enabled]="true"></dxo-search>
      </dxo-header-filter>
      <dxo-filter-row
        [visible]="isFilterRowVisible"
        [applyFilter]="auto"
      ></dxo-filter-row>

      <dxi-column
        dataField="TYPE_NAME"
        caption="Category"
        dataType="string"
      ></dxi-column>

      <dxi-column
        dataField="MAIN_GROUP_NAME"
        caption="Group"
        alignment="left"
        dataType="number"
      ></dxi-column>

      <dxi-column dataField="PARTICULARS" caption="Particulars"></dxi-column>

      <dxi-column dataField="CODE" caption="Code" width="200"></dxi-column>

      <dxi-column
        dataField="DESCRIPTION"
        caption="Description"
        width="200"
      ></dxi-column>

      <dxi-column
        dataField="AMOUNT"
        caption="Amount"
        dataType="number"
        format="#,##0.00"
      ></dxi-column>

      <!-- Group summary for MAIN_GROUP_NAME -->
      <dxo-summary>
        <dxi-group-item
          column="AMOUNT"
          summaryType="sum"
          [alignByColumn]="true"
          displayFormat="Total: {0}"
          valueFormat="#,##0.00"
        ></dxi-group-item>
      </dxo-summary>

      <dxi-column
        *ngIf="BalanceSheetReport.length > 0"
        type="buttons"
        [width]="80"
      >
        <dxi-button
          hint="View"
          icon="eyeopen"
          text="View"
          width="80"
          [onClick]="onViewClick.bind(this)"
        ></dxi-button>
      </dxi-column>
    </dx-data-grid>
  </div>

  <dx-popup
    [(visible)]="dimensionPopupVisible"
    [width]="700"
    [height]="500"
    title="Financial Dimension Details"
    [showCloseButton]="true"
    [dragEnabled]="true"
    [hideOnOutsideClick]="true"
  >
    <dx-data-grid
      [dataSource]="dimensionPopupData"
      [showBorders]="true"
      [columnAutoWidth]="true"
      [rowAlternationEnabled]="true"
    >
      <dxi-column dataField="Dimension" caption="Dimension"></dxi-column>
      <dxi-column dataField="Code" caption="Code"></dxi-column>
      <dxi-column dataField="Description" caption="Description"></dxi-column>
    </dx-data-grid>
  </dx-popup>
</div>
