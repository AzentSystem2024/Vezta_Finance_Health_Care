<div class="login-wrapper">
  <form class="login-form" (submit)="onSubmit($event)">
    <div class="logo">
      <!-- <h1 class="brand-title">MMARK</h1> -->
      <img
        src="../../../../assets/images/6e23102ce572502e660df2d9b8ac0c1454ec149d.png"
        alt="MMARK Logo"
        class="brand-logo"
        height="50px"
      />

      <p class="subtitle">LOG IN TO YOUR ACCOUNT</p>
    </div>

    <!-- Username -->
    <dx-text-box
      [(value)]="formData.LOGIN_NAME"
      [disabled]="loading"
      placeholder="Username"
      stylingMode="outlined"
      mode="text"
      (onValueChanged)="onUsernameChange($event)"
      [buttons]="[
        {
          name: 'user',
          location: 'before',
          options: { icon: 'user', stylingMode: 'text', tabIndex: -1 },
        },
      ]"
    >
      <div *dxTemplate="let data of 'before'">
        <i class="dx-icon dx-icon-user"></i>
      </div>
    </dx-text-box>
    <dx-validator
      [validationRules]="[
        { type: 'required', message: 'Username is required' },
      ]"
    >
    </dx-validator>

    <!-- Password -->
    <!-- Password -->
    <dx-text-box
      [(value)]="formData.PASSWORD"
      [disabled]="loading"
      placeholder="Password"
      stylingMode="outlined"
      [inputAttr]="{ autocomplete: 'new-password' }"
      [mode]="passwordMode"
      style="margin-top: 16px"
      [buttons]="[
        {
          name: 'user',
          location: 'before',
          options: { icon: 'lock', stylingMode: 'text', tabIndex: -1 },
        },
        {
          name: 'togglePassword',
          location: 'after',
          options: {
            icon:
              passwordMode === 'password' ? 'fas fa-eye-slash' : 'fas fa-eye',
            stylingMode: 'text',
            onClick: togglePasswordVisibility,
          },
        },
      ]"
    >
      <!-- Lock icon before input -->
      <div *dxTemplate="let data of 'before'">
        <i class="dx-icon dx-icon-lock lockicon"></i>
      </div>

      <!-- Eye icon after input -->
      <!-- <div
        *dxTemplate="let data of 'after'"
        (click)="showPassword = !showPassword"
        style="cursor: pointer"
      >
        <i
          class="dx-icon"
          [ngClass]="showPassword ? 'dx-icon-eyeclose' : 'dx-icon-eyeopen'"
        ></i>
      </div> -->
    </dx-text-box>
    <dx-validator
      [validationRules]="[
        { type: 'required', message: 'Password is required' },
      ]"
    >
    </dx-validator>

    <!-- Company -->
    <dx-select-box
      [(value)]="formData.COMPANY_ID"
      [dataSource]="CompanyList"
      displayExpr="COMPANY_NAME"
      valueExpr="COMPANY_ID"
      placeholder="Select Company"
      stylingMode="outlined"
      style="margin-top: 16px"
    >
      <dx-validator
        [validationRules]="[
          { type: 'required', message: 'Company Name is required' },
        ]"
      ></dx-validator>
    </dx-select-box>

    <!-- Financial Year -->
    <dx-select-box
      [(value)]="formData.FINANCIAL_YEAR_ID"
      [dataSource]="finacialYearList"
      displayExpr="DESCRIPTION"
      valueExpr="ID"
      placeholder="Select Financial Year"
      stylingMode="outlined"
      style="margin-top: 16px"
    >
    </dx-select-box>
    <dx-validator
      [validationRules]="[
        { type: 'required', message: 'Financial Year is required' },
      ]"
    >
    </dx-validator>

    <div class="reset-link">
      <!-- <a
        [routerLink]="resetLink"
        style="text-decoration: none; font-size: 14px; margin: top 3px"
        >Forgot password?</a -->
      <!-- > -->
    </div>
    <!-- Submit Button -->
    <dx-button
      type="default"
      width="100%"
      cssClass="btn-sign-in"
      [useSubmitBehavior]="true"
      style="margin-top: 30px"
    >
      <ng-container *ngIf="loading; else notLoading">
        <dx-load-indicator
          width="24px"
          height="24px"
          [visible]="true"
        ></dx-load-indicator>
      </ng-container>
      <ng-template #notLoading>LOG IN</ng-template>
    </dx-button>

    <!-- <div class="forgot-password-link" style="margin-top: 10px">
      <a [routerLink]="resetLink">Forgot password?</a>
    </div> -->

    <div class="error-message" *ngIf="errorMessage" style="margin-top: 10px">
      * {{ errorMessage }}
    </div>
  </form>
</div>
