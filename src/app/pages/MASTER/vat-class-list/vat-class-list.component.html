<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      class="grid theme-dependent"
      [dataSource]="VatClassDataSource"
      (onRowRemoving)="onRowRemoving($event)"
      [showBorders]="true"
      [allowColumnReordering]="true"
      [width]="'100%'"
      [height]="'82vh'"
      [showColumnHeaders]="true"
      [columnAutoWidth]="true"
      [allowColumnResizing]="true"
      [rowAlternationEnabled]="true"
      [showColumnLines]="true"
      (onExporting)="onExporting($event)"
      [scrolling]="{ mode: 'virtual' }"
      (onEditingStart)="OnEditingStartVatReturn($event)"
    >
      <dxo-filter-row [visible]="isFilterRowVisible"></dxo-filter-row>

      <dxo-header-filter [visible]="showHeaderFilter"></dxo-header-filter>

      <dxo-export [enabled]="true" [formats]="['xlsx']"> </dxo-export>

      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <dxo-editing
        mode="popup"
        [allowUpdating]="canEdit"
        [allowDeleting]="canDelete"
        [useIcons]="true"
      >
        <dxo-popup
          title="Edit Vat Class"
          [showTitle]="true"
          [width]="450"
          [height]="353"
        >
        </dxo-popup>
        <dxo-form [colCount]="1"></dxo-form>
      </dxo-editing>

      <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="
              font-weight: 600;
              font-size: 20px;
              margin-left: 12px;
              padding: -3px;
              margin-right: 3px;
            "
          >
            GST Class
          </div>
        </dxi-item>
        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="searchButtonOptions"
        ></dxi-item>

        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="refreshButtonOptions"
        ></dxi-item>
        <dxi-item
          name="exportButton"
          location="after"
          cssClass="export-btn"
        ></dxi-item>

        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="addButtonOptions"
          [visible]="canAdd"
        ></dxi-item>
      </dxo-toolbar>
      <dxi-column dataField="CODE" caption="Code">
        <dxi-validation-rule type="required" message="Code is required">
          <dxi-validation-rule type="pattern" message="Code is required">
          </dxi-validation-rule>
        </dxi-validation-rule>
      </dxi-column>
      <dxi-column dataField="VAT_NAME" caption="GST Name"> </dxi-column>
      <dxi-column dataField="CGST_PERC" caption="CGST" alignment="left">
        <dxi-validation-rule type="required" message="GST percent is required">
          <dxi-validation-rule type="pattern" message="GST percent is required">
          </dxi-validation-rule>
        </dxi-validation-rule>
      </dxi-column>
      <dxi-column dataField="SGST_PERC" caption="SGST" alignment="left">
      </dxi-column>
      <dxi-column dataField="IGST_PERC" caption="IGST" alignment="left">
      </dxi-column>
      <dxi-column type="buttons" [visible]="canEdit || canDelete" width="100">
      </dxi-column>
    </dx-data-grid>
  </div>
</div>

<form-popup
  [(visible)]="isAddVatclassPopupOpened"
  (save)="onClickSaveVatclass()"
  (onShown)="onPopupShown()"
  titleText="New GST Class"
  [showApprove]="false"
  [width]="800"
  [height]="'auto'"
>
  <app-vat-class-form></app-vat-class-form>
</form-popup>

<dx-popup
  [(visible)]="isEditVatclassPopupOpened"
  title="Edit GST Class"
  [width]="800"
  [height]="'80vh'"
>
  <app-vat-class-edit
    [selectedData]="selected_data"
    (formClosed)="handleClose()"
  >
  </app-vat-class-edit>
</dx-popup>
