<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      class="grid theme-dependent"
      [dataSource]="TrialBalanceReport"
      width="100%"
      height="82vh"
      [showBorders]="true"
      [showRowLines]="true"
      [allowColumnResizing]="false"
      [showColumnLines]="true"
      [columnAutoWidth]="true"
      [groupPanel]="{ visible: true }"
      [grouping]="{ autoExpandAll: false }"
      [rowAlternationEnabled]="true"
      rowAlternationInterval="2"
      [summary]="summaryColumnsData"
      [allowColumnReordering]="true"
      id="dataGrid"
      [scrolling]="{ mode: 'virtual' }"
      [export]="{ enabled: true, formats: ['xlsx', 'pdf'] }"
      [columnFixing]="{
        enabled: true,
        texts: { fix: 'Freeze', unfix: 'Unfreeze' },
      }"
      (onExporting)="onExporting($event)"
      [loadPanel]="{ enabled: true, text: 'Loading...' }"
      (onCellClick)="onCellClick($event)"
    >
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-export [enabled]="true" [formats]="['xlsx']"> </dxo-export>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="true"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>

      <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="
              font-weight: 600;
              font-size: 20px;
              margin-left: 12px;
              padding: -3px;
              margin-right: 3px;
            "
          >
            Trial Balance with Dimension
          </div>
        </dxi-item>

        <dxi-item>
          <dx-tag-box
            labelMode="floating"
            labelLocation="left"
            label="Financial Dimension"
            [width]="200"
            [dataSource]="Diamensions"
            placeholder="Select Dimension"
            displayExpr="DESCRIPTION"
            valueExpr="ID"
            [searchEnabled]="true"
            [showSelectionControls]="true"
            [showMultiTagOnly]="true"
            [multiline]="false"
            [(value)]="selectedDiamensions"
            (onValueChanged)="onDimensionChange($event)"
            [hint]="getSelectedDimensionHint()"
            tagTemplate="customTag"
          >
            <div *dxTemplate="let item of 'customTag'" class="custom-tag">
              {{ item.DESCRIPTION }}{{ item.SHORT_NAME }}
              <span *ngIf="!isLastTag(item)"> - </span>
            </div>
          </dx-tag-box>
        </dxi-item>

        <dxi-item>
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="Year"
            [width]="100"
            [(value)]="selectedYear"
            [dataSource]="years"
            (onValueChanged)="onYearChanged($event)"
            placeholder="Year"
          ></dx-select-box>
        </dxi-item>

        <dxi-item>
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="month"
            [dataSource]="monthDataSource"
            displayExpr="name"
            valueExpr="value"
            [(value)]="selectedmonth"
            width="120"
            (onValueChanged)="onMonthValueChanged($event)"
            [dropDownOptions]="{ width: 'auto' }"
          >
          </dx-select-box>
        </dxi-item>

        <dxi-item>
          <dx-date-box
            [width]="120"
            label="Date From"
            labelMode="floating"
            [displayFormat]="'dd-MM-yyyy'"
            [value]="formatted_from_date"
            (onValueChanged)="onFromDateChange($event)"
          ></dx-date-box>
        </dxi-item>
        <dxi-item>
          <dx-date-box
            [width]="120"
            label="Date To"
            labelMode="floating"
            [displayFormat]="'dd-MM-yyyy'"
            [value]="formatted_To_date"
            (onValueChanged)="onToDateChange($event)"
          >
          </dx-date-box>
        </dxi-item>

        <dxi-item>
          <dx-button
            class="mt-2"
            text="Apply"
            type="default"
            icon="todo"
            stylingMode="contained"
            (onClick)="get_DataSource()"
          >
          </dx-button>
        </dxi-item>

        <dxi-item name="exportButton"></dxi-item>
      </dxo-toolbar>

      <dxo-grouping
        [autoExpandAll]="false"
        [contextMenuEnabled]="true"
        [expandMode]="'rowClick'"
      ></dxo-grouping>

      <dxo-header-filter
        [visible]="true"
        [allowSearch]="true"
        [allowSelectAll]="true"
        [search]="{ enabled: true, mode: 'contains' }"
      >
      </dxo-header-filter>

      <dxo-filter-row [visible]="true" [applyFilter]="auto"></dxo-filter-row>
      <dxi-column
        dataField="MainGroup"
        caption="Main Group"
        dataType="string"
      ></dxi-column>
      <dxi-column
        dataField="SubGroup"
        caption="Sub Group"
        alignment="left"
        dataType="number"
      ></dxi-column>
      <dxi-column dataField="Category" caption="Category"></dxi-column>
      <dxi-column dataField="Code" caption="Code" width="200"></dxi-column>
      <dxi-column
        dataField="Description"
        caption="Description"
        width="200"
      ></dxi-column>
      <dxi-column caption="Opening Balance" cssClass="opening-header">
        <dxi-column
          dataField="OpeningBalanceDebit"
          caption="Debit"
          cssClass="opening-sub-header"
          [allowEditing]="false"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
          dataType="number"
        ></dxi-column>
        <dxi-column
          dataField="OpeningBalanceCredit"
          caption="Credit"
          cssClass="opening-sub-header"
          alignment="center"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
          dataType="number"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column caption="During the Period" cssClass="DuringPeriod-header">
        <dxi-column
          dataField="DuringThePeriodDebit"
          caption="Debit"
          alignment="right"
          cssClass="DuringPeriod-sub-header"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
          dataType="number"
        ></dxi-column>
        <dxi-column
          dataField="DuringThePeriodCredit"
          caption="Credit"
          alignment="center"
          cssClass="DuringPeriod-sub-header"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
          dataType="number"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column caption="Closing Balance" cssClass="closing-header">
        <dxi-column
          dataField="ClosingBalanceDebit"
          caption="Debit"
          alignment="right"
          [width]="130"
          cssClass="closing-sub-header"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
          dataType="number"
        ></dxi-column>
        <dxi-column
          dataField="ClosingBalanceCredit"
          caption="Credit"
          cssClass="closing-sub-header"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
          dataType="number"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column
        *ngIf="TrialBalanceReport.length > 0"
        type="buttons"
        [width]="100"
      >
        <dxi-button
          hint="View"
          icon="eyeopen"
          text="View"
          [onClick]="onViewClick.bind(this)"
        ></dxi-button>
      </dxi-column>
    </dx-data-grid>
  </div>

  <dx-popup
    [(visible)]="dimensionPopupVisible"
    [width]="700"
    [height]="500"
    title="Financial Dimension Details"
    [showCloseButton]="true"
    [dragEnabled]="true"
    [hideOnOutsideClick]="true"
  >
    <dx-data-grid
      [dataSource]="dimensionPopupData"
      [showBorders]="true"
      [columnAutoWidth]="true"
      [rowAlternationEnabled]="true"
    >
      <dxi-column dataField="Dimension" caption="Dimension"></dxi-column>
      <dxi-column dataField="Code" caption="Code"></dxi-column>
      <dxi-column dataField="Description" caption="Description"></dxi-column>
    </dx-data-grid>
  </dx-popup>
</div>
