<dx-validation-group #stateValidationGroup>
<div class="form-container">
  <dx-text-box
    label="StateCode"
    labelMode="floating"
    [(value)]="formStateData.STATE_CODE"
  >
  <dx-validator>
            <dxi-validation-rule
              type="required"
              message="State Code is required"
            ></dxi-validation-rule>
          </dx-validator>
  </dx-text-box>
  <dx-text-box
    label="State Name"
    labelMode="floating"
    [(value)]="formStateData.STATE_NAME"
  >
  <dx-validator>
            <dxi-validation-rule
              type="required"
              message="State Name is required"
            ></dxi-validation-rule>
          </dx-validator>
  </dx-text-box>
  <dx-select-box
    label="Country"
    labelMode="floating"
    [items]="CountryDropdownData"
    [(value)]="formStateData.COUNTRY_ID"
    displayExpr="COUNTRY_NAME"
    valueExpr="ID"
    placeholder="Select Country"
    [searchEnabled]="true"
  >
  </dx-select-box>
</div>

<div class="fixed-footer popup-footer">
  <dx-button
    text="Cancel"
    stylingMode="outlined"
    type="normal"
    class="action-btn"
    (onClick)="cancel()"
  ></dx-button>
  <dx-button
    text="Save"
    stylingMode="contained"
    type="default"
    class="action-btn"
    (onClick)="onRowUpdating(stateValidationGroup)"
  ></dx-button>
</div>
</dx-validation-group>
