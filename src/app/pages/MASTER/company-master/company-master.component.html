<div class="view-wrapper list-page">
  <dx-data-grid
    class="grid theme-dependent"
    [dataSource]="Datasource"
    [showBorders]="true"
    [rowAlternationEnabled]="true"
    rowAlternationInterval="2"
    [allowColumnReordering]="true"
    [allowColumnResizing]="true"
    [showColumnLines]="true"
    (onRowRemoving)="delete_Data($event)"
    [height]="'82vh'"
    noDataText=" "
    (onEditingStart)="onEditingStart($event)"
    [scrolling]="{ mode: 'virtual' }"
    (onExporting)="onExporting($event)"
  >
    <dxo-editing mode="row" [allowDeleting]="true"></dxo-editing>
    <dxo-export [enabled]="true" [formats]="['xlsx']"> </dxo-export>

    <dxo-filter-row [visible]="isFilterRowVisible"></dxo-filter-row>

    <dxo-header-filter [visible]="true">
      <dxo-search [enabled]="true"></dxo-search>
    </dxo-header-filter>

    <dxo-paging [pageSize]="10"></dxo-paging>
    <dxo-pager
      [visible]="true"
      [allowedPageSizes]="allowedPageSizes"
      [displayMode]="displayMode"
      [showPageSizeSelector]="showPageSizeSelector"
      [showInfo]="true"
      [showNavigationButtons]="true"
    ></dxo-pager>

    <dxo-editing
      mode="popup"
      [allowUpdating]="canEdit"
      [allowDeleting]="canDelete"
      [allowAdding]="true"
    >
      <!-- <dxo-popup title="Update Department" [showTitle]="true" [width]="600" [height]="300"></dxo-popup> -->
    </dxo-editing>

    <dxo-toolbar>
      <dxi-item location="before" locateInMenu="never">
        <div
          class="grid-header"
          style="
            font-weight: 600;
            font-size: 20px;
            margin-left: 12px;
            padding: -3px;
            margin-right: 3px;
          "
        >
          Company
        </div>
      </dxi-item>
      <dxi-item
        location="after"
        widget="dxButton"
        [options]="searchButtonOptions"
      ></dxi-item>

      <!-- Refresh -->
      <dxi-item
        location="after"
        widget="dxButton"
        [options]="refreshButtonOptions"
      ></dxi-item>

      <!-- Search -->
      <!-- Divider -->
      <!-- Export (built-in, kept) -->

      <!-- Divider -->
      <dxi-item location="after">
        <div class="toolbar-divider"></div>
      </dxi-item>

      <dxi-item
        name="exportButton"
        location="after"
        cssClass="toolbar-icon-btn export-btn"
      ></dxi-item>

      <dxi-item
        location="after"
        widget="dxButton"
        [options]="addButtonOptions"
        *ngIf="canAdd"
      ></dxi-item>
    </dxo-toolbar>

    <!-- This field ID optional .Used for displaying data temp -->
    <dxi-column
      dataField="SlNo"
      [width]="80"
      caption="Sl.No"
      [allowFiltering]="false"
      [allowEditing]="false"
      alignment="left"
      [allowHeaderFiltering]="false"
    ></dxi-column>
    <dxi-column dataField="COMPANY_CODE" caption="Code"></dxi-column>

    <dxi-column dataField="COMPANY_NAME" caption="Company Name"></dxi-column>

    <dxi-column
      dataField="COMPANY_TYPE_NAME"
      caption="Company Type"
    ></dxi-column>

    <dxi-column
      dataField="IS_INACTIVE"
      caption="Status"
      cellTemplate="statusCellTemplate"
    ></dxi-column>
    <div *dxTemplate="let cellData of 'statusCellTemplate'">
      <i
        class="fas fa-flag"
        [ngClass]="getStatusFlagClass(cellData.value)"
        [attr.title]="getStatusText(cellData.value)"
        style="margin-left: 10px; cursor: default"
      ></i>
    </div>
  </dx-data-grid>
</div>

<dx-popup
  [(visible)]="addPopup"
  [width]="630"
  height="640"
  title="New Company"
  [shading]="false"
  [showCloseButton]="true"
  (onHiding)="onAddPopupClose()"
  [shading]="true"
  [hideOnOutsideClick]="false"
>
  <!-- INPUT FIELD -->

  <dxi-item title="Basic">
    <div class="tab-content tab-basic">
      <dx-validation-group #formValidationGroup>
        <dx-form [formGroup]="formsource" width="580" class="mt-3">
          <dxi-item itemType="group" [colCount]="2" [colSpan]="2">
            <dxi-item>
              <dx-select-box
                #dealerTypeBoxRef
                label="Company Type *"
                labelMode="floating"
                alignment="center"
                formControlName="CompanyType"
                valueExpr="ID"
                displayExpr="DESCRIPTION"
                [searchEnabled]="true"
                [items]="CompanyTypeDropdown"
                [(value)]="selectedCompanyType"
                (onValueChanged)="onCompanyTypeChanged($event)"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="CompanyType is required"
                  ></dxi-validation-rule> </dx-validator
              ></dx-select-box>
            </dxi-item>

            <dxi-item>
              <dx-text-box
                #dealerCodeBoxRef
                type="text"
                formControlName="Code"
                class="form-control mt-1"
                label="Company Code *"
                labelMode="floating"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="CompanyCode is required"
                  ></dxi-validation-rule>
                </dx-validator>
              </dx-text-box>
            </dxi-item>
          </dxi-item>

          <dxi-item itemType="group" [colCount]="2" [colSpan]="2">
            <dxi-item>
              <dx-text-box
                #dealerNameBoxRef
                type="text"
                formControlName="CompanyName"
                class="form-control mt-1"
                label="Company Name *"
                labelMode="floating"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="CompanyName is required"
                  ></dxi-validation-rule> </dx-validator
              ></dx-text-box>
            </dxi-item>
            <dxi-item>
              <dx-text-box
                #whatsAppBoxRef
                type="text"
                formControlName="ContactName"
                class="form-control mt-1"
                label="ContactName"
                labelMode="floating"
              ></dx-text-box>
            </dxi-item>
          </dxi-item>
          <dxi-item itemType="group" [colCount]="2" [colSpan]="2">
            <dxi-item>
              <dx-select-box
                label="State *"
                labelMode="floating"
                alignment="center"
                valueExpr="ID"
                formControlName="STATE_ID"
                displayExpr="DESCRIPTION"
                [searchEnabled]="true"
                [items]="stateList"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="CompanyType is required"
                  ></dxi-validation-rule> </dx-validator
              ></dx-select-box>
            </dxi-item>

            <dxi-item>
              <dx-text-box
                type="text"
                labelMode="floating"
                label="GST No."
                formControlName="GSTNo"
              >
              </dx-text-box>
            </dxi-item>
          </dxi-item>
          <dxi-item>
            <dx-text-box
              #contactNameBoxRef
              type="text"
              formControlName="FirstAddress"
              class="form-control mt-1"
              label="Address"
              labelMode="floating"
            ></dx-text-box>
          </dxi-item>

          <dxi-item>
            <dx-text-box
              #addressBoxRef
              type="text"
              formControlName="SecondAddress"
              class="form-control mt-1"
              label="Address"
              labelMode="floating"
            ></dx-text-box>
          </dxi-item>

          <dxi-item>
            <dx-text-box
              #mobileBoxRef
              type="text"
              formControlName="ThirdAddress"
              class="form-control mt-1"
              label="Address"
              labelMode="floating"
            ></dx-text-box>
          </dxi-item>

          <dxi-item itemType="group" [colCount]="2" [colSpan]="2">
            <dxi-item>
              <div *dxTemplate style="display: flex">
                <dx-select-box
                  label="Country code *"
                  [searchEnabled]="true"
                  labelMode="floating"
                  [(value)]="countryCodephone"
                  [items]="countryCodes"
                  valueExpr="CODE"
                  [displayExpr]="countryDisplay"
                  placeholder="+1"
                  [dropDownOptions]="{ width: '370px' }"
                  hint="Country Code"
                  (onValueChanged)="onCountrycodeChangePhone($event)"
                >
                  <div *dxTemplate="let data of 'item'">
                    <img
                      [src]="data.FLAG_URL"
                      width="20"
                      style="margin-right: 8px"
                    />
                    {{ data.CODE }}
                  </div>
                </dx-select-box>
                <dx-text-box
                  #telephoneBoxRef
                  type="text"
                  formControlName="Telephone"
                  class="form-control mt-1"
                  label="Phone"
                  labelMode="floating"
                >
                  <dx-validator>
                    <!-- <dxi-validation-rule
                  type="required"
                  message="Mobile No is required"
                ></dxi-validation-rule> -->
                    <dxi-validation-rule
                      type="custom"
                      [validationCallback]="validatePhoneLength"
                      [message]="
                        'Mobile no. must be  ' + Phone_limit + ' digits long'
                      "
                    ></dxi-validation-rule> </dx-validator
                ></dx-text-box>
              </div>
            </dxi-item>

            <dxi-item>
              <div *dxTemplate style="display: flex">
                <dx-select-box
                  label="Country code *"
                  [searchEnabled]="true"
                  labelMode="floating"
                  [(value)]="countryCodemobile"
                  [items]="countryCodes"
                  valueExpr="CODE"
                  [displayExpr]="countryDisplay"
                  placeholder="+1"
                  [dropDownOptions]="{ width: '370px' }"
                  hint="Country Code"
                  (onValueChanged)="onCountrycodeChangeMobile($event)"
                >
                  <div *dxTemplate="let data of 'item'">
                    <img
                      [src]="data.FLAG_URL"
                      width="20"
                      style="margin-right: 8px"
                    />a
                    {{ data.CODE }}
                  </div>
                </dx-select-box>
                <dx-text-box
                  #telephoneBoxRef
                  type="text"
                  formControlName="Mobile"
                  class="form-control mt-1"
                  label="Mobile"
                  labelMode="floating"
                  valueChangeEvent="keyup"
                >
                  <dx-validator>
                    <!-- <dxi-validation-rule
                  type="required"
                  message="Mobile No is required"
                ></dxi-validation-rule> -->
                    <dxi-validation-rule
                      type="custom"
                      [validationCallback]="validateMobileLength"
                      [message]="
                        'Mobile no. must be  ' + mobile_limit + ' digits long'
                      "
                    ></dxi-validation-rule> </dx-validator
                ></dx-text-box>
              </div>
            </dxi-item>
          </dxi-item>

          <dxi-item itemType="group" [colCount]="2" [colSpan]="2">
            <dxi-item>
              <div *dxTemplate style="display: flex">
                <dx-select-box
                  label="Country code *"
                  [searchEnabled]="true"
                  labelMode="floating"
                  [(value)]="countryCodewhatsapp"
                  [items]="countryCodes"
                  valueExpr="CODE"
                  [displayExpr]="countryDisplay"
                  placeholder="+1"
                  [dropDownOptions]="{ width: '370px' }"
                  hint="Country Code"
                  (onValueChanged)="onCountrycodeChangeWhatsapp($event)"
                >
                  <div *dxTemplate="let data of 'item'">
                    <img
                      [src]="data.FLAG_URL"
                      width="20"
                      style="margin-right: 8px"
                    />
                    {{ data.CODE }} {{ data.COUNTRY_NAME }}
                  </div>
                </dx-select-box>
                <dx-text-box
                  #whatsAppBoxRef
                  type="text"
                  formControlName="WhatsApp"
                  class="form-control mt-1"
                  label="Whatsapp No"
                  labelMode="floating"
                >
                  <dx-validator>
                    <!-- <dxi-validation-rule
                  type="required"
                  message="Mobile No is required"
                ></dxi-validation-rule> -->
                    <dxi-validation-rule
                      type="custom"
                      [validationCallback]="validateWhatsAppLength"
                      [message]="
                        'Mobile no. must be  ' + whatsapp_limit + ' digits long'
                      "
                    ></dxi-validation-rule> </dx-validator
                ></dx-text-box>
              </div>
            </dxi-item>

            <dxi-item>
              <dx-text-box
                #faxBoxRef
                type="text"
                formControlName="Email"
                class="form-control mt-1"
                label="Email"
                labelMode="floating"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="custom"
                    [validationCallback]="validateEmail"
                    message="Enter a valid email address"
                  >
                  </dxi-validation-rule>
                </dx-validator>
              </dx-text-box>
            </dxi-item>
          </dxi-item>

          <dxi-item itemType="group" [colCount]="2" [colSpan]="2">
            <dxi-item>
              <dx-text-box
                #whatsAppBoxRef
                type="text"
                formControlName="PAN"
                class="form-control mt-1"
                label="PAN No."
                labelMode="floating"
              ></dx-text-box>
            </dxi-item>

            <dxi-item>
              <dx-text-box
                #faxBoxRef
                type="text"
                formControlName="CIN"
                class="form-control mt-1"
                label="CIN"
                labelMode="floating"
              ></dx-text-box>
            </dxi-item>
          </dxi-item>
        </dx-form>
      </dx-validation-group>
    </div>
  </dxi-item>
  <!-- BUTTONS -->
  <div class="form-popup-buttons-container">
    <div class="popup-footer">
      <dx-button
        text="Cancel"
        stylingMode="outlined"
        type="normal"
        class="popup-btn"
        (onClick)="closePop()"
      ></dx-button>
      <dx-button
        [text]="isSaving ? 'Saving...' : 'Save'"
        [disabled]="isSaving"
        stylingMode="contained"
        type="default"
        class="popup-btn"
        (onClick)="addData()"
      ></dx-button>

      <!-- <dx-button
        text="Save"
        stylingMode="contained"
        type="default"
        class="popup-btn save-btn"
        (onClick)="addData()"
      ></dx-button> -->
    </div>
  </div>
</dx-popup>

        stylingMode="outlined"
        type="normal"
        class="popup-btn cancel-btn"
        (onClick)="closePop()"
      ></dx-button>

      <dx-button
        [text]="isSaving ? 'Saving...' : 'Save'"
        [disabled]="isSaving"
        stylingMode="contained"
        type="default"
        class="popup-btn save-btn"
        (onClick)="editData()"
      ></dx-button>
