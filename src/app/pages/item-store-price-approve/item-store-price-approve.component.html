<!-- item-store-prices-edit.component.html -->
<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      #dataGrid
      [width]="'100%'"
      [height]="'75vh'"
      [keyExpr]="'ID'"
      class="grid theme-dependent"
      noDataText=" "
      [dataSource]="worksheetItems"
      [showBorders]="true"
      [columnAutoWidth]="true"
      [rowAlternationEnabled]="true"
      rowAlternationInterval="2"
      [allowColumnReordering]="true"
      [allowColumnResizing]="true"
      [showColumnLines]="true"
      [editing]="{
        mode: 'cell',
        allowUpdating: true,
      }"
      [selection]="{ mode: 'multiple', showCheckBoxesMode: 'always' }"
      [selectedRowKeys]="selectedRowKeys"
      (onSelectionChanged)="onSelectionChanged($event)"
      (onRowUpdated)="onRowUpdated($event)"
    >
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <dxo-scrolling
        mode="standard"
        columnRenderingMode="virtual"
      ></dxo-scrolling>
      <dxo-search-panel
        [visible]="true"
        [highlightCaseSensitive]="false"
      ></dxo-search-panel>
      <dxo-header-filter [visible]="true"></dxo-header-filter>
      <dxo-search-panel
        [visible]="true"
        [highlightCaseSensitive]="false"
      ></dxo-search-panel>
      <dxo-editing mode="popup" [alloAdding]="true"> </dxo-editing>
      <dxo-toolbar>
        <dxi-item location="before">
          <div class="grid-header">Change Price</div>
        </dxi-item>
        <dxi-item location="after" template="priceColumnSelector"> </dxi-item>
        <dxi-item location="after" template="narration"> </dxi-item>
        <dxi-item
          location="after"
          widget="dxButton"
          [options]="searchButtonOptions"
        ></dxi-item>

        <!-- <dxi-item name="searchPanel" locateInMenu="auto"></dxi-item> -->
        <!-- <dxi-item
          location="after"
          template="ApproveButtons"
          cssClass="bottom-toolbar-buttons"
        >
        </dxi-item> -->
        <dxi-item
          location="after"
          template="cancelButton"
          cssClass="bottom-toolbar-buttons"
        >
        </dxi-item>

        <dxi-item
          location="after"
          template="formulaButton"
          cssClass="bottom-toolbar-buttons"
        >
        </dxi-item>

        <dxi-item
          location="after"
          template="saveButton"
          cssClass="bottom-toolbar-buttons"
        >
        </dxi-item>
      </dxo-toolbar>
      <div *dxTemplate="let data of 'priceColumnSelector'">
        <dx-tag-box
          [items]="priceColumnOptions"
          valueExpr="value"
          displayExpr="text"
          width="250"
          label="Select Prices"
          [(value)]="selectedPriceColumns"
          placeholder="Select Prices"
          labelMode="floating"
          [showSelectionControls]="true"
          (onValueChanged)="onPriceColumnChange()"
          [multiline]="false"
        >
        </dx-tag-box>
      </div>

      <div *dxTemplate="let data of 'narration'">
        <dx-text-box
          [(value)]="narrationText"
          placeholder="Enter Remarks"
          style="width: 250px"
        ></dx-text-box>
      </div>
      <div *dxTemplate="let data of 'ApproveButtons'">
        <!-- <dx-check-box
          text="Approve"
          [(value)]="isApproved"
          stylingMode="outlined"
        >
        </dx-check-box> -->
      </div>
      <div *dxTemplate="let data of 'cancelButton'">
        <dx-button
          text="Cancel"
          stylingMode="outlined"
          type="normal"
          (onClick)="Cancel()"
          style="width: 100px"
        ></dx-button>
      </div>
      <div *dxTemplate="let data of 'formulaButton'">
        <dx-button
          icon="formula"
          hint="Apply Formula"
          stylingMode="contained"
          type="default"
          (onClick)="applyFormula($event)"
          [disabled]="isButtonDisabled"
        ></dx-button>
      </div>
      <div *dxTemplate="let data of 'saveButton'">
        <dx-button
          text="Approve"
          stylingMode="contained"
          type="default"
          (onClick)="onSaveButtonClick()"
          [disabled]="isSaving"
          [loading]="isSaving"
          style="width: 100px"
        ></dx-button>
      </div>
      <dxi-column
        dataField="ITEM_CODE"
        caption="Item Code"
        [width]="150"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="DESCRIPTION"
        caption="Description"
        [width]="220"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="ITEM_TYPE"
        caption="Item Type"
        [width]="220"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="DEPT_NAME"
        caption="Department"
        [width]="150"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="CAT_NAME"
        caption="Category"
        [width]="150"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="BRAND_NAME"
        caption="Brand"
        [width]="150"
        [allowEditing]="false"
      ></dxi-column>

      <dxi-column
        caption="MRP"
        [visible]="isVisible('MRP')"
        [width]="120"
        alignment="center"
      >
        <dxi-column
          dataField="SALE_PRICE"
          caption="Present"
          [width]="130"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_NEW"
          caption="New"
          [width]="100"
          [allowEditing]="true"
          [allowEditing]="statusOfWorksheet !== 'Approved'"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column
        caption="Standard Price"
        [width]="120"
        [visible]="isVisible('PRICE1')"
        alignment="center"
      >
        <dxi-column
          dataField="SALE_PRICE1"
          caption="Present"
          [width]="130"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_LEVEL1_NEW"
          caption="New"
          [width]="100"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column
        caption="Price 2"
        [width]="120"
        [visible]="isVisible('PRICE2')"
        alignment="center"
      >
        <dxi-column
          dataField="SALE_PRICE2"
          caption="Present"
          [width]="130"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_LEVEL2_NEW"
          caption="New"
          [width]="100"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column
        caption="Price 3"
        [width]="120"
        [visible]="isVisible('PRICE3')"
        alignment="center"
      >
        <dxi-column
          dataField="SALE_PRICE3"
          caption="Present"
          [width]="130"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_LEVEL3_NEW"
          caption="New"
          [width]="100"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column
        caption="Price 4"
        [width]="120"
        [visible]="isVisible('PRICE4')"
        alignment="center"
      >
        <dxi-column
          dataField="SALE_PRICE4"
          caption="Present"
          [width]="130"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_LEVEL4_NEW"
          caption="New"
          [width]="100"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column
        caption="Price 5"
        [width]="120"
        [visible]="isVisible('PRICE5')"
        alignment="center"
      >
        <dxi-column
          dataField="SALE_PRICE5"
          caption="Present"
          [width]="130"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_LEVEL5_NEW"
          caption="New"
          [width]="100"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        >
        </dxi-column>
      </dxi-column>
    </dx-data-grid>
  </div>
</div>
<dx-popup
  [(visible)]="isPopupVisible"
  title="Change Price"
  [width]="500"
  [height]="350"
  [showCloseButton]="true"
  [dragEnabled]="true"
  [closeOnOutsideClick]="true"
>
  <div class="popup-content">
    <div class="form-row">
      <div class="input-container">
        <dx-number-box
          [(value)]="percentageString"
          placeholder="Enter percentage"
          [showSpinButtons]="true"
          label="enter percentage(%)"
          labelMode="floating"
          style="width: 350px"
        ></dx-number-box>
        <div class="toggle-container" (click)="toggleAdjustment()">
          <div
            class="toggle-slider"
            [ngClass]="{ increase: isIncrease, decrease: !isIncrease }"
          ></div>
          <span
            class="toggle-option"
            [class.active]="isIncrease"
            title="Decrease Price"
            >-</span
          >
          <span
            class="toggle-option"
            [class.active]="!isIncrease"
            title="Increase Price"
            >+</span
          >
        </div>
      </div>
    </div>

    <div>
      <dx-select-box
        [(value)]="roundingOption"
        [items]="roundingOptions"
        displayExpr="text"
        valueExpr="value"
        placeholder="Choose rounding option"
      ></dx-select-box>
    </div>

    <div>
      <dxi-item location="before" locateInMenu="auto">
        <dx-tag-box
          [items]="salePriceOptions"
          valueExpr="value"
          [(value)]="selectedSalePrice"
          displayExpr="value"
          label="Select Prices"
          labelMode="floating"
          labelLocation="left"
          [showSelectionControls]="true"
          [multiline]="false"
          [searchEnabled]="true"
          (onValueChanged)="handleSalePriceChange($event)"
          [width]="300"
          [disabled]="statusOfWorksheet === 'Approved'"
        >
        </dx-tag-box>
      </dxi-item>
      <!-- <dx-select-box
        [(value)]="selectedSalePrice"
        [items]="salePriceOptions"
        valueExpr="value"       
        displayExpr="text"       
        placeholder="Select Price Option"
        (onValueChanged)="handleSalePriceChange($event)"
      ></dx-select-box> -->
    </div>

    <div>
      <dx-button
        text="Apply Formula"
        stylingMode="contained"
        type="default"
        (onClick)="applyPriceChange()"
        style="width: 150px"
        [disabled]="isApplyButtonDisabled && isApproved"
      ></dx-button>
    </div>
  </div>
</dx-popup>
