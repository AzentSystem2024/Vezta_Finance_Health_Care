<dx-form class="plain-styled-form">
  <dxi-item itemType="group">
    <dxo-col-count-by-screen
      [xs]="1"
      [sm]="1"
      [md]="1"
      [lg]="1"
    ></dxo-col-count-by-screen>

    <!-- CODE -->
    <dxi-item>
      <dx-text-box
        label="Code *"
        [(value)]="newCurrency.CODE"
        labelMode="floating"
      >
        <dx-validator>
          <dxi-validation-rule
            type="required"
            message="Code is required"
          ></dxi-validation-rule>

          <dxi-validation-rule
            type="custom"
            [validationCallback]="validateCodeExists.bind(this)"
            message="Code already exists"
          ></dxi-validation-rule>

          <!-- Optional: uppercase / no spaces -->
          <dxi-validation-rule
            type="pattern"
            [pattern]="'^[A-Z0-9]+$'"
            message="Only uppercase letters and numbers allowed"
          ></dxi-validation-rule>
        </dx-validator>
      </dx-text-box>
    </dxi-item>

    <!-- SYMBOL -->
    <dxi-item>
      <dx-text-box
        label="Symbol *"
        [(value)]="newCurrency.SYMBOL"
        labelMode="floating"
      >
        <dx-validator>
          <dxi-validation-rule
            type="required"
            message="Symbol is required"
          ></dxi-validation-rule>

          <dxi-validation-rule
            type="custom"
            [validationCallback]="validateSymbolExists.bind(this)"
            message="Symbol already exists"
          ></dxi-validation-rule>

        </dx-validator>
      </dx-text-box>
    </dxi-item>

    <!-- DESCRIPTION -->
    <dxi-item>
      <dx-text-box
        label="Description *"
        [(value)]="newCurrency.DESCRIPTION"
        labelMode="floating"
      >
        <dx-validator>
          <dxi-validation-rule
            type="required"
            message="Description is required"
          ></dxi-validation-rule>
        </dx-validator>
      </dx-text-box>
    </dxi-item>

    <!-- FRACTION UNIT -->
    <dxi-item>
      <dx-text-box
        label="Fraction Unit "
        [(value)]="newCurrency.FRACTION_UNIT"
        labelMode="floating"
      >
      </dx-text-box>
    </dxi-item>

    <!-- EXCHANGE -->
    <dxi-item>
      <dx-number-box
        label="Exchange *"
        [(value)]="newCurrency.EXCHANGE"
        labelMode="floating"
        [min]="0"
        [step]="0.01"
        format="#,##0.000000"
        [showSpinButtons]="true"
      >
        <dx-validator>
          <dxi-validation-rule
            type="required"
            message="Exchange is required"
          ></dxi-validation-rule>

          <dxi-validation-rule
            type="numeric"
            message="Exchange must be a number"
          ></dxi-validation-rule>
        </dx-validator>
      </dx-number-box>
    </dxi-item>
  </dxi-item>
</dx-form>
