<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      [dataSource]="BankReconciliationdatasource"
      width="100%"
      noDataText=""
      height="70vh"
      [showBorders]="true"
      [showColumnLines]="true"
      [columnAutoWidth]="true"
      [wordWrapEnabled]="false"
      [grouping]="{ autoExpandAll: false }"
      [filterRow]="{ visible: false }"
      [rowAlternationEnabled]="true"
      [rowAlternationEnabled]="true"
      rowAlternationInterval="2"
      [allowColumnReordering]="true"
      [filterRow]="{ visible: false }"
      id="dataGrid"
      [headerFilter]="{ visible: false }"
      [columnFixing]="{
        enabled: true,
        texts: { fix: 'Freeze', unfix: 'Unfreeze' },
      }"
      [selection]="{ mode: 'multiple', showCheckBoxesMode: 'always' }"
      [(selectedRowKeys)]="selectedRows"
      (onSelectionChanged)="onSelectionChanged($event)"
      [summary]="summaryColumnsData"
      [summary.calculateCustomSummary]="
        summaryColumnsData.calculateCustomSummary
      "
    >
      <!-- (onEditingStart)="onEditLedger($event)" -->
      <!-- <dxo-editing
        mode="popup"
        [allowUpdating]="true"
      ></dxo-editing> -->
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-export [enabled]="true" [formats]="['xlsx', 'pdf']"> </dxo-export>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="true"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="
              font-weight: 600;
              font-size: 20px;
              margin-left: 12px;
              padding: -3px;
              margin-right: 3px;
            "
          >
            Bank Reconciliation
          </div>
        </dxi-item>

        <!-- <dxi-item>
           <dx-select-box
    [width]="200"
    label="Company Id"
    labelMode="floating"
    [items]="company_list"
    displayExpr="COMPANY_NAME"
    valueExpr="COMPANY_ID"
    [(value)]="selectedCompanyId"
    [searchEnabled]="true"
    (onValueChanged)="onCompanyChange($event)">
        >

        </dx-select-box>

        </dxi-item> -->
        <dxi-item>
          <dx-select-box
            [width]="250"
            label="Select Bank"
            labelMode="floating"
            [valueExpr]="'ID'"
            [displayExpr]="'DESCRIPTION'"
            [items]="Bank"
            (onValueChanged)="onBankChange($event)"
            [(value)]="selectedBankId"
            [searchEnabled]="true"
          >
          </dx-select-box>
        </dxi-item>

        <dxi-item itemType="simple" verticalAlignment="center">
          <dx-date-box
            [width]="150"
            label="As on Date"
            labelMode="floating"
            [(value)]="selected_To_date"
            displayFormat="dd-MM-yyyy"
            (onValueChanged)="onToDateChange($event)"
          >
          </dx-date-box>
        </dxi-item>

        <dxi-item itemType="simple" verticalAlignment="center">
          <dx-button
            text="Show"
            stylingMode="contained"
            type="default"
            class="mt-2"
            (onClick)="Getdata()"
          >
          </dx-button>
        </dxi-item>

        <dxi-item>
          <dx-text-box
            [width]="150"
            label="Closing Balance"
            labelMode="floating"
            [(value)]="runningbalance"
          >
          </dx-text-box>
        </dxi-item>

        <dxi-item>
          <dx-button
            text="Save"
            stylingMode="contained"
            type="default"
            class="mt-2"
            (onClick)="Savedata()"
          >
          </dx-button>
        </dxi-item>
      </dxo-toolbar>

      <dxo-sorting mode="none"></dxo-sorting>
      <dxo-filter-row visible="true"></dxo-filter-row>
      <dxo-header-filter visible="true"></dxo-header-filter>
      <dxo-paging page-size="10"></dxo-paging>
      <dxo-pager
        show-page-size-selector="true"
        show-info="true"
        show-navigator="true"
      ></dxo-pager>
      <dxo-header-filter [visible]="true">
        <dxo-search [enabled]="true"></dxo-search>
      </dxo-header-filter>
      <!-- <dxo-filter-row
      [visible]="isFilterRowVisible"
      [applyFilter]="auto"
    ></dxo-filter-row> -->
      <dxo-grouping
        [autoExpandAll]="false"
        [contextMenuEnabled]="true"
        [expandMode]="'rowClick'"
      ></dxo-grouping>
      <dxi-column dataField="VOUCHER_NO" caption="Voucher No"></dxi-column>
      <dxi-column
        dataField="TRANS_DATE"
        caption="Date"
        dataType="date"
        [format]="{ type: 'custom', formatter: formatDates }"
      ></dxi-column>
      <dxi-column
        dataField="REF_NO"
        caption="ChequeNo/ReferenceNo"
      ></dxi-column>
      <!-- <dxi-column dataField="CHEQUE_DATE" caption="Cheque Date" dataType="date" [format]="{ type: 'custom', formatter: formatDates }"></dxi-column> -->
      <dxi-column dataField="PARTY_NAME" caption="PartyName"></dxi-column>
      <dxi-column
        dataField="DR_AMOUNT"
        caption="Deposited"
        [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
        alignment="right"
      >
      </dxi-column>

      <dxi-column
        dataField="CR_AMOUNT"
        caption="Issued"
        [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
        alignment="right"
      >
      </dxi-column>
    </dx-data-grid>

    <div
      style="
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 16px;
        margin-top: 10px;
        font-weight: bold;
      "
    >
      <dx-text-box
        [width]="200"
        label="Closing Balance"
        labelMode="floating"
        [(value)]="closingBalance"
        [readOnly]="true"
      ></dx-text-box>

      <dx-number-box
        label="Total Debit"
        [width]="200"
        labelMode="floating"
        [(value)]="remainingDebit"
        [readOnly]="true"
      ></dx-number-box>

      <dx-number-box
        label="Total Credit"
        [width]="200"
        labelMode="floating"
        [(value)]="remainingCredit"
        [readOnly]="true"
      ></dx-number-box>
    </div>
  </div>
</div>
