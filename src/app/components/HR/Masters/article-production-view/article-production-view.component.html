<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      #dataGrid
      noDataText="No data available"
      [width]="'100%'"
      [height]="'82vh'"
      [loadPanel]="{
        enabled: true,
        text: 'Loading...',
        showIndicator: true,
        showPane: true,
      }"
      class="grid theme-dependent"
      [dataSource]="ArticleProductionDataSource"
      [showBorders]="true"
      [columnAutoWidth]="false"
      [wordWrapEnabled]="false"
      [rowAlternationEnabled]="true"
      [allowColumnReordering]="true"
      [showColumnHeaders]="true"
      [columnAutoWidth]="true"
      [allowColumnResizing]="true"
      [columnResizingMode]="'nextColumn'"
      [headerFilter]="{ visible: true, allowSearch: true }"
      [scrolling]="{ mode: 'virtual' }"
      rowAlternationInterval="2"
      [selection]="{ mode: 'single' }"
      focusStateEnabled="false"
      [groupPanel]="{ visible: true }"
      [grouping]="{ autoExpandAll: false }"
      [summary]="summaryColumnsData"
      (onExporting)="onExporting($event)"
    >
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-pager
        [visible]="true"
        [displayMode]="displayMode"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <dxo-load-panel [showPane]="false"></dxo-load-panel>
      <dxo-export
        [enabled]="true"
        [allowExportSelectedData]="false"
        [formats]="['xlsx']"
      >
      </dxo-export>
      <!-- <dxo-scrolling mode="standard"></dxo-scrolling> -->
      <!-- <dxo-filter-row
        [visible]="isFilterRowVisible"
        [applyFilter]="auto"
      ></dxo-filter-row> -->
      <dxo-toolbar>
        <dxi-item location="before">
          <div class="custom-toolbar-stack">
            <div class="grid-header">Article Production view</div>
          </div>
        </dxi-item>

        <dxi-item location="after">
          <dx-select-box
            [dataSource]="dateRanges"
            [displayExpr]="'label'"
            valueExpr="value"
            [(value)]="selectedDateRange"
            (onValueChanged)="onDateRangeChanged($event)"
            [searchEnabled]="true"
            [width]="250"
            placeholder="Select Date Range"
          >
            <div *dxTemplate="let item of 'item'">
              {{ item.value === "custom" ? "Custom" : item.label }}
            </div>
          </dx-select-box>
        </dxi-item>

        <dxi-item location="after">
          <div>
            <dx-tag-box
              class="mb-2"
              [items]="CompanyDetails"
              valueExpr="COMPANY_ID"
              displayExpr="COMPANY_NAME"
              label="Select Company"
              labelMode="floating"
              [(value)]="company_id"
              [showSelectionControls]="true"
              [multiline]="false"
              [searchEnabled]="true"
              [width]="300"
            ></dx-tag-box>
          </div>
        </dxi-item>

        <dxi-item location="after">
          <div class="toolbar-margin-top">
            <dx-button
              text="Apply"
              type="default"
              stylingMode="contained"
              (onClick)="get_DataSource()"
            ></dx-button>
          </div>
        </dxi-item>

        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="refreshButtonOptions"
        ></dxi-item>
        <!-- <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="searchButtonOptions"
        ></dxi-item>

        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="refreshButtonOptions"
        ></dxi-item> -->
        <!-- Divider -->
        <dxi-item location="after">
          <div class="toolbar-divider"></div>
        </dxi-item>
        <dxi-item
          name="exportButton"
          location="after"
          cssClass="export-btn"
        ></dxi-item>
      </dxo-toolbar>

      <!-- <div *dxTemplate="let data of 'dateFilterTemplate'">
        <dx-select-box
          [dataSource]="dateRanges"
          [displayExpr]="displayExpr"
          valueExpr="value"
          [(value)]="selectedDateRange"
          (onValueChanged)="onDateRangeChanged($event)"
          [searchEnabled]="true"
          width="250"
        >

         
          <div *dxTemplate="let item of 'item'">
            {{ item.value === "custom" ? "Custom" : item.label }}
          </div>
        </dx-select-box>
      </div> -->
      <dxo-grouping
        [autoExpandAll]="false"
        [contextMenuEnabled]="true"
        [expandMode]="'rowClick'"
      ></dxo-grouping>
      <!-- <dxi-column dataField="ARTICLE_ID" caption="Id"></dxi-column> -->
      <dxi-column dataField="ART_NO" caption="Art No."></dxi-column>
      <dxi-column dataField="COLOR" caption="Color"></dxi-column>
      <dxi-column dataField="CATEGORY" caption="Category"></dxi-column>
      <dxi-column
        dataField="SIZE"
        caption="Size"
        alignment="center"
      ></dxi-column>
      <dxi-column
        dataField="PRODUCTION_UNIT"
        caption="Production Unit"
      ></dxi-column>
      <dxi-column dataField="QUANTITY" caption="Quantity"></dxi-column>

      <!-- <dxi-column dataField="QTY_MULTIBOX" caption="Qty Multibox"></dxi-column> -->

      <!-- <dxi-column dataField="QTY_TOTAL" caption="Qty Total"></dxi-column> -->
    </dx-data-grid>
  </div>
</div>

<app-custom-date-popup
  [(visible)]="showCustomDatePopup"
  [startDate]="customStartDate"
  [endDate]="customEndDate"
  (applyDates)="onCustomDateApplied($event)"
>
</app-custom-date-popup>
