<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      #dataGrid
      class="grid theme-dependent"
      [dataSource]="StockViewReport"
      width="100%"
      height="82vh"
      [showBorders]="true"
      [showRowLines]="true"
      [allowColumnResizing]="false"
      [showColumnLines]="true"
      [columnAutoWidth]="true"
      [groupPanel]="{ visible: true }"
      [grouping]="{ autoExpandAll: true }"
      [rowAlternationEnabled]="true"
      rowAlternationInterval="2"
      [remoteOperations]="false"
      [scrolling]="{ mode: 'virtual' }"
      (onCellPrepared)="onCellPrepared($event)"
      (onRowPrepared)="onRowPrepared($event)"
      [allowColumnReordering]="true"
      [filterRow]="{ visible: false }"
      id="dataGrid"
      [headerFilter]="{ visible: false }"
      [export]="{ enabled: true, formats: ['xlsx', 'pdf'] }"
      [columnFixing]="{
        enabled: true,
        texts: { fix: 'Freeze', unfix: 'Unfreeze' },
      }"
      (onExporting)="onExporting($event)"
      [loadPanel]="{ enabled: false, text: 'Loading...' }"
    >
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-export [enabled]="true" [formats]="['xlsx', 'pdf']"> </dxo-export>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="true"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>

      <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="
              font-weight: 600;
              font-size: 20px;
              margin-left: 12px;
              padding: -3px;
              margin-right: 3px;
            "
          >
            Store wise Stock View
          </div>
        </dxi-item>

        <!-- <dxi-item>
          <dx-select-box

            [(value)]="selectedYear"
            [dataSource]="years"
            (onValueChanged)="onYearChanged($event)"
            placeholder="Year"
          ></dx-select-box>
        </dxi-item> -->

          <dx-select-box

          >
          </dx-select-box>
        </dxi-item>

        <dxi-item>
          <dx-date-box
            [width]="130"

            [displayFormat]="'dd-MM-yyyy'"

          >
          </dx-date-box>
        </dxi-item> -->

        <dxi-item>
          <dx-tag-box
            label="item"
            labelMode="floating"
            valueExpr="ID"
            displayExpr="DESCRIPTION"
            [searchEnabled]="true"
            [dataSource]="items"
            [showSelectionControls]="true"
            [maxDisplayedTags]="100"
            [showMultiTagOnly]="true"
            [multiline]="false"
            [(value)]="selectedItem"
            [hint]="itemHint"
            (onValueChanged)="updateItemHint()"
          ></dx-tag-box>
        </dxi-item>

        <dxi-item>
          <dx-tag-box
            label="Store"
            labelMode="floating"
            displayExpr="DESCRIPTION"
            valueExpr="ID"
            [items]="Store"
            [searchEnabled]="true"
            [(value)]="selectedStoreid"
            [showSelectionControls]="true"
            [maxDisplayedTags]="100"
            [showMultiTagOnly]="true"
            [multiline]="false"
            [hint]="storeHint"
            [width]="200"
            (onValueChanged)="updateStoreHint()"
          ></dx-tag-box>
        </dxi-item>

        <!-- <dxi-item name="exportButton" [disabled]="isEmptyDatagrid"></dxi-item> -->
        <dxi-item location="after" locateInMenu="auto">
          <dx-button
            text="Apply"
            type="default"
            icon="todo"
            stylingMode="contained"
            (onClick)="get_DataSource()"
          >
          </dx-button>
        </dxi-item>
        <!-- <dxi-item>
        <dxi-item location="after">
          <div class="toolbar-divider"></div>
        </dxi-item>

        <dxi-item>
          <dx-button
            text="Apply"
            type="default"
            stylingMode="contained"
            class="mt-2"
            (onClick)="get_DataSource()"
          >
          </dx-button>
        </dxi-item> -->
        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="refreshButtonOptions"
        ></dxi-item>
        <dxi-item name="exportButton"></dxi-item>
      </dxo-toolbar>

      <dxo-grouping
        [autoExpandAll]="true"
        [contextMenuEnabled]="true"
        [expandMode]="'rowClick'"
      ></dxo-grouping>
      <dxo-header-filter [visible]="true">
        <dxo-search [enabled]="true"></dxo-search>
      </dxo-header-filter>
      <dxo-filter-row
        [visible]="isFilterRowVisible"
        [applyFilter]="auto"
      ></dxo-filter-row>

      <dxi-column
        dataField="CODE"
        caption="Code"
        dataType="string"
        sortOrder="asc"
        [sortingMethod]="typeSorting"
      ></dxi-column>

      <dxi-column
        dataField="DESCRIPTION"
        caption="Description"
        dataType="string"
        sortOrder="asc"
        [sortingMethod]="typeSorting"
      ></dxi-column>

      <!-- <dxi-column
        dataField="StoreAmounts.CENTRAL STORE"
        caption="Central Store"
        alignment="left"
        dataType="number"
      ></dxi-column> -->
      <dxi-column
        *ngFor="let col of dynamicColumns"
        [dataField]="col.dataField"
        [caption]="col.caption"
        alignment="right"
        dataType="number"
        [width]="100"
      >
      </dxi-column>
      <dxi-column
        dataField="StoreStock.TOTAL"
        caption="Total"
        dataType="number"
      ></dxi-column>

      <!-- Group summary for MAIN_GROUP_NAME -->
      <dxo-summary>
        <dxi-group-item
          column="StoreStock.TOTAL"
          summaryType="count"
          [alignByColumn]="true"
          displayFormat="Total: {0}"
        >
        </dxi-group-item>

        <dxi-total-item column="" summaryType="sum" displayFormat="">
        </dxi-total-item>
        <dxi-total-item
          column="StoreStock.TOTAL"
          summaryType="count"
          displayFormat=""
        >
        </dxi-total-item>
      </dxo-summary>

      <!-- <dxi-column
        *ngIf="StockViewReport.length > 0"
        type="buttons"

        <dxi-button

          icon="eyeopen"
          text="View"
          [onClick]="onViewClick.bind(this)"
        ></dxi-button>
      </dxi-column> -->
    </dx-data-grid>
  </div>
</div>
