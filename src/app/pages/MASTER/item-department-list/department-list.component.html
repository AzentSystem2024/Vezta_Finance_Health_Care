<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      #dataGrid
      noDataText="No data available"
      [width]="'100%'"
      [height]="'82vh'"
      [loadPanel]="{
        enabled: true,
        text: 'Loading...',
        showIndicator: true,
        showPane: true,
      }"
      class="grid theme-dependent"
      [dataSource]="department"
      [showBorders]="true"
      [showColumnLines]="true"
      [showBorders]="true"
      [columnAutoWidth]="false"
      [wordWrapEnabled]="false"
      [rowAlternationEnabled]="true"
      [allowColumnReordering]="true"
      [showColumnHeaders]="true"
      [columnAutoWidth]="true"
      [allowColumnResizing]="true"
      [columnResizingMode]="'nextColumn'"
      [filterRow]="{ visible: false }"
      [headerFilter]="{ visible: false }"
      [scrolling]="{ mode: 'virtual' }"
      rowAlternationInterval="2"
      [selection]="{ mode: 'single' }"
      focusStateEnabled="false"
      (onRowRemoving)="onRowRemoving($event)"
      (onExporting)="onExporting($event)"
      (onEditingStart)="OnEditingStart($event)"
    >
      <dxo-filter-row [visible]="isFilterRowVisible"></dxo-filter-row>

      <dxo-header-filter [visible]="showHeaderFilter"></dxo-header-filter>

      <dxo-export [enabled]="true" [formats]="['xlsx']"> </dxo-export>

      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <dxo-editing mode="popup" [allowUpdating]="canEdit" [allowDeleting]="canDelete">
        <dxo-popup
          title="Edit Department"
          [showTitle]="true"
          [width]="600"
          [height]="300"
        ></dxo-popup>
      </dxo-editing>

      <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="
              font-weight: 600;
              font-size: 20px;
              margin-left: 12px;
              padding: -3px;
              margin-right: 3px;
            "
          >
            Item Department
          </div>
        </dxi-item>

        <dxi-item
          location="after"
          widget="dxButton"
          [options]="searchButtonOptions"
        ></dxi-item>

        <!-- Refresh -->
        <dxi-item
          location="after"
          widget="dxButton"
          [options]="refreshButtonOptions"
        ></dxi-item>

        <!-- Export (built-in, kept) -->
        <dxi-item location="after">
          <div class="toolbar-divider"></div>
        </dxi-item>
        <dxi-item
          name="exportButton"
          location="after"
          cssClass="export-btn"
        ></dxi-item>
        <!-- Divider -->

        <!-- Add -->
        <dxi-item
          location="after"
          widget="dxButton"
          [visible]="canAdd"
          [options]="addButtonOptions"
        ></dxi-item>
      </dxo-toolbar>

      <dxi-column dataField="CODE" caption="Code">
        <dxi-validation-rule type="required" message="Code is required">
          <dxi-validation-rule type="required" message="Code is required">
          </dxi-validation-rule>
        </dxi-validation-rule>
      </dxi-column>
      <dxi-column dataField="DEPT_NAME" caption="Department Name">
        <dxi-validation-rule type="required" message="Department is required">
          <dxi-validation-rule type="required" message="Department is required">
          </dxi-validation-rule>
        </dxi-validation-rule>
      </dxi-column>
    </dx-data-grid>
  </div>
</div>
<form-popup
  [height]="250"
  [(visible)]="isAddDepartmentPopupOpened"
  (save)="onClickSaveDepartment()"
  titleText="New Department"
  [showApprove]="false"
>
  <app-department-form></app-department-form>
</form-popup>

<dx-popup
  [height]="250"
  [(visible)]="isEditDepartmentPopupOpened"
  [width]="500"
  title="Edit Department"
  (formClosed)="handleClose()"
>
  <app-department-edit
    (formClosed)="handleClose()"
    [selectedDepartment]="selectedDepartment_data"
  ></app-department-edit>
</dx-popup>
