<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      class="grid theme-dependent"
      [dataSource]="PDCReport"
      width="100%"
      noDataText=""
      height="82vh"
      [showBorders]="true"
      [showColumnLines]="true"
      [columnAutoWidth]="true"
      [wordWrapEnabled]="false"
      [grouping]="{ autoExpandAll: false }"
      [filterRow]="{ visible: false }"
      [rowAlternationEnabled]="true"
      [rowAlternationEnabled]="true"
      rowAlternationInterval="2"
      [allowColumnReordering]="true"
      [filterRow]="{ visible: false }"
      id="dataGrid"
      [headerFilter]="{ visible: false }"
      [columnFixing]="{
        enabled: true,
        texts: { fix: 'Freeze', unfix: 'Unfreeze' },
      }"
      [export]="{ enabled: true, formats: ['xlsx', 'pdf'] }"
      [summary]="summaryColumnsData"
      (onExporting)="onExporting($event)"
      [loadPanel]="{ enabled: true, text: 'Loading...' }"
    >
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-export [enabled]="true" [formats]="['xlsx', 'pdf']"> </dxo-export>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="true"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <!-- <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="font-weight: 600; font-size: 20px; margin-left: 12px"
          >
            Trial Balance
          </div>
        </dxi-item>
      </dxo-toolbar> -->

      <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="
              font-weight: 600;
              font-size: 20px;
              margin-left: 12px;
              padding: -3px;
              margin-right: 3px;
            "
          >
            PDC Report
          </div>
        </dxi-item>

        <dxi-item style="margin-bottom: 6px">
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="Year"
            [width]="150"
            [(value)]="selectedYear"
            [dataSource]="years"
            (onValueChanged)="onYearChanged($event)"
            placeholder="Year"
          ></dx-select-box>
        </dxi-item>

        <dxi-item style="margin-bottom: 6px">
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="month"
            [dataSource]="monthDataSource"
            displayExpr="name"
            valueExpr="value"
            [(value)]="selectedmonth"
            (onValueChanged)="onMonthValueChanged($event)"
            [dropDownOptions]="{ width: 'auto' }"
          >
          </dx-select-box>
        </dxi-item>

        <dxi-item style="margin-bottom: 6px">
          <dx-date-box
            [width]="150"
            label="Date From"
            labelMode="floating"
            [displayFormat]="'dd-MM-yyyy'"
            [value]="formatted_from_date"
            (onValueChanged)="onFromDateChange($event)"
          ></dx-date-box>
        </dxi-item>
        <dxi-item style="margin-bottom: 6px">
          <dx-date-box
            [width]="150"
            label="Date To"
            labelMode="floating"
            [displayFormat]="'dd-MM-yyyy'"
            [value]="formatted_To_date"
            (onValueChanged)="onToDateChange($event)"
          >
          </dx-date-box>
        </dxi-item>
        <dxi-item location="after" style="margin-top: 3px">
          <div class="toolbar-divider"></div>
        </dxi-item>

        <dxi-item>
          <dx-button
            text="Apply"
            type="default"
            stylingMode="contained"
            (onClick)="get_PDC_list()"
          >
          </dx-button>
        </dxi-item>

        <dxi-item name="exportButton"></dxi-item>
      </dxo-toolbar>

      <dxo-grouping
        [autoExpandAll]="false"
        [contextMenuEnabled]="true"
        [expandMode]="'rowClick'"
      ></dxo-grouping>
      <dxo-header-filter [visible]="true">
        <dxo-search [enabled]="true"></dxo-search>
      </dxo-header-filter>
      <dxo-filter-row
        [visible]="isFilterRowVisible"
        [applyFilter]="auto"
      ></dxo-filter-row>

      <!-- Customer Name -->
      <dxi-column
        dataField="CHEQUE_NO"
        caption="Cheque No."
        dataType="string"
      ></dxi-column>

      <!-- Invoice Date -->
      <dxi-column
        dataField="CHEQUE_DATE"
        caption="Due Date"
        dataType="date"
        format="dd/MM/yyyy"
      ></dxi-column>

      <!-- Invoice No -->
      <dxi-column
        dataField="BANK"
        caption="Bank"
        dataType="string"
      ></dxi-column>

      <!-- Reference No -->
      <dxi-column
        dataField="BENEFICIARY_NAME"
        caption="Beneficiary Name"
        dataType="string"
      ></dxi-column>

      <!-- Net Amount -->
      <dxi-column
        dataField="PAID"
        [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
        caption="Issued"
        dataType="number"
        format="currency"
      ></dxi-column>

      <!-- Received Amount -->
      <dxi-column
        dataField="RECEIVED"
        [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
        caption="Received"
        dataType="number"
        format="currency"
      ></dxi-column>

      <dxi-column
        dataField="PDC_STATUS"
        caption="Status"
        dataType="string"
      ></dxi-column>

      <dxi-column
        dataField="REMARKS"
        caption="Remarks"
        dataType="string"
      ></dxi-column>
      <!-- Group summary for MAIN_GROUP_NAME -->

      <dxi-column *ngIf="PDCReport.length > 0" type="buttons" [width]="100">
        <dxi-button
          hint="View"
          icon="eyeopen"
          text="View"
          [onClick]="onViewClick.bind(this)"
        ></dxi-button>
      </dxi-column>
    </dx-data-grid>
  </div>
</div>

<!-- =============================drildown========================= -->

<dx-popup
  [(visible)]="editPDCPopupOpened"
  [width]="'50vw'"
  [height]="'90vh'"
  title="Edit PDC"
  (onHiding)="handleClose()"
>
  <app-pdc-edit-form
    [selectedPDC]="selectedPDC"
    [isOpen]="editPDCPopupOpened"
    [isReadOnly]="isEditReadOnly"
    (formClosed)="handleClose()"
  ></app-pdc-edit-form>
</dx-popup>
