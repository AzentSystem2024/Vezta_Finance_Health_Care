<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      class="grid theme-dependent"
      [dataSource]="DepreciationReport"
      width="100%"
      noDataText=""
      height="82vh"
      [showBorders]="true"
      [showColumnLines]="true"
      [columnAutoWidth]="true"
      [wordWrapEnabled]="false"
      [grouping]="{ autoExpandAll: false }"
      [filterRow]="{ visible: false }"
      [rowAlternationEnabled]="true"
      [rowAlternationEnabled]="true"
      rowAlternationInterval="2"
      [allowColumnReordering]="true"
      [filterRow]="{ visible: false }"
      id="dataGrid"
      [headerFilter]="{ visible: false }"
      [columnFixing]="{
        enabled: true,
        texts: { fix: 'Freeze', unfix: 'Unfreeze' },
      }"
      [export]="{ enabled: true, formats: ['xlsx', 'pdf'] }"
      [summary]="summaryColumnsData"
      (onExporting)="onExporting($event)"
      [loadPanel]="{ enabled: true, text: 'Loading...' }"
    >
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-export [enabled]="true" [formats]="['xlsx', 'pdf']"> </dxo-export>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="true"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <!-- <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="font-weight: 600; font-size: 20px; margin-left: 12px"
          >
            Trial Balance
          </div>
        </dxi-item>
      </dxo-toolbar> -->

      <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="
              font-weight: 600;
              font-size: 20px;
              margin-left: 12px;
              padding: -3px;
              margin-right: 3px;
            "
          >
            Depreciation Report
          </div>
        </dxi-item>
        <dxi-item style="margin-bottom: 6px">
          <dx-select-box
            [width]="200"
            label="Location"
            labelMode="floating"
            [items]="Department"
            displayExpr="DESCRIPTION"
            valueExpr="ID"
            [(value)]="select_department_id"
            [searchEnabled]="true"
          >
          </dx-select-box>
        </dxi-item>

        <dxi-item style="margin-bottom: 6px">
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="Year"
            [width]="150"
            [(value)]="selectedYear"
            [dataSource]="years"
            (onValueChanged)="onYearChanged($event)"
            placeholder="Year"
          ></dx-select-box>
        </dxi-item>

        <dxi-item style="margin-bottom: 6px">
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="month"
            [dataSource]="monthDataSource"
            displayExpr="name"
            valueExpr="value"
            [(value)]="selectedmonth"
            (onValueChanged)="onMonthValueChanged($event)"
            [dropDownOptions]="{ width: 'auto' }"
          >
          </dx-select-box>
        </dxi-item>

        <dxi-item style="margin-bottom: 6px">
          <dx-date-box
            [width]="150"
            label="Date From"
            labelMode="floating"
            [displayFormat]="'dd-MM-yyyy'"
            [value]="formatted_from_date"
            (onValueChanged)="onFromDateChange($event)"
          ></dx-date-box>
        </dxi-item>
        <dxi-item style="margin-bottom: 6px">
          <dx-date-box
            [width]="150"
            label="Date To"
            labelMode="floating"
            [displayFormat]="'dd-MM-yyyy'"
            [value]="formatted_To_date"
            (onValueChanged)="onToDateChange($event)"
          >
          </dx-date-box>
        </dxi-item>
        <dxi-item location="after" style="margin-bottom: 3px">
          <div class="toolbar-divider"></div>
        </dxi-item>

        <dxi-item>
          <dx-button
            text="Apply"
            type="default"
            stylingMode="contained"
            (onClick)="Depreciation_Report()"
          >
          </dx-button>
        </dxi-item>

        <dxi-item name="exportButton"></dxi-item>
      </dxo-toolbar>

      <dxo-grouping
        [autoExpandAll]="false"
        [contextMenuEnabled]="true"
        [expandMode]="'rowClick'"
      ></dxo-grouping>
      <dxo-header-filter [visible]="true">
        <dxo-search [enabled]="true"></dxo-search>
      </dxo-header-filter>
      <dxo-filter-row
        [visible]="isFilterRowVisible"
        [applyFilter]="auto"
      ></dxo-filter-row>

      <!-- Customer Name -->
      <dxi-column
        dataField="CODE"
        caption="Asset Code"
        dataType="string"
      ></dxi-column>

      <!-- Age -->
      <dxi-column
        dataField="DESCRIPTION"
        caption="Description"
        dataType="string"
      ></dxi-column>

      <!-- Invoice No -->
      <dxi-column
        dataField="ASSET_TYPE"
        caption="Asset Type"
        dataType="string"
      ></dxi-column>

      <!-- Reference No -->
      <dxi-column
        dataField="LOCATION"
        caption="Location"
        dataType="string"
      ></dxi-column>

      <!-- Invoice Date -->
      <dxi-column
        dataField="PURCH_DATE"
        caption="Purch Date"
        dataType="date"
        format="dd/MM/yyyy"
      ></dxi-column>

      <!-- Narration -->
      <dxi-column
        dataField="ASSET_VALUE"
        caption="Purchase Value"
        dataType="number"
        [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
      ></dxi-column>

      <!-- Net Amount -->
      <dxi-column
        dataField="USEFUL_LIFE"
        caption="Useful Life"
        dataType="number"
        [customizeText]="formatUsefulLife"
      ></dxi-column>

      <dxi-column caption="Depreciation" [width]="120" alignment="center">
        <dxi-column
          dataField="OPENING_DEPR"
          caption="Opening"
          [width]="130"
          [allowEditing]="false"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
          dataType="number"
        ></dxi-column>
        <dxi-column
          dataField="DURING_DEPR"
          caption="During"
          [width]="130"
          [allowEditing]="false"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
          dataType="number"
        ></dxi-column>
        <dxi-column
          dataField="CLOSING_DEPR"
          caption="Closing"
          [width]="100"
          alignment="center"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
          dataType="number"
        >
        </dxi-column>
      </dxi-column>

      <!-- Received Amount -->
      <dxi-column
        dataField="CURRENT_VALUE"
        [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
        caption="Net Asset Value"
        dataType="number"
        format="currency"
      ></dxi-column>
    </dx-data-grid>
  </div>
</div>
