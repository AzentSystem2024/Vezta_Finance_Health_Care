<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      #dataGrid
      [width]="'100%'"
      [height]="'75vh'"
      class="grid theme-dependent"
      [dataSource]="itemStoresList"
      [showBorders]="true"
      [columnAutoWidth]="false"
      [wordWrapEnabled]="false"
      [rowAlternationEnabled]="true"
      rowAlternationInterval="2"
      [showColumnLines]="true"
      [editing]="{
        mode: 'cell',
        allowUpdating: true,
      }"
      [selection]="{ mode: 'multiple', showCheckBoxesMode: 'always' }"
      keyExpr="ID"
      (onSelectionChanged)="onSelectionChanged($event)"
      [(selectedRowKeys)]="selectedRowKeys"
      (onRowUpdated)="onRowUpdated($event)"
      (onCellValueChanged)="onCellValueChanged($event)"
      (onEditorPreparing)="onEditorPreparing($event)"
    >
      <!-- <dxo-paging [pageSize]="10"></dxo-paging> -->
      <dxo-editing
        mode="popup"
        [allowUpdating]="canEdit"
        [allowDeleting]="canDelete"
      ></dxo-editing>
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <dxo-load-panel [showPane]="false"></dxo-load-panel>
      <dxo-scrolling mode="virtual"></dxo-scrolling>
      <dxo-filter-row
        [visible]="isFilterRowVisible"
        [applyFilter]="auto"
      ></dxo-filter-row>
      <!-- <dxo-header-filter [visible]="isFilterOpened">
          <dxo-search [enabled]="true"></dxo-search>
        </dxo-header-filter> -->
      <!-- <dxo-filter-panel [visible]="isFilterOpened"></dxo-filter-panel> -->
      <dxo-filter-builder [allowHierarchicalFields]="true">
      </dxo-filter-builder>
      <dxo-search-panel
        [visible]="true"
        [highlightCaseSensitive]="false"
      ></dxo-search-panel>
      <dxo-toolbar>
        <dxi-item location="before">
          <div class="grid-header">Change Price</div>
        </dxi-item>
        <dxi-item location="after" template="priceColumnSelector"> </dxi-item>
        <dxi-item location="after" template="narration"> </dxi-item>
        <dxi-item
          location="after"
          widget="dxButton"
          [options]="searchButtonOptions"
        ></dxi-item>

        <!-- <dxi-item name="searchPanel" locateInMenu="auto"></dxi-item> -->
        <dxi-item
          location="after"
          template="cancelButton"
          cssClass="bottom-toolbar-buttons"
        >
        </dxi-item>
        <dxi-item
          location="after"
          template="FormulaButton"
          cssClass="bottom-toolbar-buttons"
        >
        </dxi-item>
        <dxi-item
          location="after"
          template="SaveButton"
          cssClass="bottom-toolbar-buttons"
        >
        </dxi-item>
      </dxo-toolbar>
      <div *dxTemplate="let data of 'priceColumnSelector'">
        <dx-tag-box
          [items]="priceColumnOptions"
          valueExpr="value"
          displayExpr="text"
          width="250"
          label="Select Prices"
          [(value)]="selectedPriceColumns"
          placeholder="Select Prices"
          labelMode="floating"
          [multiline]="false"
          [showSelectionControls]="true"
          (onValueChanged)="onPriceColumnChange()"
        >
        </dx-tag-box>
      </div>
      <div *dxTemplate="let data of 'cancelButton'">
        <dx-button
          text="Cancel"
          stylingMode="outlined"
          type="normal"
          (onClick)="Cancel()"
          style="width: 100px"
        ></dx-button>
      </div>
      <div *dxTemplate="let data of 'FormulaButton'">
        <dx-button
          icon="formula"
          hint="Apply Formula"
          stylingMode="contained"
          type="default"
          (onClick)="applyFormula($event)"
          [disabled]="isButtonDisabled || isVerified"
        ></dx-button>
      </div>
      <div *dxTemplate="let data of 'SaveButton'">
        <dx-button
          text="Save"
          stylingMode="contained"
          type="default"
          (onClick)="onSaveButtonClick()"
          style="width: 100px"
          [disabled]="isButtonDisabled || isSaving"
          [loading]="isSaving"
        ></dx-button>

        <!-- <dx-button
          *ngIf="isSaved && !isVerified && AllowCommitWithSave"
          text="Verify"
          stylingMode="contained"
          type="default"
          (onClick)="onVerify()"
          style="width: 100px"
          [disabled]="isApproved"
        ></dx-button> -->

        <!-- <dx-button
          *ngIf="isVerified && AllowCommitWithSave"
          text="Approve"
          stylingMode="contained"
          type="default"
          (onClick)="onApprove()"
          style="width: 100px"
          [disabled]="isApproved"
        ></dx-button> -->
      </div>

      <div *dxTemplate="let data of 'narration'">
        <dx-text-box
          [(value)]="narrationText"
          placeholder="Enter Remarks"
          style="width: 250px"
        ></dx-text-box>
      </div>

      <dxi-column
        dataField="ITEM_CODE"
        caption="Item Code"
        [width]="150"
        [headerFilter]="{ visible: true }"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="DESCRIPTION"
        caption="Description"
        [width]="220"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="ITEM_TYPE"
        caption="Item Type"
        [width]="220"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="DEPT_NAME"
        caption="Department"
        [width]="150"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="CAT_NAME"
        caption="Category"
        [width]="150"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="BRAND_NAME"
        caption="Brand"
        [width]="150"
        [allowEditing]="false"
      ></dxi-column>

      <dxi-column
        caption="MRP"
        [visible]="isVisible('MRP')"
        [width]="120"
        alignment="center"
      >
        <dxi-column
          dataField="SALE_PRICE"
          caption="Present"
          [width]="130"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_NEW"
          caption="New"
          [width]="100"
          dataType="number"
          [allowEditing]="true"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2 }"
          [allowEditing]="!isVerified"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column
        caption="Standard Price"
        [visible]="isVisible('PRICE1')"
        [width]="120"
        alignment="center"
        dataType="number"
      >
        <dxi-column
          dataField="SALE_PRICE1"
          dataType="number"
          caption="Present"
          [width]="130"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_LEVEL1_NEW"
          caption="New"
          [width]="100"
          alignment="right"
          dataType="number"
          [format]="{ type: 'fixedPoint', precision: 2 }"
          [allowEditing]="!isVerified"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column
        caption="Price 2"
        [width]="120"
        [visible]="isVisible('PRICE2')"
        dataType="number"
        alignment="center"
      >
        <dxi-column
          dataField="SALE_PRICE2"
          caption="Present"
          dataType="number"
          [width]="130"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_LEVEL2_NEW"
          caption="New"
          [width]="100"
          dataType="number"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2 }"
          [allowEditing]="!isVerified"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column
        caption="Price 3"
        [width]="120"
        dataType="number"
        [visible]="isVisible('PRICE3')"
        alignment="center"
      >
        <dxi-column
          dataField="SALE_PRICE3"
          caption="Present"
          [width]="130"
          [allowEditing]="false"
          dataType="number"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_LEVEL3_NEW"
          caption="New"
          [width]="100"
          dataType="number"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2 }"
          [allowEditing]="!isVerified"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column
        caption="Price 4"
        [width]="120"
        [visible]="isVisible('PRICE4')"
        alignment="center"
      >
        <dxi-column
          dataField="SALE_PRICE4"
          caption="Present"
          [width]="130"
          [allowEditing]="false"
          dataType="number"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_LEVEL4_NEW"
          caption="New"
          [width]="100"
          dataType="number"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2 }"
          [allowEditing]="!isVerified"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column
        caption="Price 5"
        [width]="120"
        [visible]="isVisible('PRICE5')"
        alignment="center"
      >
        <dxi-column
          dataField="SALE_PRICE5"
          caption="Present"
          [width]="130"
          [allowEditing]="false"
          dataType="number"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_LEVEL5_NEW"
          caption="New"
          [width]="100"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 2 }"
          [allowEditing]="!isVerified"
          dataType="number"
        >
        </dxi-column>
      </dxi-column>
    </dx-data-grid>
  </div>
</div>
<dx-popup
  [(visible)]="isPopupVisible"
  title="Change Price"
  [width]="500"
  [height]="350"
  [showCloseButton]="true"
  [dragEnabled]="true"
  [closeOnOutsideClick]="true"
>
  <div class="popup-content">
    <div class="form-row">
      <div class="input-container">
        <dx-number-box
          [(value)]="percentageString"
          placeholder="Enter percentage (%)"
          [showSpinButtons]="true"
          (onValueChanged)="handlePercentageChange($event)"
          style="width: 350px"
          label="Percentage (%)"
          labelMode="floating"
        ></dx-number-box>
        <div class="toggle-container" (click)="toggleAdjustment()">
          <div
            class="toggle-slider"
            [ngClass]="{ increase: isIncrease, decrease: !isIncrease }"
          ></div>
          <span
            class="toggle-option"
            [class.active]="isIncrease"
            title="Decrease Price"
            >-</span
          >
          <span
            class="toggle-option"
            [class.active]="!isIncrease"
            title="Increase Price"
            >+</span
          >
        </div>
      </div>
    </div>

    <div>
      <dx-select-box
        [(value)]="roundingOption"
        [items]="roundingOptions"
        displayExpr="text"
        valueExpr="value"
        placeholder="Choose rounding option"
        (onValueChanged)="handleRoundingChange($event)"
      ></dx-select-box>
    </div>

    <div>
      <dxi-item>
        <dx-tag-box
          [items]="salePriceOptions"
          valueExpr="value"
          [(value)]="selectedSalePrice"
          displayExpr="text"
          label="Select Prices"
          labelMode="floating"
          labelLocation="left"
          [showSelectionControls]="true"
          [multiline]="false"
          [searchEnabled]="true"
          (onValueChanged)="handleSalePriceChange($event)"
          [width]="300"
        >
        </dx-tag-box>
      </dxi-item>
    </div>
    <div>
      <dx-button
        text="Apply Formula"
        stylingMode="contained"
        type="default"
        (onClick)="applyPriceChange()"
        style="width: 150px"
      ></dx-button>
    </div>
  </div>
</dx-popup>
