<div class="view-wrapper list-page">
  <dx-data-grid
    class="grid theme-dependent"
    [dataSource]="ItemProperty4DataSource"
    [rowAlternationEnabled]="true"
    rowAlternationInterval="2"
    [showBorders]="true"
    (onRowRemoving)="onRowRemoving($event)"
    [showColumnLines]="true"
    [width]="'100%'"
    [height]="'82vh'"
    (onEditingStart)="OnEditingStartItem($event)"
  >
    <dxo-paging [pageSize]="10"></dxo-paging>
    <dxo-pager
      [visible]="true"
      [allowedPageSizes]="allowedPageSizes"
      [displayMode]="displayMode"
      [showPageSizeSelector]="showPageSizeSelector"
      [showInfo]="true"
      [showNavigationButtons]="true"
    ></dxo-pager>
    <dxo-editing mode="popup" [allowUpdating]="true" [allowDeleting]="true">
    </dxo-editing>

    <dxo-filter-row [visible]="isFilterRowVisible"></dxo-filter-row>

    <dxo-toolbar>
      <dxi-item location="before">
        <div class="grid-header">Item Property 4</div>
      </dxi-item>
      <!-- <dxi-item location="before">
        <div
          class="grid-header"
          style="
            font-weight: 600;
            font-size: 20px;
            margin-left: 12px;
            padding: -3px;
            margin-right: 3px;
          "
        >
          Item Property 4
        </div>
      </dxi-item> -->
      <dxi-item
        location="after"
        widget="dxButton"
        [options]="searchButtonOptions"
      ></dxi-item>

      <!-- Refresh -->
      <dxi-item
        location="after"
        widget="dxButton"
        [options]="refreshButtonOptions"
      ></dxi-item>
      <!-- Divider -->
      <dxi-item location="after">
        <div class="toolbar-divider"></div>
      </dxi-item>

      <!-- Export (built-in, kept) -->
      <dxi-item
        name="exportButton"
        location="after"
        cssClass="toolbar-icon-btn export-btn"
      ></dxi-item>

      <dxi-item
        location="after"
        widget="dxButton"
        [options]="addButtonOptions"
      ></dxi-item>
    </dxo-toolbar>

    <dxi-column dataField="CODE" caption="Code">
      <dxi-validation-rule type="required" message="Code is required">
        <dxi-validation-rule type="pattern" message="Code is required">
        </dxi-validation-rule>
      </dxi-validation-rule>
    </dxi-column>
    <dxi-column dataField="DESCRIPTION" caption="Description">
      <dxi-validation-rule type="required" message="Description is required">
        <dxi-validation-rule type="pattern" message="Description is required">
        </dxi-validation-rule>
      </dxi-validation-rule>
    </dxi-column>
  </dx-data-grid>
</div>
<form-popup
  [(visible)]="isItemProperty4PopupOpened"
  (save)="onClickSaveItemProperty4()"
  titleText="New {{ itemlabel }}"
  [showApprove]="false"
>
  <app-item-property4-form></app-item-property4-form>
</form-popup>

<dx-popup
  [(visible)]="isEditItemProperty4PopupOpened"
  title="Edit Item property4"
  height="40vh"
  width="40vw"
>
  <app-item-property4-edit
    [selectedData]="selected_data"
    (formClosed)="handleClose()"
  >
  </app-item-property4-edit>
</dx-popup>
