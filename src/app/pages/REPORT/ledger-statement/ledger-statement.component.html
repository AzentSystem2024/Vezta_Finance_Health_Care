<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      class="grid theme-dependent"
      [dataSource]="Ledger_statement_datasource"
      width="100%"
      noDataText=""
      height="78vh"
      [showBorders]="true"
      [showColumnLines]="true"
      [columnAutoWidth]="true"
      [wordWrapEnabled]="false"
      [grouping]="{ autoExpandAll: false }"
      [filterRow]="{ visible: false }"
      [rowAlternationEnabled]="true"
      [rowAlternationEnabled]="true"
      rowAlternationInterval="2"
      [allowColumnReordering]="true"
      [filterRow]="{ visible: false }"
      id="dataGrid"
      [scrolling]="{ mode: 'virtual' }"
      [headerFilter]="{ visible: false }"
      [columnFixing]="{
        enabled: true,
        texts: { fix: 'Freeze', unfix: 'Unfreeze' },
      }"
      [summary]="summaryColumnsData"
      [summary.calculateCustomSummary]="
        summaryColumnsData.calculateCustomSummary
      "
      (onExporting)="onExporting($event)"
    >
      <!-- (onEditingStart)="onEditLedger($event)" -->
      <!-- <dxo-editing
        mode="popup"s
        [allowUpdating]="true"
      ></dxo-editing> -->
      <dxo-paging [pageSize]="10"></dxo-paging>
     
      
      <dxo-export [enabled]="true" [formats]="['xlsx']"> </dxo-export>
      <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="
              font-weight: 600;
              font-size: 20px;
              margin-left: 12px;
              padding: -3px;
              margin-right:  3px;
            "
          >
            Ledger Statement
          </div>
        </dxi-item>

        <dxi-item style="margin-bottom: 6px">
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="Year"
            [width]="90"
            [(value)]="selectedYear"
            [dataSource]="years"
            (onValueChanged)="onYearChanged($event)"
            placeholder="Year"
          ></dx-select-box>
        </dxi-item>

        <dxi-item style="margin-bottom: 6px">
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="month"
            [dataSource]="monthDataSource"
            displayExpr="name"
            valueExpr="value"
            [(value)]="selectedmonth"
            (onValueChanged)="onMonthValueChanged($event)"
            [dropDownOptions]="{ width: 'auto' }"
          >
          </dx-select-box>
        </dxi-item>

        <dxi-item style="margin-bottom: 6px">
          <dx-date-box
            [width]="120"
            label="From Date"
            labelMode="floating"
            [(value)]="selected_from_date"
            [displayFormat]="'dd-MM-yyyy'"
            (onValueChanged)="onFromDateChange($event)"
          >
          </dx-date-box>
        </dxi-item>
        <dxi-item style="margin-bottom: 6px">
          <dx-date-box
            [width]="120"
            label="To Date"
            labelMode="floating"
            [(value)]="selected_To_date"
            displayFormat="dd-MM-yyyy"
            (onValueChanged)="onToDateChange($event)"
          >
          </dx-date-box>
        </dxi-item>

        <dxi-item style="margin-bottom: 6px">
          <dx-validation-group class="form-grid" #formValidationGroup>
            <dx-select-box
              [width]="200"
              label="Ledger"
              labelMode="floating"
              [items]="HEAD_ID_LIST"
              displayExpr="NAME"
              valueExpr="ID"
              [(value)]="selected_Head_Id"
              (onValueChanged)="onHeadIdChange($event)"
              [searchEnabled]="true"
              ><dx-validator>
                <dxi-validation-rule
                  type="required"
                  message="This field is required"
                ></dxi-validation-rule>
              </dx-validator>
            </dx-select-box>
          </dx-validation-group>
        </dxi-item>

        <dxi-item>
          <dx-tag-box
            label="Store"
            labelMode="floating"
            displayExpr="DESCRIPTION"
            valueExpr="ID"
            [items]="Store"
            [searchEnabled]="true"
            [(value)]="selectedStoreid"
            [showSelectionControls]="true"
            [maxDisplayedTags]="100"
            [showMultiTagOnly]="true"
            [multiline]="false"
            [hint]="storeHint"
            [width]="150"
            (onValueChanged)="updateStoreHint()"
          ></dx-tag-box>
        </dxi-item>

        <dxi-item location="after">
          <div class="toolbar-divider"></div>
        </dxi-item>
        <dxi-item>
          <dx-button
            text="Apply"
            stylingMode="contained"
            type="default"
            (onClick)="load_Ledgre_data()"
          >
          </dx-button>
        </dxi-item>
        <dxi-item name="exportButton" class="export-btn"></dxi-item>
      </dxo-toolbar>

      <dxo-sorting mode="none"></dxo-sorting>
      <dxo-filter-row visible="true"></dxo-filter-row>
      <dxo-header-filter visible="true"></dxo-header-filter>
      <dxo-paging page-size="10"></dxo-paging>
      <dxo-pager
        show-page-size-selector="true"
        show-info="true"
        show-navigator="true"
      ></dxo-pager>
      <dxo-header-filter [visible]="true">
        <dxo-search [enabled]="true"></dxo-search>
      </dxo-header-filter>
      <!-- <dxo-filter-row
      [visible]="isFilterRowVisible"
      [applyFilter]="auto"
    ></dxo-filter-row> -->
      <dxo-grouping
        [autoExpandAll]="false"
        [contextMenuEnabled]="true"
        [expandMode]="'rowClick'"
      ></dxo-grouping>
      <dxi-column
        dataField="TRANS_DATE"
        caption="Date"
        dataType="date"
        [format]="{ type: 'custom', formatter: formatDates }"
      ></dxi-column>
      <dxi-column
        dataField="TRANS_TYPE_NAME"
        caption="Document Type"
      ></dxi-column>
      <dxi-column dataField="VOUCHER_NO" caption="Voucher No"></dxi-column>
      <dxi-column dataField="PARTICULARS" caption="Particulars"></dxi-column>
      <dxi-column dataField="STORE_NAME" caption="Store/Branch"></dxi-column>
      <dxi-column dataField="DEPT_NAME" caption="Department"></dxi-column>
      <dxi-column
        dataField="DR_AMOUNT"
        caption="Debit Amount"
        [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
        alignment="right"
      >
      </dxi-column>

      <dxi-column
        dataField="CR_AMOUNT"
        caption="Credit Amount"
        [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
        alignment="right"
      >
      </dxi-column>

      <dxi-column
        dataField="BALANCE"
        caption="Balance"
        [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
        alignment="right"
      >
      </dxi-column>
      <dxi-column type="buttons" [width]="100">
        <dxi-button
          hint="View"
          icon="eyeopen"
          text="View"
          [onClick]="onViewClick.bind(this)"
          [visible]="isViewVisible"
        ></dxi-button>
      </dxi-column>
    </dx-data-grid>
  </div>
</div>
