<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      #dataGrid
      noDataText="No data available"
      [width]="'100%'"
      [height]="'75vh'"
      [loadPanel]="{
        enabled: true,
        text: 'Loading...',
        showIndicator: true,
        showPane: true,
      }"
      class="grid theme-dependent"
      [dataSource]="filteredQuotationInList"
      [showBorders]="true"
      [showColumnLines]="true"
      [showBorders]="true"
      [columnAutoWidth]="false"
      [wordWrapEnabled]="false"
      [rowAlternationEnabled]="true"
      [allowColumnReordering]="true"
      [showColumnHeaders]="true"
      [columnAutoWidth]="true"
      [allowColumnResizing]="true"
      [columnResizingMode]="'nextColumn'"
      [scrolling]="{ mode: 'virtual' }"
      rowAlternationInterval="2"
      [selection]="{ mode: 'single' }"
      focusStateEnabled="false"
      (onEditingStart)="onEditQuotation($event)"
      (onCellPrepared)="onCellPrepared($event)"
      (onRowRemoving)="onDeleteQuotation($event)"
    >
      <!-- <dxo-editing
        mode="popup"
        [allowUpdating]="canEdit"
        [allowDeleting]="canDelete"
      ></dxo-editing> -->
      <dxo-export
        [enabled]="true"
        [allowExportSelectedData]="false"
        [formats]="['xlsx']"
      >
      </dxo-export>
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <dxo-load-panel [showPane]="false"></dxo-load-panel>
      <dxo-scrolling mode="virtual"></dxo-scrolling>

      <dxo-toolbar>
        <dxi-item location="before">
          <div class="grid-header">Sales Quotation</div>
        </dxi-item>

        <dxi-item location="after" template="dateFilterTemplate"></dxi-item>
        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="searchButtonOptions"
        ></dxi-item>

        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="refreshButtonOptions"
        ></dxi-item>
        <dxi-item location="after">
          <div class="toolbar-divider"></div>
        </dxi-item>
        <dxi-item
          name="exportButton"
          location="after"
          cssClass="export-btn"
        ></dxi-item>
        <dxi-item
          *ngIf="canAdd"
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="addButtonOptions"
        ></dxi-item>
      </dxo-toolbar>
      <div *dxTemplate="let data of 'dateFilterTemplate'">
        <dx-select-box
          [dataSource]="dateRanges"
          [displayExpr]="displayExpr"
          valueExpr="value"
          [(value)]="selectedDateRange"
          (onValueChanged)="onDateRangeChanged($event)"
          (onOpened)="attachItemClickHandler($event)"
          width="180"
        >
          <div *dxTemplate="let item of 'item'">
            {{ item.value === "custom" ? "Custom" : item.label }}
          </div>
        </dx-select-box>
      </div>
      <dxi-column
        dataField="QTN_NO"
        caption="Quotation No."
        [allowEditing]="false"
        width="120"
      ></dxi-column>
      <dxi-column
        dataField="QTN_DATE"
        caption="Quotation Date"
        [allowEditing]="false"
        dataType="date"
        width="120"
        [format]="{ type: 'custom', formatter: formatDate }"
      >
      </dxi-column>
      <dxi-column
        dataField="CUSTOMER_NAME"
        caption="Customer"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="STORE_NAME"
        caption="Store"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="NET_AMOUNT"
        caption="Net amount"
        [allowEditing]="false"
        format="#,##0.00"
        width="120"
      ></dxi-column>
      <dxi-column
        dataField="NARRATION"
        caption="Narration"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        caption="Status"
        dataField="TRANS_STATUS"
        [width]="80"
        [cellTemplate]="statusCellRender"
        [allowHeaderFiltering]="true"
        [headerFilter]="{
          dataSource: getStatusFilterData,
          encodeHtml: false,
        }"
      >
      </dxi-column>
      <dxi-column caption="Actions" [width]="140" cellTemplate="actionTemplate">
      </dxi-column>
      <div *dxTemplate="let cellData of 'actionTemplate'">
        <!-- Verify / Approve / View -->
        <i
          *ngIf="canEdit"
          class="dx-icon dx-icon-edit"
          [style.opacity]="
            cellData.data.TRANS_STATUS === 2 || cellData.data.TRANS_STATUS === 5
              ? '0.4'
              : '1'
          "
          [style.pointer-events]="
            cellData.data.TRANS_STATUS === 2 || cellData.data.TRANS_STATUS === 5
              ? 'none'
              : 'auto'
          "
          class="dx-icon dx-icon-edit"
          style="cursor: pointer; margin-right: 10px"
          title="Edit"
          (click)="onEditQuotation({ data: cellData.data, cancel: false })"
        ></i>
        <span
          *ngIf="
            (cellData.data.TRANS_STATUS === 'Verified' && canApprove) ||
            (cellData.data.TRANS_STATUS !== 'Verified' && canVerify)
          "
          style="
            position: relative;
            display: inline-block;
            width: 18px;
            height: 18px;
            margin-left: 10px;
            cursor: pointer;
            vertical-align: middle;
          "
          [title]="
            cellData.data.TRANS_STATUS === 5
              ? 'Approved'
              : cellData.data.TRANS_STATUS === 2
                ? 'Approve'
                : 'Verify'
          "
          (click)="onVerifyQuotation({ row: { data: cellData.data } })"
        >
          <!-- Badge -->
          <i
            class="fas fa-certificate"
            [style.color]="
              cellData.data.TRANS_STATUS === 5
                ? '#10B981'
                : cellData.data.TRANS_STATUS === 2
                  ? '#0073D8'
                  : '#FFA500'
            "
            style="font-size: 18px; position: absolute; top: 0; left: 0"
          ></i>

          <!-- Tick -->
          <i
            class="fas fa-check"
            style="
              color: white;
              font-size: 7px;
              position: absolute;
              top: 5px;
              left: 5px;
              pointer-events: none;
            "
          ></i>
        </span>

        <!-- Edit -->

        <!-- Delete -->
        <i
          *ngIf="canDelete"
          class="dx-icon dx-icon-trash"
          [style.opacity]="
            cellData.data.TRANS_STATUS === 2 || cellData.data.TRANS_STATUS === 5
              ? '0.4'
              : '1'
          "
          [style.pointer-events]="
            cellData.data.TRANS_STATUS === 2 || cellData.data.TRANS_STATUS === 5
              ? 'none'
              : 'auto'
          "
          style="cursor: pointer; margin-right: 10px"
          title="Delete"
          (click)="onDeleteQuotation({ data: cellData.data, cancel: false })"
        ></i>
      </div>
    </dx-data-grid>
  </div>
</div>

<dx-popup
  [(visible)]="isAddQuotation"
  [width]="'90vw'"
  [height]="'100vh'"
  title="New Sales Quotation"
  (onHiding)="handleClose()"
>
  <ng-container *ngIf="isAddQuotation">
    <app-quotation-form
      (popupClosed)="handleClose()"
      [canApprove]="canApprove"
    ></app-quotation-form>
  </ng-container>
</dx-popup>

<dx-popup
  [(visible)]="isEditQuotation"
  [width]="'90vw'"
  [height]="'100vh'"
  title="Sales Quotation"
  (onHiding)="handleClose()"
>
  <ng-container *ngIf="isEditQuotation">
    <app-quotation-form
      [isEditing]="true"
      [EditingResponseData]="selectedQuotation"
      [isReadOnlyMode]="isReadOnlyQuotation"
      (popupClosed)="handleClose()"
      [canApprove]="canApprove"
    ></app-quotation-form>
  </ng-container>
</dx-popup>

<dx-popup
  *ngIf="isVerifyQuotation"
  [(visible)]="isVerifyQuotation"
  [width]="'95vw'"
  [height]="'100vh'"
  [title]="
    selectedQuotation?.TRANS_STATUS === 2
      ? 'Approve Quotation'
      : 'Verify Quotation'
  "
  (onHiding)="handleClose()"
>
  <app-quotation-form
    [isEditing]="true"
    [EditingResponseData]="selectedQuotation"
    [isVerifyMode]="selectedQuotation?.TRANS_STATUS !== 2"
    [isApproveMode]="selectedQuotation?.TRANS_STATUS === 2"
    (popupClosed)="handleClose()"
    [canApprove]="canApprove"
  >
  </app-quotation-form>
</dx-popup>

<dx-popup
  *ngIf="isApproveQuotation"
  [(visible)]="isApproveQuotation"
  [width]="'95vw'"
  [height]="'100vh'"
  title="Approve Quotation"
  (onHiding)="handleClose()"
>
  <app-quotation-form
    [isEditing]="true"
    [EditingResponseData]="selectedQuotation"
    [isApproveMode]="true"
    (popupClosed)="handleClose()"
    [canApprove]="canApprove"
  >
  </app-quotation-form>
</dx-popup>

<dx-popup
  *ngIf="isViewQuotation"
  [(visible)]="isViewQuotation"
  [width]="'95vw'"
  [height]="'100vh'"
  title="Quotation"
  (onHiding)="handleClose()"
>
  <!-- <ng-container *ngIf="isAddInvoice"> -->
  <app-quotation-form
    [isEditing]="true"
    [isReadOnlyMode]="isReadOnlyQuotation"
    [EditingResponseData]="selectedQuotation"
    (popupClosed)="handleClose()"
  ></app-quotation-form>
  <!-- </ng-container> -->
</dx-popup>
