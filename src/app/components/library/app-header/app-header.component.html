<header>
  <dx-toolbar class="header-toolbar">
    <dxi-item
      *ngIf="menuToggleEnabled"
      location="before"
      widget="dxButton"
      cssClass="menu-button"
      [options]="{
        icon: 'menu',
        stylingMode: 'text',
        onClick: toggleMenu,
      }"
    >
    </dxi-item>
    <!-- <dxi-item
      location="before"
      cssClass="header-title"
      *ngIf="title"
      [text]="title"
    >
    </dxi-item> -->
    <dxi-item location="before" cssClass="header-title">
      <div *dxTemplate class="d-flex align-items-end">
        <img [src]="logoPath" alt="Logo" class="logo-image" />
        <span
          class="fw-bold versionText small"
          style="margin-bottom: -4px; margin-left: 5px"
          >V {{ version }}</span
        >
      </div>
    </dxi-item>

    <dxi-item location="after" locateInMenu="never">
      <ng-container *dxTemplate>
        <theme-switcher></theme-switcher>
      </ng-container>
    </dxi-item>

    <dxi-item location="after">
      <div class="toolbar-divider"></div>
    </dxi-item>

    <dxi-item location="after" locateInMenu="auto">
      <ng-container *dxTemplate>
        <div class="user-info">
          <div class="user-name">{{ UserName }}</div>
          <div class="company-name">{{ company }}</div>
        </div>
      </ng-container>
    </dxi-item>

    <!-- <dxi-item
      location="after"
      locateInMenu="auto"
      widget="dxButton"
      [options]="{
        text: UserName,
        stylingMode: 'text',
        elementAttr: { class: 'userNameLabel' }
      }"
    ></dxi-item> -->

    <dxi-item location="after" locateInMenu="auto" menuItemTemplate="menuItem">
      <div *dxTemplate="let data of 'item'">
        <user-panel
          [user]="user"
          [menuItems]="userMenuItems"
          menuMode="context"
        ></user-panel>
      </div>
    </dxi-item>
    <div *dxTemplate="let data of 'menuItem'">
      <user-panel
        [user]="user"
        [menuItems]="userMenuItems"
        menuMode="list"
      ></user-panel>
    </div>
  </dx-toolbar>
</header>
