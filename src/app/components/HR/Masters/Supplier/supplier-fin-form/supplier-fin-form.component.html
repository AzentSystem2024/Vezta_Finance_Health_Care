<dx-form class="plain-styled-form" [colCount]="3">
  <dxi-item itemType="group">
    <dxi-item itemType="group" [colCount]="1">
      <dxi-item>
        <div *dxTemplate>
          <dx-text-box
            label="Code *"
            labelMode="floating"
            [(value)]="newSupplier.SUPP_CODE"
            width="150px"
          >
            <dx-validator>
              <dxi-validation-rule type="required" message="Code is required">
              </dxi-validation-rule>
              <dxi-validation-rule
                type="pattern"
                [pattern]="'^[a-zA-Z0-9]+$'"
                message="Code should be alphanumeric only"
              ></dxi-validation-rule>
              <dxi-validation-rule
                type="custom"
                [validationCallback]="validateSupplierCode"
                message="Code already exists"
              ></dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </div>
      </dxi-item>
    </dxi-item>
    <dxi-item itemType="group" [colCount]="1">
      <dxi-item>
        <div *dxTemplate>
          <dx-text-box
            label="Address *"
            labelMode="floating"
            [(value)]="newSupplier.ADDRESS1"
          >
            <dx-validator>
              <dxi-validation-rule
                type="required"
                message="Address is required"
              >
              </dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </div>
      </dxi-item>
    </dxi-item>
    <dxi-item itemType="group" [colCount]="1">
      <dxi-item>
        <div *dxTemplate>
          <dx-text-box
            label="Address"
            labelMode="floating"
            [(value)]="newSupplier.ADDRESS2"
          ></dx-text-box>
        </div>
      </dxi-item>
    </dxi-item>
    <dxi-item itemType="group" [colCount]="1">
      <dxi-item>
        <div *dxTemplate>
          <dx-text-box
            label="Address"
            labelMode="floating"
            [(value)]="newSupplier.ADDRESS3"
          ></dx-text-box>
        </div>
      </dxi-item>
    </dxi-item>
    <dxi-item itemType="group" [colCount]="1">
      <dxi-item>
        <div *dxTemplate style="display: flex">
          <dx-select-box
            label="Country code *"
            [searchEnabled]="true"
            labelMode="floating"
            [(value)]="countryCode"
            [items]="countryCodes"
            valueExpr="CODE"
            [displayExpr]="countryDisplay"
            placeholder="+1"
            [dropDownOptions]="{ width: '370px' }"
            hint="Country Code"
            (onValueChanged)="onCountrycodeChange($event)"
          >
            <div *dxTemplate="let data of 'item'">
              <img [src]="data.FLAG_URL" width="20" style="margin-right: 8px" />
              {{ data.CODE }} {{ data.COUNTRY_NAME }}
            </div>
            <dx-validator>
              <dxi-validation-rule
                type="required"
                message="Country code is required"
              ></dxi-validation-rule>
            </dx-validator>
          </dx-select-box>
          <dx-text-box
            label="Mobile *"
            labelMode="floating"
            class="phone-style"
            [(value)]="Supplier_mobile"
            (keypress)="keyPressNumbers($event)"
            [style]="{ width: '300px' }"
          >
            <dx-validator>
              <dxi-validation-rule
                type="required"
                message="Mobile number is required"
              >
              </dxi-validation-rule>
              <dxi-validation-rule
                type="custom"
                [validationCallback]="validateMobileLength"
                [message]="
                  'Mobile no. must be  ' + mobile_limit + ' digits long'
                "
              ></dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </div>
      </dxi-item>
      <dxi-item itemType="group" [colCount]="2">
        <dxi-item>
          <div *dxTemplate>
            <dx-text-box
              label="Fax"
              [(value)]="newSupplier.FAX_NO"
              labelMode="floating"
            >
              <!-- <dx-validator>
                <dxi-validation-rule
                  type="required"
                  message="Fax No. is required"
                >
                </dxi-validation-rule>
              </dx-validator> -->
            </dx-text-box>
          </div>
        </dxi-item>
        <dxi-item>
          <div *dxTemplate>
            <dx-text-box
              label="Email *"
              [(value)]="newSupplier.EMAIL"
              labelMode="floating"
            >
              <dx-validator>
                <dxi-validation-rule
                  type="required"
                  message="Email is required"
                >
                </dxi-validation-rule>
                <dxi-validation-rule
                  type="pattern"
                  pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$"
                  message="Invalid email format"
                ></dxi-validation-rule>
              </dx-validator>
            </dx-text-box>
          </div>
        </dxi-item>
      </dxi-item>
    </dxi-item>
    <dxi-item itemType="group" [colCount]="2">
      <dxi-item>
        <div *dxTemplate>
          <div class="checkbox">Accepted Currency</div>
          <dx-check-box
            [value]="isCurrencyAccepted"
            (onValueChanged)="toggleCurrencyDropdown($event.value)"
            [elementAttr]="{ 'aria-label': 'Checked' }"
          ></dx-check-box>
          Default
        </div>
      </dxi-item>

      <dxi-item>
        <div *dxTemplate>
          <dx-select-box
            label="Currency *"
            [items]="CurrencyDropdownData"
            displayExpr="DESCRIPTION"
            valueExpr="ID"
            [(value)]="newSupplier.CURRENCY_ID"
            [disabled]="isCurrencyAccepted"
            placeholder="Select Currency"
            [searchEnabled]="true"
            labelMode="floating"
          >
            <dx-validator>
              <dxi-validation-rule type="required" message="Select Currency">
              </dxi-validation-rule>
            </dx-validator>
          </dx-select-box>
        </div>
      </dxi-item>
    </dxi-item>
    <dxi-item itemType="group" [colCount]="1">
      <dxi-item>
        <div *dxTemplate>
          <dx-select-box
            label="Tax Rule"
            [items]="VATRuleDropdownData"
            displayExpr="DESCRIPTION"
            valueExpr="ID"
            [(value)]="newSupplier.VAT_RULE_ID"
            placeholder="Select Tax Rule"
            labelMode="floating"
            [searchEnabled]="true"
            (onValueChanged)="onTaxRuleChange()"
          >
            <dx-validator>
              <dxi-validation-rule
                type="required"
                message="Tax rule is required"
              >
              </dxi-validation-rule>
            </dx-validator>
          </dx-select-box>
        </div>
      </dxi-item>
    </dxi-item>
    <dxi-item itemType="group" [colCount]="1">
      <dxi-item>
        <!-- <div *dxTemplate>
          <dx-select-box
            label="Category"

        </div>

    </dxi-item>
  </dxi-item>

  <dxi-item itemType="group">
    <dxi-item itemType="group" [colCount]="1">
      <dxi-item>
        <div *dxTemplate>
          <dx-text-box
            label="Supplier Name *"
            [(value)]="newSupplier.SUPP_NAME"
            labelMode="floating"
          >
            <dx-validator>
              <dxi-validation-rule
                type="required"
                message="Supplier name is required"
              >
              </dxi-validation-rule>

              <dxi-validation-rule
                type="custom"
                [validationCallback]="validateSupplierName"
                message="Name already exists"
              ></dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </div>
      </dxi-item>

      <dxi-item>
        <div *dxTemplate>
          <dx-text-box
            label="Contact Name *"
            [(value)]="newSupplier.CONTACT_NAME"
            labelMode="floating"
          >
            <dx-validator>
              <dxi-validation-rule
                type="required"
                message="Contact name is required"
              >
              </dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </div>
      </dxi-item>
    </dxi-item>

    <dxi-item itemType="group" [colCount]="2">
      <dxi-item>
        <div *dxTemplate>
          <dx-text-box
            label="City *"
            [(value)]="newSupplier.CITY"
            labelMode="floating"
          >
            <dx-validator>
              <dxi-validation-rule type="required" message="City is required">
              </dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </div>
      </dxi-item>
      <dxi-item>
        <div *dxTemplate>

            label="Zip Code *"

            labelMode="floating"
          >
            <dx-validator>
              <dxi-validation-rule
                type="required"
                message="Zip Code is required"
              >
              </dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </div>
      </dxi-item>
    </dxi-item>
    <dxi-item itemType="group" [colCount]="1">
      <dxi-item>
        <div *dxTemplate>
          <dx-select-box
            label="Country *"
            [items]="CountryDropdownData"
            displayExpr="COUNTRY_NAME"
            valueExpr="ID"
            [(value)]="newSupplier.COUNTRY_ID"
            placeholder="Select Country"
            (onValueChanged)="onCountrySelectionChanged($event)"
            [searchEnabled]="true"
            labelMode="floating"
          >
            <dx-validator>
              <dxi-validation-rule type="required" message="Select country">
              </dxi-validation-rule>
            </dx-validator>
          </dx-select-box>
        </div>
      </dxi-item>
    </dxi-item>
    <dxi-item itemType="group" [colCount]="1">
      <dxi-item>
        <div *dxTemplate>
          <dx-select-box
            label="{{ stateLabel }}"
            [items]="StateDropdownData"
            displayExpr="DESCRIPTION"
            valueExpr="ID"
            [items]="State"
            [(value)]="newSupplier.STATE_ID"
            placeholder="Select State {{ stateLabel }} *"
            [searchEnabled]="true"
            labelMode="floating"
            (onValueChanged)="onStateValue($event)"
          >
            <dx-validator>
              <dxi-validation-rule type="required" message="Select state">
              </dxi-validation-rule>
            </dx-validator>
          </dx-select-box>
        </div>
      </dxi-item>
    </dxi-item>
    <dxi-item itemType="group" [colCount]="1">
      <dxi-item>
        <div *dxTemplate style="display: flex">
          <dx-select-box
            label="Country code *"
            [searchEnabled]="true"
            labelMode="floating"
            [(value)]="countryCodePhone"
            [items]="countryCodes"
            valueExpr="CODE"
            [displayExpr]="countryDisplay"
            placeholder="+1"
            [dropDownOptions]="{ width: '370px' }"
            hint="Country Code"
            (onValueChanged)="onCountrycodeChangePhone($event)"
          >
            <div *dxTemplate="let data of 'item'">
              <img [src]="data.FLAG_URL" width="20" style="margin-right: 8px" />
              {{ data.CODE }} {{ data.COUNTRY_NAME }}
            </div>
            <dx-validator>
              <dxi-validation-rule
                type="required"
                message="Country code is required"
              ></dxi-validation-rule>
            </dx-validator>
          </dx-select-box>
          <dx-text-box
            label="Phone *"
            class="phone-style"
            [(value)]="PhoneNumber"
            labelMode="floating"
            (keypress)="keyPressNumbers($event)"
            [style]="{ width: '300px' }"
          >
            <dx-validator>
              <dxi-validation-rule
                type="custom"
                [validationCallback]="validatePhoneLength"
                [message]="'Phone no. must be  ' + Phone_limit + ' digits long'"
              ></dxi-validation-rule
            ></dx-validator>
          </dx-text-box>
        </div>
      </dxi-item>
      <!-- <dxi-item>
        <div *dxTemplate>
          <dx-text-box
            label="Fax"
            [(value)]="newSupplier.FAX_NO"
            stylingMode="filled"
          >
            <dx-validator>
              <dxi-validation-rule
                type="required"
                message="Fax No. is required"
              >
              </dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </div>
      </dxi-item>
      <dxi-item>
        <div *dxTemplate>
          <dx-text-box
            label="Email"
            [(value)]="newSupplier.EMAIL"
            stylingMode="filled"
          >
            <dx-validator>

              </dxi-validation-rule>
              <dxi-validation-rule
                type="pattern"
                pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$"
                message="Invalid email format"
              ></dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </div>
      </dxi-item> -->
    </dxi-item>
    <dxi-item itemType="group" [colCount]="1">
      <dxi-item>
        <div *dxTemplate>
          <dx-select-box
            label="Payment Terms *"
            [items]="PaymentTermsDropdownData"
            [items]="PaymentTerms"
            displayExpr="DESCRIPTION"
            [searchEnabled]="true"
            valueExpr="ID"
            [(value)]="newSupplier.PAY_TERM_ID"
            placeholder="Select Payment Terms"
            labelMode="floating"
            (onValueChanged)="onPayTermSelectionChanged($event)"
          >
            <dx-validator>
              <dxi-validation-rule
                type="required"
                message="Select payment terms"
              >
              </dxi-validation-rule>
            </dx-validator>
          </dx-select-box>
        </div>
      </dxi-item>
    </dxi-item>
    <dxi-item itemType="group" [colCount]="1">
      <dxi-item>
        <div *dxTemplate>
          <dx-text-box
            label="VAT Registration Number *"
            [(value)]="newSupplier.VAT_REGNO"
            labelMode="floating"
            [disabled]="newSupplier.VAT_RULE_ID != 2"
          >
            <dx-validator>
              <dxi-validation-rule
                type="custom"
                [validationCallback]="validateVAT"
                message="VAT Registration Number is required when Tax is applicable"
              ></dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </div>
      </dxi-item>
    </dxi-item>

    <dxi-item [colSpan]="2">
      <div *dxTemplate>
        <dx-text-area
          label="Additional Info."
          [(value)]="newSupplier.NOTES"
          labelMode="floating"
        ></dx-text-area>
      </div>
    </dxi-item>
    <dxi-item itemType="group" [colCount]="1">

        <div *dxTemplate>
          <dx-select-box

            displayExpr="DESCRIPTION"
            valueExpr="ID"

            placeholder="Select Category"
            labelMode="floating"
          >
            <dx-validator>
              <dxi-validation-rule
                type="required"
                message="Select SupplierCategory"

              </dxi-validation-rule>

          >

    <dxi-item itemType="group" [colCount]="1">
      <dxi-item>
        <div *dxTemplate>
          <dx-check-box
            [(value)]="newSupplier.IS_COMPANY_BRANCH"
            text="Company Branch"
            stylingMode="outlined"
            hint="Company Branch"
            labelMode="floating"
          ></dx-check-box>
        </div>
      </dxi-item>
    </dxi-item>
  </dxi-item>

  <dxi-item itemType="group" [colCount]="2">
    <!-- LANDED COST -->
    <dxi-item itemType="group" [colCount]="1">
      <!-- <label class="landed-cost-label">Landed Cost</label> -->

      <!-- DataGrid for Cost Factors -->
      <dx-data-grid
        #landedCostGrid
        [dataSource]="landedcost"
        [height]="'200'"
        [width]="'300'"
        [showColumnLines]="false"
        [showRowLines]="true"
        [selection]="{
          mode: 'multiple',
          showCheckBoxesMode: 'always',
        }"
        [disabled]="isCurrencyAccepted"
        (onSelectionChanged)="onSelectionChanged($event)"
      >
        <dxo-paging [enabled]="false"></dxo-paging>
        <dxo-pager
          [showPageSizeSelector]="false"
          [showInfo]="false"
        ></dxo-pager>

        <!-- Only include the DESCRIPTION column -->
        <dxi-column dataField="DESCRIPTION" caption="Landed Cost"></dxi-column>
      </dx-data-grid>
    </dxi-item>
  </dxi-item>
</dx-form>
