<dx-validation-group #journalVoucherGroup>
  <div class="salary-grid-wrapper" style="padding: 0 10px">
    <div class="grid-container">
      <dx-data-grid
        #itemsGridRef
        [dataSource]="debitFormData.NOTE_DETAIL"
        [showBorders]="true"
        [showRowLines]="true"
        [showColumnLines]="true"
        [columnAutoWidth]="false"
        [wordWrapEnabled]="false"
        [rowAlternationEnabled]="true"
        [headerFilter]="{ visible: true, allowSearch: true }"
        [allowColumnReordering]="true"
        [showColumnHeaders]="true"
        [allowColumnResizing]="true"
        [height]="'70vh'"
        [columnResizingMode]="'nextColumn'"
        [scrolling]="{ mode: 'virtual' }"
        rowAlternationInterval="2"
        [selection]="{ mode: 'single' }"
        [editing]="{
          mode: 'cell',
          allowUpdating: true,
          allowDeleting: true,
          allowAdding: false,
          useIcons: true,
        }"
        (onEditorPreparing)="onEditorPreparing($event)"
        (onSummaryCalculated)="onSummaryCalculated($event)"
        (onRowInserted)="onRowInserted($event)"
        (onRowRemoving)="onRowRemoving($event)"
      >
        <dxo-load-panel [showPane]="false"></dxo-load-panel>
        <dxo-filter-builder [allowHierarchicalFields]="true">
        </dxo-filter-builder>
        <dxo-toolbar>
          <div
            class="stacked-toolbar-group"
            style="display: flex; flex-direction: column; gap: 2px"
          ></div>
          <dxi-item location="before" locateInMenu="auto">
            <div
              class="stacked-toolbar-group"
              style="display: flex; flex-direction: column; gap: 5px"
            >
              <div style="display: flex; gap: 5px">
                <dx-text-box
                  label="Doc No"
                  [(value)]="debitFormData.DOC_NO"
                  labelMode="floating"
                  [width]="200"
                  [readOnly]="true"
                ></dx-text-box>
                <dx-select-box
                  *ngIf="showSubType"
                  [dataSource]="subTypeList"
                  displayExpr="SUB_TYPE_NAME"
                  valueExpr="SUB_TYPE_ID"
                  [(value)]="debitFormData.SUB_TYPE_ID"
                  label="Select Subtype"
                  labelMode="floating"
                  placeholder="Select Subtype"
                  [width]="200"
                  (onValueChanged)="onSubTypeChange($event)"
                >
                </dx-select-box>
                <!--  -->
              </div>
              <div style="display: flex; gap: 5px">
                <dx-select-box
                  #distributorRef
                  [(value)]="debitFormData.SUPP_ID"
                  [dataSource]="distributorList"
                  displayExpr="DESCRIPTION"
                  valueExpr="ID"
                  [width]="405"
                  [searchEnabled]="true"
                  label="Supplier"
                  labelMode="floating"
                  (onValueChanged)="onSupplierChanged($event)"
                ></dx-select-box>

                <dx-select-box
                  [(value)]="debitFormData.INVOICE_NO"
                  [items]="pendingInvoicelist"
                  displayExpr="INVOICE_NO"
                  valueExpr="INVOICE_NO"
                  label="Select Invoice"
                  labelMode="floating"
                  placeholder="Select Invoice No."
                  [width]="200"
                  (onFocusIn)="openInvoicePopup()"
                ></dx-select-box>
              </div>
            </div>
          </dxi-item>

          <dxi-item location="after" locateInMenu="auto">
            <div class="stacked-toolbar-group"></div>
          </dxi-item>
          <dxi-item location="after" locateInMenu="auto">
            <div
              class="stacked-toolbar-group"
              style="display: flex; flex-direction: column; gap: 5px"
            >
              <!-- Row 1: Date only -->
              <div style="display: flex; gap: 5px; justify-content: flex-end">
                <dx-date-box
                  [(value)]="debitFormData.TRANS_DATE"
                  displayFormat="dd-MM-yyyy"
                  type="date"
                  label="Date"
                  labelMode="floating"
                  [width]="200"
                  [readOnly]="true"
                ></dx-date-box>
              </div>
              <div style="display: flex; gap: 5px">
                <dx-number-box
                  #dueAmountRef
                  label="Due Amount"
                  labelMode="floating"
                  [(value)]="this.debitFormData.DUE_AMOUNT"
                  [format]="{ type: 'fixedPoint', precision: 2 }"
                  [width]="200"
                  [showSpinButtons]="true"
                  [inputAttr]="{ style: 'text-align: right;' }"
                  (onKeyDown)="onDueAmountKeyDown($event)"
                  [readOnly]="true"
                ></dx-number-box>
                <dx-button
                  stylingMode="contained"
                  hint="Add New Row"
                  type="default"
                  (onClick)="onAddNewRow()"
                  style="margin-top: 10px"
                >
                  <div
                    *dxTemplate="let data of 'content'"
                    class="add-btn-content"
                  >
                    <span
                      class="iconify"
                      data-icon="formkit:add"
                      data-width="20"
                      data-height="20"
                    ></span>

                    <span class="add-text">Add Row</span>
                  </div></dx-button
                >
              </div>
            </div>
          </dxi-item>
        </dxo-toolbar>
        <dxi-column
          dataField="SL_NO"
          caption="Sl No"
          width="100"
          [allowEditing]="false"
        ></dxi-column>
        <dxi-column
          dataField="ledgerCode"
          caption="Ledger Code"
          [editorType]="'dxSelectBox'"
          [lookup]="{
            dataSource: ledgerList,
            valueExpr: 'HEAD_CODE',
            displayExpr: 'HEAD_CODE',
            searchEnabled: true,
          }"
          (onEditorPreparing)="onEditorPreparing($event)"
        ></dxi-column>

        <dxi-column
          dataField="ledgerName"
          caption="Ledger Name"
          [width]="'auto'"
          [editorType]="'dxSelectBox'"
          [lookup]="{
            dataSource: ledgerList,
            valueExpr: 'HEAD_NAME',
            displayExpr: 'HEAD_NAME',
            searchEnabled: true,
          }"
        ></dxi-column>
        <!-- <dxi-column dataField="HSN_CODE" caption="HSN Code" dataType="string">
        </dxi-column> -->
        <dxi-column
          dataField="particulars"
          caption="Particulars"
          [editorOptions]="{ maxLength: 250 }"
        >
          <dxi-validation-rule
            type="stringLength"
            [max]="250"
            message="Max 250 characters allowed"
          ></dxi-validation-rule>
        </dxi-column>
        <dxi-column
          dataField="Amount"
          caption="Amount"
          dataType="number"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        >
        </dxi-column>
        <!-- <dxi-column
          dataField="GST_PERC"
          [caption]="vatTitle + '%'"
          dataType="number"
          [allowEditing]="false"
        >
        </dxi-column> -->

        <dxi-column
          dataField="GST_PERC"
          [caption]="vatTitle + '%'"
          alignment="right"
          [format]="{ type: 'fixedPoint', precision: 0 }"
          [calculateDisplayValue]="getGstDisplayValue"
          [lookup]="{
            dataSource: VatClass,
            valueExpr: 'ID',
            displayExpr: 'DESCRIPTION',
          }"
        >
        </dxi-column>

        <dxi-column dataField="GST_ID" [visible]="false"></dxi-column>

        <!-- <dxi-column
          dataField="CGST"
          caption="CGST"
          dataType="number"
          [visible]="showCGST"
          [allowEditing]="false"
        ></dxi-column>

        <dxi-column
          dataField="SGST"
          caption="SGST"
          dataType="number"
          [visible]="showSGST"
          [allowEditing]="false"
        ></dxi-column> -->

        <dxi-column
          dataField="gstAmount"
          [caption]="vatTitle + ' Amount'"
          dataType="number"
          [format]="{ type: 'fixedPoint', precision: 2 }"
          [calculateCellValue]="calculateTaxAmount"
        >
        </dxi-column>

        <dxi-column
          dataField="Total"
          caption="Total"
          dataType="number"
          [allowEditing]="false"
          [calculateCellValue]="calculateTotal"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>

        <dxi-column type="buttons">
          <dxi-button name="edit"></dxi-button>
          <dxi-button name="delete"></dxi-button>
        </dxi-column>

        <dxo-summary>
          <dxi-total-item
            column="Amount"
            summaryType="sum"
            valueFormat="#,##0.00"
            displayFormat="Total: {0}"
            alignment="right"
          >
          </dxi-total-item>

          <dxi-total-item
            column="gstAmount"
            summaryType="sum"
            valueFormat="#,##0.00"
            displayFormat="Total: {0}"
            alignment="right"
          >
          </dxi-total-item>

          <dxi-total-item
            column="Total"
            summaryType="sum"
            valueFormat="#,##0.00"
            displayFormat="Total: {0}"
            alignment="right"
          >
          </dxi-total-item>
        </dxo-summary>
      </dx-data-grid>

      <div
        style="
          margin-top: 1px;
          padding: 0 10px 0 0;
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
          width: 100%;
        "
      >
        <!-- Left: Narration -->
        <dx-text-box
          #narrationRef
          [(value)]="debitFormData.NARRATION"
          label="Narration"
          labelMode="floating"
          [width]="400"
          (onKeyDown)="onNarrationKeyDown($event)"
        ></dx-text-box>

        <dx-text-box
          label="Vehicle No"
          labelMode="floating"
          [(value)]="debitFormData.VEHICLE_NO"
          [width]="200"
        ></dx-text-box>

        <!-- Middle: Round Off Checkbox -->
        <div class="approve-container" *ngIf="canApprove">
          <dx-check-box
            text="Round Off"
            [(value)]="debitFormData.ROUND_OFF"
            (onValueChanged)="onRoundOffChange()"
            style="margin-top: 18px"
          ></dx-check-box>
        </div>
        <!-- Right: Net Amount + Approve checkbox -->
        <div
          style="
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
          "
        >
          <dx-text-box
            [value]="netAmountString"
            label="Net Amount"
            labelMode="floating"
            [width]="200"
            [readOnly]="true"
            [format]="{ type: 'fixedPoint', precision: 2 }"
            [inputAttr]="{ style: 'text-align: right;' }"
          ></dx-text-box>
          <!-- <dx-text-box
              [value]="netAmountDisplay | number : '1.2-2'"
              label="Net Amount"
              labelMode="floating"
              [width]="200"
              [readOnly]="true"
              [calculateCellValue]="calculateAmount"
              [inputAttr]="{ style: 'text-align: right;' }"
            ></dx-text-box> -->
        </div>
      </div>
    </div>
  </div>
</dx-validation-group>

<div class="form-popup-buttons-container">
  <div class="popup-footer">
    <dx-check-box
      text="Approve"
      [(value)]="debitFormData.IS_APPROVED"
    ></dx-check-box>

    <dx-button
      text="Cancel"
      (onClick)="cancel()"
      stylingMode="outlined"
      type="normal"
    ></dx-button>
    <dx-button
      #saveButtonRef
      [text]="isSaving ? actionButtonText + '...' : actionButtonText"
      [disabled]="isSaving"
      (onClick)="saveDebitNote()"
      stylingMode="contained"
      type="default"
    ></dx-button>
  </div>
</div>

<dx-popup
  [(visible)]="invoicePopupVisible"
  [width]="600"
  [height]="400"
  title="Select Invoice"
>
  <dx-data-grid
    [dataSource]="pendingInvoicelist"
    [showBorders]="true"
    [showColumnLines]="true"
    [height]="'40vh'"
    [hoverStateEnabled]="true"
    [scrolling]="{ mode: 'virtual' }"
    [selection]="{ mode: 'single' }"
    (onRowClick)="selectInvoice($event)"
  >
    <dxo-editing mode="popup"></dxo-editing>
    <dxo-paging [pageSize]="10"></dxo-paging>
    <dxo-pager
      [visible]="true"
      [allowedPageSizes]="allowedPageSizes"
      [displayMode]="displayMode"
      [showPageSizeSelector]="showPageSizeSelector"
      [showInfo]="true"
      [showNavigationButtons]="true"
    ></dxo-pager>
    <dxo-load-panel [showPane]="false"></dxo-load-panel>
    <dxo-scrolling mode="standard"></dxo-scrolling>
    <dxo-filter-row
      [visible]="isFilterRowVisible"
      [applyFilter]="auto"
    ></dxo-filter-row>
    <dxo-toolbar> </dxo-toolbar>
    <dxi-column dataField="INVOICE_NO" caption="Doc No"></dxi-column>
    <dxi-column dataField="PURCH_DATE" caption="Date"></dxi-column>
    <dxi-column dataField="NET_AMOUNT" caption="Net Amount"></dxi-column>
    <dxi-column dataField="PENDING_AMOUNT" caption="Balance"></dxi-column>
  </dx-data-grid>
</dx-popup>
