<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      #dataGrid
      noDataText="No data available"
      [width]="'100%'"
      [height]="'82vh'"
      [loadPanel]="{
        enabled: true,
        text: 'Loading...',
        showIndicator: true,
        showPane: true,
      }"
      class="grid theme-dependent"
      [dataSource]="EmployeeLeaveDatasource"
      [showBorders]="true"
      [showColumnLines]="true"
      [showBorders]="true"
      [columnAutoWidth]="false"
      [wordWrapEnabled]="false"
      [rowAlternationEnabled]="true"
      [allowColumnReordering]="true"
      [showColumnHeaders]="true"
      [columnAutoWidth]="true"
      [allowColumnResizing]="true"
      [columnResizingMode]="'nextColumn'"
      [filterRow]="{ visible: false }"
      [headerFilter]="{ visible: false }"
      [scrolling]="{ mode: 'virtual' }"
      rowAlternationInterval="2"
      [selection]="{ mode: 'single' }"
      focusStateEnabled="false"
      (onRowRemoving)="Delete_Data($event)"
      (onEditingStart)="onEditingStart($event)"
    >
      <dxo-filter-row [visible]="isFilterRowVisible"></dxo-filter-row>

      <dxo-header-filter [visible]="showHeaderFilter"></dxo-header-filter>

      <dxo-export [enabled]="true" [formats]="['xlsx']"> </dxo-export>

      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <dxo-editing mode="popup" [allowUpdating]="true" [allowDeleting]="true">
        <dxo-popup
          title="Edit EmployeeLeave"
          [showTitle]="true"
          [width]="600"
          [height]="300"
        ></dxo-popup>
      </dxo-editing>

      <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="
              font-weight: 600;
              font-size: 20px;
              margin-left: 12px;
              padding: -3px;
              margin-right: 3px;
            "
          >
            Employee Leave
          </div>
        </dxi-item>

        <dxi-item
          location="after"
          widget="dxButton"
          [options]="searchButtonOptions"
        ></dxi-item>

        <!-- Refresh -->
        <dxi-item
          location="after"
          widget="dxButton"
          [options]="refreshButtonOptions"
        ></dxi-item>

        <!-- Divider -->
        <dxi-item location="after">
          <div class="toolbar-divider"></div>
        </dxi-item>

        <dxi-item
          name="exportButton"
          location="after"
          cssClass="export-btn"
        ></dxi-item>

        <!-- Add -->
        <dxi-item
          *ngIf="canAdd"
          location="after"
          widget="dxButton"
          [options]="addButtonOptions"
        ></dxi-item>
      </dxo-toolbar>

      <!-- <dxi-column dataField="SlNo" [width]="80" caption="Sl.No" [allowEditing]="false" [allowFiltering]="false"  alignment="left"  [allowHeaderFiltering]="false"></dxi-column> -->
      <dxi-column dataField="DOC_NO" caption="Doc No"></dxi-column>
      <dxi-column dataField="DATE" caption="Date"></dxi-column>
      <dxi-column dataField="EMP_NO" caption="Employee No"></dxi-column>
      <dxi-column dataField="EMP_NAME" caption="Employee Name"></dxi-column>
      <dxi-column dataField="LEAVE_TYPE" caption="Leave Type"></dxi-column>
      <dxi-column dataField="REMARKS" caption="Remarks"></dxi-column>
      <dxi-column
        dataField="STATUS"
        caption="Status"
        [cellTemplate]="statusCellRender"
        width="100"
        fixedPosition="right"
      >
      </dxi-column>
      
      <dxi-column
        type="buttons"
        caption="Actions"
        [width]="140"
        cellTemplate="actionTemplate"
      >
      </dxi-column>

       <div *dxTemplate="let cellData of 'actionTemplate'">
        <!-- Edit -->
        <i
          *ngIf="canEdit"
          class="dx-icon dx-icon-edit"
          [style.opacity]="
  cellData.data.STATUS === 'Verified' ||
  cellData.data.STATUS === 'Approved' ||
  cellData.data.STATUS === 'Travelled' ||
  cellData.data.STATUS === 'Rejoined' ||
  cellData.data.STATUS === 'Left Service'
    ? '0.4'
    : '1'
"
[style.pointer-events]="
  cellData.data.STATUS === 'Verified' ||
  cellData.data.STATUS === 'Approved' ||
  cellData.data.STATUS === 'Travelled' ||
  cellData.data.STATUS === 'Rejoined' ||
  cellData.data.STATUS === 'Left Service'
    ? 'none'
    : 'auto'
"
          style="cursor: pointer; margin-right: 10px"
          title="Edit"
          (click)="onEditingStart({ data: cellData.data, cancel: false })"
        ></i>

        <!-- Delete -->
        <i
          *ngIf="canDelete"
          class="dx-icon dx-icon-trash"
          [style.opacity]="
  cellData.data.STATUS === 'Verified' ||
  cellData.data.STATUS === 'Approved' ||
  cellData.data.STATUS === 'Travelled' ||
  cellData.data.STATUS === 'Rejoined' ||
  cellData.data.STATUS === 'Left Service'
    ? '0.4'
    : '1'
"
[style.pointer-events]="
  cellData.data.STATUS === 'Verified' ||
  cellData.data.STATUS === 'Approved' ||
  cellData.data.STATUS === 'Travelled' ||
  cellData.data.STATUS === 'Rejoined' ||
  cellData.data.STATUS === 'Left Service'
    ? 'none'
    : 'auto'
"
          style="cursor: pointer; margin-right: 10px"
          title="Delete"
          (click)="Delete_Data({ data: cellData.data, cancel: false })"
        ></i>

        <!-- Verify -->
        <span
          *ngIf="
  (cellData.data.STATUS === 'Verified' && canApprove) ||
  (cellData.data.STATUS === 'Approved' && canApprove) ||
  (cellData.data.STATUS === 'Travelled' && canApprove) ||
  (
    cellData.data.STATUS !== 'Verified' &&
    cellData.data.STATUS !== 'Approved' &&
    cellData.data.STATUS !== 'Travelled' &&
    canVerify
  )
"
          style="
            position: relative;
            display: inline-block;
            width: 18px;
            height: 18px;
            margin-left: 10px;
            cursor: pointer;
            vertical-align: middle;
          "
         [title]="
  cellData.data.STATUS === 'Rejoined' ||
  cellData.data.STATUS === 'Left Service'
    ? 'View'
    : cellData.data.STATUS === 'Travelled'
      ? 'Rejoin / Left Service'
      : cellData.data.STATUS === 'Approved'
        ? 'Travel'
        : cellData.data.STATUS === 'Verified'
          ? 'Approve'
          : 'Verify'
"
        (click)="
  cellData.data.STATUS === 'Rejoined' ||
  cellData.data.STATUS === 'Left Service'
    ? onEditingStart({ data: cellData.data, cancel: false })
    : cellData.data.STATUS === 'Travelled'
      ? onRejoinClick({ row: { data: cellData.data } })
      : cellData.data.STATUS === 'Approved'
        ? onTravelClick({ row: { data: cellData.data } })
        : cellData.data.STATUS === 'Verified'
          ? onApproveClick({ row: { data: cellData.data } })
          : onVerifyClick({ row: { data: cellData.data } })
"
        >
          <!-- Blue badge -->
          <i
            class="fas fa-certificate"
            [style.color]="
  cellData.data.STATUS === 'Travelled'
    ? '#FFD700'
    : cellData.data.STATUS === 'Approved'
      ? '#10B981'
      : cellData.data.STATUS === 'Verified'
        ? '#0073D8'
        : cellData.data.STATUS === 'Rejoined'
            ? '#8B4513'
            : cellData.data.STATUS === 'Left Service'
              ? '#DC2626'
        : '#FFA500'
"
            style="font-size: 18px; position: absolute; top: 0; left: 0"
          ></i>

          <!-- White tick -->
          <i
            class="fas fa-check"
            style="
              color: white;
              font-size: 7px;
              position: absolute;
              top: 5px;
              left: 5px;
              pointer-events: none;
            "
          ></i>
        </span>
      </div>
    </dx-data-grid>
  </div>
</div>

<!-- ADD POPUP -->
<form-popup
  AddVacationPopup="false;"
  [(visible)]="AddVacationPopup"
  titleText=" Employee Vacation"
  (cancel)="closePopup()"
  (save)="Add_Data()"
  [showApprove]="false"
>
  <dx-form id="form" [formGroup]="formsource">
    <dxi-item itemType="group" [colCount]="2" [colSpan]="2">
      <!-- Document No -->
      <dxi-item>
        <dx-text-box
          label="Document No"
          [readOnly]="true"
          [labelMode]="'floating'"
          formControlName="Doc_no"
        ></dx-text-box>
      </dxi-item>

      <!-- Date Picker -->
      <dxi-item>
        <dx-date-box
          label="Date"
          placeholder="MM/DD/YYYY"
          [showClearButton]="true"
          [useMaskBehavior]="true"
          displayFormat="dd/MM/yyyy"
          type="date"
          [inputAttr]="{ 'aria-label': 'Date' }"
          formControlName="Date"
          [labelMode]="'floating'"
        ></dx-date-box>
      </dxi-item>
    </dxi-item>

    <dxi-item class="select-box">
      <dx-select-box
        [inputAttr]="{ 'aria-label': 'Simple Product' }"
        label="Employee"
        [searchEnabled]="true"
        placeholder="Select.."
        displayExpr="DESCRIPTION"
        valueExpr="ID"
        [(value)]="Employee_no"
        [items]="Employee"
        formControlName="Employee_no"
        [labelMode]="'floating'"
        (onValueChanged)="onEmployee_Change($event)"
      ></dx-select-box>
    </dxi-item>

    <dxi-item itemType="group" [colCount]="2" [colSpan]="2">
      <dxi-item class="select-box">
        <dx-select-box
          [inputAttr]="{ 'aria-label': 'Simple Product' }"
          label="Leave Type"
          [searchEnabled]="true"
          displayExpr="DESCRIPTION"
          valueExpr="ID"
          [items]="LeaveType"
          [(value)]="Leave_type"
          placeholder="Select.."
          formControlName="Leave_type"
          [labelMode]="'floating'"
        ></dx-select-box>
      </dxi-item>

      <dxi-item>
        <dx-number-box
          label="Leave Days Available"
          [labelMode]="'floating'"
          formControlName="Leave_credit"
          valueChangeEvent="input"
          [readOnly]="true"
        ></dx-number-box>
      </dxi-item>
    </dxi-item>

    <dxi-item itemType="group" [colCount]="2" [colSpan]="2">
      <!-- Date Picker -->
      <dxi-item>
        <dx-date-box
          [labelMode]="'floating'"
          label="Departure Date"
          placeholder="MM/DD/YYYY"
          [showClearButton]="true"
          [useMaskBehavior]="true"
          displayFormat="dd/MM/yyyy"
          type="date"
          [min]="minSelectableDate"
          [inputAttr]="{ 'aria-label': 'Dept_date' }"
          formControlName="Dept_date"
          ><dx-validator>
            <dxi-validation-rule
              type="required"
              message="This field is required"
            ></dxi-validation-rule> </dx-validator
        ></dx-date-box>
      </dxi-item>
    </dxi-item>

    <dxi-item itemType="group" [colCount]="2" [colSpan]="2">
      <dxi-item>
        <dx-number-box
          label="Leave Days Required"
          formControlName="Leave_days"
          valueChangeEvent="keyup input change"
          valueChangeEvonValueChangedent="input"
          [labelMode]="'floating'"
          ><dx-validator>
            <dxi-validation-rule
              type="required"
              message="This field is required"
            ></dxi-validation-rule> </dx-validator
        ></dx-number-box>
      </dxi-item>
      <!-- Date Picker -->
      <dxi-item>
        <dx-date-box
          label="Expected Rejoin Date"
          placeholder="MM/DD/YYYY"
          [showClearButton]="true"
          [useMaskBehavior]="true"
          displayFormat="dd/MM/yyyy"
          type="date"
          [readOnly]="true"
          [inputAttr]="{ 'aria-label': 'Date' }"
          formControlName="Expected_rejoin_date"
          [labelMode]="'floating'"
        >
          <!-- <dx-validator>
            <dxi-validation-rule
              type="custom"
              [validationCallback]="validateExpectedRejoin"
              message="Rejoin date overlaps with departure period."
            ></dxi-validation-rule>
          </dx-validator> -->
        </dx-date-box>
      </dxi-item>
    </dxi-item>

    <dxi-item
      ><dx-text-box
        label="Remarks"
        valueChangeEvent="input"
        formControlName="Remarks"
        [labelMode]="'floating'"
      ></dx-text-box
    ></dxi-item>

    <dxi-item>
      <dx-check-box
        text="Leave Salary Payable"
        formControlName="Leave_salary_payable"
      ></dx-check-box>
    </dxi-item>
  </dx-form>
</form-popup>
