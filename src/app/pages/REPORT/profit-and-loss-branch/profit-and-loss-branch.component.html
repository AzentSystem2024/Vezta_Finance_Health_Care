<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      #dataGrid
      class="grid theme-dependent"
      [dataSource]="ProfitLossReport"
      width="100%"
      height="82vh"
      [showBorders]="true"
      [showRowLines]="true"
      [allowColumnResizing]="false"
      [showColumnLines]="true"
      [columnAutoWidth]="true"
      [groupPanel]="{ visible: true }"
      [grouping]="{ autoExpandAll: true }"
      [rowAlternationEnabled]="true"
      rowAlternationInterval="2"
      [remoteOperations]="false"
      [scrolling]="{ mode: 'virtual' }"
      (onCellPrepared)="onCellPrepared($event)"
      (onRowPrepared)="onRowPrepared($event)"
      [allowColumnReordering]="true"
      [filterRow]="{ visible: false }"
      id="dataGrid"
      [headerFilter]="{ visible: false }"
      [export]="{ enabled: true, formats: ['xlsx', 'pdf'] }"
      [columnFixing]="{
        enabled: true,
        texts: { fix: 'Freeze', unfix: 'Unfreeze' },
      }"
      (onExporting)="onExporting($event)"
      [loadPanel]="{ enabled: false, text: 'Loading...' }"
    >
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-export [enabled]="true" [formats]="['xlsx', 'pdf']"> </dxo-export>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="true"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>

      <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="
              font-weight: 600;
              font-size: 20px;
              margin-left: 12px;
              padding: -3px;
              margin-right: 3px;
            "
          >
            Branch wise Profit & Loss
          </div>
        </dxi-item>

        <dxi-item>
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="Year"
            [width]="120"
            [(value)]="selectedYear"
            [dataSource]="years"
            (onValueChanged)="onYearChanged($event)"
            placeholder="Year"
          ></dx-select-box>
        </dxi-item>

        <dxi-item>
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="month"
            [dataSource]="monthDataSource"
            displayExpr="name"
            valueExpr="value"
            [(value)]="selectedmonth"
            (onValueChanged)="onMonthValueChanged($event)"
            [dropDownOptions]="{ width: 'auto' }"
          >
          </dx-select-box>
        </dxi-item>

        <dxi-item>
          <dx-date-box
            [width]="130"
            label="Date From"
            labelMode="floating"
            [displayFormat]="'dd-MM-yyyy'"
            [value]="formatted_from_date"
            (onValueChanged)="onFromDateChange($event)"
          ></dx-date-box>
        </dxi-item>
        <dxi-item>
          <dx-date-box
            [width]="130"
            label="Date To"
            labelMode="floating"
            [value]="formatted_To_date"
            [displayFormat]="'dd-MM-yyyy'"
            (onValueChanged)="onToDateChange($event)"
          >
          </dx-date-box>
        </dxi-item>

        <dxi-item>
      <dx-tag-box
  label="Store"
  labelMode="floating"
  displayExpr="DESCRIPTION"
  valueExpr="ID"
  [items]="Store"
  [searchEnabled]="true"
  [(value)]="selectedStoreid"
  [showSelectionControls]="true"
  [maxDisplayedTags]="100"
  [showMultiTagOnly]="true"
  [multiline]="false"
  [hint]="storeHint"
  [width]="200"
  (onValueChanged)="updateStoreHint()"
></dx-tag-box>
    </dxi-item>

        <!-- <dxi-item name="exportButton" [disabled]="isEmptyDatagrid"></dxi-item> -->
        <dxi-item location="after" locateInMenu="auto">
          <dx-button
            text="Apply"
            type="default"
            icon="todo"
            stylingMode="contained"
            (onClick)="get_DataSource()"
          >
          </dx-button>
        </dxi-item>
        <!-- <dxi-item>
        <dxi-item location="after">
          <div class="toolbar-divider"></div>
        </dxi-item>

        <dxi-item>
          <dx-button
            text="Apply"
            type="default"
            stylingMode="contained"
            class="mt-2"
            (onClick)="get_DataSource()"
          >
          </dx-button>
        </dxi-item> -->
        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="refreshButtonOptions"
        ></dxi-item>
        <dxi-item name="exportButton"></dxi-item>
      </dxo-toolbar>

      <dxo-grouping
        [autoExpandAll]="true"
        [contextMenuEnabled]="true"
        [expandMode]="'rowClick'"
      ></dxo-grouping>
      <dxo-header-filter [visible]="true">
        <dxo-search [enabled]="true"></dxo-search>
      </dxo-header-filter>
      <dxo-filter-row
        [visible]="isFilterRowVisible"
        [applyFilter]="auto"
      ></dxo-filter-row>

      <dxi-column
        dataField="TYPE_NAME"
        caption="Main Group"
        dataType="string"
        [groupIndex]="0"
        sortOrder="asc"
        [sortingMethod]="typeSorting"
      ></dxi-column>

      <dxi-column
        dataField="GROUP_NAME"
        caption="Sub Group"
        dataType="string"
        [groupIndex]="0"
        sortOrder="asc"
        [sortingMethod]="typeSorting"
      ></dxi-column>
      <dxi-column
        dataField="CATEGORY_NAME"
        caption="Category"
        alignment="left"
        dataType="number"
        [groupIndex]="1"
        [sortingMethod]="typeSorting"
      ></dxi-column>
      <dxi-column
        dataField="HEAD_NAME"
        caption="ledger"
        alignment="left"
        dataType="number"
      ></dxi-column>
      <!-- <dxi-column
        dataField="StoreAmounts.CENTRAL STORE"
        caption="Central Store"
        alignment="left"
        dataType="number"
      ></dxi-column> -->
     <dxi-column
  *ngFor="let col of dynamicColumns"
  [dataField]="col.dataField"
  [caption]="col.caption"
  alignment="right"
  dataType="number"
  format="#,##0.00"
  [width]="100"
>
</dxi-column>
      <dxi-column
        dataField="StoreAmounts.TOTAL"
        caption="Total"
        dataType="number"
        format="#,##0.00"
      ></dxi-column>

      <!-- Group summary for MAIN_GROUP_NAME -->
      <dxo-summary>
        <dxi-group-item
          column="StoreAmounts.TOTAL"
          summaryType="sum"
          [alignByColumn]="true"
          displayFormat="Total: {0}"
          valueFormat="#,##0.00"
        >
        </dxi-group-item>

        <dxi-total-item column="StoreAmounts.TOTAL" summaryType="sum" displayFormat="">
        </dxi-total-item>
      </dxo-summary>

      <dxi-column
        *ngIf="ProfitLossReport.length > 0"
        type="buttons"
        [width]="100"
      >
        <dxi-button
          hint="View"
          icon="eyeopen"
          text="View"
          [onClick]="onViewClick.bind(this)"
        ></dxi-button>
      </dxi-column>
    </dx-data-grid>
  </div>
</div>
