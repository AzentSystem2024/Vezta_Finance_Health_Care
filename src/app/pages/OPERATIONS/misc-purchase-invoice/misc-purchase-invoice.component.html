<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      #dataGrid
      noDataText="No data available"
      [width]="'100%'"
      [height]="'82vh'"
      [loadPanel]="{
        enabled: true,
        text: 'Loading...',
        showIndicator: true,
        showPane: true,
      }"
      class="grid theme-dependent"
      [dataSource]="InvoiceDataSource"
      [showBorders]="true"
      [showRowLines]="true"
      [showColumnLines]="true"
      [columnAutoWidth]="false"
      [wordWrapEnabled]="false"
      [rowAlternationEnabled]="true"
      [allowColumnReordering]="true"
      [showColumnHeaders]="true"
      [columnAutoWidth]="true"
      [allowColumnResizing]="true"
      [columnResizingMode]="'nextColumn'"
      [filterRow]="{ visible: false }"
      [headerFilter]="{ visible: false }"
      [scrolling]="{ mode: 'virtual' }"
      rowAlternationInterval="2"
      [selection]="{ mode: 'single' }"
      focusStateEnabled="false"
      [scrolling]="{ mode: 'virtual' }"
      (onEditingStart)="onEditInvoice($event)"
      (onRowRemoving)="onDeleteInvoice($event)"
      (onCellPrepared)="onCellPrepared($event)"
    >
      <dxo-editing
        mode="popup"
        [allowUpdating]="canEdit"
        [allowDeleting]="canDelete"
      ></dxo-editing>
      <dxo-export
        [enabled]="true"
        [allowExportSelectedData]="false"
        [formats]="['xlsx']"
      >
      </dxo-export>
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <dxo-load-panel [showPane]="false"></dxo-load-panel>
      <!-- <dxo-scrolling mode="standard"></dxo-scrolling> -->
      <dxo-filter-row
        [visible]="isFilterRowVisible"
        [applyFilter]="auto"
      ></dxo-filter-row>
      <dxo-header-filter [visible]="isFilterOpened">
        <dxo-search [enabled]="true"></dxo-search>
      </dxo-header-filter>
      <dxo-header-filter [visible]="isFilterOpened">
        <dxo-search [enabled]="true"></dxo-search>
      </dxo-header-filter>
      <dxo-filter-panel [visible]="isFilterOpened"></dxo-filter-panel>
      <dxo-filter-builder [allowHierarchicalFields]="true">
      </dxo-filter-builder>
      <dxo-toolbar>
        <dxi-item location="before">
          <div class="grid-header">Miscellaneous Purchase Invoice</div>
        </dxi-item>
        <dxi-item location="after" template="dateFilterTemplate"></dxi-item>
        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="searchButtonOptions"
        ></dxi-item>
        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="refreshButtonOptions"
        ></dxi-item>
        <dxi-item location="after">
          <div class="toolbar-divider"></div>
        </dxi-item>
        <dxi-item
          name="exportButton"
          location="after"
          cssClass="export-btn"
        ></dxi-item>
        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="addButtonOptions"
        ></dxi-item>
      </dxo-toolbar>
      <div *dxTemplate="let data of 'dateFilterTemplate'">
        <dx-select-box
          [dataSource]="dateRanges"
          [displayExpr]="displayExpr"
          valueExpr="value"
          [(value)]="selectedDateRange"
          (onValueChanged)="onDateRangeChanged($event)"
          (onOpened)="attachItemClickHandler($event)"
          width="220"
        >
          <!-- This controls the dropdown list rendering -->
          <div *dxTemplate="let item of 'item'">
            {{ item.value === "custom" ? "Custom" : item.label }}
          </div>
        </dx-select-box>
      </div>
      <dxi-column
        dataField="PURCH_NO"
        caption="Purchase No"
        alignment="left"
      ></dxi-column>
      <dxi-column dataField="SUPP_NAME" caption="Supplier"></dxi-column>
      <dxi-column
        dataField="PURCH_DATE"
        caption="Date"
        dataType="date"
        [allowEditing]="false"
        format="dd-MM-yyyy"
      ></dxi-column>
      <!-- <dxi-column
        dataField="GROSS_AMOUNT"
        caption="Gross Amount"
        dataType="number"
        [format]="{ type: 'fixedPoint', precision: 2 }"
      ></dxi-column>
      <dxi-column
        dataField="GST_AMOUNT"
        [caption]="vatTitle + ' Amount'"
        dataType="number"
        [format]="{ type: 'fixedPoint', precision: 2 }"
      ></dxi-column> -->
      <dxi-column
        dataField="NET_AMOUNT"
        caption="Net Amount"
        dataType="number"
        [format]="{ type: 'fixedPoint', precision: 2 }"
      ></dxi-column>
      <dxi-column
        dataField="NARRATION"
        caption="Narration"
        dataType="number"
        [format]="{ type: 'fixedPoint', precision: 2 }"
      ></dxi-column>
      <dxi-column
        caption="Status"
        dataField="STATUS"
        [width]="80"
        [cellTemplate]="statusCellRender"
        [allowHeaderFiltering]="true"
        [headerFilter]="{
          dataSource: getStatusFilterData,
          encodeHtml: false,
        }"
      >
      </dxi-column>
      <dxi-column
        type="buttons"
        caption="Actions"
        [width]="140"
        cellTemplate="actionTemplate"
      >
      </dxi-column>
      <div *dxTemplate="let cellData of 'actionTemplate'">
        <!-- Edit -->
        <i
          *ngIf="canEdit"
          class="dx-icon dx-icon-edit"
          [style.opacity]="
            cellData.data.STATUS === 'Verified' ||
            cellData.data.STATUS === 'Approved'
              ? '0.4'
              : '1'
          "
          [style.pointer-events]="
            cellData.data.STATUS === 'Verified' ||
            cellData.data.STATUS === 'Approved'
              ? 'none'
              : 'auto'
          "
          style="cursor: pointer; margin-right: 10px"
          title="Edit"
          (click)="onEditInvoice({ data: cellData.data, cancel: false })"
        ></i>

        <!-- Delete -->
        <i
          *ngIf="canDelete"
          class="dx-icon dx-icon-trash"
          [style.opacity]="
            cellData.data.STATUS === 'Verified' ||
            cellData.data.STATUS === 'Approved'
              ? '0.4'
              : '1'
          "
          [style.pointer-events]="
            cellData.data.STATUS === 'Verified' ||
            cellData.data.STATUS === 'Approved'
              ? 'none'
              : 'auto'
          "
          style="cursor: pointer; margin-right: 10px"
          title="Delete"
          (click)="onDeleteInvoice({ data: cellData.data, cancel: false })"
        ></i>

        <!-- Verify -->
        <span
          *ngIf="
            (cellData.data.STATUS === 'Verified' && canApprove) ||
            (cellData.data.STATUS !== 'Verified' && canVerify)
          "
          style="
            position: relative;
            display: inline-block;
            width: 18px;
            height: 18px;
            margin-left: 10px;
            cursor: pointer;
            vertical-align: middle;
          "
          [title]="
            cellData.data.STATUS === 'Approved'
              ? 'Approved'
              : cellData.data.STATUS === 'Verified'
                ? 'Approve'
                : 'Verify'
          "
          (click)="onVerifyInvoice({ row: { data: cellData.data } })"
        >
          <!-- Blue badge -->
          <i
            class="fas fa-certificate"
            [style.color]="
              cellData.data.STATUS === 'Approved'
                ? '#10B981'
                : cellData.data.STATUS === 'Verified'
                  ? '#0073D8'
                  : '#FFA500'
            "
            style="font-size: 18px; position: absolute; top: 0; left: 0"
          ></i>

          <!-- White tick -->
          <i
            class="fas fa-check"
            style="
              color: white;
              font-size: 7px;
              position: absolute;
              top: 5px;
              left: 5px;
              pointer-events: none;
            "
          ></i>
        </span>
      </div>
    </dx-data-grid>
  </div>
</div>

<dx-popup
  *ngIf="isAddInvoice"
  [(visible)]="isAddInvoice"
  [width]="'95vw'"
  [height]="'100vh'"
  title="New Invoice"
  (onHiding)="handleClose()"
>
  <!-- <ng-container *ngIf="isAddInvoice"> -->
  <app-misc-purch-invoice-form
    [isEditing]="false"
    (popupClosed)="handleClose()"
    [canApprove]="canApprove"
  ></app-misc-purch-invoice-form>
  <!-- </ng-container> -->
</dx-popup>
<dx-popup
  *ngIf="isEditInvoice"
  [(visible)]="isEditInvoice"
  [width]="'95vw'"
  [height]="'100vh'"
  title="Edit Invoice"
  (onHiding)="handleClose()"
>
  <!-- <ng-container *ngIf="isAddInvoice"> -->
  <app-misc-purch-invoice-form
    [isEditing]="true"
    [EditingResponseData]="selectedInvoice"
    (popupClosed)="handleClose()"
  ></app-misc-purch-invoice-form>
  <!-- </ng-container> -->
</dx-popup>

<dx-popup
  *ngIf="isVerifyInvoice"
  [(visible)]="isVerifyInvoice"
  [width]="'95vw'"
  [height]="'100vh'"
  [title]="
    selectedInvoice?.STATUS === 'Verified'
      ? 'Approve Invoice'
      : 'Verify Invoice'
  "
  (popupClosed)="handleClose()"
>
  <app-misc-purch-invoice-form
    [isEditing]="true"
    [EditingResponseData]="selectedInvoice"
    [isVerifyMode]="selectedInvoice?.STATUS !== 'Verified'"
    [isApproveMode]="selectedInvoice?.STATUS === 'Verified'"
    (popupClosed)="handleClose()"
    [canApprove]="canApprove"
  >
  </app-misc-purch-invoice-form>
</dx-popup>

<dx-popup
  *ngIf="isApproveInvoice"
  [(visible)]="isApproveInvoice"
  [width]="'95vw'"
  [height]="'100vh'"
  title="Approve Invoice"
  (onHiding)="handleClose()"
>
  <app-misc-purch-invoice-form
    [isEditing]="true"
    [EditingResponseData]="selectedInvoice"
    [isApproveMode]="true"
    (popupClosed)="handleClose()"
    [canApprove]="canApprove"
  >
  </app-misc-purch-invoice-form>
</dx-popup>

<dx-popup
  *ngIf="isViewInvoice"
  [(visible)]="isViewInvoice"
  [width]="'95vw'"
  [height]="'100vh'"
  title="Invoice"
  (onHiding)="handleClose()"
>
  <!-- <ng-container *ngIf="isAddInvoice"> -->
  <app-misc-purch-invoice-form
    [isEditing]="true"
    [isReadOnlyMode]="isReadOnlyInvoice"
    [EditingResponseData]="selectedInvoice"
    (popupClosed)="handleClose()"
  ></app-misc-purch-invoice-form>
  <!-- </ng-container> -->
</dx-popup>
<app-custom-date-popup
  [(visible)]="showCustomDatePopup"
  [startDate]="customStartDate"
  [endDate]="customEndDate"
  (applyDates)="onCustomDateApplied($event)"
>
</app-custom-date-popup>
