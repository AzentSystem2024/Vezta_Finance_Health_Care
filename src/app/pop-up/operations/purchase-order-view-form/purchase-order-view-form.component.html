<div
  class="pono-date"
  style="display: flex; margin-top: 10px; margin-bottom: 10px"
>
  <dx-text-box
    label="PO NO."
    labelMode="floating"
    placeholder="Enter PO No"
    [(value)]="newPoData.DOC_NO"
    [width]="200"
    [readOnly]="true"
  >
  </dx-text-box>
  <div class="po-date" style="margin-left: 20px">
    <dx-text-box
      label="Date"
      labelMode="floating"
      placeholder="Select Date"
      [width]="200"
      [readOnly]="true"
      [value]="formattedDate"
      displayFormat="dd-MM-yyyy"
    >
    </dx-text-box>
  </div>
  <div class="po-date" style="margin-left: 20px">
    <dx-text-box
      label="Reference No"
      labelMode="floating"
      [width]="200"
      [(value)]="newPoData.REF_NO"
    >
    </dx-text-box>
  </div>
  <div class="po-date" style="margin-left: 20px">
    <dx-text-box
      label="Supplier"
      labelMode="floating"
      [width]="300"
      placeholder="Select Supplier"
      [(value)]="newPoData.SUPP_NAME"
      [readOnly]="true"
    >
    </dx-text-box>
  </div>
  <div class="po-date" style="margin-left: 20px">
    <dx-text-box
      label="Store"
      labelMode="floating"
      [width]="300"
      placeholder="Select Store"
      [(value)]="newPoData.STORE"
      [readOnly]="true"
    >
    </dx-text-box>
  </div>
</div>
<dx-tabs
  [(selectedIndex)]="selectedTabIndex"
  [dataSource]="tabs"
  (onItemClick)="onTabClick($event)"
  [elementAttr]="{ class: 'po-tabs' }"
  [orientation]="orientations"
  [stylingMode]="stylingMode"
>
</dx-tabs>

<!-- Content based on selected tab -->
<div *ngIf="selectedTabIndex === 0">
  <div class="header-tab-content">
    <!-- Supplier and Shipping Details -->
    <div class="details-container">
      <!-- Supplier Details -->
      <div class="supplier-details">
        <span class="section-title">Supplier Details</span>

        <!-- <dx-text-box
          label="Currency"
          labelMode="floating"
          placeholder="Currency"
          [(value)]="SupplierCurrency"
          [readOnly]="true"
        >
        </dx-text-box>

        <dx-text-box
          label="Exchange Rate"
          labelMode="floating"
          placeholder="Exchange Rate"
          [(value)]="newPoData.EXCHANGE_RATE"
          [readOnly]="true"
        >
        </dx-text-box> -->

        <dx-text-box
          label="Tax Rule"
          labelMode="floating"
          placeholder="Tax Rule"
          [(value)]="newPoData.VAT_RULE_NAME"
          [readOnly]="true"
        >
        </dx-text-box>
        <dx-text-box
          label="Contact Person"
          labelMode="floating"
          placeholder="Contact Person"
          [(value)]="newPoData.SUPP_CONTACT"
          [readOnly]="true"
        >
        </dx-text-box>
        <dx-text-box
          label="Email"
          labelMode="floating"
          placeholder="Email"
          [(value)]="newPoData.SUPPLIER_EMAIL"
          [readOnly]="true"
        >
        </dx-text-box>
        <div style="display: flex">
          <dx-select-box
            label="Code"
            labelMode="floating"
            [width]="100"
            [(value)]="supplierCountryCode"
            [items]="countryCodes"
            displayExpr="data.dial_code"
            valueExpr="data.dial_code"
            [dropDownOptions]="{ width: '370px' }"
            [readOnly]="true"
          >
            <div *dxTemplate="let item of 'item'">
              <span>{{ item.data.flag }}</span>
              <span>{{ item.data.dial_code }}</span>
              <span>{{ item.data.name }}</span>
            </div>
          </dx-select-box>

          <dx-text-box
            label="Contact No"
            labelMode="floating"
            [(value)]="newPoData.SUPP_MOBILE"
            style="margin-left: 10px"
            valueChangeEvent="input"
            [readOnly]="true"
          >
          </dx-text-box>
        </div>

        <dx-text-box
          class="address-field"
          label="Address"
          labelMode="floating"
          placeholder="Supplier Address"
          [(value)]="newPoData.SUPP_ADDRESS"
          [readOnly]="true"
        >
        </dx-text-box>
      </div>

      <!-- Shipping Details -->
      <div class="shipping-details">
        <span class="section-title">Shipping Details</span>
        <dx-text-box
          label="Shipping Address"
          labelMode="floating"
          placeholder="Shipping Address"
          [(value)]="newPoData.SHIP_TO"
          [readOnly]="true"
        >
        </dx-text-box>

        <dx-text-box
          label="Purpose"
          labelMode="floating"
          placeholder="Purpose"
          [(value)]="newPoData.PURPOSE"
          [readOnly]="true"
        >
        </dx-text-box>

        <dx-text-box
          label="Contact Name"
          labelMode="floating"
          placeholder="Contact Name"
          [(value)]="newPoData.CONTACT_NAME"
          [readOnly]="true"
        >
        </dx-text-box>

        <div style="display: flex">
          <dx-select-box
            label="Code"
            labelMode="floating"
            [items]="countryCodes"
            [(value)]="shippingCountryCode"
            displayExpr="data.dial_code"
            valueExpr="data.dial_code"
            [width]="110"
            [readOnly]="true"
          >
            <div *dxTemplate="let item of 'item'">
              <span>{{ item.data.flag }}</span>
              <span>{{ item.data.dial_code }}</span>
              <span>{{ item.data.name }}</span>
            </div>
          </dx-select-box>

          <dx-text-box
            width="100%"
            label="Mobile"
            labelMode="floating"
            [(value)]="newPoData.CONTACT_MOBILE"
            style="margin-left: 10px"
            [valueChangeEvent]="'input'"
            [readOnly]="true"
          >
          </dx-text-box>
        </div>
      </div>
    </div>
    <div class="termsncondition-container">
      <span class="section-title">Terms&Condition</span>
      <div style="display: flex; margin-bottom: 10px">
        <div class="Shipment-details" style="flex: 1">
          <dx-text-box
            label="Shipment Method"
            labelMode="floating"
            placeholder="Select Shipment Method"
            [(value)]="newPoData.DELIVERY_TERM"
            [readOnly]="true"
          >
          </dx-text-box>
          <dx-text-box
            label="Payment"
            labelMode="floating"
            placeholder="Select Payment"
            [(value)]="newPoData.PAY_TERM"
            [readOnly]="true"
          >
          </dx-text-box>
        </div>
        <div class="Delivery-details" style="flex: 1; margin-left: 30px">
          <dx-date-box
            label="Delivery Date"
            labelMode="floating"
            placeholder="Select Delivery Date"
            [readOnly]="true"
            [(value)]="newPoData.DELIVERY_DATE"
            displayFormat="dd-MM-yyyy"
          >
          </dx-date-box>
          <dx-text-box
            label="Reference"
            labelMode="floating"
            placeholder="Reference"
            [(value)]="newPoData.DELIVERY_DESC"
            [readOnly]="true"
          >
          </dx-text-box>
        </div>
      </div>
    </div>
    <dx-text-box
      label="Notes"
      labelMode="floating"
      placeholder="Notes"
      [(value)]="newPoData.NOTES"
      [readOnly]="true"
    >
    </dx-text-box>
    <dx-text-box
      label="Remark"
      labelMode="floating"
      placeholder="Narration"
      [(value)]="newPoData.NARRATION"
      [readOnly]="true"
    >
    </dx-text-box>
    <div>
      <dx-select-box
        label="Issued by"
        labelMode="floating"
        placeholder="Issued by"
        [width]="465"
        [items]="employeeList"
        displayExpr="DESCRIPTION"
        valueExpr="ID"
        [(value)]="newPoData.ISSUED_EMP_ID"
        [readOnly]="true"
      >
      </dx-select-box>
      <!-- <dx-text-box
        label="Issued by"
        labelMode="floating"
        placeholder="Issued by"
        [width]="465"
        [(value)]="newPoData.ISSUED_EMP_ID"
      >
      </dx-text-box> -->
    </div>
  </div>
</div>

<div *ngIf="selectedTabIndex === 1">
  <div
    style="display: flex; justify-content: space-between; margin-bottom: 10px"
  >
    <span class="section-sub-title">Items</span>
  </div>

    [showBorders]="true"
    class="data-grid"
    [dataSource]="savedItems"
    [width]="'85vw'"
    [height]="'50vh'"
    (onRowUpdated)="updateAmount($event)"
    [rowAlternationEnabled]="true"
    [showColumnLines]="true"
    [showRowLines]="true"
    [columnAutoWidth]="true"

      caption="Item Id"
      dataField="ITEM_ID"
      width="auto"
      [visible]="false"
    ></dxi-column>
    <dxi-column
      caption="Sl no"
      dataField="slNo"
      alignment="center"
      width="67"
      [allowEditing]="false"
    ></dxi-column>
    <dxi-column
      caption="Item Code"
      dataField="ITEM_CODE"
      width="auto"
      [allowEditing]="false"
    ></dxi-column>
    <dxi-column
      caption="Description"
      dataField="DESCRIPTION"
      width="200"
      [allowEditing]="false"
    ></dxi-column>
    <dxi-column
      caption="UOM"
      dataField="UOM"
      width="76"
      [allowEditing]="false"
    ></dxi-column>

      caption="Packing"
      dataField="PACKING_NAME"
      width="auto"
      [allowEditing]="false"
    ></dxi-column> -->

        SupplierCurrencySymbol === menuResponse?.GeneralSettings?.SYMBOL
          ? 'Price'
          : 'Price (' + SupplierCurrencySymbol + ')'

      dataField="SUPP_PRICE"
      width="100"
      [allowEditing]="false"
      [format]="{ type: 'fixedPoint', precision: 2 }"
      [editorOptions]="{ format: '#0' }"
    >
    </dxi-column>
    <!-- <dxi-column
      caption="Price"
      dataField="SUPP_PRICE"
      width="100"
      [allowEditing]="false"
      [format]="{ type: 'fixedPoint', precision: 2 }"
      [editorOptions]="{ format: '#0' }"
    ></dxi-column> -->
    <dxi-column
      caption="Qty"
      dataField="qtyOrdered"
      alignment="right"
      width="76"
      [allowEditing]="false"
      [editorOptions]="{
        showSpinButtons: true,
        min: 0,
        format: '#0',
        mode: 'number',
      }"
    ></dxi-column>
    <dxi-column
      [caption]="
        !SupplierCurrencySymbol ||
        SupplierCurrencySymbol === '0' ||
        SupplierCurrencySymbol === menuResponse?.GeneralSettings?.SYMBOL
          ? 'Amount'
          : 'Amount (' + SupplierCurrencySymbol + ')'
      "
      [visible]="false"
      dataField="Amount"
      width="auto"
      [allowEditing]="false"
      [format]="{ type: 'fixedPoint', precision: 2 }"
    ></dxi-column>
    <dxi-column

      alignment="right"
      width="auto"
      [allowEditing]="false"
      [editorOptions]="{ format: '#0', mode: 'number' }"
    ></dxi-column>
    <dxi-column
      [caption]="
        !SupplierCurrencySymbol ||
        SupplierCurrencySymbol === '0' ||
        SupplierCurrencySymbol === menuResponse?.GeneralSettings?.SYMBOL
          ? 'Disc Amt'
          : 'Disc Amt (' + SupplierCurrencySymbol + ')'
      "
      [visible]="false"
      dataField="discountAmount"
      width="auto"
      [allowEditing]="false"
      [format]="{ type: 'fixedPoint', precision: 2 }"
    ></dxi-column>
    <!-- <dxi-column
      *ngIf="showLocalCurrencyColumn"

      dataField="taxable_Supplier"
      width="100"
      [allowEditing]="false"
      [format]="{ type: 'fixedPoint', precision: 2 }"
    >
    </dxi-column> -->
    <dxi-column
      [caption]="
        !SupplierCurrencySymbol ||
        SupplierCurrencySymbol === '0' ||
        SupplierCurrencySymbol === menuResponse?.GeneralSettings?.SYMBOL
          ? 'Taxable'
          : 'Taxable (' + SupplierCurrencySymbol + ')'
      "
      dataField="taxable"
      width="100"
      [allowEditing]="false"
      [format]="{ type: 'fixedPoint', precision: 2 }"
    >
    </dxi-column>
    <!-- IGST -->

    <dxi-column
      [caption]="vatTitle + ' (%)'"
      dataField="VAT_PERC"
      alignment="right"
      width="80"
      [allowEditing]="false"
    ></dxi-column>
    <!-- <dxi-column

      [visible]="isIntraState"
      [allowEditing]="false"
    ></dxi-column> -->

    <!-- <dxi-column
      caption="Tax (%)"
      dataField="VAT_PERC"
      alignment="center"

      [allowEditing]="false"

    <dxi-column

      dataField="vatAmount"
      width="100"
      [allowEditing]="false"
      [format]="{ type: 'fixedPoint', precision: 2 }"

      [format]="{ type: 'fixedPoint', precision: 2 }"
    ></dxi-column>

    <dxo-summary>
      <dxi-total-item column="ITEM_CODE" displayFormat="Total"></dxi-total-item>

      <dxi-total-item column="qtyOrdered" summaryType="sum" displayFormat="{0}">
      </dxi-total-item>

      <dxi-total-item
        column="taxable_Supplier"
        summaryType="sum"
        displayFormat="{0}"
      >
        <dxo-format [precision]="2" type="fixedPoint"></dxo-format>
      </dxi-total-item>

      <dxi-total-item
        column="taxable"
        summaryType="sum"
        displayFormat="{0}"
        [valueFormat]="{ type: 'fixedPoint', precision: 2 }"
      >
        <dxo-format [precision]="2" type="fixedPoint"></dxo-format>
      </dxi-total-item>

      <dxi-total-item
        column="vatAmount"
        summaryType="sum"
        displayFormat="{0}"

      </dxi-total-item>

      <dxi-total-item
        column="total_Supplier"
        summaryType="sum"

      </dxi-total-item>

      <dxi-total-item
        column="total"
        summaryType="sum"
        [customizeText]="formatTotalAmount"
        displayFormat="{0}"
        [valueFormat]="{ type: 'fixedPoint', precision: 2 }"
      >
        <dxo-format [precision]="2" type="fixedPoint"></dxo-format>
      </dxi-total-item>
    </dxo-summary>

    <dxo-master-detail
      [enabled]="true"
      template="masterDetail"
    ></dxo-master-detail>

    <div *dxTemplate="let detailData of 'masterDetail'">
      <div *ngIf="detailData?.data">
        <span class="po-title"
          >Last 5 Purchase Orders for {{ detailData.data.ITEM_CODE }}</span
        >
        <dx-data-grid
          [columnAutoWidth]="true"
          [showBorders]="true"
          [dataSource]="purchaseOrders"
          [width]="750"
        >
          <dxi-column dataField="PO_NO" caption="PO No"></dxi-column>
          <dxi-column
            dataField="PO_DATE"
            caption="Date"
            dataType="date"
            [allowEditing]="false"
            format="dd-MM-yyyy"
          ></dxi-column>
          <dxi-column dataField="QUANTITY" caption="Quantity"></dxi-column>
          <dxi-column dataField="PRICE" caption="Price"></dxi-column>
          <!-- <dxi-column dataField="CURRENCY_NAME" caption="Currency"></dxi-column> -->
        </dx-data-grid>
      </div>
    </div>
  </dx-data-grid>
  <!-- Bottom Section for Total Quantity and Total (Excluding VAT) -->

<div *ngIf="selectedTabIndex === 2">
  <!-- Add button to open the popup for file details input -->

  <!-- DataGrid to display uploaded files -->
  <div class="history-grid-container">
    <dx-data-grid
      [dataSource]="uploadedFiles"
      [showBorders]="true"
      [height]="'60vh'"
      [showBorders]="true"
      [showColumnLines]="true"
      [showBorders]="true"
      [columnAutoWidth]="false"
      [wordWrapEnabled]="false"
      [rowAlternationEnabled]="true"
      [allowColumnReordering]="true"
      [showColumnHeaders]="true"
      [columnAutoWidth]="true"
      [allowColumnResizing]="true"
      [columnResizingMode]="'nextColumn'"
      class="file-data-grid"
    >
      <dxo-editing mode="cell" [allowUpdating]="true"></dxo-editing>

      <dxi-column
        dataField="FILE_NAME"
        caption="File Name"
        [allowEditing]="false"
        [cellTemplate]="'fileNameTemplate'"
      ></dxi-column>
      <!-- <div *dxTemplate="let cell of 'fileNameTemplate'">
        <a [href]="cell.data.fileUrl" target="_blank" rel="noopener noreferrer">{{ cell.data.fileName }}</a>cellTemplate="fileNameTemplate"
      </div> -->
      <dxi-column
        dataField="REMARKS"
        caption="Remarks"
        [allowEditing]="false"
      ></dxi-column>

      <!-- File Name Cell Template -->
      <div *dxTemplate="let data of 'fileNameTemplate'">
        <a
          href="javascript:void(0);"
          (click)="openFile(data.data.FILE_DATA, data.data.FILE_NAME)"
        >
          {{ data.data.FILE_NAME }}
        </a>
      </div>
    </dx-data-grid>
  </div>
  <!-- Popup for adding file details -->
</div>

<div *ngIf="selectedTabIndex === 3">
  <div class="history-grid-container">
    <dx-data-grid
      [showBorders]="true"
      [columnAutoWidth]="true"
      [dataSource]="poHistoryList"
      height="60vh"
      [showBorders]="true"
      [showColumnLines]="true"
      [showBorders]="true"
      [columnAutoWidth]="false"
      [wordWrapEnabled]="false"
      [rowAlternationEnabled]="true"
      [allowColumnReordering]="true"
      [showColumnHeaders]="true"
      [columnAutoWidth]="true"
      [allowColumnResizing]="true"
      [columnResizingMode]="'nextColumn'"
    >
      <!-- <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager> -->
      <dxi-column
        dataField="slNo"
        caption="Sl No"
        alignment="center"
      ></dxi-column>
      <dxi-column
        dataField="TIME"
        [calculateCellValue]="formatDateTime"
        caption="Date & Time"
      ></dxi-column>
      <dxi-column dataField="DESCRIPTION" caption="Description"></dxi-column>
      <dxi-column dataField="USER_NAME" caption="User"></dxi-column>
    </dx-data-grid>
  </div>
</div>

<div class="form-popup-buttons-container">
  <div class="popup-footer">
    <dx-button
      icon="fas fa-file-pdf"
      text="PDF"
      type="normal"
      stylingMode="outlined"
      [width]="100"
      (onClick)="viewPdfDMGT()"
      hint="View PDF"
    >
    </dx-button>
  </div>
</div>
