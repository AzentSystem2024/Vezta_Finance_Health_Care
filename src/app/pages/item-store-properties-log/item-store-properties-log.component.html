<div class="view-wrapper list-page">
  <div>
    <dx-data-grid
      [width]="'100%'"
      [height]="'530px'"
      class="grid theme-dependent"
      [dataSource]="logList"
      [showBorders]="true"
      [columnAutoWidth]="false"
      [wordWrapEnabled]="false"
      [rowAlternationEnabled]="true"
      rowAlternationInterval="2"
      (onSelectionChanged)="onSelectionChanged($event)"
      (onEditingStart)="openEditingStart($event)"
      (onRowRemoving)="onRowRemoving($event)"
      (onCellPrepared)="onCellPrepared($event)"
      [keyExpr]="'ID'"
      [selection]="{ mode: 'single' }"
    >
      <dxo-scrolling
        mode="standard"
        columnRenderingMode="virtual"
      ></dxo-scrolling>
      <dxo-editing
        mode="popup"
        [allowUpdating]="true"
        [allowDeleting]="true"
      ></dxo-editing>
      <dxo-search-panel
        [visible]="true"
        [highlightCaseSensitive]="false"
      ></dxo-search-panel>
      <dxo-header-filter [visible]="showHeaderFilter"></dxo-header-filter>
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-toolbar>
        <dxi-item location="before">
          <div class="grid-header">Store Properties Log</div>
        </dxi-item>

        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="refreshButtonOptions"
        ></dxi-item>
        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="addButtonOptions"
        >
        </dxi-item>
      </dxo-toolbar>

      <dxi-column
        dataField="ID"
        caption="ID"
        [width]="'auto'"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="WS_NO"
        caption="Work Sheet No."
        [width]="'auto'"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="WS_DATE"
        caption="Date"
        [width]="'auto'"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="Narration"
        caption="Remarks"
        [width]="'300'"
        [allowEditing]="false"
      ></dxi-column>
      <!-- <dxi-column
        dataField="Status"
        caption="Status"
        [width]="150"
        [allowEditing]="false"
        cellTemplate="statusCellTemplate"
        alignment="center"
      ></dxi-column>

      <div *dxTemplate="let cellData of 'statusCellTemplate'">
        <i
          class="fas fa-flag"
          [ngClass]="getStatusFlagClass(cellData.value)"
          [attr.title]="cellData.value"
        ></i>
      </div>
      <dxi-column
        type="buttons"
        [width]="200"
        [buttons]="allButtons"
      ></dxi-column> -->

      <dxi-column
        caption="Status"
        dataField="Status"
        [width]="80"
        [cellTemplate]="statusCellRender"
        [allowHeaderFiltering]="true"
      >
      </dxi-column>
      <!-- <dxi-column type="buttons" [buttons]="gridButtons"> </dxi-column> -->
      <dxi-column
        type="buttons"
        caption="Actions"
        [width]="140"
        cellTemplate="actionTemplate"
      >
      </dxi-column>
      <div *dxTemplate="let cellData of 'actionTemplate'">
        <!-- Edit -->
        <i
          *ngIf="canEdit"
          class="dx-icon dx-icon-edit"
          [style.opacity]="
            cellData.data.Status === 'Verified' ||
            cellData.data.Status === 'Approved'
              ? '0.4'
              : '1'
          "
          [style.pointer-events]="
            cellData.data.Status === 'Verified' ||
            cellData.data.Status === 'Approved'
              ? 'none'
              : 'auto'
          "
          style="cursor: pointer; margin-right: 10px"
          title="Edit"
          (click)="openEditingStart({ data: cellData.data, cancel: false })"
        ></i>

        <!-- Delete -->
        <i
          *ngIf="canDelete"
          class="dx-icon dx-icon-trash"
          [style.opacity]="
            cellData.data.Status === 'Verified' ||
            cellData.data.Status === 'Approved'
              ? '0.4'
              : '1'
          "
          [style.pointer-events]="
            cellData.data.Status === 'Verified' ||
            cellData.data.Status === 'Approved'
              ? 'none'
              : 'auto'
          "
          style="cursor: pointer; margin-right: 10px"
          title="Delete"
          (click)="onRowRemoving({ data: cellData.data, cancel: false })"
        ></i>

        <!-- Verify -->
        <span
          *ngIf="
            (cellData.data.Status === 'Verified' && canApprove) ||
            (cellData.data.Status !== 'Verified' && canVerify)
          "
          style="
            position: relative;
            display: inline-block;
            width: 18px;
            height: 18px;
            margin-left: 10px;
            cursor: pointer;
            vertical-align: middle;
          "
          [title]="
            cellData.data.Status === 'Approved'
              ? 'Approved'
              : cellData.data.Status === 'Verified'
                ? 'Approve'
                : 'Verify'
          "
          (click)="onVerifyClick({ row: { data: cellData.data } })"
        >
          <!-- Blue badge -->
          <i
            class="fas fa-certificate"
            [style.color]="
              cellData.data.Status === 'Approved'
                ? '#10B981'
                : cellData.data.Status === 'Verified'
                  ? '#0073D8'
                  : '#FFA500'
            "
            style="font-size: 18px; position: absolute; top: 0; left: 0"
          ></i>

          <!-- White tick -->
          <i
            class="fas fa-check"
            style="
              color: white;
              font-size: 7px;
              position: absolute;
              top: 5px;
              left: 5px;
              pointer-events: none;
            "
          ></i>
        </span>
      </div>
    </dx-data-grid>
  </div>
  <!-- <div class="selected-rows-container">
    Total records: {{ totalRecords }}
  </div> -->
</div>

<dx-popup
  [(visible)]="editPackPopupOpened"
  [width]="'90vw'"
  [height]="'100vh'"
  title="Update Store Items Properties"
  (onHiding)="handleClose()"
>
  <div *dxTemplate="let data of 'content'">
    <app-edit-item-store-property
      (popupClosed)="handleClose()"
      [selectedData]="selectedData"
      [status]="StatusType"
    ></app-edit-item-store-property>
  </div>
</dx-popup>
