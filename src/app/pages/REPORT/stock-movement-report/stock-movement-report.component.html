<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      #dataGrid
      noDataText="No data available"
      [width]="'100%'"
      [height]="'82vh'"
      [loadPanel]="{
        enabled: true,
        text: 'Loading...',
        showIndicator: true,
        showPane: true,
      }"
      class="grid theme-dependent"
      [dataSource]="StockMovementDatasource"
      [showBorders]="true"
      [columnAutoWidth]="false"
      [wordWrapEnabled]="false"
      [rowAlternationEnabled]="true"
      [allowColumnReordering]="true"
      [showColumnHeaders]="true"
      [showColumnLines]="true"
      [columnAutoWidth]="true"
      [allowColumnResizing]="true"
      [columnResizingMode]="'nextColumn'"
      [filterRow]="{ visible: false }"
      [headerFilter]="{ visible: true }"
      [scrolling]="{ mode: 'virtual' }"
      rowAlternationInterval="2"
      [selection]="{ mode: 'single' }"
      focusStateEnabled="false"
      [groupPanel]="{ visible: true }"
      [grouping]="{ autoExpandAll: false }"
      [summary]="summaryColumnsData"
      (onExporting)="onExporting($event)"
      (onCellClick)="onCellClick($event)"
    >
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-pager
        [visible]="true"
        [displayMode]="displayMode"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>

      <dxo-export [enabled]="true" [formats]="['xlsx']"> </dxo-export>
      <dxo-load-panel [showPane]="false"></dxo-load-panel>
      <dxo-scrolling mode="standard"></dxo-scrolling>
      <dxo-header-filter
        [visible]="true"
        [allowSearch]="true"
      ></dxo-header-filter>

      <!-- <dxo-filter-row
        [visible]="isFilterRowVisible"
        [applyFilter]="auto"
      ></dxo-filter-row> -->
      <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="
              font-weight: 600;
              font-size: 20px;
              margin-left: 12px;
              padding: -3px;
              margin-right:  3px;
            "
          >
            Stock Movement
          </div>
        </dxi-item>

       <dxi-item>
          <dx-tag-box
            label="Store"
            labelMode="floating"
            displayExpr="DESCRIPTION"
            valueExpr="ID"
            [items]="Store"
            [searchEnabled]="true"
            [(value)]="selectedStoreid"
            [showSelectionControls]="true"
            [maxDisplayedTags]="100"
            [showMultiTagOnly]="true"
            [multiline]="false"
            [hint]="storeHint"
            [width]="200"
            (onValueChanged)="updateStoreHint()"
          ></dx-tag-box>
        </dxi-item>


        <dxi-item>
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="Year"
            [width]="150"
            [(value)]="selectedYear"
            [dataSource]="years"
            (onValueChanged)="onYearChanged($event)"
            placeholder="Year"
          ></dx-select-box>
        </dxi-item>

        <dxi-item>
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="month"
            [dataSource]="monthDataSource"
            displayExpr="name"
            valueExpr="value"
            [(value)]="selectedmonth"
            (onValueChanged)="onMonthValueChanged($event)"
            [dropDownOptions]="{ width: 'auto' }"
          >
          </dx-select-box>
        </dxi-item>

        <dxi-item location="after" locateInMenu="auto">
          <dx-date-box
            [width]="150"
            label="Date From"
            labelMode="floating"
            [displayFormat]="'dd-MM-yyyy'"
            [(value)]="selected_from_date"
            (onValueChanged)="onFromDateChange($event)"
          ></dx-date-box>
        </dxi-item>

        <dxi-item location="after" locateInMenu="auto">
          <dx-date-box
            [width]="150"
            label="Date To"
            labelMode="floating"
            [displayFormat]="'dd-MM-yyyy'"
            [(value)]="selected_To_date"
            (onValueChanged)="onToDateChange($event)"
          ></dx-date-box>
        </dxi-item>

        <!-- <dxi-item>
          <dx-button
            text="Apply"
            icon="todo"
            stylingMode="contained"
            type="default"
            [width]="100"
            (onClick)="getStockMovement()"
          ></dx-button>
        </dxi-item> -->
        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="refreshButtonOptions"
        ></dxi-item>
        <dxi-item
          name="exportButton"
          location="after"
          cssClass="export-btn"
        ></dxi-item>
        <!-- <dxi-item location="after" template="dateFilterTemplate"></dxi-item> -->
        <!-- <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="searchButtonOptions"
        ></dxi-item>

         <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
        ></dxi-item>
        <dxi-item
          name="exportButton"
          location="after"
          cssClass="export-btn"
        ></dxi-item> -->
      </dxo-toolbar>

      <dxo-grouping
        [autoExpandAll]="false"
        [contextMenuEnabled]="true"
        [expandMode]="'rowClick'"
      ></dxo-grouping>

      <dxi-column
        dataField="ITEM_CODE"
        caption="Code"
        [fixed]="true"
        fixedPosition="left"
      ></dxi-column>
      <dxi-column
        dataField="ITEM_NAME"
        caption="Description"
        [fixed]="true"
        fixedPosition="left"
      ></dxi-column>
      <dxi-column
        dataField="UOM"
        caption="UOM"
        [fixed]="true"
        fixedPosition="left"
      ></dxi-column>
      <dxi-column
        dataField="OPENING_QTY"
        dataType="number"
        alignment="right"
        caption="Opening Qty"
      ></dxi-column>
      <dxi-column
        dataField="GRN_QTY"
        dataType="number"
        alignment="right"
        caption="GRN Qty"
      ></dxi-column>
      <dxi-column
        dataField="PURCHASE_RETURN_QTY"
        dataType="number"
        alignment="right"
        caption="Purch.Return"
      ></dxi-column>
      <dxi-column
        dataField="PRODUCTION_QTY"
        dataType="number"
        alignment="right"
        caption="Production"
        [visible]="false"
      ></dxi-column>
      <dxi-column
        dataField="CONSUMPTION_QTY"
        dataType="number"
        alignment="right"
        caption="Consumption"
        [visible]="false"
      ></dxi-column>
      <!-- <dxi-column
        dataField="TRANSFEROUT_QTY"
        dataType="number"
        format="#,##0.00"
        alignment="right"
        caption="Transf.Out"
      ></dxi-column>
      <dxi-column
        dataField="TRANSFERIN_QTY"
        dataType="number"
        format="#,##0.00"
        alignment="right"
        caption="Transf.In"
      ></dxi-column> -->
      <dxi-column
        dataField="DELIVERY_QTY"
        dataType="number"
        alignment="right"
        [visible]="false"
        caption="Delivery Out"
      ></dxi-column>
      <dxi-column
        dataField="DELIVERY_RETURN_QTY"
        dataType="number"
        alignment="right"
        caption="Delivery Return"
        [visible]="false"
      ></dxi-column>
      <dxi-column
        dataField="SALE_QTY"
        dataType="number"
        alignment="right"
        caption="Sale Qty"
      ></dxi-column>
      <dxi-column
        dataField="SALE_RETURN_QTY"
        dataType="number"
        alignment="right"
        caption="Sales Return"
      ></dxi-column>
      <dxi-column
        dataField="ADJUSTED"
        dataType="number"
        alignment="right"
        caption="Adjusted"
      ></dxi-column>
      <dxi-column
        dataField="TRANSFER_OUT_QTY"
        dataType="number"
        alignment="right"
        caption="Transfer Out"
      ></dxi-column>
      <dxi-column
        dataField="TRANSFER_IN_QTY"
        dataType="number"
        alignment="right"
        caption="Transfer In"
      ></dxi-column>
      <dxi-column
        dataField="BALANCE_STOCK"
        dataType="number"
        alignment="right"
        caption="Closing"
      ></dxi-column>
      <!-- <dxi-column dataField="SIZE" caption="Size"></dxi-column>
      <dxi-column dataField="COLOR" caption="Color"></dxi-column>
      <dxi-column dataField="STYLE" caption="Style"></dxi-column> -->
    </dx-data-grid>
  </div>
</div>

<dx-popup
  [(visible)]="isPopupVisible"
  [width]="'70vw'"
  [height]="'60vh'"
  [showTitle]="true"
  [closeOnOutsideClick]="true"
  [showCloseButton]="true"
>
  <!-- <div class="custom-popup-header">
    {{ popupTitle }}
  </div> -->
  <div *dxTemplate="let data of 'title'">
    <div class="custom-popup-title">
      {{ popupTitle }}
    </div>
  </div>

  <!-- GRN grid -->
  <dx-data-grid
    *ngIf="popupType === 'grn'"
    [dataSource]="GrnDetails"
    [showBorders]="true"
    [showColumnLines]="true"
    [columnAutoWidth]="false"
    [wordWrapEnabled]="false"
    [rowAlternationEnabled]="true"
    [headerFilter]="{ visible: true }"
    [allowColumnReordering]="true"
    [showColumnHeaders]="true"
    [allowColumnResizing]="true"
    [height]="'40vh'"
    [columnResizingMode]="'nextColumn'"
    [headerFilter]="{ visible: true }"
    [scrolling]="{ mode: 'virtual' }"
    rowAlternationInterval="2"
    [selection]="{ mode: 'single' }"
    (onRowDblClick)="onPopupRowClick($event, 'grn')"
  >
    <dxo-paging [pageSize]="10"></dxo-paging>
    <dxo-pager
      [visible]="true"
      [allowedPageSizes]="allowedPageSizes"
      [displayMode]="displayMode"
      [showPageSizeSelector]="showPageSizeSelector"
      [showInfo]="true"
      [showNavigationButtons]="true"
    ></dxo-pager>
    <dxo-header-filter
      [visible]="true"
      [allowSearch]="true"
    ></dxo-header-filter>
    <dxo-load-panel [showPane]="false"></dxo-load-panel>
    <dxo-scrolling mode="virtual"></dxo-scrolling>
    <dxo-filter-row
      [visible]="isFilterRowVisible"
      [applyFilter]="auto"
    ></dxo-filter-row>
    <dxo-filter-panel [visible]="isFilterOpened"></dxo-filter-panel>
    <dxo-filter-builder [allowHierarchicalFields]="true"> </dxo-filter-builder>

    <dxi-column dataField="DOC_NO" caption="Doc No."></dxi-column>
    <dxi-column dataField="TRANS_TYPE" caption="Type"></dxi-column>

    <dxi-column dataField="SUPP_NAME" caption="Supplier"></dxi-column>

    <dxi-column
      dataField="DOC_DATE"
      caption="Date"
      dataType="date"
      format="dd/MM/yyyy"
    ></dxi-column>

    <dxi-column
      dataField="QUANTITY"
      caption="Quantity"
      dataType="number"
      alignment="right"
    ></dxi-column>
    <dxo-summary>
      <dxi-total-item
        column="QUANTITY"
        summaryType="sum"
        displayFormat="Total: {0}"
        valueFormat="#,##0.00"
      >
      </dxi-total-item>
    </dxo-summary>
  </dx-data-grid>
