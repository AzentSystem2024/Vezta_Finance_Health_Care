<dx-validation-group #journalVoucherGroup>
  <div
    class="invoice-wrapper"
    style="
      height: 85vh;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    "
  >
    <div class="salary-grid-wrapper" style="padding: 0 10px">
      <div class="grid-container">
        <dx-data-grid
          *ngIf="ledgerList?.length"
          #itemsGridRef
          [dataSource]="journalVoucherFormData?.DETAILS"
          [showBorders]="true"
          [showColumnLines]="true"
          [columnAutoWidth]="false"
          [wordWrapEnabled]="false"
          [rowAlternationEnabled]="true"
          [headerFilter]="{ visible: true }"
          [allowColumnReordering]="true"
          [showColumnHeaders]="true"
          [columnAutoWidth]="true"
          [allowColumnResizing]="true"
          [height]="'80vh'"
          [columnResizingMode]="'nextColumn'"
          [headerFilter]="{ visible: true }"
          [scrolling]="{ mode: 'virtual' }"
          rowAlternationInterval="2"
          [selection]="{ mode: 'single' }"
        >
          <dxo-load-panel [showPane]="false"></dxo-load-panel>
          <dxo-filter-builder [allowHierarchicalFields]="true">
          </dxo-filter-builder>

          <dxo-toolbar>
            <div
              class="stacked-toolbar-group"
              style="display: flex; flex-direction: column; gap: 2px"
            ></div>
            <dxi-item location="before" locateInMenu="auto">
              <div class="stacked-toolbar-group">
                <div style="display: flex; gap: 5px">
                  <div *ngIf="journalVoucherFormData">
                    <dx-text-box
                      label="JV No."
                      [(value)]="journalVoucherFormData.DOC_NO"
                      labelMode="floating"
                      [width]="200"
                      [readOnly]="true"
                    ></dx-text-box>
                  </div>
                  <div *ngIf="journalVoucherFormData">
                    <dx-text-box
                      #refBoxRef
                      label="Reference No."
                      labelMode="floating"
                      [(value)]="journalVoucherFormData.REF_NO"
                      [width]="200"
                      [readOnly]="true"
                    ></dx-text-box>
                  </div>
                </div>
              </div>
            </dxi-item>

            <dxi-item location="after" locateInMenu="auto">
              <div class="stacked-toolbar-group"></div>
            </dxi-item>
            <dxi-item location="after" locateInMenu="auto">
              <div
                class="stacked-toolbar-group"
                style="display: flex; flex-direction: column; gap: 5px"
              >
                <!-- Row 1: Date only -->
                <div style="display: flex; gap: 5px; justify-content: flex-end">
                  <div *ngIf="journalVoucherFormData">
                    <dx-text-box
                      #partyNameRef
                      label="Transaction Type"
                      labelMode="floating"
                      [(value)]="journalVoucherFormData.SUB_TYPE"
                      [width]="405"
                      [readOnly]="true"
                    ></dx-text-box>
                  </div>
                  <div *ngIf="journalVoucherFormData">
                    <dx-date-box
                      label="Date"
                      labelMode="floating"
                      [(value)]="journalVoucherFormData.TRANS_DATE"
                      [displayFormat]="'dd-MM-yyyy'"
                      type="date"
                      [width]="200"
                      [readOnly]="true"
                    ></dx-date-box>
                  </div>
                </div>
              </div>
            </dxi-item>
          </dxo-toolbar>

          <dxi-column
            dataField="billNo"
            caption="SL No."
            [allowEditing]="true"
            [readOnly]="isReadOnly"
          ></dxi-column>

          <dxi-column
            dataField="ledgerCode"
            caption="Ledger Code"
            [width]="130"
          ></dxi-column>

          <dxi-column dataField="ledgerName" caption="Ledger Name"></dxi-column>
          <dxi-column dataField="STORE_ID" caption="Store">
            <dxo-lookup
              [dataSource]="storeList"
              displayExpr="DESCRIPTION"
              valueExpr="ID"
            ></dxo-lookup>
          </dxi-column>

          <dxi-column dataField="DEPT_NAME" caption="Department"> </dxi-column>

          <dxi-column
            dataField="DepartmentGroup"
            caption="Department Group"
            [width]="150"
            [allowEditing]="false"
          >
          </dxi-column>

          <dxi-column
            dataField="Clinician"
            caption="Clinician"
            [width]="150"
            [allowEditing]="false"
          >
          </dxi-column>

          <dxi-column
            dataField="particulars"
            caption="Particulars"
            [width]="150"
            [allowEditing]="false"
          >
          </dxi-column>

          <dxi-column
            dataField="debitAmount"
            caption="Debit Amount"
            dataType="number"
            [allowEditing]="false"
            [width]="150"
            [format]="{ type: 'fixedPoint', precision: 2 }"
          >
          </dxi-column>

          <dxi-column
            dataField="creditAmount"
            caption="Credit Amount"
            dataType="number"
            [width]="150"
            [allowEditing]="false"
            [format]="{ type: 'fixedPoint', precision: 2 }"
          >
          </dxi-column>

          <dxo-summary>
            <dxi-total-item
              column="debitAmount"
              summaryType="sum"
              valueFormat="#,##0.00"
              displayFormat="Total: {0}"
              alignment="right"
            ></dxi-total-item>

            <dxi-total-item
              column="creditAmount"
              summaryType="sum"
              valueFormat="#,##0.00"
              displayFormat="Total: {0}"
              alignment="right"
            ></dxi-total-item>
          </dxo-summary>
        </dx-data-grid>
      </div>
    </div>
  </div>
</dx-validation-group>
