<div class="view-wrapper list-page">
  <dx-data-grid
    width="100%"
    [height]="'82vh'"
    class="grid theme-dependent"
    [dataSource]="UomDataSource"
    (onRowRemoving)="onRowRemoving($event)"
    (onEditingStart)="onEditingRow($event)"
    rowAlternationInterval="2"
    [showBorders]="true"
    [allowColumnReordering]="true"
    [showColumnHeaders]="true"
    [columnAutoWidth]="true"
    [allowColumnResizing]="true"
    [rowAlternationEnabled]="true"
    [showColumnLines]="true"
    [scrolling]="{ mode: 'virtual' }"
    (onExporting)="onExporting($event)"
  >
    <dxo-paging [pageSize]="10"></dxo-paging>
    <dxo-pager
      [visible]="true"
      [allowedPageSizes]="allowedPageSizes"
      [displayMode]="displayMode"
      [showPageSizeSelector]="showPageSizeSelector"
      [showInfo]="true"
      [showNavigationButtons]="true"
    ></dxo-pager>
    <dxo-scrolling mode="virtual"></dxo-scrolling>
    <dxo-export [enabled]="true" [formats]="['xlsx']"> </dxo-export>
    <dxo-editing
      mode="popup"
      [allowUpdating]="canEdit"
      [allowDeleting]="canDelete"
    >
      <!-- <dxo-popup
        title="Edit UOM"
        [showTitle]="true"
        [width]="500"
        [height]="200"
      >
      
      </dxo-popup> -->

      <dxo-form class="plain-styled-form" [colCount]="1">
        <dxi-item itemType="group" [colCount]="1">
          <dxi-item itemType="group" [colCount]="1">
            <dxi-item dataField="UOM"></dxi-item>
          </dxi-item>
        </dxi-item>
      </dxo-form>
    </dxo-editing>

    <dxo-toolbar>
      <dxi-item location="before">
        <div
          class="grid-header"
          style="
            font-weight: 600;
            font-size: 20px;
            margin-left: 12px;
            padding: -3px;
            margin-right: 3px;
          "
        >
          Unit of Measurement
        </div>
      </dxi-item>

      <dxi-item
        location="after"
        widget="dxButton"
        [options]="searchButtonOptions"
      ></dxi-item>

      <!-- Refresh -->
      <dxi-item
        location="after"
        widget="dxButton"
        [options]="refreshButtonOptions"
      ></dxi-item>
      <!-- Divider -->
      <dxi-item location="after">
        <div class="toolbar-divider"></div>
      </dxi-item>
      <dxi-item
        name="exportButton"
        location="after"
        cssClass="export-btn"
      ></dxi-item>

      <dxi-item
        location="after"
        widget="dxButton"
        [options]="addButtonOptions"
        [visible]="canAdd"
      ></dxi-item>
    </dxo-toolbar>

    <dxi-column dataField="UOM" caption="Uom" stylingMode="filled">
    </dxi-column>
  </dx-data-grid>
  <form-popup
    [(visible)]="isAddUomPopupOpened"
    [width]="550"
    [height]="200"
    (save)="onClickSaveUom()"
    titleText="New UOM"
    [showApprove]="false"
  >
    <app-uom-add-form (formClosed)="CloseEditForm()"></app-uom-add-form>
  </form-popup>

  <dx-popup
    [(visible)]="isEditUomPopupOpened"
    title="Edit UOM"
    [height]="'30vh'"
    [width]="'40vw'"
    (onHiding)="CloseEditForm()"
  >
    <app-uom-edit
      (formClosed)="CloseEditForm()"
      [selectedData]="selectedData"
    ></app-uom-edit>
  </dx-popup>
</div>
