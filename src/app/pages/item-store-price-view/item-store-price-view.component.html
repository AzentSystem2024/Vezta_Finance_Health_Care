<!-- item-store-prices-edit.component.html -->
<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      #dataGrid
      [width]="'100%'"
      [height]="'75vh'"
      class="grid theme-dependent"
      [dataSource]="worksheetItems"
      [showBorders]="true"
      [columnAutoWidth]="true"
      [rowAlternationEnabled]="true"
      rowAlternationInterval="2"
      [allowColumnReordering]="true"
      [allowColumnResizing]="true"
      [showColumnLines]="true"
      [editing]="{
        mode: 'cell',
        allowUpdating: true,
      }"
      [keyExpr]="'ID'"
      (onSelectionChanged)="onSelectionChanged($event)"
      (onRowUpdated)="onRowUpdated($event)"
    >
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-scrolling
        mode="standard"
        columnRenderingMode="virtual"
      ></dxo-scrolling>
      <!-- <dxo-search-panel
        [visible]="true"
        [highlightCaseSensitive]="false"
      ></dxo-search-panel> -->
      <dxo-header-filter [visible]="true"></dxo-header-filter>
      <!-- <dxo-search-panel
        [visible]="true"
        [highlightCaseSensitive]="false"
      ></dxo-search-panel> -->
      <dxo-editing mode="popup" [alloAdding]="true"> </dxo-editing>
      <dxo-toolbar>
        <dxi-item location="before">
          <div class="grid-header">Change Price View</div>
        </dxi-item>
        <dxi-item location="after" template="priceColumnSelector"> </dxi-item>
        <dxi-item location="after" template="narration"> </dxi-item>
        <dxi-item
          location="after"
          widget="dxButton"
          [options]="searchButtonOptions"
        ></dxi-item>

        <dxi-item location="after" template="backButton"> </dxi-item>

        <dxi-item location="after" cssClass="bottom-toolbar-buttons">
          <!-- <dx-button *ngIf="!isSaved && !isVerified" 
                       text="Save" 
                       stylingMode="contained" 
                       type="default" 
                       (onClick)="onSaveButtonClick()" 
                       [disabled]="isApplyButtonDisabled"
                       style="width: 100px;"></dx-button> -->

          <!-- <dx-button *ngIf="isSaved && !isVerified && AllowCommitWithSave" 
                       text="Verify" 
                       stylingMode="contained" 
                       type="default" 
                       (onClick)="onVerify()" 
                       style="width: 100px;"></dx-button> -->

          <!-- <dx-button *ngIf="isVerified && AllowCommitWithSave" 
                       text="Approve" 
                       stylingMode="contained" 
                       type="default" 
                       (onClick)="onApprove()" 
                       style="width: 100px;"></dx-button> -->
          <!-- <dx-button 
                       text="Change Price" 
                       stylingMode="contained" 
                       type="default" 
                       (onClick)="applyFormula()" 
                       style="width: 100px;"></dx-button> -->
        </dxi-item>
      </dxo-toolbar>
      <div *dxTemplate="let data of 'priceColumnSelector'">
        <dx-tag-box
          [items]="priceColumnOptions"
          valueExpr="value"
          displayExpr="text"
          width="250"
          label="Select Prices"
          [(value)]="selectedPriceColumns"
          placeholder="Select Prices"
          labelMode="floating"
          [showSelectionControls]="true"
          (onValueChanged)="onPriceColumnChange()"
          [multiline]="false"
        >
        </dx-tag-box>
      </div>
      <div *dxTemplate="let data of 'narration'">
        <dx-text-box
          [(value)]="narrationText"
          placeholder="Enter Remarks"
          style="width: 250px"
          [disabled]="true"
        ></dx-text-box>
      </div>
      <div *dxTemplate="let data of 'backButton'">
        <dx-button
          hint="Back"
          icon="back"
          stylingMode="contained"
          type="default"
          (onClick)="Cancel()"
        ></dx-button>
      </div>
      <dxi-column
        dataField="ITEM_CODE"
        caption="item Code"
        [width]="150"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="DESCRIPTION"
        caption="Description"
        [width]="220"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="ITEM_TYPE"
        caption="Item Type"
        [width]="220"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="DEPT_NAME"
        caption="Department"
        [width]="150"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="CAT_NAME"
        caption="Category"
        [width]="150"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="BRAND_NAME"
        caption="Brand"
        [width]="150"
        [allowEditing]="false"
      ></dxi-column>

      <dxi-column
        caption="MRP"
        [width]="120"
        [visible]="isVisible('MRP')"
        alignment="center"
      >
        <dxi-column
          dataField="SALE_PRICE"
          caption="Present"
          [width]="130"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_NEW"
          caption="New"
          [width]="100"
          [allowEditing]="true"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
          alignment="right"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column
        caption="Standard Price"
        [width]="120"
        [visible]="isVisible('PRICE1')"
        alignment="center"
      >
        <dxi-column
          dataField="SALE_PRICE1"
          caption="Present"
          [width]="130"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_LEVEL1_NEW"
          caption="New"
          [width]="100"
          alignment="right"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column
        caption="Price 2"
        [width]="120"
        [visible]="isVisible('PRICE2')"
        alignment="center"
      >
        <dxi-column
          dataField="SALE_PRICE2"
          caption="Present"
          [width]="130"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_LEVEL2_NEW"
          caption="New"
          [width]="100"
          alignment="right"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column
        caption="Price 3"
        [width]="120"
        [visible]="isVisible('PRICE3')"
        alignment="center"
      >
        <dxi-column
          dataField="SALE_PRICE3"
          caption="Present"
          [width]="130"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_LEVEL3_NEW"
          caption="New"
          [width]="100"
          alignment="right"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column
        caption="Price 4"
        [width]="120"
        [visible]="isVisible('PRICE4')"
        alignment="center"
      >
        <dxi-column
          dataField="SALE_PRICE4"
          caption="Present"
          [width]="130"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_LEVEL4_NEW"
          caption="New"
          [width]="100"
          alignment="right"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        >
        </dxi-column>
      </dxi-column>

      <dxi-column
        caption="Price 5"
        [width]="120"
        [visible]="isVisible('PRICE5')"
        alignment="center"
      >
        <dxi-column
          dataField="SALE_PRICE5"
          caption="Present"
          [width]="130"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
        <dxi-column
          dataField="PRICE_LEVEL5_NEW"
          caption="New"
          [width]="100"
          alignment="right"
          [allowEditing]="false"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        >
        </dxi-column>
      </dxi-column>
    </dx-data-grid>
  </div>
</div>
