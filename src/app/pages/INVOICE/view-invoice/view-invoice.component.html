<dx-validation-group #journalVoucherGroup>
  <div
    class="invoice-wrapper"
    style="
      height: 85vh;
      display: flex;
      flex-direction: column;

      box-sizing: border-box;
    "
  >
    <div class="salary-grid-wrapper" style="padding: 0 20px">
      <div class="grid-container">
        <dx-data-grid
          #itemsGridRef
          [dataSource]="mainInvoiceGridList"
          [showBorders]="true"
          [showRowLines]="true"
          [showColumnLines]="true"
          [columnAutoWidth]="false"
          [wordWrapEnabled]="false"
          [rowAlternationEnabled]="true"
          [headerFilter]="{ visible: true, allowSearch: true }"
          [allowColumnReordering]="true"
          [showColumnHeaders]="true"
          [columnAutoWidth]="true"
          [allowColumnResizing]="true"
          [height]="'65vh'"
          [width]="'auto'"
          [columnResizingMode]="'nextColumn'"
          [scrolling]="{ mode: 'virtual' }"
          rowAlternationInterval="2"
          [selection]="{ mode: 'single' }"
          (onContentReady)="onContentReady($event)"
        >
          <dxo-load-panel [showPane]="false"></dxo-load-panel>
          <dxo-filter-builder [allowHierarchicalFields]="true">
          </dxo-filter-builder>
          <dxo-toolbar>
            <div
              class="stacked-toolbar-group"
              style="display: flex; flex-direction: column; gap: 2px"
            ></div>
            <dxi-item location="before" locateInMenu="auto">
              <div
                class="stacked-toolbar-group"
                style="display: flex; flex-direction: column; gap: 5px"
              >
                <div style="display: flex; gap: 5px">
                  <dx-text-box
                    #invoiceBoxRef
                    [(value)]="invoiceFormData.DOC_NO"
                    label="Invoice No."
                    labelMode="floating"
                    [width]="185"
                    [readOnly]="true"
                  ></dx-text-box>
                  <dx-text-box
                    #invoiceBoxRef
                    label="Reference No."
                    labelMode="floating"
                    [(value)]="invoiceFormData.REF_NO"
                    [width]="185"
                    [readOnly]="true"
                  ></dx-text-box>
                </div>
                <div
                  style="
                    margin-top: 4px;
                    display: flex;
                    align-items: flex-start;
                    gap: 16px;
                    margin-bottom: 24px;
                  "
                >
                  <!-- Radio Group -->

                  <!-- Company Select -->
                  <!-- <dx-select-box
                    [(value)]="invoiceFormData.UNIT_ID"
                    [dataSource]="companyList"
                    displayExpr="COMPANY_NAME"
                    valueExpr="COMPANY_ID"
                    [width]="300"
                    label="Company"
                    labelMode="floating"
                    style="margin-top: -1px"
                    [readOnly]="true"
                  >
                  </dx-select-box> -->

                  <!-- Distributor Select -->

                  <dx-text-box
                    #invoiceBoxRef
                    label="Customer"
                    labelMode="floating"
                    [(value)]="invoiceFormData.CUST_NAME"
                    [width]="375"
                    style="margin-top: -1px"
                    [readOnly]="true"
                  ></dx-text-box>
                  <!-- <dx-select-box
                    [(value)]="invoiceFormData.DISTRIBUTOR_ID"
                    [dataSource]="distributorList"
                    displayExpr="DESCRIPTION"
                    valueExpr="ID"
                    [width]="375"
                    label="Customer"
                    labelMode="floating"
                    style="margin-top: -1px"
                    [readOnly]="true"
                  >
                  </dx-select-box> -->
                </div>
              </div>
            </dxi-item>
            <dxi-item location="after" locateInMenu="auto">
              <div class="stacked-toolbar-group"></div>
            </dxi-item>
            <dxi-item location="after" locateInMenu="auto">
              <div
                class="stacked-toolbar-group"
                style="display: flex; flex-direction: column; gap: 2px"
              >
                <!-- Row 1: Date only -->
                <div
                  style="display: flex; gap: 2px; justify-content: flex-end"
                ></div>
                <div
                  style="
                    display: flex;
                    gap: 0px;
                    margin-top: 38px;
                    margin-bottom: 0;
                  "
                >
                  <dx-date-box
                    label="Transaction Date"
                    [(value)]="invoiceFormData.SALE_DATE"
                    [displayFormat]="'dd-MM-yyyy'"
                    type="date"
                    labelMode="floating"
                    [width]="200"
                    [readOnly]="true"
                  ></dx-date-box>
                </div>
              </div>
            </dxi-item>
          </dxo-toolbar>

          <dxi-column
            dataField="TRANSFER_NO"
            caption="Transfer No"
          ></dxi-column>
          <dxi-column
            dataField="TRANSFER_DATE"
            caption="Date"
            dataType="date"
            format="dd-MM-yyyy"
          ></dxi-column>
          <dxi-column dataField="ARTICLE" caption="Description"></dxi-column>
          <dxi-column
            dataField="HSN_CODE"
            caption="HSN Code"
            dataType="string"
          ></dxi-column>
          <dxi-column
            dataField="TOTAL_PAIR_QTY"
            caption="Total Pair Qty"
            dataType="number"
          ></dxi-column>
          <dxi-column
            dataField="PRICE"
            caption="Price"
            dataType="number"
            format="#,##0.00"
            [width]="100"
            [allowEditing]="true"
          ></dxi-column>
          <dxi-column
            dataField="AMOUNT"
            caption="Amount"
            dataType="number"
            format="#,##0.00"
            [allowEditing]="false"
          ></dxi-column>
          <dxi-column
            dataField="GST"
            [caption]="vatTitle + '%'"
            dataType="number"
            [visible]="showGST"
            [allowEditing]="false"
          ></dxi-column>
          <!-- <dxi-column
            dataField="CGST"
            caption="CGST"
            dataType="number"
            [visible]="showCGST"
            [allowEditing]="false"
          ></dxi-column>

          <dxi-column
            dataField="SGST"
            caption="SGST"
            dataType="number"
            [visible]="showSGST"
            [allowEditing]="false"
          ></dxi-column> -->
          <dxi-column
            dataField="TAX_AMOUNT"
            [caption]="vatTitle + ' Amount'"
            dataType="number"
            format="#,##0.00"
            [allowEditing]="false"
          ></dxi-column>
          <dxi-column
            dataField="TOTAL_AMOUNT"
            caption="Total"
            dataType="number"
            format="#,##0.00"
            [allowEditing]="false"
          ></dxi-column>
          <dxo-summary>
            <dxi-total-item
              column="AMOUNT"
              summaryType="sum"
              valueFormat="#,##0.00"
              displayFormat="{0}"
              alignment="right"
            ></dxi-total-item>

            <dxi-total-item
              column="TAX_AMOUNT"
              summaryType="sum"
              valueFormat="#,##0.00"
              displayFormat="{0}"
              alignment="right"
            ></dxi-total-item>

            <dxi-total-item
              column="TOTAL_AMOUNT"
              summaryType="sum"
              valueFormat="#,##0.00"
              displayFormat="{0}"
              alignment="right"
              [allowEditing]="true"
            ></dxi-total-item>
          </dxo-summary>
        </dx-data-grid>

        <div
          style="
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <!-- LEFT SIDE → Vehicle No -->
          <div>
            <dx-text-box
              label="Vehicle No"
              labelMode="floating"
              [(value)]="invoiceFormData.VEHICLE_NO"
              [width]="200"
            ></dx-text-box>
          </div>

          <!-- RIGHT SIDE → Round Off + Net Amount -->
          <div style="display: flex; align-items: center; gap: 16px">
            <dx-check-box
              text="Round Off"
              [(value)]="invoiceFormData.ROUND_OFF"
              [readOnly]="true"
            ></dx-check-box>

            <dx-text-box
              label="Net Amount"
              labelMode="floating"
              [value]="netAmount"
              [width]="150"
              [readOnly]="true"
            ></dx-text-box>
          </div>
        </div>
        <div
          style="
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
          "
        >
          <!-- <dx-check-box
            [(value)]="invoiceFormData.IS_APPROVED"
            text="Approved"
            [width]="200"
            [readOnly]="true"
          ></dx-check-box> -->
        </div>

        <div class="form-popup-buttons-container">
          <div class="popup-footer">
            <!-- <dx-button
              icon="fas fa-file-pdf"
              text="PDF"
              type="normal"
              stylingMode="outlined"
              [width]="100"
              (onClick)="viewPdf()"
              hint="View PDF"
            ></dx-button> -->

            <dx-button
              text="Cancel"
              (onClick)="cancelPopup()"
              stylingMode="outlined"
              type="normal"
            ></dx-button>
          </div>
        </div>
      </div>
    </div>

    <!-- <div class="pdf-container" style="margin-top: 30px">
    <iframe
      *ngIf="pdfSrc"
      [src]="pdfSrc"
      width="100%"
      height="600"
      style="border: 1px solid #ccc; border-radius: 4px"
    ></iframe>
  </div> -->
  </div>
</dx-validation-group>
