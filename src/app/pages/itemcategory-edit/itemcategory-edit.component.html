<dx-validation-group #departmentValidationGroup>
  <dx-form class="plain-styled-form">
    <dxi-item itemType="group">
      <dxo-col-count-by-screen
        [xs]="1"
        [sm]="1"
        [md]="1"
        [lg]="1"
      ></dxo-col-count-by-screen>

      <!-- Code -->
      <dxi-item>
        <dx-text-box
          class="mt-3"
          [(value)]="formCategoryData.CODE"
          label="Code *"
          labelMode="floating"
          ><dx-validator>
            <dxi-validation-rule
              type="required"
              message="Code is required"
            ></dxi-validation-rule>
            <dxi-validation-rule
              type="pattern"
              [pattern]="'^[a-zA-Z0-9]+$'"
              message="Code should be alphanumeric only"
            ></dxi-validation-rule>
            <dxi-validation-rule
              type="custom"
              [validationCallback]="validateCategoryCode"
              message="Code already exists"
            ></dxi-validation-rule>
          </dx-validator>
        </dx-text-box>
      </dxi-item>

      <!-- Category Name -->
      <dxi-item>
        <dx-text-box
          class="mt-3"
          [(value)]="formCategoryData.CAT_NAME"
          label="Category Name *"
          labelMode="floating"
          ><dx-validator>
            <dxi-validation-rule
              type="required"
              message="Category is required"
            ></dxi-validation-rule>

            <dxi-validation-rule
                type="custom"
                [validationCallback]="validateCategoryName"
                message="Name already exists"
          ></dxi-validation-rule>
          </dx-validator>
        </dx-text-box>
      </dxi-item>

      <!-- Department -->
      <dxi-item>
        <dx-select-box
          class="mt-3"
          [items]="DepartmentDropdownData"
          displayExpr="DESCRIPTION"
          valueExpr="ID"
          placeholder="Select Department"
          [(value)]="formCategoryData.DEPT_ID"
          label="Department *"
          labelMode="floating"
          [searchEnabled]="true"
          ><dx-validator>
            <dxi-validation-rule
              type="required"
              message="Department is required"
            ></dxi-validation-rule>
          </dx-validator>
        </dx-select-box>
      </dxi-item>

      <dxi-item *ngIf="IsLedgerEnabled">
        <dx-select-box
          class="mt-3"
          [items]="item_Ledger_DropdownData"
          displayExpr="DESCRIPTION"
          valueExpr="ID"
          [(value)]="formCategoryData.COST_HEAD_ID"
          label="Ledger *"
          labelMode="floating"
          [searchEnabled]="true"
          ><dx-validator>
            <dxi-validation-rule
              type="required"
              message="Ledger is required"
            ></dxi-validation-rule>
          </dx-validator>
        </dx-select-box>
      </dxi-item>
    </dxi-item>
  </dx-form>

  <div class="fixed-footer popup-footer right-footer">
    <dx-button
      text="Cancel"
      stylingMode="outlined"
      (onClick)="closePopup()"
      type="normal"
    ></dx-button>
    <dx-button
      text="Save"
      stylingMode="contained"
      type="default"
      (onClick)="UpdateData()"
    ></dx-button>
  </div>
</dx-validation-group>
