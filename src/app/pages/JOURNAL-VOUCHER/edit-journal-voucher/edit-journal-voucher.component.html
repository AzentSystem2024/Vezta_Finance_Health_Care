<dx-validation-group #journalVoucherGroup>
  <div
    class="invoice-wrapper"
    style="
      height: 75vh;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    "
  >
    <div class="salary-grid-wrapper" style="padding: 0 10px">
      <div class="grid-container">
        <dx-data-grid
          *ngIf="ledgerList?.length"
          #itemsGridRef
          [dataSource]="journalVoucherFormData?.DETAILS"
          [showBorders]="true"
          [showColumnLines]="true"
          [columnAutoWidth]="false"
          [wordWrapEnabled]="false"
          [rowAlternationEnabled]="true"
          [headerFilter]="{ visible: true }"
          [allowColumnReordering]="true"
          [showColumnHeaders]="true"
          [columnAutoWidth]="true"
          [allowColumnResizing]="true"
          [height]="'71vh'"
          [columnResizingMode]="'nextColumn'"
          [headerFilter]="{ visible: true }"
          [scrolling]="{ mode: 'virtual' }"
          rowAlternationInterval="2"
          [selection]="{ mode: 'single' }"
          [editing]="{
            mode: 'cell',
            allowUpdating: true,
            allowDeleting: true,
            allowAdding: true,
            useIcons: true,
          }"
          (onEditorPreparing)="onEditorPreparing($event)"
          (onRowValidating)="onRowValidating($event)"
          (onRowUpdating)="onRowUpdating($event)"
          (onRowRemoved)="onRowRemoved($event)"
          (onRowInserted)="onRowInserted($event)"
          (onKeyDown)="onGridKeyDown($event)"
        >
          <dxo-load-panel [showPane]="false"></dxo-load-panel>
          <dxo-filter-builder [allowHierarchicalFields]="true">
          </dxo-filter-builder>
          <dxo-toolbar>
            <div
              class="stacked-toolbar-group"
              style="display: flex; flex-direction: column; gap: 2px"
            ></div>
            <dxi-item location="before" locateInMenu="auto">
              <div
                class="stacked-toolbar-group"
                style="display: flex; flex-direction: column; gap: 5px"
              >
                <div style="display: flex; gap: 5px">
                  <div *ngIf="journalVoucherFormData">
                    <dx-text-box
                      label="JV No."
                      [(value)]="journalVoucherFormData.DOC_NO"
                      labelMode="floating"
                      [width]="200"
                      [readOnly]="true"
                    ></dx-text-box>
                  </div>
                  <div *ngIf="journalVoucherFormData">
                    <dx-text-box
                      #refBoxRef
                      label="Reference No."
                      labelMode="floating"
                      [(value)]="journalVoucherFormData.REF_NO"
                      [width]="200"
                      (onKeyDown)="onRefNoEnter($event)"
                    ></dx-text-box>
                  </div>
                </div>
                <div style="display: flex; gap: 5px">
                  <div *ngIf="journalVoucherFormData">
                    <dx-text-box
                      #partyNameRef
                      label="Beneficiary Name"
                      labelMode="floating"
                      [(value)]="journalVoucherFormData.PARTY_NAME"
                      [width]="405"
                      (onKeyDown)="onPartyNameEnter($event)"
                    ></dx-text-box>
                  </div>
                </div>
              </div>
            </dxi-item>

            <dxi-item location="after" locateInMenu="auto">
              <div class="stacked-toolbar-group"></div>
            </dxi-item>
            <dxi-item location="after" locateInMenu="auto">
              <div
                class="stacked-toolbar-group"
                style="display: flex; flex-direction: column; gap: 5px"
              >
                <!-- Row 1: Date only -->
                <div style="display: flex; gap: 5px; justify-content: flex-end">
                  <!-- <dx-select-box
                    [width]="200"
                    [height]="32"
                    label="Department"
                    labelMode="floating"
                    [items]="Company_list"
                    displayExpr="DESCRIPTION"
                    valueExpr="ID"
                    [(value)]="journalVoucherFormData.DEPT_ID"
                    (onValueChanged)="onDeptChanged($event)"
                  >
                  </dx-select-box> -->
                  <div *ngIf="journalVoucherFormData">
                    <dx-date-box
                      label="Date"
                      labelMode="floating"
                      [(value)]="journalVoucherFormData.TRANS_DATE"
                      [displayFormat]="'dd-MM-yyyy'"
                      type="date"
                      [width]="200"
                      [readOnly]="true"
                    ></dx-date-box>
                  </div>
                </div>
                <div style="display: flex; gap: 5px">
                  <div *ngIf="journalVoucherFormData">
                    <dx-text-box
                      #narrationRefBox
                      label="Narration"
                      labelMode="floating"
                      [(value)]="journalVoucherFormData.NARRATION"
                      [width]="370"
                      (onKeyDown)="onNarrationEnter($event)"
                    ></dx-text-box>
                  </div>
                  <dx-button
                    icon="plus"
                    type="default"
                    stylingMode="contained"
                    hint="Add Row"
                    style="margin-top: 6px"
                    (onClick)="onAddRow()"
                  >
                    <div
                      *dxTemplate="let data of 'content'"
                      class="add-btn-content"
                    >
                      <span
                        class="iconify"
                        data-icon="formkit:add"
                        data-width="20"
                        data-height="20"
                      ></span>

                      <span class="add-text">Add Row</span>
                    </div></dx-button
                  >
                  <!-- <dx-button
                    icon="plus"
                    stylingMode="outlined"
                    type="default"
                    hint="New Row"
                    [elementAttr]="{ class: 'small-btn' }"
                    style="margin-top: 8px"
                    (onClick)="onAddRow()"
                  ></dx-button> -->
                </div>
              </div>
            </dxi-item>
          </dxo-toolbar>
          <dxi-column
            dataField="billNo"
            caption="Serial No."
            [width]="'auto'"
            [allowEditing]="true"
          ></dxi-column>
          <dxi-column
            dataField="ledgerCode"
            caption="Ledger Code"
            [width]="130"
            [lookup]="{
              dataSource: ledgerList,
              valueExpr: 'HEAD_CODE',
              displayExpr: 'HEAD_CODE',
              searchEnabled: true,
            }"
          ></dxi-column>
          <dxi-column
            dataField="ledgerName"
            caption="Ledger Name"
            [lookup]="{
              dataSource: ledgerList,
              valueExpr: 'HEAD_NAME',
              displayExpr: 'HEAD_NAME',
              searchEnabled: true,
            }"
          ></dxi-column>
          <dxi-column dataField="STORE_ID" caption="Store">
            <dxo-lookup
              [dataSource]="storeList"
              displayExpr="DESCRIPTION"
              valueExpr="ID"
            ></dxo-lookup>
          </dxi-column>
          <dxi-column dataField="DEPT_ID" caption="Department">
            <dxo-lookup
              [dataSource]="departmentList"
              displayExpr="DESCRIPTION"
              valueExpr="ID"
            ></dxo-lookup>
          </dxi-column>
          <dxi-column
            dataField="particulars"
            caption="Particulars"
            [width]="150"
            [editorOptions]="{ maxLength: 250 }"
          >
            <dxi-validation-rule
              type="stringLength"
              [max]="250"
              message="Max 250 characters allowed"
            ></dxi-validation-rule>
          </dxi-column>
          <dxi-column
            dataField="debitAmount"
            caption="Debit Amount"
            dataType="number"
            [width]="150"
            [format]="{ type: 'fixedPoint', precision: 2 }"
          >
            <dxo-validation-rules>
              <dxi-validation-rule
                type="custom"
                [validationCallback]="validateDebitOrCredit"
                message="Either Debit or Credit must be entered"
              ></dxi-validation-rule>
            </dxo-validation-rules>
          </dxi-column>
          <dxi-column
            dataField="creditAmount"
            caption="Credit Amount"
            dataType="number"
            [width]="150"
            [format]="{ type: 'fixedPoint', precision: 2 }"
          >
            <dxo-validation-rules>
              <dxi-validation-rule
                type="custom"
                [validationCallback]="validateDebitOrCredit"
                message="Either Debit or Credit must be entered"
              ></dxi-validation-rule>
            </dxo-validation-rules>
          </dxi-column>
          <dxi-column type="buttons">
            <dxi-button name="edit"></dxi-button>
            <dxi-button name="delete"></dxi-button>
          </dxi-column>
          <dxo-summary>
            <dxi-total-item
              column="debitAmount"
              summaryType="sum"
              valueFormat="#,##0.00"
              displayFormat="Total: {0}"
              alignment="right"
            ></dxi-total-item>

            <dxi-total-item
              column="creditAmount"
              summaryType="sum"
              valueFormat="#,##0.00"
              displayFormat="Total: {0}"
              alignment="right"
            ></dxi-total-item>
          </dxo-summary>
        </dx-data-grid>
        <!-- Row with Narration and Approve aligned in same row -->
        <div
          *ngIf="journalVoucherFormData"
          style="
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 15px;
            padding: 0 5px;
          "
        >
          <!-- Narration Text Box (left side) -->
          <!-- <dx-text-box
            label="Narration"
            labelMode="floating"
            [(value)]="journalVoucherFormData.NARRATION"
            [width]="400"
            [showClearButton]="true"
          ></dx-text-box> -->

          <!-- Approve Checkbox (right side) -->
        </div>

        <!-- <div *ngIf="journalVoucherFormData" style="margin-top: 10px">
  <dx-check-box
    [(value)]="journalVoucherFormData.IS_APPROVED"
    text="Approve"

    (onValueChanged)="onApprovedChanged($event)"
  ></dx-check-box>
</div> -->
      </div>
    </div>
  </div>
</dx-validation-group>

<div class="form-popup-buttons-container">
  <div class="popup-footer" style="display: flex; justify-content: flex-end">
    <div
      style="
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 5px;
      "
    >
      <div *ngIf="journalVoucherFormData">
        <div
          class="approve-container"
          *ngIf="canApprove && !isVerifyMode && !isApproveMode"
        >
          <dx-check-box
            [(value)]="journalVoucherFormData.IS_APPROVED"
            text="Approve"
            (onValueChanged)="onApprovedChanged($event)"
          >
          </dx-check-box>
        </div>
      </div>
      <div style="display: flex; gap: 10px">
        <dx-button
          text="Cancel"
          (onClick)="cancel()"
          stylingMode="outlined"
          type="normal"
        ></dx-button>
        <dx-button
          [text]="
            isSaving
              ? isVerifyMode
                ? 'Verifying...'
                : journalVoucherFormData?.IS_APPROVED || isApproveMode
                  ? 'Approving...'
                  : 'Updating...'
              : isVerifyMode
                ? 'Verify'
                : journalVoucherFormData?.IS_APPROVED || isApproveMode
                  ? 'Approve'
                  : 'Update'
          "
          [visible]="canEdit"
          [disabled]="isSaving"
          (onClick)="update()"
          stylingMode="contained"
          type="default"
        >
        </dx-button>
      </div>
    </div>

    <!-- <dx-button
      [text]="
        journalVoucherFormData?.IS_APPROVED ? 'Update & Commit' : 'Update'
      "
      [visible]="canEdit"
      (onClick)="update()"
      stylingMode="contained"
      type="default"
    >
    </dx-button> -->
  </div>
</div>
