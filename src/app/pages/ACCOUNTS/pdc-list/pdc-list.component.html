<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      #dataGrid
      noDataText="No data available"
      [width]="'100%'"
      [height]="'82vh'"
      [loadPanel]="{
        enabled: true,
        text: 'Loading...',
        showIndicator: true,
        showPane: true,
      }"
      class="grid theme-dependent"
      [dataSource]="PDCListDataSource"
      [showBorders]="true"
      [showColumnLines]="true"
      [columnAutoWidth]="false"
      [wordWrapEnabled]="false"
      [rowAlternationEnabled]="true"
      [allowColumnReordering]="true"
      [showColumnHeaders]="true"
      [columnAutoWidth]="true"
      [allowColumnResizing]="true"
      [columnResizingMode]="'nextColumn'"
      [headerFilter]="{ visible: true, allowSearch: true }"
      [scrolling]="{ mode: 'virtual' }"
      rowAlternationInterval="2"
      [selection]="{ mode: 'single' }"
      focusStateEnabled="false"
      [groupPanel]="{ visible: true }"
      [grouping]="{ autoExpandAll: false }"
      (onExporting)="onExporting($event)"
      (onEditingStart)="onEditPDC($event)"
      (onRowRemoving)="DeletePDC($event)"
    >
      <dxo-editing
        mode="popup"
        [allowUpdating]="canEdit"
        [allowDeleting]="canDelete"
      ></dxo-editing>

      <dxo-export
        [enabled]="true"
        [allowExportSelectedData]="false"
        [formats]="['xlsx']"
      >
      </dxo-export>

      <dxo-paging [pageSize]="20"></dxo-paging>
      <dxo-pager
        [visible]="true"
        [displayMode]="displayMode"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <dxo-load-panel [showPane]="false"></dxo-load-panel>
      <dxo-scrolling mode="standard"></dxo-scrolling>
      <!-- <dxo-filter-row
        [visible]="isFilterRowVisible"
        [applyFilter]="auto"
      ></dxo-filter-row> -->
      <dxo-toolbar>
        <dxi-item location="before">
          <h6>PDC</h6>
        </dxi-item>

        <dxi-item location="after" locateInMenu="auto"> </dxi-item>

        <!-- <div class="toolbar-margin-top "> -->
        <dxi-item location="center" locateInMenu="auto">
          <dx-radio-group
            [items]="priorities"
            [(value)]="selectedType"
            layout="horizontal"
            displayExpr="name"
            [stylingMode]="'outlined'"
            (onValueChanged)="onTypeChanged($event)"
          >
          </dx-radio-group>
        </dxi-item>

        <dxi-item location="after" locateInMenu="auto">
          <dx-select-box
            displayExpr="label"
            valueExpr="id"
            displayExpr="name"
            label="Status"
            labelMode="floating"
            [width]="220"
            [searchEnabled]="true"
            [acceptCustomValue]="true"
            [items]="StatusfilterOptions"
            [(value)]="selectedStatus"
            (onValueChanged)="onStatusChanged()"
          ></dx-select-box>
        </dxi-item>

        <dxi-item location="after">
          <dx-select-box
            label="Due Date"
            labelMode="floating"
            [dataSource]="dateRanges"
            [displayExpr]="displayDueDateExpr"
            valueExpr="value"
            [(value)]="selectedDateRange"
            (onValueChanged)="onDateRangeChanged($event)"
            (onItemClick)="handleDueDateItemClick($event)"
          >
            <div *dxTemplate="let item of 'item'">
              {{ item.value === "custom" ? "Custom" : item.label }}
            </div>
          </dx-select-box>
        </dxi-item>

        <dxi-item location="after">
          <dx-select-box
            label="Entry Date between"
            labelMode="floating"
            [dataSource]="entryDateRanges"
            [displayExpr]="displayEntryDateExpr"
            valueExpr="value"
            [(value)]="selectedEntryDateRange"
            (onValueChanged)="onEntryDateRangeChanged($event)"
            (onItemClick)="handleEntryDateItemClick($event)"
          >
            <div *dxTemplate="let item of 'item'">
              {{ item.value === "custom" ? "Custom" : item.label }}
            </div>
          </dx-select-box>
        </dxi-item>

        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="searchButtonOptions"
        ></dxi-item>

        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="refreshButtonOptions"
        ></dxi-item>
        <dxi-item
          name="exportButton"
          location="after"
          cssClass="export-btn"
        ></dxi-item>

        <dxi-item
          *ngIf="canAdd"
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="addButtonOptions"
        ></dxi-item>
        <!-- </div> -->
      </dxo-toolbar>

      <dxo-grouping
        [autoExpandAll]="false"
        [contextMenuEnabled]="true"
        [expandMode]="'rowClick'"
      ></dxo-grouping>
      <dxi-column dataField="ENTRY_NO" caption="Entry No."></dxi-column>
      <dxi-column dataField="ENTRY_DATE" caption="Entry date"></dxi-column>
      <dxi-column
        dataField="BENEFICIARY_NAME"
        caption="Beneficiary Name"
      ></dxi-column>
      <dxi-column dataField="CHEQUE_NO" caption="Cheque No."></dxi-column>
      <dxi-column dataField="CHEQUE_DATE" caption="Due date."></dxi-column>
      <dxi-column
        dataField="AMOUNT"
        caption="Amount"
        [format]="{ type: 'fixedPoint', precision: 2 }"
      ></dxi-column>
      <dxi-column dataField="REMARKS" caption="Remarks"></dxi-column>
      <dxi-column
        dataField="ENTRY_STATUS"
        caption="Status"
        [cellTemplate]="statusCellRender"
        width="100  "
        alignment="right"
        [headerFilter]="{
          dataSource: getStatusFilterData,
          encodeHtml: false,
        }"
      >
      </dxi-column>

      <dxi-column
        type="buttons"
        caption="Actions"
        [width]="140"
        cellTemplate="actionTemplate"
      >
      </dxi-column>

      <div *dxTemplate="let cellData of 'actionTemplate'">
        <!-- Edit -->
        <i
          *ngIf="canEdit"
          class="dx-icon dx-icon-edit"
          [style.opacity]="
            cellData.data.ENTRY_STATUS === 'Verified' ||
            cellData.data.ENTRY_STATUS === 'Approved' ||
            cellData.data.ENTRY_STATUS === 'Closed'
              ? '0.4'
              : '1'
          "
          [style.pointer-events]="
            cellData.data.ENTRY_STATUS === 'Verified' ||
            cellData.data.ENTRY_STATUS === 'Approved' ||
            cellData.data.ENTRY_STATUS === 'Closed'
              ? 'none'
              : 'auto'
          "
          style="cursor: pointer; margin-right: 10px"
          title="Edit"
          (click)="onEditPDC({ data: cellData.data, cancel: false })"
        ></i>

        <!-- Delete -->
        <i
          *ngIf="canDelete"
          class="dx-icon dx-icon-trash"
          [style.opacity]="
            cellData.data.ENTRY_STATUS === 'Verified' ||
            cellData.data.ENTRY_STATUS === 'Approved' ||
            cellData.data.ENTRY_STATUS === 'Closed'
              ? '0.4'
              : '1'
          "
          [style.pointer-events]="
            cellData.data.ENTRY_STATUS === 'Verified' ||
            cellData.data.ENTRY_STATUS === 'Approved' ||
            cellData.data.ENTRY_STATUS === 'Closed'
              ? 'none'
              : 'auto'
          "
          style="cursor: pointer; margin-right: 10px"
          title="Delete"
          (click)="DeletePDC({ data: cellData.data, cancel: false })"
        ></i>

        <!-- Verify -->
        <span
          *ngIf="
            cellData.data.ENTRY_STATUS === 'Closed' ||
            (cellData.data.ENTRY_STATUS === 'Verified' && canApprove) ||
            (cellData.data.ENTRY_STATUS !== 'Verified' && canVerify)
          "
          style="
            position: relative;
            display: inline-block;
            width: 18px;
            height: 18px;
            margin-left: 10px;
            cursor: pointer;
            vertical-align: middle;
          "
          [title]="
            cellData.data.ENTRY_STATUS === 'Closed'
              ? 'Closed'
              : cellData.data.ENTRY_STATUS === 'Approved'
                ? 'Approved'
                : cellData.data.ENTRY_STATUS === 'Verified'
                  ? 'Approve'
                  : 'Verify'
          "
          (click)="onVerifyInvoice({ row: { data: cellData.data } })"
        >
          <!-- Blue badge -->
          <i
            class="fas fa-certificate"
            [style.color]="
              cellData.data.ENTRY_STATUS === 'Closed'
                ? '#EF4444'
                : cellData.data.ENTRY_STATUS === 'Approved'
                  ? '#10B981'
                  : cellData.data.ENTRY_STATUS === 'Verified'
                    ? '#0073D8'
                    : '#FFA500'
            "
            style="font-size: 18px; position: absolute; top: 0; left: 0"
          ></i>

          <!-- White tick -->
          <i
            class="fas fa-check"
            style="
              color: white;
              font-size: 7px;
              position: absolute;
              top: 5px;
              left: 5px;
              pointer-events: none;
            "
          ></i>
        </span>
      </div>
    </dx-data-grid>

    <dx-popup
      [(visible)]="addPDCPopupOpened"
      [width]="'60vw'"
      [height]="'auto'"
      [title]="popupTitle"
      (onHiding)="handleClose()"
    >
      <app-pdc-add-form
        [canApprove]="canApprove"
        [isOpen]="addPDCPopupOpened"
        (formClosed)="handleClose()"
        [popupMode]="popupMode"
      ></app-pdc-add-form>
    </dx-popup>
  </div>
</div>

<dx-popup
  [(visible)]="editPDCPopupOpened"
  [width]="'50vw'"
  [height]="'90vh'"
  title="Edit PDC"
  (onHiding)="handleClose()"
  titleTemplate="popupTitle"
>
  <div *dxTemplate="let data of 'popupTitle'">
    <div class="popup-title-text">
      {{ popupTitle }}
    </div>
  </div>
  <app-pdc-edit-form
    [selectedPDC]="selectedPDC"
    [isOpen]="editPDCPopupOpened"
    [isReadOnly]="isEditReadOnly"
    (formClosed)="handleClose()"
    [PDCid]="selectPDC"
    [canApprove]="canApprove"
    [popupMode]="popupMode"
  ></app-pdc-edit-form>
</dx-popup>

<dx-popup
  [(visible)]="VerifyPDCPopupOpened"
  [width]="'50vw'"
  [height]="'90vh'"
  [title]="popupTitle"
  (onHiding)="handleClose()"
  [popupMode]="popupMode"
  titleTemplate="popupTitle"
>
  <div *dxTemplate="let data of 'popupTitle'">
    <div class="popup-title-text">
      {{ popupTitle }}
    </div>
  </div>
  <app-pdc-edit-form
    [selectedPDC]="selectedPDC"
    [isOpen]="VerifyPDCPopupOpened"
    [isEditReadOnly]="isEditReadOnly"
    (formClosed)="handleClose()"
    [PDCid]="selectPDC"
    [canApprove]="false"
    [showApprove]="false"
    [isVerifyMode]="selectedPDC?.ENTRY_STATUS !== 'Verified'"
    [isApproveMode]="selectedPDC?.ENTRY_STATUS === 'Verified'"
    [VerifyPDCPopupOpened]="VerifyPDCPopupOpened"
  ></app-pdc-edit-form>
</dx-popup>

<app-custom-date-popup
  [(visible)]="showCustomDatePopup"
  [startDate]="customStartDate"
  [endDate]="customEndDate"

>
</app-custom-date-popup>

<dx-popup
  [(visible)]="showEntryCustomDatePopup"
  [showTitle]="true"
  title="Select Dates"
  [width]="380"
  [height]="250"
  [dragEnabled]="false"
>
  <div class="date-range-container">
    <!-- Row 1 : Year + Month -->
    <div class="date-row">
      <dx-select-box
        label="Year"
        labelMode="floating"
        [width]="160"
        [(value)]="selectedYear"
        [dataSource]="years"
        (onValueChanged)="onYearChanged($event)"
      >
      </dx-select-box>

      <dx-select-box
        label="Month"
        labelMode="floating"
        [width]="160"
        [dataSource]="monthDataSource"
        displayExpr="name"
        valueExpr="value"
        [(value)]="selectedmonth"
        (onValueChanged)="onMonthValueChanged($event)"
      >
      </dx-select-box>
    </div>

    <!-- Row 2 : From + To Date -->
    <div class="date-row">
      <dx-date-box
        label="From Date"
        labelMode="floating"
        type="date"
        displayFormat="dd-MM-yyyy"
        [(value)]="entrycustomStartDate"
        [width]="160"
      >
      </dx-date-box>

      <dx-date-box
        label="To Date"
        labelMode="floating"
        type="date"
        displayFormat="dd-MM-yyyy"
        [(value)]="entrycustomEndDate"
        [width]="160"
      >
      </dx-date-box>
    </div>

    <!-- Row 3 : Button -->
    <div class="button-row">
      <dx-button
        text="Apply"
        type="default"
        (onClick)="applyEntryCustomDateFilter()"
      >
      </dx-button>
    </div>
  </div>
</dx-popup>
