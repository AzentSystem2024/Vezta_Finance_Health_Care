<dx-validation-group class="form-grid" #formValidationGroup>
  <div class="form-container">
    <!-- Row 1 -->
    <div class="form-row">
      <dx-text-box
        label="Doc No."
        [(value)]="docNo"
        labelMode="floating"
        [readOnly]="true"
      ></dx-text-box>
      <dx-date-box
        label="Date"
        labelMode="floating"
        displayFormat="dd/MM/yyyy"
        [(value)]="PrePaymentFormData.TRANS_DATE"
      ></dx-date-box>
    </div>

    <!-- Row 2 -->
    <div class="form-row">
      <dx-select-box
        label="Supplier"
        [valueExpr]="'ID'"
        [(value)]="PrePaymentFormData.SUPP_ID"
        [displayExpr]="'DESCRIPTION'"
        [searchEnabled]="true"
        [items]="Supplier"
        labelMode="floating"
      >
        <dx-validator>
          <dxi-validation-rule
            type="required"
            message="This field is required"
          ></dxi-validation-rule>
        </dx-validator>
      </dx-select-box>
    </div>

    <!-- Row 3 -->
    <div class="form-row">
      <dx-text-box
        label="Supplier Invoice No"
        labelMode="floating"
        [(value)]="PrePaymentFormData.REF_NO"
      ></dx-text-box>
      <dx-number-box
        label="Amount"
        labelMode="floating"
        [format]="{ type: 'fixedPoint', precision: 2 }"
        [(value)]="PrePaymentFormData.EXPENSE_AMOUNT"
        [inputAttr]="{ style: 'text-align: right;' }"
      >
        <dx-validator>
          <dxi-validation-rule
            type="required"
            message="This field is required"
          ></dxi-validation-rule>
        </dx-validator>
      </dx-number-box>
    </div>

    <!-- Row 4 -->
    <!-- <div class="period-row">
      <dx-number-box
        [label]="
          selected_vat_id == sessionData.VAT_ID && sessionData.VAT_ID == 2
            ? 'VAT %'
            : ' GST %'
        "
        labelMode="floating"
        [(value)]="PrePaymentFormData.TAX_PERCENT"
        (onValueChanged)="updateGSTAmount()"
      ></dx-number-box>
      <dx-number-box
        [label]="
          selected_vat_id == sessionData.VAT_ID && sessionData.VAT_ID == 2
            ? 'VAT Amount'
            : ' GST Amount'
        "
        labelMode="floating"
        [(value)]="PrePaymentFormData.TAX_AMOUNT"
      ></dx-number-box>
      <dx-number-box
        label="Net Amount"
        labelMode="floating"
        [(value)]="PrePaymentFormData.NET_AMOUNT"
      ></dx-number-box>
    </div> -->

    <!-- Row 5 -->
    <div class="form-row">
      <dx-select-box
        label="Expense Ledger"
        [searchEnabled]="true"
        [valueExpr]="'ID'"
        [displayExpr]="'DESCRIPTION'"
        [items]="ExpenseLedger"
        [(value)]="PrePaymentFormData.EXP_HEAD_ID"
        labelMode="floating"
      >
        <dx-validator>
          <dxi-validation-rule
            type="required"
            message="This field is required"
          ></dxi-validation-rule>
        </dx-validator>
      </dx-select-box>

      <dx-select-box
        label="Prepayment Ledger"
        [searchEnabled]="true"
        [valueExpr]="'ID'"
        [displayExpr]="'DESCRIPTION'"
        [items]="PrePaymentLedger"
        [(value)]="PrePaymentFormData.PREPAY_HEAD_ID"
        labelMode="floating"
      >
        <dx-validator>
          <dxi-validation-rule
            type="required"
            message="This field is required"
          ></dxi-validation-rule>
        </dx-validator>
      </dx-select-box>
      <!-- <dx-select-box label="Location" labelMode="floating"></dx-select-box> -->
    </div>

    <!-- Row 6 -->
    <div class="form-row">
      <dx-text-box
        label="Narration"
        labelMode="floating"
        [(value)]="PrePaymentFormData.NARRATION"
      ></dx-text-box>
    </div>

    <!-- Row 7 -->
    <div class="form-row"></div>

    <!-- Row 8 -->
    <div class="period-row">
      <dx-date-box
        label="Period From"
        displayFormat="dd/MM/yyyy"
        labelMode="floating"
        width="150"
        [(value)]="PrePaymentFormData.DATE_FROM"
        (onValueChanged)="updatePeriodTo()"
      ></dx-date-box>
      <dx-number-box
        label="No.Month"
        labelMode="floating"
        width="120"
        [(value)]="PrePaymentFormData.NO_OF_MONTHS"
        (onValueChanged)="updatePeriodTo()"
      ></dx-number-box>
      <dx-number-box
        label="No.Days"
        labelMode="floating"
        width="120"
        [(value)]="PrePaymentFormData.NO_OF_DAYS"
        (onValueChanged)="updatePeriodTo()"
      ></dx-number-box>
      <dx-date-box
        label="Period To"
        displayFormat="dd/MM/yyyy"
        labelMode="floating"
        width="150"
        [(value)]="PrePaymentFormData.DATE_TO"
        [readOnly]="true"
      ></dx-date-box>
      <dx-button
        icon="bi bi-calendar fs-5"
        hint="generateSchedule"
        stylingMode="text"
        class="calendar-btn"
        (onClick)="showGrid = true"
        (onClick)="onCalendarClick()"
      ></dx-button>
    </div>

    <!-- Data Grid -->
    <div *ngIf="showGrid">
      <dx-data-grid
        #prepayGrid
        [showBorders]="true"
        height="200"
        class="mt-3"
        [dataSource]="ExpenseAmountDetails"
        (onRowInserted)="recalculateTotalExpense()"
        (onRowUpdated)="recalculateTotalExpense()"
        (onRowRemoved)="recalculateTotalExpense()"
        (onSelectionChanged)="onSelectionChanged($event)"
        (onEditorPreparing)="onEditorPreparing($event)"
        width="100%"
        [editing]="{
          mode: 'cell',
          allowUpdating: true,
        }"
      >
        <dxo-header-filter [visible]="true"></dxo-header-filter>
        <dxo-sorting mode="multiple"></dxo-sorting>

        <dxi-column
          [width]="'200'"
          dataField="DUE_DATE"
          caption="Date"
          displayFormat="dd/MM/yyyy"
          [allowEditing]="false"
          [readOnly]="true"
        >
          <dxo-header-filter [allowSelectAll]="false">
            <dxo-search [enabled]="true"></dxo-search>
          </dxo-header-filter>
        </dxi-column>

        <dxi-column
          dataField="DUE_AMOUNT"
          caption="Expense Amount"
          [format]="{ type: 'fixedPoint', precision: 2 }"
          [editorOptions]="{ showSpinButtons: true }"
          [allowEditing]="false"
          [readOnly]="true"
        >
          <dxo-header-filter [allowSelectAll]="false">
            <dxo-search [enabled]="true"></dxo-search>
          </dxo-header-filter>
        </dxi-column>

        <dxi-column
          dataField="HEAD_PERCENT"
          caption="Status"
          alignment="right"
          [allowEditing]="false"
          [readOnly]="true"
        >
          <dxo-header-filter [allowSelectAll]="false">
            <dxo-search [enabled]="true"></dxo-search>
          </dxo-header-filter>
        </dxi-column>
      </dx-data-grid>
    </div>

    <div class="total-expense">
      <dx-number-box
        label="Total Expense"
        width="200px"
        [readOnly]="true"
        [format]="{ type: 'fixedPoint', precision: 2 }"
        labelMode="floating"
        [(value)]="totalExpense"
        [inputAttr]="{ style: 'text-align: right;' }"
      ></dx-number-box>
    </div>
    <div
    *ngIf="canApprove"
      style="
        margin: 4px 0 8px 0;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
      "
      
    >
      <dx-check-box
        text="Approve"
        [(value)]="PrePaymentFormData.IS_APPROVED"
      ></dx-check-box>
    </div>
    <!-- Footer -->
    <div class="fixed-footer">
      <dx-button
        text="Cancel"
        stylingMode="outlined"
        type="normal"
        class="action-btn"
        (onClick)="cancel()"
      ></dx-button>
      <dx-button
        *ngIf="mode !== 'view'"
        class="action-btn"
        [text]="isSaving ? 'Processing...' : actionButtonText"
        [disabled]="isSaving"
        stylingMode="contained"
        type="default"
        (onClick)="savePrePayment()"
      >
      </dx-button>

      <!-- <dx-button
        text="Save"
        stylingMode="contained"
        type="default"
        class="action-btn"
        (onClick)="savePrePayment()"
      ></dx-button> -->
    </div>
  </div></dx-validation-group
>
