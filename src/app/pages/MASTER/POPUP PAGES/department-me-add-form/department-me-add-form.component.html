<dx-form class="plain-styled-form">
  <dxi-item itemType="group">
    <dxo-col-count-by-screen
      [xs]="1"
      [sm]="1"
      [md]="1"
      [lg]="1"
    ></dxo-col-count-by-screen>
    <dxi-item>
      <div *dxTemplate>
        <dx-text-box
          label="Code *"
          [(value)]="newDepartment.CODE"
          labelMode="floating"
          (keypress)="keyPressCode($event)"
          ><dx-validator>
            <dxi-validation-rule
              type="required"
              message="Department Code is required"
            ></dxi-validation-rule>

            <dxi-validation-rule
              type="pattern"
              [pattern]="'^[a-zA-Z0-9]+$'"
              message="Code should be alphanumeric only"
            ></dxi-validation-rule>

            <dxi-validation-rule
                type="custom"
                [validationCallback]="validateDepartmentCode"
                message="Code already exists"
            ></dxi-validation-rule>
          </dx-validator>
        </dx-text-box>
      </div>
    </dxi-item>

    <dxi-item>
      <div *dxTemplate>
        <dx-text-box
          labelMode="floating"
          label="Department Name *"
          [(value)]="newDepartment.DEPT_NAME"
          (keypress)="keyPressDepartment($event)"
          ><dx-validator>
            <dxi-validation-rule
              type="required"
              message="Department Name is required"
            ></dxi-validation-rule>

             <dxi-validation-rule
                type="custom"
                [validationCallback]="validateDepartmentName"
                message="Name already exists"
            ></dxi-validation-rule>
          </dx-validator>
        </dx-text-box>
      </div>
    </dxi-item>

    <dxi-item>
      <div *dxTemplate>
        <dx-select-box
          label="Cost Bucket"
          labelMode="floating"
          [items]="Cost_Bucket_DropDownData"
          displayExpr="DESCRIPTION"
          valueExpr="ID"
          [searchEnabled]="true"
          [(value)]="newDepartment.COST_BUCKET_ID"
        >
        </dx-select-box>
      </div>
    </dxi-item>
  </dxi-item>
</dx-form>
