<dx-form class="plain-styled-form" >
    <dxi-item itemType="group">
      <dxo-col-count-by-screen
        [xs]="1"
        [sm]="1"
        [md]="1"
        [lg]="1"
      ></dxo-col-count-by-screen>
      <dxi-item>
        <div *dxTemplate>
          <dx-text-box
            label="CODE"
            [(value)]="newDeliveryTerms.CODE"
            labelMode="floating"
          >
          <dx-validator>

              <dxi-validation-rule
                type="required"
                message="Code is required"
              ></dxi-validation-rule>

              <dxi-validation-rule
                type="pattern"
                [pattern]="'^[a-zA-Z0-9]+$'"
                message="Only alphanumeric allowed"
              ></dxi-validation-rule>

              <!--  Duplicate check -->
              <dxi-validation-rule
                type="custom"
                [validationCallback]="validateDeliveryCode"
                message="Code already exists"
              ></dxi-validation-rule>

            </dx-validator>
          </dx-text-box>
        </div>
      </dxi-item>
  
      <dxi-item>
        <div *dxTemplate>
          <dx-text-box
            label="DESCRIPTION"
            [(value)]="newDeliveryTerms.DESCRIPTION"
            labelMode="floating"
          >
          <dx-validator>

              <dxi-validation-rule
                type="required"
                message="Description is required"
              ></dxi-validation-rule>

<!--  Duplicate check -->
              <dxi-validation-rule
                type="custom"
                [validationCallback]="validateDeliveryName"
                message="Description already exists"
              ></dxi-validation-rule>              
          </dx-validator>
          </dx-text-box>
        </div>
      </dxi-item>

    </dxi-item>
  </dx-form>
