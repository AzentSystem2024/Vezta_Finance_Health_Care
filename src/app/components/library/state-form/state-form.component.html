<dx-form class="plain-styled-form">
  <dxi-item itemType="group">
    <dxo-col-count-by-screen
      [xs]="1"
      [sm]="1"
      [md]="1"
      [lg]="1"
    ></dxo-col-count-by-screen>
    <dxi-item>
      <div *dxTemplate>
        <dx-text-box
          label="State Code"
          [(value)]="newState.STATE_CODE"
          
          labelMode="floating"
        >
        <dx-validator>
            <dxi-validation-rule
              type="required"
              message="State Code is required"
            ></dxi-validation-rule>
          </dx-validator>
        </dx-text-box>
      </div>
    </dxi-item>
    <dxi-item>
      <div *dxTemplate>
        <dx-text-box
          label="State Name"
          [(value)]="newState.STATE_NAME"
          
          labelMode="floating"
        >
        <dx-validator>
            <dxi-validation-rule
              type="required"
              message="State Name is required"
            ></dxi-validation-rule>
          </dx-validator>
        </dx-text-box>
      </div>
    </dxi-item>

    <dxi-item>
      <div *dxTemplate>
        <dx-select-box
          label="Country"
          labelMode="floating"
          [items]="CountryDropdownData"
         
          displayExpr="COUNTRY_NAME"
          valueExpr="ID"
          placeholder="Select Country"
          [(value)]="newState.COUNTRY_ID"
          [searchEnabled]="true"
        ></dx-select-box>
      </div>
    </dxi-item>
  </dxi-item>
</dx-form>
