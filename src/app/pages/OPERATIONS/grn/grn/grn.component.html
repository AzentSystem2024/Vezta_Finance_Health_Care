<div class="view-wrapper list-page">
  <dx-data-grid
    class="grid theme-dependent"
    [rowAlternationEnabled]="true"
    rowAlternationInterval="2"
    [showBorders]="true"
    height="82vh"
    [dataSource]="grnDataSource"
    [showColumnLines]="true"
    [scrolling]="{ mode: 'virtual' }"
    (onRowRemoved)="deleteGrnData($event)"
    (onEditingStart)="onEditingRow($event)"
  >
    <dxo-load-panel [showPane]="false"></dxo-load-panel>
    <dxo-scrolling mode="virtual"></dxo-scrolling>
    <dxo-sorting mode="multiple"></dxo-sorting>
    <dxo-header-filter [visible]="true"></dxo-header-filter>
    <dxo-filter-row [visible]="isFilterRowVisible"></dxo-filter-row>

    <dxo-paging [pageSize]="10"></dxo-paging>
    <dxo-pager
      [visible]="true"
      [allowedPageSizes]="allowedPageSizes"
      [displayMode]="displayMode"
      [showPageSizeSelector]="showPageSizeSelector"
      [showInfo]="true"
      [showNavigationButtons]="true"
    ></dxo-pager>
    <dxo-column-chooser [enabled]="true" [height]="400"></dxo-column-chooser>
    <dxo-header-filter [visible]="true">
      <dxo-search [enabled]="true"></dxo-search>
    </dxo-header-filter>
    <dxo-export
      [enabled]="true"
      [allowExportSelectedData]="true"
      [formats]="['xlsx']"
    >
    </dxo-export>
    <!-- <dxo-pager
            [visible]="true"
            [allowedPageSizes]="allowedPageSizes"
            [displayMode]="displayMode"
            [showPageSizeSelector]="showPageSizeSelector"
            [showInfo]="showInfo"
            [showNavigationButtons]="showNavButtons"
          ></dxo-pager> -->
    <!-- <dxo-editing mode="popup" [allowUpdating]="true" [allowDeleting]="true"> -->
    <!-- </dxo-editing> -->
    <dxo-toolbar>
      <dxi-item location="before">
        <div class="grid-header">Goods Receipt Note</div>
      </dxi-item>
      <dxi-item location="after" template="dateFilterTemplate"></dxi-item>
      <dxi-item
        location="after"
        locateInMenu="auto"
        widget="dxButton"
        [options]="searchButtonOptions"
      ></dxi-item>

      <dxi-item
        location="after"
        locateInMenu="auto"
        widget="dxButton"
        [options]="refreshButtonOptions"
      ></dxi-item>
      <!-- Divider -->
      <dxi-item location="after">
        <div class="toolbar-divider"></div>
      </dxi-item>
      <dxi-item
        name="exportButton"
        location="after"
        cssClass="export-btn"
      ></dxi-item>

      <dxi-item
        location="after"
        locateInMenu="auto"
        widget="dxButton"
        [options]="addButtonOptions"
        [visible]="canAdd"
      ></dxi-item>

      <!-- <dxi-item location="after" locateInMenu="auto">
            <div class="separator"></div>
          </dxi-item> -->
    </dxo-toolbar>
    <div *dxTemplate="let data of 'dateFilterTemplate'">
      <dx-select-box
        [dataSource]="dateRanges"
        [displayExpr]="displayExpr"
        valueExpr="value"
        [(value)]="selectedDateRange"
        (onValueChanged)="onDateRangeChanged($event)"
        (onOpened)="attachItemClickHandler($event)"
        width="220"
      >
        <!-- This controls the dropdown list rendering -->
        <div *dxTemplate="let item of 'item'">
          {{ item.value === "custom" ? "Custom" : item.label }}
        </div>
      </dx-select-box>
    </div>
    <dxi-column
      dataField="DOC_NO"
      width="130"
      caption="GRN NO"
      alignment="left"
    ></dxi-column>
    <dxi-column
      dataField="GRN_DATE"
      displayFormat="dd-MM-yyyy"
      caption="GRN DATE"
      dataType="date"
      [allowEditing]="false"
      format="dd-MM-yyyy"
    ></dxi-column>
    <dxi-column
      dataField="PO_NO"
      width="130"
      caption="PO NO"
      alignment="left"
    ></dxi-column>
    <dxi-column caption="SUPPLIER NAME" dataField="SUPPPLIER_NAME"></dxi-column>
    <dxi-column caption="Store" dataField="STORE_NAME"></dxi-column>
    <dxi-column
      caption="NET AMOUNT"
      dataField="NET_AMOUNT"
      dataType="number"
      width="130"
      [format]="{ type: 'fixedPoint', precision: 2 }"
    ></dxi-column>
    <!-- <dxi-column
      caption="NET AMOUNT"
      dataField="SUPP_NET_AMOUNT"
      dataType="number"
      width="130"
      [format]="{ type: 'fixedPoint', precision: 2 }"
    ></dxi-column> -->
    <dxi-column
      caption="STATUS"
      dataField="STATUS"
      [cellTemplate]="statusCellRender"
    ></dxi-column>

    <!-- <dxi-column type="buttons" [buttons]="allButtonsEditDelete"> </dxi-column> -->
    <dxi-column caption="Actions" [width]="140" cellTemplate="actionTemplate">
    </dxi-column>
    <div *dxTemplate="let cellData of 'actionTemplate'">
      <!-- Verify / Approve / View -->
      <span
        *ngIf="
          canVerify ||
          (canApprove && cellData.data.STATUS === 'Verified') ||
          (canView && cellData.data.STATUS === 'Approved')
        "
        style="
          position: relative;
          display: inline-block;
          width: 18px;
          height: 18px;
          margin-right: 12px;
          margin-top: -4px;
          cursor: pointer;
          vertical-align: middle;
        "
        [title]="
          cellData.data.STATUS === 'Approved' ||
          cellData.data.STATUS === 'Closed'
            ? 'View'
            : cellData.data.STATUS === 'Verified'
              ? 'Approve'
              : 'Verify'
        "
        (click)="onVerifyClick({ row: { data: cellData.data } })"
      >
        <!-- Badge -->
        <i
          class="fas fa-certificate"
          [style.color]="
            cellData.data.STATUS === 'Approved' ||
            cellData.data.STATUS === 'Closed'
              ? '#10B981'
              : cellData.data.STATUS === 'Verified'
                ? '#0073D8'
                : '#FFA500'
          "
          style="font-size: 18px; position: absolute; top: 0; left: 0"
        ></i>

        <!-- Tick -->
        <i
          class="fas fa-check"
          style="
            color: white;
            font-size: 7px;
            position: absolute;
            top: 5px;
            left: 5px;
            pointer-events: none;
          "
        ></i>
      </span>

      <!-- Edit -->
      <i
        *ngIf="
          canEdit &&
          !['Approved', 'Verified', 'Closed'].includes(cellData.data.STATUS)
        "
        class="dx-icon dx-icon-edit"
        style="cursor: pointer; margin-right: 10px"
        title="Edit"
        (click)="onEditingRow({ data: cellData.data, cancel: false })"
      ></i>

      <!-- Delete -->
      <i
        *ngIf="
          canDelete &&
          !['Approved', 'Verified', 'Closed'].includes(cellData.data.STATUS)
        "
        class="dx-icon dx-icon-trash"
        style="cursor: pointer"
        title="Delete"
        (click)="deleteGrnData({ data: cellData.data })"
      ></i>
    </div>
  </dx-data-grid>
</div>

<form-popup
  [(visible)]="isGRNPopupVisible"
  [width]="width"
  [height]="height"
  titleText="New Goods Receipt Note"
  (save)="onClickSaveNewData()"
  (closePopup)="ClearFormData()"
  [isEditMode]="false"
  [(isApproved)]="isApproved"
  [showApprove]="canApprove"
  [isSaveDisabled]="isSaving"
>
  <app-grn-new-form></app-grn-new-form>
</form-popup>

<!-- EDIT POPUP -->
<form-popup
  *ngIf="isVerifyPopupOpened"
  [(visible)]="isVerifyPopupOpened"
  titleText="Edit Goods Receipt Note"
  [height]="'100vh'"
  [width]="width"
  [(isApproved)]="isApproved"
  [showApprove]="canApprove"
  (save)="editGrnData()"
>
  <app-grn-verify-form
    #editVerifyForm
    [formdata]="selectedRowData"
  ></app-grn-verify-form>
</form-popup>

<!-- VERIFY POPUP -->
<form-popup
  *ngIf="isVerifyOpened"
  [(visible)]="isVerifyOpened"
  titleText="Verify Goods Receipt Note"
  [height]="'100vh'"
  [width]="width"
  (save)="verifyGrnData()"
>
  <app-grn-verify-form
    #verifyForm
    [formdata]="selectedRowData"
  ></app-grn-verify-form>
</form-popup>
<form-popup
  *ngIf="isApprovePopupOpened"
  [(visible)]="isApprovePopupOpened"
  titleText="Approve Goods Receipt Note"
  [height]="'100vh'"
  [width]="width"
  (save)="approveGrnData()"
>
  <app-grn-verify-form
    #approveForm
    [formdata]="selectedRowData"
  ></app-grn-verify-form>
</form-popup>

<dx-popup
  *ngIf="isViewPopupOpened"
  [(visible)]="isViewPopupOpened"
  title="View Goods Receipt Note"
  [height]="'100vh'"
  [width]="width"
>
  <app-grn-verify-form
    [formdata]="selectedRowData"
    [isReadOnly]="true"
    (closePopup)="isViewPopupOpened = false"
  ></app-grn-verify-form>
</dx-popup>

<dx-popup
  [(visible)]="showTemplatePopup"
  title="Choose Template"
  [height]="'30vh'"
  [width]="'30vw'"
  [showCloseButton]="true"
>
  <div class="popup-content">
    <dx-select-box
      [(value)]="selectedTemplate"
      [dataSource]="templateList"
      displayExpr="TEMPLATE_NAME"
      valueExpr="TEMPLATE_NAME"
      placeholder="Select a template"
      [searchEnabled]="true"
    ></dx-select-box>
    <dxi-toolbar-item toolbar="bottom" location="after">
      <div
        class="form-popup-buttons-container"
        [class.flex-buttons]="width <= 360"
      >
        <dx-button
          style="margin-top: 30px"
          text="Print"
          type="default"
          stylingMode="contained"
          [width]="'100px'"
          (onClick)="applyTemplate()"
        ></dx-button>
      </div>
    </dxi-toolbar-item>
  </div>
</dx-popup>

<dx-popup
  [(visible)]="showReportDesigner"
  title="Print Goods Receipt Note"
  [height]="'100vh'"
  [width]="width"
  [showCloseButton]="true"
  *ngIf="flag"
>
  <div>
    <dx-report-viewer [reportUrl]="reportName" height="800px">
      <dxrv-request-options
        [invokeAction]="getDesignerModelAction"
        [host]="host"
      ></dxrv-request-options>
      <dxrv-callbacks
        (ParametersInitialized)="OnParametersInitialized($event)"
      ></dxrv-callbacks>
    </dx-report-viewer>
  </div>
</dx-popup>

<app-custom-date-popup
  [(visible)]="showCustomDatePopup"
  [startDate]="customStartDate"
  [endDate]="customEndDate"
  (applyDates)="onCustomDateApplied($event)"
>
</app-custom-date-popup>
