<dx-form class="plain-styled-form" >
    <dxi-item itemType="group">
      <dxo-col-count-by-screen
        [xs]="1"
        [sm]="1"
        [md]="1"
        [lg]="1"
      ></dxo-col-count-by-screen>
      <dxi-item>
      <dx-text-box
      
        label="CODE"
        [(value)]="newCountry.CODE"
        (onValueChanged)="onCodeChange($event)"
        labelMode="floating"
      >

      <dx-validator>

            <dxi-validation-rule
              type="required"
              message="Code is required"
            ></dxi-validation-rule>

            <dxi-validation-rule
              type="pattern"
              [pattern]="'^\\+[0-9]{1,4}$'"
              message="Enter valid country code like +91, +1, +971"
            ></dxi-validation-rule>

            <!--  Duplicate check -->
            <dxi-validation-rule
              type="custom"
              [validationCallback]="validateCountryCode"
              message="Code already exists"
            ></dxi-validation-rule>

          </dx-validator>

      </dx-text-box>
  
    </dxi-item>
  
      <dxi-item>

          <dx-text-box
           labelMode="floating"
            label="COUNTRY NAME"
            [(value)]="newCountry.COUNTRY_NAME"
          
         >
         <dx-validator>
          <dxi-validation-rule
                type="required"
                message="Country Name is required"
          ></dxi-validation-rule>

           <!--  Duplicate check -->
            <dxi-validation-rule
              type="custom"
              [validationCallback]="validateCountryName"
              message="Name already exists"
            ></dxi-validation-rule>

        </dx-validator>
        </dx-text-box>
          
        
      </dxi-item>

    </dxi-item>
  </dx-form>
