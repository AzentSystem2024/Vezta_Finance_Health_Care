<dx-form class="plain-styled-form">
  <dxi-item itemType="group">
    <dxo-col-count-by-screen
      [xs]="1"
      [sm]="1"
      [md]="1"
      [lg]="1"
    ></dxo-col-count-by-screen>

    <!-- Code -->
    <dxi-item>
      <dx-text-box
        [(value)]="newSubDepartment.CODE"
        label="Code *"
        labelMode="floating"
        ><dx-validator>
          <dxi-validation-rule
            type="required"
            message="Code is required"
          ></dxi-validation-rule>

          <dxi-validation-rule
              type="pattern"
              [pattern]="'^[a-zA-Z0-9]+$'"
              message="Code should be alphanumeric only"
          ></dxi-validation-rule>

          <dxi-validation-rule
                type="custom"
                [validationCallback]="validateSubDepartmentCode"
                message="Code already exists"
          ></dxi-validation-rule>
          
        </dx-validator>
      </dx-text-box>
    </dxi-item>

    <!-- SubDepartment Name -->
    <dxi-item>
      <dx-text-box
        [(value)]="newSubDepartment.DESCRIPTION"
        label="Description *"
        labelMode="floating"
        ><dx-validator>
          <dxi-validation-rule
            type="required"
            message="Description is required"
          ></dxi-validation-rule>

          <dxi-validation-rule
                type="custom"
                [validationCallback]="validateSubDepartmentName"
                message="Description already exists"
          ></dxi-validation-rule>
          
        </dx-validator>
      </dx-text-box>
    </dxi-item>

    <!-- Department -->
    <dxi-item>
      <dx-select-box
        [items]="DepartmentDropdownData"
        displayExpr="DESCRIPTION"
        valueExpr="ID"
        placeholder="Select Department"
        [(value)]="newSubDepartment.DEPARTMENT_ID"
        label="Department *"
        labelMode="floating"
        [searchEnabled]="true"
        ><dx-validator>
          <dxi-validation-rule
            type="required"
            message="Department is required"
          ></dxi-validation-rule>
        </dx-validator>
      </dx-select-box>
    </dxi-item>
  </dxi-item>
</dx-form>
