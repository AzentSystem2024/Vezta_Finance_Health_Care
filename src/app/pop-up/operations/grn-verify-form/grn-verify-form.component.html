<div>
  <!-- First Row -->
  <div
    class="row"
    style="
      display: flex;
      justify-content: space-between;
      margin-top: 1px;
      margin-bottom: 1px;
    "
  >
    <div class="left-section" style="display: flex; gap: 5px; flex: 1">
      <dx-text-box
        label="GRN NO."
        [(value)]="newGrnData.DOC_NO"
        labelMode="floating"
        placeholder="Enter PO No"
        [readOnly]="true"
        [elementAttr]="{ class: 'grntextbox' }"
      >
      </dx-text-box>

      <dx-date-box
        label="Date"
        labelMode="floating"
        placeholder="Select Date"
        [readOnly]="true"
        [value]="today"
        [readOnly]="true"
        displayFormat="dd-MM-yyyy"
        [elementAttr]="{ class: 'grndatebox' }"
      >
      </dx-date-box>
    </div>

    <div class="right-section" style="flex: 1; margin-left: 20px">
      <dx-select-box
        label="Store *"
        labelMode="floating"
        width="100%"
        [dataSource]="storeList"
        displayExpr="DESCRIPTION"
        valueExpr="ID"
        [(value)]="newGrnData.STORE_ID"
        placeholder="Select Store"
        [readOnly]="true"
        [elementAttr]="{ class: 'grndropdown' }"
        (onValueChanged)="onStoreValueChanged($event)"
      >
      </dx-select-box>
    </div>
  </div>

  <!-- Second Row -->
  <div class="row" style="display: flex; gap: 20px; margin-top: 1px">
    <div style="flex: 1">
      <dx-select-box
        label="Supplier *"
        labelMode="floating"
        [dataSource]="supplierList"
        displayExpr="DESCRIPTION"
        valueExpr="ID"
        [(value)]="newGrnData.SUPP_ID"
        placeholder="Select Supplier"
        [searchEnabled]="true"
        [elementAttr]="{ class: 'grndropdown' }"
        width="380"
        [readOnly]="true"
      >
      </dx-select-box>
    </div>

    <div
      style="
        flex: 1;
        display: flex;
        gap: 10px;
        align-items: center;
        min-width: 0;
      "
    >
      <dx-text-box [value]="PONO" [readOnly]="true"></dx-text-box>

<div style="margin-top: 10px">
  <dx-data-grid
    #grnGrid
    [showBorders]="true"
    class="data-grid"
    [dataSource]="poDetails"
    [selection]="{ mode: 'single' }"
    [hoverStateEnabled]="true"
    [paging]="{ enabled: true, pageSize: 10 }"
    [scrolling]="{ mode: 'virtual' }"
    [height]="'55vh'"
    (onRowUpdated)="updateCell($event)"
    (onCellPrepared)="highlightEditableColumns($event)"
    class="custom-data-grid"
    [columnAutoWidth]="true"
    [showColumnLines]="true"
    (onContentReady)="onGrnContentReady($event)"
    (onEditorPreparing)="onEditorPreparing($event)"
    (onRowRemoved)="onRowRemoved($event)"
  >
    <dxo-editing
      mode="cell"
      [allowUpdating]="true"
      [allowDeleting]="allowDeleting"
    ></dxo-editing>

    <dxi-column
      caption="SL NO"
      dataField="SL_NO"
      [width]="87"
      [allowEditing]="false"
      alignment="center"
    ></dxi-column>
    <dxi-column
      dataField="ITEM_CODE"
      caption="ITEM CODE"
      [width]="'auto'"
      [allowEditing]="false"
    ></dxi-column>
    <dxi-column
      dataField="DESCRIPTION"
      caption="DESCRIPTION"
      [width]="'auto'"
      [allowEditing]="false"
    ></dxi-column>
    <dxi-column
      *ngIf="
        currency !== currencySymbol && currencySymbol && currencySymbol !== '0'
      "
      dataField="SUPP_PRICE"
      caption="PRICE {{ currencySymbol }}"
      [width]="'auto'"
      [format]="{ type: 'fixedPoint', precision: 2 }"
      [allowEditing]="false"
      alignment="right"
    ></dxi-column>
    <dxi-column
      dataField="PRICE"
      caption="PRICE {{ localCurrencySymbol }}"
      [format]="{ type: 'fixedPoint', precision: 2 }"
      [allowEditing]="false"
      alignment="right"
      [format]="{ type: 'fixedPoint', precision: 2 }"
    ></dxi-column>

    <dxi-column
      dataField="DISC_PERCENT"
      caption="Disc %"
      [format]="{ type: 'fixedPoint', precision: 2 }"
      [allowEditing]="false"
      alignment="right"
      [format]="{ type: 'fixedPoint', precision: 2 }"
    ></dxi-column>

    <dxi-column
      dataField="UNIT_COST"
      caption="UNIT COST"
      [allowEditing]="false"
      alignment="right"
      [format]="{ type: 'fixedPoint', precision: 2 }"
    ></dxi-column>
    <dxi-column
      dataField="PO_QUANTITY"
      caption="QTY IN PO"
      [allowEditing]="false"
    ></dxi-column>
    <dxi-column
      dataField="UOM"
      caption="PURCH UOM"
      [allowEditing]="false"
    ></dxi-column>
    <!-- <dxi-column
      dataField="GRN_QUANTITY"
      [width]="cwidth"
      caption="RECEIVED TO DATE"
      [allowEditing]="false"
      alignment="center"
    ></dxi-column> -->
    <dxi-column
      dataField="QTY_TO_RECEIVE"
      caption="QTY TO RECEIVE"
      [allowEditing]="false"
    ></dxi-column>
    <dxi-column
      dataField="QUANTITY"
      caption="QTY RECEIVED"
      [allowEditing]="true"
      [editorOptions]="{
        showSpinButtons: true,
        min: 0,
        format: '#0',
        mode: 'number',
      }"
    ></dxi-column>
    <!-- <dxi-column
      dataField="QTY_BASE_UNIT"
      caption="QTY IN STOCK UNIT"
      [allowEditing]="false"
    ></dxi-column> -->
    <dxi-column
      *ngIf="
        currency !== currencySymbol && currencySymbol && currencySymbol !== '0'
      "
      dataField="SUPP_AMOUNT"
      caption="AMOUNT {{ currencySymbol }}"
      [allowEditing]="false"
      alignment="right"
      [format]="{ type: 'fixedPoint', precision: 2 }"
    ></dxi-column>
    <dxi-column
      dataField="AMOUNT"
      caption="AMOUNT {{ localCurrencySymbol }}"
      [allowEditing]="false"
      alignment="right"
      [format]="{ type: 'fixedPoint', precision: 2 }"
    ></dxi-column>

    <!-- <dxi-column *ngFor="let col of dynamicColumns" [dataField]="col.dataField" [caption]="col.caption" [allowEditing]="col.allowEditing" [width]="col.width" [alignment]="col.alignment" [format]="{ type: 'fixedPoint', precision: 2 }"></dxi-column> -->

    <dxo-summary>
      <dxi-total-item
        column="AMOUNT"
        summaryType="sum"
        valueFormat="#,##0.00"
        displayFormat="{0}"
        alignment="right"
      >
      </dxi-total-item>
      <dxi-total-item
        column="SUPP_AMOUNT"
        summaryType="sum"
        valueFormat="#,##0.00"
        displayFormat="{0}"
        alignment="right"
      >
      </dxi-total-item>
      <dxi-total-item
        column="QTY_TO_RECEIVE"
        summaryType="sum"
        displayFormat="{0}"
        alignment="right"
      >
      </dxi-total-item>
      <dxi-total-item
        column="QUANTITY"
        summaryType="sum"
        displayFormat="{0}"
        alignment="right"
      >
      </dxi-total-item>
    </dxo-summary>
  </dx-data-grid>
</div>

<dx-popup
  id="CostPopup"
  [(visible)]="isCostPopUpOpened"
  title="Add Cost"
  [height]="300"
  [width]="400"
  (onHiding)="onCloseCostPOpup()"
>
  <dx-select-box
    label="Landed Cost"
    labelMode="floating"
    displayExpr="DESCRIPTION"
    valueExpr="ID"
    [(value)]="costData.ID"
    [dataSource]="landedCostDropDown"
    placeholder="Select Cost"
    [searchEnabled]="true"
    [elementAttr]="{ class: 'grndropdown' }"
    (onValueChanged)="onCostDropdownValueChanged($event)"
  >
  </dx-select-box>

  <dx-text-box
    label="Currency"
    labelMode="floating"
    [(value)]="costData.CURRENCY"
    [readOnly]="true"
    [elementAttr]="{ class: 'grntextbox' }"
  >
  </dx-text-box>

  <dx-text-box
    label="Rate"
    labelMode="floating"
    [(value)]="costData.RATE"
    [elementAttr]="{ class: 'grntextbox' }"
  >
  </dx-text-box>

  <dxi-toolbar-item toolbar="bottom" location="center">
    <div
      class="form-popup-buttons-container"
      [class.flex-buttons]="width <= 360"
    >
      <dx-button
        text="Cancel"
        stylingMode="outlined"
        type="normal"
        (onClick)="onCloseCostPOpup()"
      ></dx-button>
      <dx-button
        text="Save"
        stylingMode="contained"
        (onClick)="saveCost('CostPopup')"
        type="default"
      ></dx-button>
    </div>
  </dxi-toolbar-item>

  <dx-popup></dx-popup
></dx-popup>

<dx-popup
  [(visible)]="isPendingPopupVisible"
  title="Pending PO Items"
  [width]="800"
  [height]="'65vh'"
>
  <dx-data-grid
    [height]="'42vh'"
    [dataSource]="pendingGrnItems"
    [showBorders]="true"
    [columnAutoWidth]="true"
    [showBorders]="true"
    [wordWrapEnabled]="false"
    [rowAlternationEnabled]="true"
    [allowColumnReordering]="true"
    [showColumnHeaders]="true"
    [allowColumnResizing]="true"
    [selection]="{ mode: 'multiple', showCheckBoxesMode: 'always' }"
    [(selectedRowKeys)]="selectedPendingItems"
    keyExpr="PO_DETAIL_ID"
    (onSelectionChanged)="onPendingSelectionChanged($event)"
    (onRowPrepared)="onPendingRowPrepared($event)"
  >
    <dxo-paging [pageSize]="10"></dxo-paging>
    <dxo-pager
      [visible]="true"
      [allowedPageSizes]="allowedPageSizes"
      [displayMode]="displayMode"
      [showPageSizeSelector]="showPageSizeSelector"
      [showInfo]="true"
      [showNavigationButtons]="true"
    ></dxo-pager>
    <dxo-load-panel [showPane]="false"></dxo-load-panel>
    <dxo-scrolling mode="virtual"></dxo-scrolling>

    <dxo-header-filter [visible]="true">
      <dxo-search [enabled]="true"></dxo-search>
    </dxo-header-filter>

    <dxi-column dataField="ITEM_CODE" caption="Item Code"></dxi-column>
    <dxi-column dataField="DESCRIPTION" caption="Description"></dxi-column>
    <dxi-column dataField="UOM" caption="UOM"></dxi-column>
    <dxi-column dataField="PRICE" caption="Price"></dxi-column>
    <dxi-column dataField="PO_QUANTITY" caption="PO Qty"></dxi-column>
    <dxi-column dataField="PENDING_QTY" caption="Pending Qty"></dxi-column>
  </dx-data-grid>

  <dxi-toolbar-item toolbar="bottom" location="after">
    <dx-button
      class="mx-2"
      text="Close"
      (onClick)="isPendingPopupVisible = false"
    ></dx-button>

    <dx-button
      text="Save"
      type="default"
      stylingMode="contained"
      (onClick)="onSavePendingItems()"
    ></dx-button>
  </dxi-toolbar-item>
</dx-popup>
