<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      #dataGrid
      noDataText="No data available"
      [width]="'100%'"
      [height]="'75vh'"
      [loadPanel]="{
        enabled: true,
        text: 'Loading...',
        showIndicator: true,
        showPane: true,
      }"
      class="grid theme-dependent"
      [dataSource]="filteredStockList"
      [showBorders]="true"
      [showColumnLines]="true"
      [showBorders]="true"
      [columnAutoWidth]="false"
      [wordWrapEnabled]="false"
      [rowAlternationEnabled]="true"
      [allowColumnReordering]="true"
      [showColumnHeaders]="true"
      [columnAutoWidth]="true"
      [allowColumnResizing]="true"
      [columnResizingMode]="'nextColumn'"
      [filterRow]="{ visible: false }"
      [headerFilter]="{ visible: false }"
      [scrolling]="{ mode: 'standard' }"
      rowAlternationInterval="2"
      [selection]="{ mode: 'single' }"
      focusStateEnabled="false"
      (onToolbarPreparing)="onToolbarPreparing($event)"
      (onEditingStart)="onEditStock($event)"
      (onRowRemoving)="delete_Data($event)"
    >
      <dxo-editing
        mode="popup"
        [allowUpdating]="canEdit"
        [allowDeleting]="canDelete"
      ></dxo-editing>
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <dxo-load-panel [showPane]="false"></dxo-load-panel>
      <dxo-scrolling mode="standard"></dxo-scrolling>
      <dxo-filter-row
        [visible]="isFilterRowVisible"
        [applyFilter]="auto"
      ></dxo-filter-row>
      <dxo-header-filter [visible]="isFilterOpened">
        <dxo-search [enabled]="true"></dxo-search>
      </dxo-header-filter>
      <dxo-filter-panel [visible]="isFilterOpened"></dxo-filter-panel>
      <dxo-filter-builder [allowHierarchicalFields]="true">
      </dxo-filter-builder>
      <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="font-weight: 600; font-size: 20px; margin-left:  12px"
          >
            Stock Adjustment
          </div>
        </dxi-item>
        <dxi-item location="after" template="dateFilterTemplate"></dxi-item>
        <dxi-item location="after" template="StoreFilterTemplate"></dxi-item>
        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="refreshButtonOptions"
        ></dxi-item>
        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [visible]="canAdd"
          [options]="addButtonOptions"
        ></dxi-item>
      </dxo-toolbar>
      <div *dxTemplate="let data of 'dateFilterTemplate'">
        <dx-select-box
          [dataSource]="dateRanges"
          displayExpr="label"
          valueExpr="value"
          [(value)]="selectedDateRange"
          (onValueChanged)="onDateRangeChanged($event)"
          width="250"
        >
          <div *dxTemplate="let item of 'item'">
            {{ item.value === "custom" ? "Custom" : item.label }}
          </div>
        </dx-select-box>
      </div>
      <div
        *dxTemplate="let data of 'StoreFilterTemplate'"
        style="margin-bottom: 5px"
      >
        <dx-tag-box
          label="Store"
          labelMode="floating"
          displayExpr="DESCRIPTION"
          valueExpr="ID"
          [items]="Store"
          [searchEnabled]="true"
          [(value)]="selectedStoreid"
          [showSelectionControls]="true"
          [showMultiTagOnly]="true"
          [multiline]="false"
          [width]="200"
          (onValueChanged)="onStoreChanged($event)"
        ></dx-tag-box>
      </div>
      <dxi-column
        dataField="ADJ_NO"
        caption="Doc No."
        [allowEditing]="false"
        width="100"
      ></dxi-column>
      <dxi-column
        dataField="ADJ_DATE"
        caption="Doc Date"
        [allowEditing]="false"
        dataType="date"
        format="dd/MM/yyyy"
      >
      </dxi-column>

      <dxi-column
        dataField="STORE_NAME"
        caption=" Store"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="REASON_DESCRIPTION"
        caption="Reason"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="NARRATION"
        caption="Narration"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        caption="Status"
        dataField="TRANS_STATUS"
        [width]="80"
        [cellTemplate]="statusCellRender"
        [allowHeaderFiltering]="true"
        [headerFilter]="{
          dataSource: getStatusFilterData,
          encodeHtml: false,
        }"
      >
      </dxi-column>
      <!-- <dxi-column type="buttons" [buttons]="gridButtons"> </dxi-column> -->
      <dxi-column
        type="buttons"
        caption="Actions"
        [width]="140"
        cellTemplate="actionTemplate"
      >
      </dxi-column>
      <div *dxTemplate="let cellData of 'actionTemplate'">
        <!-- Edit -->
        <i
          *ngIf="canEdit"
          class="dx-icon dx-icon-edit"
          [style.opacity]="
            cellData.data.TRANS_STATUS === 2 || cellData.data.TRANS_STATUS === 5
              ? '0.4'
              : '1'
          "
          [style.pointer-events]="
            cellData.data.TRANS_STATUS === 2 || cellData.data.TRANS_STATUS === 5
              ? 'none'
              : 'auto'
          "
          style="cursor: pointer; margin-right: 10px"
          title="Edit"
          (click)="onEditStock({ data: cellData.data, cancel: false })"
        ></i>

        <!-- Delete -->
        <i
          *ngIf="canDelete"
          class="dx-icon dx-icon-trash"
          [style.opacity]="
            cellData.data.TRANS_STATUS === 2 || cellData.data.TRANS_STATUS === 5
              ? '0.4'
              : '1'
          "
          [style.pointer-events]="
            cellData.data.TRANS_STATUS === 2 || cellData.data.TRANS_STATUS === 5
              ? 'none'
              : 'auto'
          "
          style="cursor: pointer; margin-right: 10px"
          title="Delete"
          (click)="delete_Data({ data: cellData.data, cancel: false })"
        ></i>

        <!-- Verify -->
        <span
          *ngIf="
            (cellData.data.TRANS_STATUS === 2 && canApprove) ||
            (cellData.data.TRANS_STATUS !== 2 && canVerify)
          "
          style="
            position: relative;
            display: inline-block;
            width: 18px;
            height: 18px;
            margin-left: 10px;
            cursor: pointer;
            vertical-align: middle;
          "
          [title]="
            cellData.data.TRANS_STATUS === 5
              ? 'Approved'
              : cellData.data.TRANS_STATUS === 2
                ? 'Approve'
                : 'Verify'
          "
          (click)="onVerifyClick({ row: { data: cellData.data } })"
        >
          <!-- Blue badge -->
          <i
            class="fas fa-certificate"
            [style.color]="
              cellData.data.TRANS_STATUS === 5
                ? '#10B981'
                : cellData.data.TRANS_STATUS === 2
                  ? '#0073D8'
                  : '#FFA500'
            "
            style="font-size: 18px; position: absolute; top: 0; left: 0"
          ></i>

          <!-- White tick -->
          <i
            class="fas fa-check"
            style="
              color: white;
              font-size: 7px;
              position: absolute;
              top: 5px;
              left: 5px;
              pointer-events: none;
            "
          ></i>
        </span>
      </div>
    </dx-data-grid>
  </div>
</div>

<dx-popup
  [(visible)]="showCustomDatePopup"
  [showTitle]="true"
  title="Select Dates"
  [width]="350"
  [height]="250"
  [dragEnabled]="false"
>
  <div>
    <div
      style="display: flex; gap: 15px; align-items: center; margin-bottom: 10px"
    >
      <dx-date-box
        [(value)]="customStartDate"
        type="date"
        width="250"
        displayFormat="dd/MM/yyyy"
        placeholder="From Date"
        label="From Date"
        labelMode="floating"
      >
      </dx-date-box>

      <dx-date-box
        [(value)]="customEndDate"
        type="date"
        width="250"
        displayFormat="dd/MM/yyyy"
        placeholder="To Date"
        label="To Date"
        labelMode="floating"
      >
      </dx-date-box>
    </div>

    <div class="button-container">
      <dx-button
        text="Apply"
        type="default"
        (onClick)="applyCustomDateFilter()"
      ></dx-button>
    </div>
  </div>
</dx-popup>

<dx-popup
  [(visible)]="isAddStock_adj"
  [width]="'75vw'"
  [height]="'85vh'"
  title=" New Stock Adjustment"
  (onHiding)="handleClose()"
>
  <ng-container *ngIf="isAddStock_adj">
    <app-stock-adjustment-add
      (popupClosed)="handleClose()"
    ></app-stock-adjustment-add>
  </ng-container>
</dx-popup>

<dx-popup
  [(visible)]="is_Edit_popup"
  [width]="'90vw'"
  [height]="'85vh'"
  [title]="buttonText"
  (onHiding)="handleClose()"
  titleTemplate="popupTitle"
>
  <div *dxTemplate="let data of 'popupTitle'">
    <div class="popup-title-text">
      {{ buttonText }}
    </div>
  </div>
  <ng-container *ngIf="is_Edit_popup">
    <app-stock-adjustment-edit
      [isEditing]="true"
      [EditingResponseData]="selected_Data"
      (popupClosed)="handleClose()"
      [status]="StatusType"
    ></app-stock-adjustment-edit>
  </ng-container>
</dx-popup>
