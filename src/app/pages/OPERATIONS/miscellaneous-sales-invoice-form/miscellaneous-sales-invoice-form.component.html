<dx-validation-group #journalVoucherGroup>
  <div
    class="invoice-wrapper"
    style="
      height: 85vh;
      display: flex;
      flex-direction: column;

      box-sizing: border-box;
    "
  >
    <div
      class="stacked-toolbar-group"
      style="
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 6px;
        margin-left: 20px;
        margin-right: 20px;
      "
    >
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
          gap: 10px;
        "
      >
        <div style="display: flex; gap: 10px; margin-top: 15px">
          <dx-date-box
            label="Date"
            type="date"
            labelMode="floating"
            [(value)]="invoiceFormData.TRANS_DATE"
            [width]="200"
            [displayFormat]="'dd-MM-yyyy'"
            [readOnly]="true"
          >
          </dx-date-box>
          <dx-text-box
            label="Doc No. *"
            labelMode="floating"
            [readOnly]="true"
            [width]="200"
            [(value)]="invoiceFormData.DOC_NO"
          >
          </dx-text-box>
        </div>
      </div>
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
          gap: 10px;
          width: 100%;
        "
      >
        <div style="display: flex; gap: 10px">
          <dx-text-box
            label="Reference No."
            labelMode="floating"
            [(value)]="invoiceFormData.REF_NO"
            [readOnly]="isReadOnlyMode"
            [width]="410"
          >
          </dx-text-box>
        </div>
        <div style="display: flex; align-items: flex-end; gap: 8px">
          <dx-select-box
            [dataSource]="customerList"
            displayExpr="DESCRIPTION"
            valueExpr="ID"
            [width]="370"
            label="Customer"
            labelMode="floating"
            [(value)]="invoiceFormData.CUSTOMER_ID"
            [readOnly]="isReadOnlyMode"
          >
          </dx-select-box>
          <dx-button
            icon="plus"
            stylingMode="contained"
            type="default"
            [visible]="!isReadOnlyMode"
            hint="Add row"
            (onClick)="addNewRow()"
          >
          </dx-button>
        </div>
      </div>
    </div>
    <div class="salary-grid-wrapper" style="padding: 0 20px">
      <div class="grid-container">
        <dx-data-grid
          #itemsGridRef
          [dataSource]="invoiceFormData.Details"
          [showBorders]="true"
          [showRowLines]="true"
          [showColumnLines]="true"
          [columnAutoWidth]="false"
          [wordWrapEnabled]="false"
          [rowAlternationEnabled]="true"
          [headerFilter]="{ visible: true, allowSearch: true }"
          [allowColumnReordering]="true"
          [showColumnHeaders]="true"
          [columnAutoWidth]="true"
          [allowColumnResizing]="true"
          [height]="'55vh'"
          [width]="'auto'"
          [columnResizingMode]="'nextColumn'"
          [scrolling]="{ mode: 'virtual' }"
          rowAlternationInterval="2"
          [selection]="{ mode: 'single' }"
          [editing]="{
            mode: 'cell',
            allowUpdating: true,
            allowDeleting: !isReadOnlyMode,
            allowAdding: false,

            texts: { addRow: '' },
          }"
          (onRowRemoved)="onRowRemoved()"
          (onEditorPreparing)="onEditorPreparing($event)"
          (onCellValueChanged)="onCellValueChanged($event)"
        >
          <dxo-filter-builder [allowHierarchicalFields]="true">
          </dxo-filter-builder>
          <dxi-column
            dataField="SL_NO"
            caption="Sl No"
            width="80"
            [allowEditing]="false"
          ></dxi-column>
          <dxi-column
            dataField="ledgerCode"
            caption="Ledger Code"
            [editorType]="'dxSelectBox'"
            [allowEditing]="!isReadOnlyMode"
            [lookup]="{
              dataSource: ledgerList,
              valueExpr: 'HEAD_CODE',
              displayExpr: 'HEAD_CODE',
              searchEnabled: true,
            }"
          ></dxi-column>

          <dxi-column
            dataField="ledgerName"
            caption="Ledger Name"
            [editorType]="'dxSelectBox'"
            [allowEditing]="!isReadOnlyMode"
            [lookup]="{
              dataSource: ledgerList,
              valueExpr: 'HEAD_NAME',
              displayExpr: 'HEAD_NAME',
              searchEnabled: true,
            }"
          ></dxi-column>

          <dxi-column
            dataField="particulars"
            caption="Particulars"
            [allowEditing]="!isReadOnlyMode"
            [editorOptions]="{ maxLength: 250 }"
          >
            <dxi-validation-rule
              type="stringLength"
              [max]="250"
              message="Max 250 characters allowed"
            ></dxi-validation-rule>
          </dxi-column>
          <!-- <dxi-column
            dataField="HSN_CODE"
            caption="HSN Code"
            dataType="string"
          ></dxi-column> -->
          <dxi-column
            dataField="Amount"
            caption="Amount"
            [allowEditing]="!isReadOnlyMode"
            dataType="number"
            [format]="{ type: 'fixedPoint', precision: 2 }"
          >
          </dxi-column>
          <dxi-column
            dataField="GST_PERC"
            [allowEditing]="!isReadOnlyMode"
            [caption]="vatTitle + '%'"
            alignment="right"
            [format]="{ type: 'fixedPoint', precision: 0 }"
            [lookup]="{
              dataSource: VatClass,
              valueExpr: 'VALUE',
              displayExpr: 'DESCRIPTION',
            }"
          >
          </dxi-column>
          <dxi-column
            dataField="gstAmount"
            [allowEditing]="!isReadOnlyMode"
            [caption]="vatTitle + ' Amount'"
            dataType="number"
            [format]="{ type: 'fixedPoint', precision: 2 }"
            [calculateCellValue]="calculateGSTAmount"
          >
          </dxi-column>
          <dxi-column
            dataField="TOTAL"
            caption="Total"
            dataType="number"
            [visible]="true"
            [allowEditing]="false"
            [format]="{ type: 'fixedPoint', precision: 2 }"
            [calculateCellValue]="calculateTotal"
          ></dxi-column>
          <dxi-column type="buttons">
            <dxi-button name="delete" width="80"></dxi-button>
          </dxi-column>

          <dxo-summary>
            <dxi-total-item
              column="Amount"
              summaryType="sum"
              valueFormat="#,##0.00"
              displayFormat="Total: {0}"
              alignment="right"
            >
            </dxi-total-item>

            <dxi-total-item
              column="gstAmount"
              summaryType="sum"
              valueFormat="#,##0.00"
              displayFormat="Total: {0}"
              alignment="right"
            >
            </dxi-total-item>
            <dxi-total-item
              column="TOTAL"
              summaryType="sum"
              valueFormat="#,##0.00"
              displayFormat="Total: {0}"
              alignment="right"
            >
            </dxi-total-item>
          </dxo-summary>
        </dx-data-grid>
      </div>
    </div>
    <div class="remarks-container">
      <dx-text-box
        label="Remarks"
        labelMode="floating"
        [(value)]="invoiceFormData.NARRATION"
        [width]="300"
        [readOnly]="isReadOnlyMode"
      ></dx-text-box>
    </div>
    <div class="form-footer-wrapper">
      <div class="right-section">
        <div class="approve-container" *ngIf="canApprove">
          <dx-check-box
            text="Approve"
            [visible]="!isReadOnlyMode"
            [(value)]="invoiceFormData.IS_APPROVED"
          ></dx-check-box>
        </div>
        <dx-button
          text="Cancel"
          stylingMode="outlined"
          type="normal"
          (onClick)="onCancel()"
        ></dx-button>

        <dx-button
          #saveButtonRef
          [text]="
            isSaving
              ? invoiceFormData.IS_APPROVED
                ? 'Committing...'
                : 'Saving...'
              : invoiceFormData.IS_APPROVED
                ? 'Save'
                : 'Save'
          "
          [disabled]="isSaving"
          (onClick)="saveInvoice()"
          stylingMode="contained"
          type="default"
        ></dx-button>

        <!-- <dx-button
              #saveButtonRef
              [text]="invoiceFormData.IS_APPROVED ? 'Commit' : 'Save'"
              (onClick)="saveInvoice()"
              stylingMode="contained"
              type="default"
            ></dx-button> -->
      </div>
    </div>
  </div>
</dx-validation-group>
