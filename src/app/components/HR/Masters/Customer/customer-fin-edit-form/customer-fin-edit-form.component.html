<dx-tab-panel
  class="innert-tab custom-article-tabs"
  [(selectedIndex)]="selectedTabIndex"
  [animationEnabled]="true"
  [deferRendering]="false"
  style="border: none"
>
  <dxi-item title="Details">
    <dx-form class="plain-styled-form" [colCount]="2">
      <dxi-item itemType="group">
        <dxi-item itemType="group" [colCount]="2">
          <dxi-item>
            <div *dxTemplate>
              <dx-text-box
                label="Code *"
                [(value)]="formCustomerData.CUST_CODE"
                labelMode="floating"
                [readOnly]="true"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="Code is required"
                  >
                  </dxi-validation-rule>

                  <dxi-validation-rule
                    type="custom"
                    [validationCallback]="validateCustomerCode"
                    message="Code already exists"
                  ></dxi-validation-rule>

                  <dxi-validation-rule
                    type="pattern"
                    [pattern]="'^[a-zA-Z0-9]+$'"
                    message="Code should be alphanumeric only"
                  ></dxi-validation-rule>
                </dx-validator>
              </dx-text-box>
            </div>
          </dxi-item>
        </dxi-item>

        <dxi-item itemType="group" [colCount]="2">
          <dxi-item>
            <div *dxTemplate>
              <dx-text-box
                label="First Name *"
                [(value)]="formCustomerData.FIRST_NAME"
                labelMode="floating"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="First name is required"
                  >
                  </dxi-validation-rule> </dx-validator
              ></dx-text-box>
            </div>
          </dxi-item>
          <dxi-item>
            <div *dxTemplate>
              <dx-text-box
                label="Last Name *"
                [(value)]="formCustomerData.LAST_NAME"
                labelMode="floating"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="Last name is required"
                  >
                  </dxi-validation-rule>
                </dx-validator>
              </dx-text-box>
            </div>
          </dxi-item>
        </dxi-item>

        <dxi-item itemType="group" [colCount]="1">
          <dxi-item>
            <div *dxTemplate>
              <dx-text-box
                label="Contact Name *"
                [(value)]="formCustomerData.CONTACT_NAME"
                labelMode="floating"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="Contact name is required"
                  >
                  </dxi-validation-rule>

                  <dxi-validation-rule
                    type="custom"
                    [validationCallback]="validateCustomername"
                    message="Contactname already exists"
                  ></dxi-validation-rule>
                </dx-validator>
              </dx-text-box>
            </div>
          </dxi-item>
        </dxi-item>

        <dxi-item itemType="group" [colCount]="1">
          <dxi-item>
            <div *dxTemplate>
              <dx-text-box
                label="Address *"
                [(value)]="formCustomerData.ADDRESS1"
                labelMode="floating"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="Address is required"
                  >
                  </dxi-validation-rule>
                </dx-validator>
              </dx-text-box>
            </div>
          </dxi-item>

          <dxi-item>
            <div *dxTemplate>
              <dx-text-box
                [(value)]="formCustomerData.ADDRESS2"
                labelMode="floating"
                label="Address"
                style="margin-top: 10px"
              >
              </dx-text-box>
            </div>
          </dxi-item>

          <dxi-item>
            <div *dxTemplate>
              <dx-text-box
                [(value)]="formCustomerData.ADDRESS3"
                labelMode="floating"
                label="Address"
                style="margin-top: 10px"
              ></dx-text-box>
            </div>
          </dxi-item>
        </dxi-item>

        <dxi-item itemType="group" [colCount]="2">
          <dxi-item>
            <div *dxTemplate>
              <dx-select-box
                label="Country *"
                [items]="CountryDropdownData"
                displayExpr="DESCRIPTION"
                valueExpr="ID"
                [(value)]="formCustomerData.COUNTRY_ID"
                placeholder="Select Country"
                (onValueChanged)="onCountrySelectionChanged($event)"
                [searchEnabled]="true"
                labelMode="floating"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="Country is required"
                  >
                  </dxi-validation-rule>
                </dx-validator>
              </dx-select-box>
            </div>
          </dxi-item>
          <dxi-item>
            <div *dxTemplate>
              <dx-select-box
                label="State *"
                labelMode="floating"
                displayExpr="DESCRIPTION"
                [items]="StateDropdownData"
                valueExpr="ID"
                (onValueChanged)="onStateSelectionChanged($event)"
                [(value)]="formCustomerData.STATE_ID"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="State is required"
                  >
                  </dxi-validation-rule> </dx-validator
              ></dx-select-box>
            </div>
          </dxi-item>
        </dxi-item>

        <dxi-item itemType="group" [colCount]="2">
          <dxi-item>
            <div *dxTemplate>
              <dx-text-box
                label="City *"
                [(value)]="formCustomerData.CITY"
                labelMode="floating"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="City is required"
                  >
                  </dxi-validation-rule>
                </dx-validator>
              </dx-text-box>
            </div>
          </dxi-item>

          <dxi-item>
            <div *dxTemplate>
              <dx-text-box
                label="Zip Code *"
                [(value)]="formCustomerData.ZIP"
                labelMode="floating"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="ZIP is required"
                  >
                  </dxi-validation-rule>
                </dx-validator>
              </dx-text-box>
            </div>
          </dxi-item>
        </dxi-item>

        <dxi-item itemType="group" [colCount]="1">
          <dxi-item>
            <div *dxTemplate style="display: flex">
              <dx-select-box
                label="Country code *"
                [searchEnabled]="true"
                labelMode="floating"
                [(value)]="countryCode"
                [items]="countryCodes"
                valueExpr="CODE"
                [displayExpr]="countryDisplay"
                placeholder="+1"
                [dropDownOptions]="{ width: '370px' }"
                hint="Country Code"
                (onValueChanged)="onCountrycodeChange($event)"
              >
                <div *dxTemplate="let data of 'item'">
                  <img
                    [src]="data.FLAG_URL"
                    width="20"
                    style="margin-right: 8px"
                  />
                  {{ data.CODE }} {{ data.COUNTRY_NAME }}
                </div>
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="Country code is required"
                  ></dxi-validation-rule>
                </dx-validator>
              </dx-select-box>
              <dx-text-box
                label="Mobile *"
                class="phone-style"
                [(value)]="formCustomerData.MOBILE_NO"
                labelMode="floating"
                (keypress)="keyPressNumbers($event)"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="Mobile number is required"
                  >
                  </dxi-validation-rule>
                  <dxi-validation-rule
                    type="custom"
                    [validationCallback]="validateMobileLength"
                    [message]="
                      'Mobile no. must be  ' + mobile_limit + ' digits long'
                    "
                  ></dxi-validation-rule>
                </dx-validator>
              </dx-text-box>
            </div>
          </dxi-item>

          <dxi-item>
            <div *dxTemplate style="display: flex">
              <dx-select-box
                label="Country code *"
                [searchEnabled]="true"
                labelMode="floating"
                [(value)]="PhonenumberCode"
                [items]="countryCodes"
                valueExpr="CODE"
                [displayExpr]="countryDisplay"
                placeholder="+1"
                [dropDownOptions]="{ width: '370px' }"
                hint="Country Code"
                (onValueChanged)="onCountrycodeChangePhoneNocode($event)"
              >
                <div *dxTemplate="let data of 'item'">
                  <img
                    [src]="data.FLAG_URL"
                    width="20"
                    style="margin-right: 8px"
                  />
                  {{ data.CODE }} {{ data.COUNTRY_NAME }}
                </div>
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="Country code is required"
                  ></dxi-validation-rule>
                </dx-validator>
              </dx-select-box>
              <dx-text-box
                label="Phone *"
                class="phone-style"
                [(value)]="formCustomerData.PHONE"
                labelMode="floating"
                (keypress)="keyPressNumbers($event)"
                (onValueChanged)="onCountrycodeChangeDeliveryAddress($event)"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="Phone number is required"
                  >
                  </dxi-validation-rule>
                  <dxi-validation-rule
                    type="custom"
                    [validationCallback]="validatePhoneLength"
                    [message]="
                      'Phone no. must be  ' + Phone_limit + ' digits long'
                    "
                  ></dxi-validation-rule>
                </dx-validator>
              </dx-text-box>
            </div>
          </dxi-item>
        </dxi-item>

        <dxi-item itemType="group" [colCount]="2">
          <dxi-item>
            <div *dxTemplate>
              <dx-text-box
                label="Fax "
                [(value)]="formCustomerData.FAX_NO"
                labelMode="floating"
              >
                <!-- <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="FAX number is required"
                  >
                  </dxi-validation-rule>
                </dx-validator> -->
              </dx-text-box>
            </div>
          </dxi-item>
          <dxi-item>
            <div *dxTemplate>
              <dx-text-box
                label="Email"
                [(value)]="formCustomerData.EMAIL"
                labelMode="floating"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="custom"
                    [validationCallback]="validateEmail"
                    message="Enter a valid email address"
                  >
                  </dxi-validation-rule>
                </dx-validator>
              </dx-text-box>
            </div>
          </dxi-item>
        </dxi-item>
      </dxi-item>

      <dxi-item itemType="group">
        <dxi-item [colSpan]="2">
          <div *dxTemplate>
            <dx-select-box
              label="Customer Type"
              [items]="Customer_type_list"
              displayExpr="DESCRIPTION"
              valueExpr="ID"
              [(value)]="formCustomerData.CUSTOMER_TYPE"
              placeholder="Select customer type"
              labelMode="floating"
              (onValueChanged)="onDealerSelected($event)"
            ></dx-select-box>
            <!-- <dx-check-box
              [(value)]="IS_COMPANY_BRANCH_VALUE"
              text="Company Branch"
              stylingMode="outlined"
              hint="Company Branch"
              labelMode="floating"
            ></dx-check-box> -->
            <!-- <dx-radio-group
              [(value)]="formCustomerData.CUST_TYPE"
              [items]="dealerTypeOptions"
              layout="horizontal"
              displayExpr="text"
              valueExpr="value"
              label="Customer Category"
              labelMode="floating"
              (onValueChanged)="onDealerTypeChange($event)"
            ></dx-radio-group> -->
          </div>
        </dxi-item>

        <dxi-item *ngIf="formCustomerData.CUST_TYPE === 2" [colSpan]="2">
          <div *dxTemplate>
            <dx-select-box
              label="Parent Dealer"
              [items]="dealerList"
              displayExpr="DESCRIPTION"
              valueExpr="ID"
              [(value)]="formCustomerData.DEALER_ID"
              placeholder="Select Parent Dealer"
              labelMode="floating"
              (onValueChanged)="onDealerSelected($event)"
            >
            </dx-select-box>
          </div>
        </dxi-item>

        <!-- <dxi-item itemType="group" [colCount]="2">
      <dxi-item>
        <div *dxTemplate>
          <dx-select-box
            label="Warehouse"
            (onValueChanged)="onWarehouseValue($event)"
                  [items]="Warehouse"
                  [(value)]="formCustomerData.WAREHOUSE_ID"
                  labelMode="floating"
                  [searchEnabled]="true"
                  valueExpr="ID"
                  displayExpr="DESCRIPTION"
          >
            <dx-validator>
              <dxi-validation-rule type="required" message="ZIP is required">
              </dxi-validation-rule>
            </dx-validator>
          </dx-select-box>
        </div>
      </dxi-item>
    </dxi-item> -->

        <dxi-item itemType="group" [colCount]="2">
          <dxi-item>
            <div *dxTemplate>
              <dx-number-box
                label="Credit Limit *"
                labelMode="floating"
                [(value)]="formCustomerData.CREDIT_LIMIT"
                [min]="0"
                [showSpinButtons]="true"
                format="#0.00"
              >
                <!-- <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="Credit limit is required"
                  ></dxi-validation-rule>

                  <dxi-validation-rule
                    type="numeric"
                    message="Only numbers are allowed"
                  ></dxi-validation-rule>
                </dx-validator> -->
              </dx-number-box>
            </div>
          </dxi-item>
          <dxi-item>
            <div *dxTemplate>
              <dx-number-box
                label="Current Credit *"
                [(value)]="formCustomerData.CURRENT_CREDIT"
                labelMode="floating"
                [readOnly]="true"
                format="#0.00"
              >
              </dx-number-box>
            </div>
          </dxi-item>
        </dxi-item>

        <dxi-item itemType="group" [colCount]="1">
          <dxi-item>
            <div *dxTemplate>
              <dx-select-box
                label="Payment Terms *"
                [items]="PaymentTermsDropdownData"
                displayExpr="DESCRIPTION"
                valueExpr="ID"
                [(value)]="formCustomerData.PAY_TERM_ID"
                placeholder="Select Payment Terms"
                labelMode="floating"
              >
                <!-- <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="Payment terms is required"
                  >
                  </dxi-validation-rule>
                </dx-validator> -->
              </dx-select-box>
            </div>
          </dxi-item>
        </dxi-item>
        <dxi-item itemType="group" [colCount]="1">
          <div *dxTemplate>
            <dx-text-area
              label="Additional Info."
              [(value)]="formCustomerData.NOTES"
              labelMode="floating"
            ></dx-text-area>
          </div>
        </dxi-item>
        <dxi-item itemType="group" [colCount]="2">
          <dxi-item>
            <div *dxTemplate>
              <dx-select-box
                label="Default Price Level *"
                [items]="PriceLevelDropdownData"
                displayExpr="DESCRIPTION"
                valueExpr="ID"
                placeholder="Select Price level"
                [(value)]="formCustomerData.PRICE_CLASS_ID"
                labelMode="floating"
              >
                <!-- <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="Select default price level"
                  >
                  </dxi-validation-rule>
                </dx-validator> -->
              </dx-select-box>
            </div>
          </dxi-item>
          <dxi-item>
            <div *dxTemplate>
              <dx-number-box
                label="Discount % *"
                labelMode="floating"
                [(value)]="formCustomerData.DISCOUNT_PERCENT"
                [min]="0"
                [max]="100"
                [step]="0.01"
                format="#0.00"
                [showSpinButtons]="true"
              >
                <!-- <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="Discount percent is required"
                  ></dxi-validation-rule>

                  <dxi-validation-rule
                    type="numeric"
                    message="Only numbers are allowed"
                  ></dxi-validation-rule>

                  <dxi-validation-rule
                    type="range"
                    [min]="0"
                    [max]="100"
                    message="Discount must be between 0 and 100"
                  ></dxi-validation-rule>
                </dx-validator> -->
              </dx-number-box>
            </div>
          </dxi-item>
        </dxi-item>
        <dxi-item itemType="group" [colCount]="1">
          <dxi-item>
            <div *dxTemplate>
              <dx-select-box
                [items]="VATRuleDropdownData"
                displayExpr="DESCRIPTION"
                valueExpr="ID"
                [(value)]="formCustomerData.CUST_VAT_RULE_ID"
                placeholder="Select VAT Rule *"
                labelMode="floating"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="State is required"
                  >
                  </dxi-validation-rule>
                </dx-validator>
              </dx-select-box>
            </div>
          </dxi-item>
        </dxi-item>
        <dxi-item itemType="group" [colCount]="1">
          <dxi-item>
            <div *dxTemplate>
              <dx-text-box
                [label]="'  VAT Registration Number *'"
                [(value)]="formCustomerData.VAT_REGNO"
                labelMode="floating"
              >
                <!-- <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    [message]="' VAT Registration number is required'"
                  >
                    >
                  </dxi-validation-rule>
                </dx-validator> -->
              </dx-text-box>
            </div>
          </dxi-item>
        </dxi-item>
      </dxi-item>

      <div class="form-popup-buttons-container">
        <div class="popup-footer">
          <dx-button
            text="Cancel"
            stylingMode="outlined"
            (onClick)="closePopup()"
            type="normal"
          ></dx-button>
          <dx-button
            text="UpdateS"
            stylingMode="contained"
            type="default"
            (onClick)="UpdateData()"
          ></dx-button>
        </div>
      </div>
    </dx-form>
  </dxi-item>

  <dxi-item title="Delivery Address">
    <div class="address-container">
      <dx-form
        [colCount]="2"
        labelLocation="left"
        stylingMode="outlined"
        class="address-form"
      >
        <dxi-item>
          <dx-text-box
            label="Address"
            labelMode="floating"
            [(value)]="Address1Value"
            stylingMode="outlined"
          >
          </dx-text-box>
        </dxi-item>

        <dxi-item itemType="group" [colCount]="12" [colSpan]="2">
          <dxi-item [colSpan]="2">
            <dx-select-box
              style="width: 100px; margin-right: 15px"
              label="Country Code *"
              [searchEnabled]="true"
              [acceptCustomValue]="false"
              [(value)]="countryCodeDeliveryaddress"
              [items]="countryCodes"
              valueExpr="CODE"
              [displayExpr]="countryDisplay"
              placeholder="+1"
              labelMode="floating"
              [dropDownOptions]="{ width: '370px' }"
              hint="Country Code"
              (onValueChanged)="onCountrycodeChangeDeliveryAddress($event)"
            >
              <div *dxTemplate="let data of 'item'">
                <img
                  [src]="data.FLAG_URL"
                  width="20"
                  style="margin-right: 8px"
                />
                {{ data.CODE }} {{ data.COUNTRY_NAME }}
              </div>
            </dx-select-box>
          </dxi-item>
          <dxi-item [colSpan]="2" class="ms-2">
            <dx-text-box
              #mobileBoxRef
              label="Mobile"
              labelMode="floating"
              [(value)]="MobileValue"
              stylingMode="outlined"
              style="margin-left: 10px; width: 250px"
              mode="tel"
              (onInput)="allowOnlyNumbers($event)"
            >
              <dx-validator>
                <dxi-validation-rule
                  type="custom"
                  [validationCallback]="validateMobileLengthdeliveryaddress"
                  [message]="
                    'Mobile no. must be  ' +
                    mobile_limit_Delivery_Address +
                    ' digits long'
                  "
                ></dxi-validation-rule>
              </dx-validator>
            </dx-text-box>
          </dxi-item>
        </dxi-item>
        <dxi-item>
          <dx-text-box
            label="Location"
            labelMode="floating"
            [(value)]="locationValue"
            stylingMode="outlined"
          ></dx-text-box>
        </dxi-item>

        <dxi-item>
          <dx-text-box
            label="Telephone"
            labelMode="floating"
            [(value)]="phoneValue"
            stylingMode="outlined"
            mode="tel"
            (onInput)="allowOnlyNumbers($event)"
          >
            <dx-validator>
              <dxi-validation-rule
                type="custom"
                [validationCallback]="validateMobileLengthdeliveryaddress"
                [message]="
                  'Mobile no. must be  ' +
                  mobile_limit_Delivery_Address +
                  ' digits long'
                "
              ></dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </dxi-item>
      </dx-form>
      <dxi-item>
        <div class="save-btn">
          <dx-button
            text="Save"
            type="default"
            location="after"
            (onClick)="saveDeliveryAddress()"
          ></dx-button>
        </div>

        <div class="saved-addresses" *ngIf="savedAddresses.length > 0">
          <div class="address-card-container">
            <div
              class="address-card"
              *ngFor="let addr of savedAddresses; let i = index"
            >
              <div
                style="
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                "
              >
                <div>
                  <h6>{{ addr.ADDRESS1 || "Address " + (i + 1) }}</h6>
                </div>
                <div class="card-actions">
                  <dx-button
                    icon="edit"
                    stylingMode="text"
                    hint="Edit"
                    (onClick)="editAddress(i)"
                  ></dx-button>

                  <dx-button
                    icon="trash"
                    stylingMode="text"
                    hint="Delete"
                    (onClick)="removeAddress(i)"
                  ></dx-button>
                </div>
              </div>
              <p><strong>Address:</strong> {{ addr.ADDRESS1 }}</p>
              <p><strong>Mobile:</strong> {{ addr.MOBILE }}</p>
              <p><strong>Location:</strong> {{ addr.LOCATION }}</p>
              <p><strong>Telephone:</strong> {{ addr.PHONE }}</p>
            </div>
          </div>
        </div>
      </dxi-item>
    </div>
  </dxi-item>
</dx-tab-panel>
