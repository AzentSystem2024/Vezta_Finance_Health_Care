<div
  class="pono-date"
  style="display: flex; margin-top: 10px; margin-bottom: 10px"
>
  <dx-text-box
    label="PO NO."
    labelMode="floating"
    placeholder="Enter PO No"
    [(value)]="newPoData.DOC_NO"
    [width]="200"
    [readOnly]="true"
  >
  </dx-text-box>
  <div class="po-date" style="margin-left: 20px">
    <dx-date-box
      label="Date"
      labelMode="floating"
      placeholder="Select Date"
      [width]="200"
      [readOnly]="true"
      [value]="currentDate"
      [(value)]="newPoData.PO_DATE"
      displayFormat="dd-MM-yyyy"
    >
    </dx-date-box>
  </div>
  <div class="po-date" style="margin-left: 20px">
    <dx-text-box
      label="Reference No"
      labelMode="floating"
      [width]="200"
      [(value)]="newPoData.REF_NO"
    >
    </dx-text-box>
  </div>
  <div class="po-date" style="margin-left: 20px">
    <dx-select-box
      label="Supplier"
      labelMode="floating"
      [width]="320"
      placeholder="Select Supplier"
      [items]="SupplierList"
      displayExpr="DESCRIPTION"
      valueExpr="ID"
      [(value)]="newPoData.SUPP_ID"
      [isValid]="isSupplierValid"
      (onValueChanged)="onSupplierChanged($event)"
      [validationMessageMode]="'always'"
      [validationError]="{ message: 'Please select a supplier' }"
      [searchEnabled]="true"
      [readOnly]="true"
    >
    </dx-select-box>
  </div>
  <div class="po-date" style="margin-left: 20px">
    <dx-select-box
      [label]="storeLabel"
      labelMode="floating"
      [width]="320"
      [placeholder]="'Select ' + storeLabel"
      [items]="StoreList"
      displayExpr="DESCRIPTION"
      valueExpr="ID"
      [(value)]="newPoData.STORE_ID"
      [searchEnabled]="true"
      [readOnly]="true"
      (onValueChanged)="getStoreOrCompanyByid()"
    >
    </dx-select-box>
  </div>
</div>
<dx-tabs
  [(selectedIndex)]="selectedTabIndex"
  [dataSource]="tabs"
  (onItemClick)="onTabClick($event)"
  [elementAttr]="{ class: 'po-tabs' }"
  [orientation]="orientations"
  [stylingMode]="stylingMode"
>
</dx-tabs>

<!-- Content based on selected tab -->
<div *ngIf="selectedTabIndex === 0">
  <div class="header-tab-content">
    <!-- Supplier and Shipping Details -->
    <div class="details-container">
      <!-- Supplier Details -->
      <div class="supplier-details">
        <span class="section-title">Supplier Details</span>

        <!-- <dx-text-box
          label="Currency"
          labelMode="floating"
          placeholder="Currency"
          [(value)]="SupplierCurrency"
          [readOnly]="true"
        >
        </dx-text-box>

        <dx-text-box
          label="Exchange Rate"
          labelMode="floating"
          placeholder="Exchange Rate"
          [(value)]="currencyExchangeRate"
          [readOnly]="true"
        >
        </dx-text-box> -->

        <dx-text-box
          label="Tax Rule"
          labelMode="floating"
          placeholder="Tax Rule"
          [(value)]="newPoData.VAT_RULE_NAME"
          [readOnly]="newPoData.VAT_RULE_NAME"
        >
        </dx-text-box>
        <dx-text-box
          label="Contact Person"
          labelMode="floating"
          placeholder="Contact Person"
          [(value)]="newPoData.SUPP_CONTACT"
        >
        </dx-text-box>
        <dx-text-box
          label="Email"
          labelMode="floating"
          placeholder="Email"
          [(value)]="newPoData.SUPPLIER_EMAIL"
        >
        </dx-text-box>
        <div style="display: flex">
          <dx-drop-down-box
            label="Code"
            labelMode="floating"
            [(value)]="supplierCountryCode"
            valueExpr="data.dial_code"
            displayExpr="display"
            [(opened)]="isCountryDropdownOpen"
            [dataSource]="countryCodes"
            [width]="100"
            [dropDownOptions]="{ width: 350 }"
          >
            <div *dxTemplate="let data of 'content'">
              <dx-list
                [dataSource]="countryCodes"
                selectionMode="single"
                [searchEnabled]="true"
                [searchExpr]="['data.name', 'data.dial_code']"
                [focusStateEnabled]="false"
                (onItemClick)="onCountrySelected($event)"
              >
                <div
                  *dxTemplate="let item of 'item'"
                  style="display: flex; align-items: center; gap: 8px"
                >
                  <img
                    [src]="item.flagUrl"
                    width="20"
                    height="14"
                    style="border-radius: 2px"
                  />

                  <span style="min-width: 55px">
                    {{ item.data.dial_code }}
                  </span>

                  <span>
                    {{ item.data.name }}
                  </span>
                </div>
              </dx-list>
            </div>
          </dx-drop-down-box>

          <dx-text-box
            label="Contact No"
            labelMode="floating"
            [(value)]="newPoData.SUPP_MOBILE"
            style="margin-left: 10px"
            valueChangeEvent="input"
            (input)="onSupplierMobileInput($event)"
            (onKeyDown)="preventDialCodeDelete($event)"
          >
            <dx-validator>
              <dxi-validation-rule
                type="required"
                message="Contact number is required"
              ></dxi-validation-rule>

              <dxi-validation-rule
                type="custom"
                [validationCallback]="SupplierMobileValidate"
              ></dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </div>

        <dx-text-box
          class="address-field"
          label="Address"
          labelMode="floating"
          placeholder="Supplier Address"
          [(value)]="newPoData.SUPP_ADDRESS"
        >
        </dx-text-box>
      </div>

      <!-- Shipping Details -->
      <div class="shipping-details">
        <span class="section-title">Shipping Details</span>
        <dx-text-box
          label="Shipping Address"
          labelMode="floating"
          placeholder="Shipping Address"
          [(value)]="newPoData.SHIP_TO"
        >
        </dx-text-box>

        <dx-text-box
          label="Purpose"
          labelMode="floating"
          placeholder="Purpose"
          [(value)]="newPoData.PURPOSE"
        >
        </dx-text-box>

        <dx-text-box
          label="Contact Name"
          labelMode="floating"
          placeholder="Contact Name"
          [(value)]="newPoData.CONTACT_NAME"
        >
        </dx-text-box>

        <div style="display: flex">
          <dx-drop-down-box
            label="Code"
            labelMode="floating"
            [(value)]="shippingCountryCode"
            [(opened)]="isShipCountryDropdownOpen"
            valueExpr="data.dial_code"
            displayExpr="display"
            [dataSource]="countryCodes"
            [width]="120"
            [dropDownOptions]="{ width: 350 }"
          >
            <div *dxTemplate="let data of 'content'">
              <dx-list
                [dataSource]="countryCodes"
                selectionMode="single"
                [searchEnabled]="true"
                [searchExpr]="['data.name', 'data.dial_code']"
                [focusStateEnabled]="false"
                (onItemClick)="onShippingCountrySelected($event)"
              >
                <div
                  *dxTemplate="let item of 'item'"
                  style="display: flex; align-items: center; gap: 8px"
                >
                  <img
                    [src]="item.flagUrl"
                    width="20"
                    height="14"
                    style="border-radius: 2px"
                  />

                  <span style="min-width: 55px">
                    {{ item.data.dial_code }}
                  </span>

                  <span>
                    {{ item.data.name }}
                  </span>
                </div>
              </dx-list>
            </div>
          </dx-drop-down-box>

          <dx-text-box
            width="100%"
            label="Mobile"
            labelMode="floating"
            [(value)]="newPoData.CONTACT_MOBILE"
            style="margin-left: 10px"
            [valueChangeEvent]="'input'"
            (input)="onContactMobileInput($event)"
            (onKeyDown)="preventShipementDialCodeDelete($event)"
          >
            <dx-validator>
              <dxi-validation-rule
                type="required"
                message="Contact number is required"
              >
              </dxi-validation-rule>

              <dxi-validation-rule
                type="custom"
                [validationCallback]="validateContactMobile"
              >
              </dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </div>
      </div>
    </div>
    <div class="termsncondition-container">
      <span class="section-title">Terms&Condition</span>
      <div style="display: flex; margin-bottom: 10px">
        <div class="Shipment-details" style="flex: 1">
          <dx-select-box
            label="Shipment Method"
            labelMode="floating"
            placeholder="Select Shipment Method"
            [items]="deliveryTermsList"
            displayExpr="DESCRIPTION"
            valueExpr="ID"
            [(value)]="newPoData.DELIVERY_TERM_ID"
          >
          </dx-select-box>
          <dx-select-box
            label="Payment"
            labelMode="floating"
            [items]="paymentTermsList"
            displayExpr="DESCRIPTION"
            valueExpr="ID"
            placeholder="Select Payment"
            [(value)]="newPoData.PAY_TERM_ID"
          >
          </dx-select-box>
        </div>
        <div class="Delivery-details" style="flex: 1; margin-left: 30px">
          <dx-date-box
            label="Delivery Date"
            labelMode="floating"
            placeholder="Select Delivery Date"
            [(value)]="newPoData.DELIVERY_DATE"
            displayFormat="dd-MM-yyyy"
          >
          </dx-date-box>
          <dx-text-box
            label="Reference"
            labelMode="floating"
            placeholder="Reference"
            [(value)]="newPoData.DELIVERY_DESC"
          >
          </dx-text-box>
        </div>
      </div>
    </div>
    <dx-text-box
      label="Notes"
      labelMode="floating"
      placeholder="Notes"
      [(value)]="newPoData.NOTES"
    >
    </dx-text-box>
    <dx-text-box
      label="Narration"
      labelMode="floating"
      placeholder="Narration"
      [(value)]="newPoData.NARRATION"
    >
    </dx-text-box>
    <div>
      <dx-select-box
        label="Issued by"
        labelMode="floating"
        placeholder="Issued by"
        [width]="465"
        [items]="employeeList"
        displayExpr="DESCRIPTION"
        valueExpr="ID"
        [(value)]="newPoData.ISSUED_EMP_ID"
      >
      </dx-select-box>
    </div>
  </div>
</div>

<div *ngIf="selectedTabIndex === 1">
  <div
    style="display: flex; justify-content: space-between; margin-bottom: 10px"
  >
    <span class="section-title">Items</span>
    <div class="add-button">
      <dx-button
        icon="plus"
        hint="Add item"
        type="default"
        stylingMode="contained"
        (onClick)="onAddItemClick()"
      ></dx-button>
    </div>
  </div>
  <dx-data-grid
    #itemsGridRef
    [columnAutoWidth]="true"
    [showBorders]="true"
    class="data-grid"
    [dataSource]="savedItems"
    [width]="'85vw'"
    [height]="'50vh'"
    (onRowUpdated)="updateAmount($event)"
    [rowAlternationEnabled]="true"
    [showColumnLines]="true"
    [showRowLines]="true"
    [columnAutoWidth]="true"
    [columnResizingMode]="'widget'"
    (onRowExpanding)="onRowClick($event)"
    (onCellPrepared)="highlightEditableColumns($event)"
    class="custom-data-grid"
    (onContentReady)="onContentReady($event)"
    (onEditorPreparing)="onEditorPreparing($event)"
    (onRowRemoving)="onRowRemoving($event)"
    (onRowRemoved)="onRowRemoved($event)"
  >
    <dxo-editing
      mode="cell"
      [allowUpdating]="true"
      [allowDeleting]="true"
    ></dxo-editing>
    <dxi-column
      caption="Item Id"
      dataField="ITEM_ID"
      width="auto"
      [visible]="false"
    ></dxi-column>
    <dxi-column
      caption="Sl no"
      dataField="slNo"
      width="67"
      [allowEditing]="false"
      alignment="center"
    ></dxi-column>
    <dxi-column
      caption="Item Code"
      dataField="ITEM_CODE"
      width="auto"
      [allowEditing]="false"
    ></dxi-column>
    <dxi-column
      caption="Description"
      dataField="DESCRIPTION"
      width="auto"
      [allowEditing]="false"
    ></dxi-column>
    <dxi-column
      caption="UOM"
      dataField="UOM"
      width="76"
      [allowEditing]="false"
    ></dxi-column>
    <!-- <dxi-column
      caption="Packing"
      dataField="PACKING_NAME"
      width="auto"
      [allowEditing]="false"
    ></dxi-column> -->
    <!-- <dxi-column
      dataField="HSN_CODE"
      caption="HSN Code"
      dataType="string"
    ></dxi-column> -->
    <!-- Conditionally add local currency column -->
    <dxi-column
      [caption]="
        !CurrencySymbol ||
        CurrencySymbol === '0' ||
        CurrencySymbol === menuResponse?.GeneralSettings?.SYMBOL
          ? 'Price'
          : 'Price (' + CurrencySymbol + ')'
      "
      dataField="SUPP_PRICE"
      alignment="right"
      width="100"
      [allowEditing]="true"
      [format]="{ type: 'fixedPoint', precision: 2 }"
      [editorOptions]="{ format: '#0.00' }"
    >
    </dxi-column>

    <dxi-column
      caption="Qty"
      dataField="qtyOrdered"
      alignment="right"
      width="76"
      [allowEditing]="true"
      [editorOptions]="{
        showSpinButtons: true,
        min: 0,
        format: '#0',
        mode: 'number',
      }"
    ></dxi-column>
    <dxi-column
      caption="Amount"
      alignment="right"
      [visible]="false"
      dataField="Amount"
      width="auto"
      [allowEditing]="false"
      [format]="{ type: 'fixedPoint', precision: 2 }"
    ></dxi-column>
    <dxi-column
      caption="Disc%"
      dataField="discountPercentage"
      alignment="right"
      width="auto"
      [allowEditing]="true"
      [editorOptions]="{ format: '#0', mode: 'number' }"
    ></dxi-column>
    <dxi-column
      caption="Disc Amount"
      alignment="right"
      [visible]="false"
      dataField="discountAmount"
      width="auto"
      [allowEditing]="false"
      [format]="{ type: 'fixedPoint', precision: 2 }"
    ></dxi-column>
    <dxi-column
      [caption]="
        !CurrencySymbol ||
        CurrencySymbol === '0' ||
        CurrencySymbol === menuResponse?.GeneralSettings?.SYMBOL
          ? 'Taxable'
          : 'Taxable (' + CurrencySymbol + ')'
      "
      dataField="taxable_Supplier"
      alignment="right"
      width="100"
      [allowEditing]="false"
      [format]="{ type: 'fixedPoint', precision: 2 }"
    >
    </dxi-column>

    <dxi-column
      [caption]="vatTitle + ' (%)'"
      dataField="VAT_PERC"
      alignment="right"
      width="80"
      [allowEditing]="false"
    ></dxi-column>

    <!-- <dxi-column
      caption="IGST %"
      dataField="VAT_PERC"
      alignment="center"
      width="70"
      [allowEditing]="false"
      [visible]="isInterState"
    ></dxi-column>

    <dxi-column
      caption="CGST %"
      dataField="CGST"
      alignment="center"
      width="70"
      [allowEditing]="false"
      [visible]="isIntraState"
    ></dxi-column>

    <dxi-column
      caption="SGST %"
      dataField="SGST"
      alignment="center"
      width="70"
      [allowEditing]="false"
      [visible]="isIntraState"
    ></dxi-column> -->

    <dxi-column
      [caption]="
        !CurrencySymbol ||
        CurrencySymbol === '0' ||
        CurrencySymbol === menuResponse?.GeneralSettings?.SYMBOL
          ? 'Tax Amt'
          : 'Tax Amt (' + CurrencySymbol + ')'
      "
      alignment="right"
      dataField="vatAmount"
      width="100"
      [allowEditing]="false"
      [format]="{ type: 'fixedPoint', precision: 2 }"
    ></dxi-column>
    <dxi-column
      [caption]="
        !CurrencySymbol ||
        CurrencySymbol === '0' ||
        CurrencySymbol === menuResponse?.GeneralSettings?.SYMBOL
          ? 'Total'
          : 'Total (' + CurrencySymbol + ')'
      "
      dataField="total"
      alignment="right"
      width="100"
      [allowEditing]="false"
      [format]="{ type: 'fixedPoint', precision: 2 }"
    ></dxi-column>

    <dxi-column type="buttons" width="70">
      <dxi-button name="delete"></dxi-button>
    </dxi-column>

    <dxo-summary>
      <dxi-total-item column="ITEM_CODE" displayFormat="Total"></dxi-total-item>

      <dxi-total-item column="qtyOrdered" summaryType="sum" displayFormat="{0}">
      </dxi-total-item>

      <dxi-total-item
        column="taxable_Supplier"
        summaryType="sum"
        displayFormat="{0}"
        [valueFormat]="{ type: 'fixedPoint', precision: 2 }"
      >
        <!-- <dxo-format [precision]="2" type="fixedPoint"></dxo-format> -->
      </dxi-total-item>

      <dxi-total-item
        column="taxable"
        summaryType="sum"
        displayFormat="{0}"
        [valueFormat]="{ type: 'fixedPoint', precision: 2 }"
      >
        <!-- <dxo-format [precision]="2" type="fixedPoint"></dxo-format> -->
      </dxi-total-item>

      <dxi-total-item
        column="vatAmount"
        summaryType="sum"
        displayFormat="{0}"
        [valueFormat]="{ type: 'fixedPoint', precision: 2 }"
      >
        <!-- <dxo-format [precision]="2" type="fixedPoint"></dxo-format> -->
      </dxi-total-item>

      <dxi-total-item
        column="total_Supplier"
        summaryType="sum"
        displayFormat="{0}"
        [valueFormat]="{ type: 'fixedPoint', precision: 2 }"
      >
        <!-- <dxo-format [precision]="2" type="fixedPoint"></dxo-format> -->
      </dxi-total-item>

      <dxi-total-item
        column="total"
        summaryType="sum"
        [customizeText]="formatTotalAmount"
        displayFormat="{0}"
        [valueFormat]="{ type: 'fixedPoint', precision: 2 }"
      >
      </dxi-total-item>
    </dxo-summary>

    <dxo-master-detail
      [enabled]="true"
      template="masterDetail"
    ></dxo-master-detail>

    <div *dxTemplate="let detailData of 'masterDetail'">
      <div *ngIf="detailData?.data">
        <span class="po-title"
          >Last 5 Purchase Orders for {{ detailData.data.ITEM_CODE }}</span
        >
        <dx-data-grid
          [columnAutoWidth]="true"
          [showBorders]="true"
          [dataSource]="purchaseOrders"
          [width]="750"
        >
          <dxi-column dataField="PO_NO" caption="PO No"></dxi-column>
          <dxi-column
            dataField="PO_DATE"
            caption="Date"
            dataType="date"
            [allowEditing]="false"
            format="dd-MM-yyyy"
          ></dxi-column>
          <dxi-column dataField="QUANTITY" caption="Quantity"></dxi-column>
          <dxi-column
            dataField="PRICE"
            caption="Price"
            [format]="{ type: 'fixedPoint', precision: 2 }"
          ></dxi-column>
          <dxi-column dataField="CURRENCY_NAME" caption="Currency"></dxi-column>
        </dx-data-grid>
      </div>
    </div>
  </dx-data-grid>
  <!-- Bottom Section for Total Quantity and Total (Excluding VAT) -->

  <!-- Add Item Popup -->
  <dx-popup
    [(visible)]="showAddItemPopup"
    [width]="'90vw'"
    [height]="600"
    [showTitle]="true"
    [title]="'Add Item'"
    [closeOnOutsideClick]="true"
    (onHiding)="onPopupClosing()"
  >
    <div *dxTemplate="let data of 'content'">
      <dx-data-grid
        #supplierItemsGrid
        [columnAutoWidth]="true"
        [showBorders]="true"
        [height]="'60vh'"
        [dataSource]="supplierItems"
        [selection]="{ mode: 'multiple', showCheckBoxesMode: 'always' }"
        [selectedRowKeys]="selectedRowKeys"
        [keyExpr]="'ITEM_CODE'"
        (onSelectionChanged)="onSelectionChanged($event)"
        (onRowPrepared)="onSupplierRowPrepared($event)"
      >
        <dxo-paging [pageSize]="10"></dxo-paging>
        <dxo-pager
          [visible]="true"
          [allowedPageSizes]="allowedPageSizes"
          [displayMode]="displayMode"
          [showPageSizeSelector]="showPageSizeSelector"
          [showInfo]="true"
          [showNavigationButtons]="true"
        ></dxo-pager>
        <dxo-load-panel [showPane]="false"></dxo-load-panel>
        <dxo-scrolling mode="virtual"></dxo-scrolling>
        <dxo-filter-row
          [visible]="isFilterRowVisible"
          [applyFilter]="auto"
        ></dxo-filter-row>
        <dxo-header-filter [visible]="isFilterOpened">
          <dxo-search [enabled]="true"></dxo-search>
        </dxo-header-filter>
        <dxo-filter-panel [visible]="isFilterOpened"></dxo-filter-panel>
        <dxo-filter-builder [allowHierarchicalFields]="true">
        </dxo-filter-builder>
        <dxo-toolbar>
          <dxi-item
            location="after"
            locateInMenu="auto"
            widget="dxButton"
            [options]="searchButtonOptions"
          ></dxi-item>
        </dxo-toolbar>

        <dxi-column dataField="ITEM_CODE" caption="Item Code"></dxi-column>
        <dxi-column dataField="DESCRIPTION" caption="Description"></dxi-column>
        <dxi-column dataField="UOM" caption="UOM"></dxi-column>
        <dxi-column
          dataField="PURCH_PRICE"
          caption="Price"
          [format]="{ type: 'fixedPoint', precision: 2 }"
        ></dxi-column>
      </dx-data-grid>
      <div class="form-popup-buttons-container">
        <dx-button
          text="Cancel"
          stylingMode="outlined"
          type="normal"
          (onClick)="onCancelNewData()"
        ></dx-button>
        <dx-button
          text="Save"
          stylingMode="contained"
          type="default"
          (onClick)="saveSelectedData()"
        ></dx-button>
      </div>
    </div>
  </dx-popup>
</div>

<div *ngIf="selectedTabIndex === 2">
  <!-- Add button to open the popup for file details input -->
  <div style="display: flex; justify-content: flex-end; margin-bottom: 10px">
    <div class="add-button">
      <dx-button
        icon="add"
        hint="add a file"
        type="default"
        stylingMode="contained"
        (onClick)="showPopup = true"
      ></dx-button>
    </div>
  </div>
  <!-- DataGrid to display uploaded files -->
  <dx-data-grid
    [dataSource]="uploadedFiles"
    [showBorders]="true"
    [height]="'50vh'"
    [showBorders]="true"
    [showColumnLines]="true"
    [showBorders]="true"
    [columnAutoWidth]="false"
    [wordWrapEnabled]="false"
    [rowAlternationEnabled]="true"
    [allowColumnReordering]="true"
    [showColumnHeaders]="true"
    [columnAutoWidth]="true"
    [allowColumnResizing]="true"
    [columnResizingMode]="'nextColumn'"
    class="file-data-grid"
  >
    <dxo-editing
      mode="cell"
      [allowUpdating]="true"
      [allowDeleting]="true"
    ></dxo-editing>

    <dxi-column
      dataField="FILE_NAME"
      caption="File Name"
      [allowEditing]="false"
      [cellTemplate]="'fileNameTemplate'"
      [width]="380"
    ></dxi-column>
    <!-- <div *dxTemplate="let cell of 'fileNameTemplate'">
        <a [href]="cell.data.fileUrl" target="_blank" rel="noopener noreferrer">{{ cell.data.fileName }}</a>cellTemplate="fileNameTemplate"
      </div> -->
    <dxi-column
      dataField="REMARKS"
      caption="Remarks"
      [allowEditing]="false"
    ></dxi-column>

    <!-- File Name Cell Template -->
    <div *dxTemplate="let data of 'fileNameTemplate'">
      <a
        href="javascript:void(0);"
        (click)="openFile(data.data.FILE_DATA, data.data.FILE_NAME)"
      >
        {{ data.data.FILE_NAME }}
      </a>
    </div>
  </dx-data-grid>

  <!-- Popup for adding file details -->
  <dx-popup
    [(visible)]="showPopup"
    [width]="500"
    [height]="350"
    title="Add File Details"
    [showCloseButton]="true"
  >
    <div class="popup-content">
      <!-- File upload input with label -->
      <div class="file-upload-container">
        <label for="file-upload" class="file-upload-label"
          >Upload a File:</label
        >
        <label for="file-upload">
          <dx-button icon="upload" text="Select File"></dx-button>
        </label>
        <input
          id="file-upload"
          type="file"
          (change)="onFileSelected($event)"
          accept="image/*,application/pdf"
          class="file-input"
        />
        <span *ngIf="uploadedFileName" class="file-name-display">{{
          uploadedFileName
        }}</span>
      </div>

      <!-- Remarks textbox -->
      <div class="remarks-container">
        <dx-text-box
          [(value)]="fileDetails.remarks"
          placeholder="Enter Remarks"
        ></dx-text-box>
      </div>

      <!-- Save and Cancel buttons -->
      <div class="form-popup-buttons-container">
        <dx-button
          text="Cancel"
          stylingMode="outlined"
          type="normal"
          (onClick)="showPopup = false"
        ></dx-button>
        <dx-button
          text="Save"
          stylingMode="contained"
          type="default"
          (onClick)="saveFileDetails()"
        ></dx-button>
      </div>
    </div>
  </dx-popup>
</div>

<div *ngIf="selectedTabIndex === 3">
  <div class="history-grid-container">
    <dx-data-grid
      [showBorders]="true"
      [columnAutoWidth]="true"
      [dataSource]="poHistoryList"
      height="60vh"
      [showBorders]="true"
      [showColumnLines]="true"
      [showBorders]="true"
      [columnAutoWidth]="false"
      [wordWrapEnabled]="false"
      [rowAlternationEnabled]="true"
      [allowColumnReordering]="true"
      [showColumnHeaders]="true"
      [columnAutoWidth]="true"
      [allowColumnResizing]="true"
      [columnResizingMode]="'nextColumn'"
    >
      <!-- <dxo-pager
      [visible]="true"
      [allowedPageSizes]="allowedPageSizes"
      [displayMode]="displayMode"
      [showPageSizeSelector]="showPageSizeSelector"
      [showInfo]="true"
      [showNavigationButtons]="true"
    ></dxo-pager> -->
      <dxi-column
        dataField="slNo"
        caption="Sl No"
        alignment="center"
      ></dxi-column>
      <dxi-column
        dataField="TIME"
        [calculateCellValue]="formatDateTime"
        caption="Date & Time"
      ></dxi-column>
      <dxi-column dataField="DESCRIPTION" caption="Description"></dxi-column>
      <dxi-column dataField="USER_NAME" caption="User"></dxi-column>
    </dx-data-grid>
  </div>
</div>
