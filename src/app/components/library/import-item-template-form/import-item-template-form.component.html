<dx-form class="plain-styled-form" [colCount]="1">
  
    
  <dxi-item itemType="group" >
     
      <dxi-item itemType="group" [colCount]="1">
      <dxi-item>
        <div *dxTemplate>
          <dx-text-box
            label="Template Name"
            [(value)]="formModel.TEMPLATE_NAME"
            labelMode="floating"
          >
          <dx-validator>
          <dxi-validation-rule
            type="required"
            message="Template Name is required"
          ></dxi-validation-rule>
          <dxi-validation-rule
            type="pattern"
            [pattern]="'^[a-zA-Z0-9]+$'"
            message="Only alphanumeric characters are allowed"
          ></dxi-validation-rule>
          <dxi-validation-rule
            type="custom"
            [validationCallback]="validateTemplateNameExists.bind(this)"
            message="Template Name already exists"
          ></dxi-validation-rule>
          </dx-validator>
        </dx-text-box>
        </div>
        </dxi-item>
        <dxi-item>
          <div *dxTemplate>
            <dx-text-box
              class="mt-2 mb-2"
              label="Remarks"
              [(value)]="formModel.REMARKS"
              labelMode="floating"
            >
          </dx-text-box>
          </div>
          </dxi-item>
          
          <dxi-item>
              <div *dxTemplate>
                <dx-data-grid
                class="grid theme-dependent"
                [dataSource]="TemplateColumnsData"
                [columnAutoWidth]="true"
                height="400"
                keyExpr="ID"
                [showBorders]="false"
                [(selectedRowKeys)]="selectedRows"
                (onSelectionChanged)="onSelectionChanged($event)" 
                >
                <dxo-row-dragging
                [allowReordering]="true"
                [showDragIcons]="true"
                [onReorder]="onReorder"
                ></dxo-row-dragging>
                <dxo-scrolling mode="infinite"></dxo-scrolling>
                <dxo-selection mode="multiple"> </dxo-selection>
                <dxi-column dataField="COLUMN_TITLE"  caption="Columns"></dxi-column>
                </dx-data-grid>
              </div>
            </dxi-item>
      </dxi-item>
  </dxi-item>
</dx-form>
