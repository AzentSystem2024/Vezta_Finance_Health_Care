<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      class="grid theme-dependent"
      [dataSource]="Ar_Report_DataSource"
      width="100%"
      height="82vh"
      [showBorders]="true"
      [showRowLines]="true"
      [allowColumnResizing]="false"
      [showColumnLines]="true"
      [columnAutoWidth]="true"
      [groupPanel]="{ visible: true }"
      [grouping]="{ autoExpandAll: false }"
      [rowAlternationEnabled]="true"
      rowAlternationInterval="2"
      [allowColumnReordering]="true"
      [filterRow]="{ visible: false }"
      id="dataGrid"
      [scrolling]="{ mode: 'virtual' }"
      [export]="{ enabled: true, formats: ['xlsx', 'pdf'] }"
      [columnFixing]="{
        enabled: true,
        texts: { fix: 'Freeze', unfix: 'Unfreeze' },
      }"
      (onExporting)="onExporting($event)"
      [loadPanel]="{ enabled: true, text: 'Loading...' }"
    >
      <ng-container *ngFor="let column of columnsConfig">
        <dxi-column
          *ngIf="column.isBand"
          [caption]="column.caption"
          [isBand]="true"
        >
          <dxi-column
            *ngFor="let subColumn of column.columns"
            [dataField]="subColumn.dataField"
            [caption]="subColumn.caption"
            [format]="subColumn.format"
            [visible]="subColumn.visible"
            [width]="150"
          ></dxi-column>
        </dxi-column>

        <dxi-column
          *ngIf="!column.isBand"
          [dataField]="column.dataField"
          [caption]="column.caption"
          [format]="column.format"
          [visible]="column.visible"
          [width]="150"
        ></dxi-column>
      </ng-container>

      <dxo-summary
        [totalItems]="summaryColumnsData?.totalItems"
        [groupItems]="summaryColumnsData?.groupItems"
      >
      </dxo-summary>

      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-export [enabled]="true" [formats]="['xlsx']"> </dxo-export>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="true"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <dxo-header-filter
        [visible]="true"
        [allowSearch]="true"
        [allowSelectAll]="true"
        [search]="{ enabled: true, mode: 'contains' }"
      >
      </dxo-header-filter>
      <dxo-filter-row [visible]="true" [applyFilter]="'auto'"></dxo-filter-row>

      <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="
              font-weight: 600;
              font-size: 20px;
              margin-left: 12px;
              padding: -3px;
              margin-right: 3px;
            "
          >
            Receivable Report
          </div>
        </dxi-item>

        <dxi-item>
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="Year"
            [width]="100"
            [(value)]="selectedYear"
            [dataSource]="years"
            (onValueChanged)="onYearChanged($event)"
            placeholder="Year"
          ></dx-select-box>
        </dxi-item>

        <dxi-item>
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="month"
            [dataSource]="monthDataSource"
            displayExpr="name"
            valueExpr="value"
            [(value)]="selectedmonth"
            width="120"
            (onValueChanged)="onMonthValueChanged($event)"
            [dropDownOptions]="{ width: 'auto' }"
          >
          </dx-select-box>
        </dxi-item>

        <dxi-item>
          <dx-date-box
            [width]="120"
            label="Date From"
            labelMode="floating"
            [displayFormat]="'dd-MM-yyyy'"
            [value]="formatted_from_date"
            (onValueChanged)="onFromDateChange($event)"
          ></dx-date-box>
        </dxi-item>
        <dxi-item>
          <dx-date-box
            [width]="120"
            label="Date To"
            labelMode="floating"
            [displayFormat]="'dd-MM-yyyy'"
            [value]="formatted_To_date"
            (onValueChanged)="onToDateChange($event)"
          >
          </dx-date-box>
        </dxi-item>

        <dxi-item>
          <dx-button
            class="mt-2"
            text="Apply"
            type="default"
            icon="todo"
            stylingMode="contained"
            (onClick)="get_Datagrid_DataSource()"
          >
          </dx-button>
        </dxi-item>

        <dxi-item name="exportButton"></dxi-item>
      </dxo-toolbar>
    </dx-data-grid>
  </div>
</div>
