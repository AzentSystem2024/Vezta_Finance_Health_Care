<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      #dataGrid
      noDataText="No data available"
      [width]="'100%'"
      [height]="'82vh'"
      [loadPanel]="{
        enabled: true,
        text: 'Loading...',
        showIndicator: true,
        showPane: true,
      }"
      class="grid theme-dependent"
      [dataSource]="EmployeeSalarySettingsDatasource"
      [showBorders]="true"
      [showColumnLines]="true"
      [columnAutoWidth]="false"
      [wordWrapEnabled]="false"
      [rowAlternationEnabled]="true"
      [allowColumnReordering]="true"
      [showColumnHeaders]="true"
      [columnAutoWidth]="true"
      [allowColumnResizing]="true"
      [columnResizingMode]="'nextColumn'"
      [headerFilter]="{ visible: true, allowSearch: true }"
      [scrolling]="{ mode: 'virtual' }"
      rowAlternationInterval="2"
      [selection]="{ mode: 'single' }"
      focusStateEnabled="false"
      [groupPanel]="{ visible: true }"
      [grouping]="{ autoExpandAll: false }"
      (onEditingStart)="onEditEmployee($event)"
      (onRowRemoving)="DeleteEmployeeSalarySettings($event)"
    >
      <dxo-editing
        mode="popup"
        [allowUpdating]="canEdit"
        [allowDeleting]="canDelete"
      ></dxo-editing>

      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-pager
        [visible]="true"
        [displayMode]="displayMode"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <dxo-load-panel [showPane]="false"></dxo-load-panel>
      <dxo-scrolling mode="standard"></dxo-scrolling>
      <dxo-toolbar>
        <!-- TITLE -->
        <dxi-item location="before" text="Employee Salary Settings"> </dxi-item>

        <!-- FILTER SELECT BOX (STABLE) -->
        <dxi-item
          location="after"
          locateInMenu="never"
          widget="dxSelectBox"
          [options]="filterSelectBoxOptions"
        >
        </dxi-item>

        <!-- SEARCH BUTTON -->
        <dxi-item
          location="after"
          widget="dxButton"
          [options]="searchButtonOptions"
        >
        </dxi-item>

        <!-- REFRESH BUTTON -->
        <dxi-item
          location="after"
          widget="dxButton"
          [options]="refreshButtonOptions"
        >
        </dxi-item>

        <!-- EXPORT -->
        <dxi-item
          name="exportButton"
          location="after"
          cssClass="export-btn"
        ></dxi-item>
        <!-- ADD BUTTON -->
        <dxi-item
          *ngIf="canAdd"
          location="after"
          widget="dxButton"
          [options]="addButtonOptions"
        >
        </dxi-item>
      </dxo-toolbar>
      <dxo-grouping
        [autoExpandAll]="false"
        [contextMenuEnabled]="true"
        [expandMode]="'rowClick'"
      ></dxo-grouping>
      <dxi-column dataField="EMP_CODE" caption="Employee No."></dxi-column>
      <dxi-column dataField="EMP_NAME" caption="Employee Name"></dxi-column>
      <!-- <dxi-column dataField="DESG_NAME" caption="Designation"></dxi-column> -->
      <dxi-column
        dataField="EFFECT_FROM"
        caption="Effect From"
        [format]="{ type: 'custom', formatter: formatMonthYear }"
        dataType="date"
      ></dxi-column>
      <dxi-column
        dataField="SALARY"
        caption="Salary"
        [format]="{ type: 'fixedPoint', precision: 2 }"
      ></dxi-column>
      <!-- <dxi-column dataField="PACKING" caption="Basic Pay"></dxi-column> -->
    </dx-data-grid>

    <dx-popup
      [(visible)]="addEmployeePopupOpened"
      [width]="'60vw'"
      [height]="'100vh'"
      title="Add employee salary settings"
      (onHiding)="handleClose()"
    >
      <app-employee-salary-settings-add
        [isOpen]="addEmployeePopupOpened"
        (formClosed)="handleClose()"
      ></app-employee-salary-settings-add>
    </dx-popup>
  </div>
</div>

<dx-popup
  [(visible)]="editEmployeePopupOpened"
  [width]="'60vw'"
  [height]="'100vh'"
  title="Edit employee salary settings"
>
  <app-employee-salary-settings-edit
    [employeeData]="selectedEmployee"
    [isOpen]="addEmployeePopupOpened"
    (formClosed)="handleEditClose($event)"
  ></app-employee-salary-settings-edit>
</dx-popup>
