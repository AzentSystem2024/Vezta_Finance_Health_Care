<dx-validation-group #journalVoucherGroup>
  <div class="invoice-wrapper">
    <div
      class="stacked-toolbar-group"
      style="
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 6px;
      "
    >
      <!-- Row 1 -->
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
          gap: 10px;
        "
      >
        <div style="display: flex; gap: 4px">
          <dx-text-box
            label="Doc No"
            labelMode="floating"
            [(value)]="productionFormData.VOUCHER_NO"
            [width]="200"
            [readOnly]="true"
          ></dx-text-box>

          <dx-text-box
            label="Reference No"
            labelMode="floating"
            [(value)]="productionFormData.REF_NO"
            [width]="200"
            [readOnly]="true"
          ></dx-text-box>
        </div>

        <dx-date-box
          label="Production Date"
          labelMode="floating"
          [(value)]="productionFormData.PROD_DATE"
          [width]="200"
          type="date"
          displayFormat="dd-MM-yyyy"
          [readOnly]="true"
        ></dx-date-box>
      </div>

      <!-- Row 2 -->
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
          gap: 10px;
        "
      >
        <div style="display: flex; gap: 4px">
          <dx-text-box
            label="Product"
            labelMode="floating"
            [(value)]="productionFormData.DESCRIPTION"
            [width]="405"
            [readOnly]="true"
          ></dx-text-box>
        </div>

        <dx-number-box
          label="Production Qty"
          labelMode="floating"
          [(value)]="productionFormData.PRODUCED_QTY"
          [width]="200"
          [readOnly]="true"
        ></dx-number-box>
      </div>
    </div>
    <div class="salary-grid-wrapper">
      <div class="grid-container">
        <dx-data-grid
          #itemsGridRef
          [dataSource]="items"
          [showBorders]="true"
          [showRowLines]="true"
          [showColumnLines]="true"
          [columnAutoWidth]="false"
          [wordWrapEnabled]="false"
          [rowAlternationEnabled]="true"
          [headerFilter]="{ visible: true, allowSearch: true }"
          [allowColumnReordering]="true"
          [showColumnHeaders]="true"
          [columnAutoWidth]="true"
          [allowColumnResizing]="true"
          [height]="'50vh'"
          [columnResizingMode]="'nextColumn'"
          [scrolling]="{ mode: 'virtual' }"
          rowAlternationInterval="2"
          [selection]="{ mode: 'single' }"
          [keyboardNavigation]="{ editOnKeyPress: true }"
          [editing]="{
            mode: 'cell',
            allowUpdating: false,
            allowDeleting: false,
            allowAdding: false,
            useIcons: false,
          }"
          [loadPanel]="{
            enabled: true,
            text: 'Loading materials...',
            showIndicator: true,
            showPane: true,
          }"
          (onEditorPreparing)="onEditorPreparing($event)"
          (onRowRemoved)="onRowRemoved($event)"
        >
          <dxo-load-panel [showPane]="false"></dxo-load-panel>
          <dxo-filter-builder [allowHierarchicalFields]="true">
          </dxo-filter-builder>

          <dxi-column
            dataField="ITEM_CODE"
            caption="Item Code"
            [width]="130"
          ></dxi-column>

          <dxi-column
            dataField="DESCRIPTION"
            caption="Item Description"
            [width]="200"
          ></dxi-column>

          <dxi-column dataField="UOM" caption="UOM" [width]="80"></dxi-column>

          <dxi-column
            dataField="BOM_QTY"
            caption="BoM Qty"
            dataType="number"
          ></dxi-column>

          <dxi-column
            dataField="REQUIRED_QTY"
            caption="Qty Required"
            dataType="number"
          ></dxi-column>

          <dxi-column
            dataField="USED_QTY"
            caption="Qty Used"
            dataType="number"
          ></dxi-column>

          <dxi-column
            dataField="UNIT_COST"
            caption="Cost"
            dataType="number"
            [format]="{ type: 'fixedPoint', precision: 2 }"
          ></dxi-column>

          <dxi-column
            dataField="TOTAL_COST"
            caption="Amount"
            dataType="number"
            [format]="{ type: 'fixedPoint', precision: 2 }"
          ></dxi-column>

          <dxo-summary>
            <dxi-total-item
              column="TOTAL_COST"
              summaryType="sum"
              valueFormat="#,##0.00"
              displayFormat="Total: {0}"
              alignment="right"
            ></dxi-total-item>
          </dxo-summary>
        </dx-data-grid>

        <!-- Fill Amount Button below grid -->
        <div
          style="display: flex; justify-content: flex-end; margin-top: 5px"
        ></div>
        <div
          class="bordered-grid"
          style="
            margin-top: 10px;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
          "
        >
          <div style="display: flex; gap: 10px; align-items: center">
            <!-- Remark -->
            <dx-text-box
              label="Additional Cost"
              labelMode="floating"
              [(value)]="productionFormData.ADDL_COST"
              style="flex: 2"
              [format]="{ type: 'fixedPoint', precision: 2 }"
              [readOnly]="true"
            ></dx-text-box>

            <!-- Unit Product Cost -->
            <dx-number-box
              label="Cost of production"
              labelMode="floating"
              [(value)]="productionFormData.COST_PRODUCTION"
              style="flex: 1"
              [format]="{ type: 'fixedPoint', precision: 2 }"
              [readOnly]="true"
            ></dx-number-box>
          </div>

          <div style="display: flex; gap: 10px; align-items: center">
            <!-- Remark -->
            <dx-text-box
              label="Remark"
              labelMode="floating"
              [(value)]="productionFormData.REMARKS"
              style="flex: 2"
              [readOnly]="true"
            ></dx-text-box>

            <!-- Unit Product Cost -->
            <div style="flex: 1; display: flex; gap: 6px">
              <dx-number-box
                label="Unit Product Cost"
                labelMode="floating"
                [(value)]="productionFormData.UNIT_COST"
                [format]="{ type: 'fixedPoint', precision: 2 }"
                [readOnly]="true"
                style="flex: 1"
              ></dx-number-box>

              <!-- <dx-number-box
                label="Average(Pair)"
                labelMode="floating"
                [value]="productionFormData.AVERAGE_COST"
                [format]="averageFormat"
                [format]="{ type: 'fixedPoint', precision: 2 }"
                [readOnly]="true"
                style="flex: 1"
              ></dx-number-box> -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</dx-validation-group>

<div class="form-popup-buttons-container">
  <div class="popup-footer">
    <dx-button
      text="Cancel"
      stylingMode="outlined"
      (onClick)="Cancel()"
      type="normal"
    ></dx-button>
  </div>
</div>
