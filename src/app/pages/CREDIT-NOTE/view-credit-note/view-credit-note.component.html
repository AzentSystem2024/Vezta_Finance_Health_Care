<div class="salary-grid-wrapper" style="padding: 0 10px">
  <div class="grid-container">
    <dx-data-grid
      #itemsGridRef
      [dataSource]="noteDetails"
      [showBorders]="true"
      [showColumnLines]="true"
      [columnAutoWidth]="false"
      [wordWrapEnabled]="false"
      [rowAlternationEnabled]="true"
      [headerFilter]="{ visible: true }"
      [allowColumnReordering]="true"
      [showColumnHeaders]="true"
      [allowColumnResizing]="true"
      [height]="'70vh'"
      [columnResizingMode]="'nextColumn'"
      [headerFilter]="{ visible: true }"
      [scrolling]="{ mode: 'virtual' }"
      rowAlternationInterval="2"
      [selection]="{ mode: 'single' }"
    >
      <dxo-load-panel [showPane]="false"></dxo-load-panel>
      <dxo-toolbar>
        <dxi-item location="before">
          <div style="display: flex; flex-direction: column; gap: 5px">
            <div style="display: flex; gap: 5px">
              <dx-text-box
                label="Doc No"
                [value]="creditFormData?.[0]?.DOC_NO"
                labelMode="floating"
                [width]="200"
                [readOnly]="true"
              ></dx-text-box>
              <dx-text-box
                *ngIf="showSubType"
                label="Sub Type"
                [value]="creditFormData?.[0]?.SUB_TYPE_NAME"
                labelMode="floating"
                [width]="405"
                [readOnly]="true"
              ></dx-text-box>
              <!--  -->
            </div>
            <div style="display: flex; align-items: baseline; gap: 5px">
              <dx-select-box
                #distributorRef
                [dataSource]="distributorList"
                [(value)]="selectedDistributorId"
                displayExpr="DESCRIPTION"
                valueExpr="ID"
                [width]="405"
                [searchEnabled]="true"
                [showClearButton]="true"
                label="Customer"
                labelMode="floating"
                [readOnly]="true"
              ></dx-select-box>

              <dx-text-box
                label="Invoice No."
                [value]="creditFormData?.[0]?.INVOICE_NO"
                labelMode="floating"
                [width]="200"
                [readOnly]="true"
              ></dx-text-box>
            </div>
          </div>
        </dxi-item>
        <dxi-item location="after">
          <div style="display: flex; flex-direction: column; gap: 5px">
            <div style="display: flex; justify-content: flex-end">
              <dx-date-box
                label="Date"
                labelMode="floating"
                [width]="200"
                [(value)]="transDate"
                displayFormat="dd-MM-yyyy"
                [readOnly]="true"
              ></dx-date-box>
            </div>
            <div style="display: flex; gap: 6px">
              <dx-number-box
                label="Due Amount"
                labelMode="floating"
                [value]="creditFormData?.[0]?.DUE_AMOUNT"
                [format]="{ type: 'fixedPoint', precision: 2 }"
                [width]="200"
                [showSpinButtons]="true"
                [inputAttr]="{ style: 'text-align: right;' }"
                [readOnly]="true"
              ></dx-number-box>
            </div>
          </div>
        </dxi-item>
      </dxo-toolbar>

      <dxi-column
        dataField="SL_NO"
        caption="Sl No"
        [allowEditing]="true"
        width="80"
        [readOnly]="true"
      ></dxi-column>

      <dxi-column
        dataField="ledgerCode"
        caption="Ledger Code"
        [editorType]="'dxSelectBox'"
        [lookup]="{
          dataSource: ledgerList,
          valueExpr: 'HEAD_CODE',
          displayExpr: 'HEAD_CODE',
          searchEnabled: true,
        }"
      ></dxi-column>

      <dxi-column
        dataField="ledgerName"
        caption="Ledger Name"
        [editorType]="'dxSelectBox'"
        [lookup]="{
          dataSource: ledgerList,
          valueExpr: 'HEAD_NAME',
          displayExpr: 'HEAD_NAME',
          searchEnabled: true,
        }"
      ></dxi-column>
      <dxi-column
        dataField="particulars"
        caption="Particulars"
        [editorOptions]="{ maxLength: 250 }"
      >
      </dxi-column>

      <dxi-column
        dataField="Amount"
        caption="Amount"
        dataType="number"
        [format]="{ type: 'fixedPoint', precision: 2 }"
      ></dxi-column>
      <dxi-column
        dataField="GST_PERC"
        [caption]="vatTitle + '%'"
        dataType="number"
      >
      </dxi-column>
      <dxi-column
        dataField="gstAmount"
        [caption]="
          selected_vat_id == sessionData.VAT_ID && sessionData.VAT_ID == 2
            ? ' VAT Amount'
            : ' GST Amount'
        "
        dataType="number"
        [format]="{ type: 'fixedPoint', precision: 2 }"
      ></dxi-column>

      <dxi-column
        dataField="CGST"
        caption="CGST"
        dataType="number"
        [visible]="showCGST"
        [allowEditing]="false"
      ></dxi-column>

      <dxi-column
        dataField="SGST"
        caption="SGST"
        dataType="number"
        [visible]="showSGST"
        [allowEditing]="false"
      ></dxi-column>

      <!-- <dxi-column
        dataField="HSN_CODE"
        caption="HSN Code"
        dataType="string"
      ></dxi-column> -->

      <dxi-column
        dataField="Total"
        caption="Total"
        dataType="number"
        [allowEditing]="false"
        [calculateCellValue]="calculateTotal"
      ></dxi-column>

      <dxo-summary>
        <dxi-total-item
          column="Amount"
          summaryType="sum"
          valueFormat="#,##0.00"
          displayFormat="Total: {0}"
          alignment="right"
        ></dxi-total-item>
        <dxi-total-item
          column="gstAmount"
          summaryType="sum"
          valueFormat="#,##0.00"
          displayFormat="Total: {0}"
          alignment="right"
        ></dxi-total-item>

        <dxi-total-item
          column="Total"
          summaryType="sum"
          valueFormat="#,##0.00"
          displayFormat="Total: {0}"
          alignment="right"
        >
        </dxi-total-item>
      </dxo-summary>
    </dx-data-grid>

    <div
      style="
        margin-top: 1px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        width: 100%;
      "
    >
      <div style="display: flex; gap: 10px; width: 750px">
        <!-- Left: Narration -->

        <dx-text-box
          label="Narration"
          [value]="creditFormData?.[0]?.NARRATION"
          labelMode="floating"
          [width]="400"
          [readOnly]="true"
        ></dx-text-box>

        <dx-text-box
          label="Vehicle Number"
          labelMode="floating"
          [value]="creditFormData?.[0]?.VEHICLE_NO"
          [width]="200"
        ></dx-text-box>
      </div>
      <!-- <dx-text-box
          label="Vehicle No"
          labelMode="floating"
          [(value)]="creditFormData[0].VEHICLE_NO"
          [width]="200"
        ></dx-text-box> -->
      <!-- Right: Net Amount + Approve checkbox -->
      <div
        style="
          display: flex;
          flex-direction: column;
          align-items: flex-end;
          gap: 5px;
        "
      >
        <div style="display: flex; align-items: center; gap: 15px">
          <dx-check-box
            text="Round Off"
            [readOnly]="true"
            [value]="creditFormData?.[0]?.ROUND_OFF"
            (onValueChanged)="onRoundOffChange()"
            style="margin-top: 18px"
          ></dx-check-box>

          <dx-number-box
            label="Net Amount"
            [value]="creditFormData?.[0]?.NET_AMOUNT"
            labelMode="floating"
            [width]="200"
            [readOnly]="true"
            [format]="{ type: 'fixedPoint', precision: 2 }"
            [inputAttr]="{ style: 'text-align: right;' }"
          ></dx-number-box>
        </div>
        <dx-check-box
          text="Approved"
          [value]="creditFormData?.[0]?.TRANS_STATUS === 5"
          [readOnly]="true"
        ></dx-check-box>
      </div>
    </div>
  </div>
</div>

<div class="form-popup-buttons-container">
  <div class="popup-footer">
    <!-- <dx-button
      #saveButtonRef
      [text]="'PDF'"
      stylingMode="contained"
      type="default"
      (onClick)="viewPdf()"
    ></dx-button> -->
    <dx-button
      text="Cancel"
      (onClick)="cancel()"
      stylingMode="outlined"
      type="normal"
    ></dx-button>
  </div>
</div>

<dx-popup
  [(visible)]="isPdfPopupVisible"
  [width]="900"
  [height]="700"
  [showTitle]="true"
  title="CreditNote PDF Preview"
  [dragEnabled]="true"
  [closeOnOutsideClick]="true"
>
  <div class="pdf-container" style="margin-top: 10px">
    <iframe
      *ngIf="pdfSrc"
      [src]="pdfSrc"
      width="100%"
      height="600"
      style="border: 1px solid #ccc; border-radius: 4px"
    ></iframe>
  </div>
</dx-popup>
