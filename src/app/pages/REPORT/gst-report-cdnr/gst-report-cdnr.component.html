<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      class="grid theme-dependent"
      [dataSource]="GST_datasource"
      noDataText=""
      width="100%"
      height="82vh"
      [showBorders]="true"
      [showColumnLines]="true"
      [columnAutoWidth]="true"
      [wordWrapEnabled]="false"
      [grouping]="{ autoExpandAll: false }"
      [filterRow]="{ visible: false }"
      [rowAlternationEnabled]="true"
      [rowAlternationEnabled]="true"
      rowAlternationInterval="2"
      [allowColumnReordering]="true"
      [filterRow]="{ visible: false }"
      id="dataGrid"
      [scrolling]="{ mode: 'virtual' }"
      [headerFilter]="{ visible: false }"
      [columnFixing]="{
        enabled: true,
        texts: { fix: 'Freeze', unfix: 'Unfreeze' },
      }"
      [summary]="summaryColumnsData"
      (onExporting)="onExporting($event)"
    >
      <!-- [summary.calculateCustomSummary]="summaryColumnsData.calculateCustomSummary" -->
      <!-- (onEditingStart)="onEditLedger($event)" -->
      <!-- <dxo-editing
        mode="popup"
        [allowUpdating]="true"
      ></dxo-editing> -->
      <dxo-paging [pageSize]="10"></dxo-paging>

      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="true"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <dxo-export [enabled]="true" [formats]="['xlsx', 'pdf']"> </dxo-export>
      <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="
              font-weight: 600;
              font-size: 20px;
              margin-left: 12px;
              padding: -3px;
              margin-right: 3px;
            "
          >
            GST Report(CDNR)
          </div>
        </dxi-item>
        <!-- <dxi-item>
           <dx-select-box
        [width]="150"
        label="Fin Id" 
        labelMode="floating"
         [items]="fin_id"
    displayExpr="FIN_CODE"
    valueExpr="FIN_ID"
    [(value)]="selected_fin_id"
    [searchEnabled]="true"
    (onValueChanged)="onCompanyChange($event)"
        >

        </dx-select-box>

        </dxi-item> -->
        <!-- <dxi-item>
           <dx-select-box
    [width]="200"
    label="Company Id"
    labelMode="floating"

    displayExpr="COMPANY_NAME"
    valueExpr="COMPANY_ID"
    [(value)]="selectedCompanyId"
    [searchEnabled]="true"
    (onValueChanged)="onCompanyChange($event)">
        >

        </dx-select-box>

        </dxi-item> -->
        <!-- <dxi-item>
           <dx-select-box
        [width]="200"
        label="Ledger"
        labelMode="floating"
         [items]="HEAD_ID_LIST"
    displayExpr="NAME"
    valueExpr="ID"
    [(value)]="selected_Head_Id"
    (onValueChanged)="onHeadIdChange($event)"
    [searchEnabled]="true"
        >
        </dx-select-box>

        </dxi-item> -->

        <dxi-item>
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="Year"
            [width]="150"
            [(value)]="selectedYear"
            [dataSource]="years"
            (onValueChanged)="onYearChanged($event)"
            placeholder="Year"
          ></dx-select-box>
        </dxi-item>

        <dxi-item>
          <dx-select-box
            labelMode="floating"
            labelLocation="left"
            label="month"
            [dataSource]="monthDataSource"
            displayExpr="name"
            valueExpr="value"
            [(value)]="selectedmonth"
            (onValueChanged)="onMonthValueChanged($event)"
            [dropDownOptions]="{ width: 'auto' }"
          >
          </dx-select-box>
        </dxi-item>

        <dxi-item>
          <dx-date-box
            [width]="150"
            label="From Date"
            labelMode="floating"
            [value]="selected_from_date"
            [displayFormat]="'dd-MM-yyyy'"
            (onValueChanged)="onFromDateChange($event)"
          >
          </dx-date-box>

          <!-- <dx-date-box
        [width]="150"
        label="From Date"
        labelMode="floating"
            [(value)]="selected_from_date"
              displayFormat="yyyy-MM-dd"
        >

        </dx-date-box> -->
        </dxi-item>
        <dxi-item itemType="simple" verticalAlignment="center">
          <dx-date-box
            [width]="150"
            label="To Date"
            labelMode="floating"
            [value]="selected_To_date"
            displayFormat="dd-MM-yyyy"
            (onValueChanged)="onToDateChange($event)"
          >
          </dx-date-box>
        </dxi-item>

        <dxi-item itemType="simple" verticalAlignment="center">
          <dx-button
            text="Apply"
            stylingMode="contained"
            type="default"
            (onClick)="load_GST_data()"
          >
          </dx-button>
        </dxi-item>
        <dxi-item name="exportButton"></dxi-item>
      </dxo-toolbar>
      <dxo-sorting mode="none"></dxo-sorting>
      <dxo-filter-row visible="true"></dxo-filter-row>
      <dxo-header-filter visible="true"></dxo-header-filter>
      <dxo-paging page-size="10"></dxo-paging>
      <dxo-pager
        show-page-size-selector="true"
        show-info="true"
        show-navigator="true"
      ></dxo-pager>
      <dxo-header-filter [visible]="true">
        <dxo-search [enabled]="true"></dxo-search>
      </dxo-header-filter>
      <!-- <dxo-filter-row
      [visible]="isFilterRowVisible"
      [applyFilter]="auto"
    ></dxo-filter-row> -->
      <dxo-grouping
        [autoExpandAll]="false"
        [contextMenuEnabled]="true"
        [expandMode]="'rowClick'"
      ></dxo-grouping>
      <!-- <dxi-column dataField="TransID" caption="Trans Type Id" dataType="date"></dxi-column> -->
      <dxi-column dataField="DOC_NO" caption="Doc No."></dxi-column>
      <dxi-column
        dataField="DOC_DATE"
        caption="Doc Date."
        dataType="date"
        [format]="{ type: 'custom', formatter: formatDates }"
      ></dxi-column>
      <dxi-column dataField="DOC_NAME" caption="Document Name"></dxi-column>
      <dxi-column
        dataField="RECEIVER_NAME"
        caption="Receiver Name"
      ></dxi-column>
      <dxi-column
        dataField="INVOICE_AMOUNT"
        caption="Invoice Amount"
        [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
        alignment="right"
        width="150px"
      ></dxi-column>
      <dxi-column dataField="GSTIN" caption="GSTIN"></dxi-column>

      <dxi-column dataField="CGST" caption="CGST %"></dxi-column>
      <dxi-column dataField="SGST" caption="SGST %"></dxi-column>
      <dxi-column dataField="IGST" caption="IGST %"></dxi-column>
      <dxi-column dataField="HSN_CODE" caption="HSN CODE"></dxi-column>

      <dxi-column
        dataField="TAXABLE_AMOUNT"
        caption="Taxable Amount"
        [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
        alignment="right"
      ></dxi-column>
      <dxi-column
        dataField="INVOICE_AMOUNT"
        caption="Total GST"
        width="130px"
      ></dxi-column>
      <!-- <dxi-column
        dataField="DebitAmount"
        caption="Debit Amount"
        [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
        alignment="right"
      >
      </dxi-column> -->

      <!-- <dxi-column
        dataField="CreditAmount"
        caption="Credit Amount"
        [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
        alignment="right"
      >
      </dxi-column> -->

      <!-- <dxi-column dataField="BALANCE" caption="Balance"
  [format]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
  alignment="right">
</dxi-column> -->
      <dxi-column
        *ngIf="GST_datasource.length > 0"
        type="buttons"
        [width]="100"
      >
        <dxi-button
          hint="View"
          icon="eyeopen"
          text="View"
          [onClick]="onViewClick.bind(this)"
        ></dxi-button>
      </dxi-column>
    </dx-data-grid>
  </div>
</div>

<dx-popup
  [(visible)]="isViewJournalVoucher"
  [width]="'100vw'"
  [deferRendering]="false"
  [height]="'100vh'"
  title="Journal Voucher"
  (onHiding)="handleClose()"
>
  <app-view-journal-voucher
    [journalVoucherFormData]="selectedJournalVoucher"
    (popupClosed)="handleClose()"
  ></app-view-journal-voucher>
</dx-popup>

<dx-popup
  [(visible)]="isViewDebitNote"
  [width]="'100vw'"
  [height]="'100vh'"
  title="Debit Note"
  [deferRendering]="false"
  (onHiding)="handleClose()"
>
  <ng-container *ngIf="isViewDebitNote">
    <app-view-debit
      [debitFormData]="selectedDebitNote"
      (popupClosed)="handleClose()"
    ></app-view-debit>
  </ng-container>
</dx-popup>

<dx-popup
  [(visible)]="isViewCreditNote"
  [width]="'100vw'"
  [height]="'100vh'"
  title="Credit Note"
  [deferRendering]="false"
  (onHiding)="handleClose()"
>
  <app-view-credit-note
    [creditFormData]="selectedCreditNote"
    (popupClosed)="handleClose()"
  ></app-view-credit-note>
</dx-popup>

<dx-popup
  [(visible)]="isViewInvoice"
  [width]="'100vw'"
  [height]="'100vh'"
  [deferRendering]="false"
  title="View Invoice"
  (onHiding)="handleClose()"
>
  <ng-container *ngIf="isViewInvoice">
    <app-view-invoice
      [invoiceFormData]="selectedInvoice"
      (popupClosed)="handleClose()"

  </ng-container>
</dx-popup>

<dx-popup
  [(visible)]="isEditCustomerReceipt"
  [width]="'75vw'"
  [height]="'100vh'"
  [deferRendering]="false"
  title="View Receipt"
  (onHiding)="handleClose()"
>
  <ng-container *ngIf="isEditCustomerReceipt">
    <app-edit-customer-receipt
      [receiprtFormData]="selectedReceipt"
      [isReadOnlyMode]="isReadOnlyReceipt"
      (popupClosed)="handleClose()"
    ></app-edit-customer-receipt>
  </ng-container>
</dx-popup>

<dx-popup
  [(visible)]="isEditInvoice"
  [width]="'100vw'"
  [height]="'100vh'"
  [deferRendering]="false"
  title="Purchase Invoice"
  (onHiding)="handleClose()"
>
  <ng-container *ngIf="isEditInvoice">
    <app-edit-purchase-invoice
      [invoiceFormData]="selectedInvoice"
      [readOnly]="isEditInvoiceReadOnly"
      (popupClosed)="handleClose()"
    ></app-edit-purchase-invoice>
  </ng-container>
</dx-popup>

<dx-popup
  [(visible)]="editMiscPopup"
  [width]="'100vw'"
  [height]="'100vh'"

      [EditingResponseData]="selectedmiscellaneousData"
      [isReadOnlyMode]="isReadOnlyPayment"

  </ng-container>

</dx-popup>

<!-- Prepayment -->
<dx-popup
  [(visible)]="editPrePaymentPopupOpened"

>

<!-- Supplier Payment -->
<dx-popup
  [(visible)]="isEditReceipt"
  [width]="'75vw'"

  (onHiding)="handleClose()"
>
  <!-- <ng-container *ngIf="isAddInvoice"> -->
  <app-edit-supplier-payment
    [paymentData]="selectedReceipt"
    [isReadOnlyMode]="isReadOnlyReceipt"
    (popupClosed)="handleClose()"
    [supplierPaymentId]="selectedSupplierPayment"
  ></app-edit-supplier-payment>
  <!-- </ng-container> -->
</dx-popup>

<!-- purchase return -->

<!-- Misc payment -->

  [(visible)]="editMiscPopupOpened"

  title="Miscellaneous Payment"
  (onHiding)="handleClose()"
>
  <ng-container *ngIf="editMiscPopupOpened">

      [isReadOnlyMode]="isReadOnlyPayment"

      [MiscPaymentId]="selectedMiscPayment"
    ></app-add-miscellaneous-payment>
  </ng-container>
</dx-popup>

<dx-popup
  [(visible)]="isEditPopupPrepaymentPosting"
  [width]="'95vw'"
  [height]="'100vh'"
  title="Edit Prepayment Posting"
  (onHiding)="handleClose()"
>
  <app-prepayment-posting-edit
    *ngIf="isEditPopupPrepaymentPosting"
    [selecteprepaymentData]="selecte_prepayment_Data"
    (popupClosed)="handleClose()"
  >
  </app-prepayment-posting-edit>
</dx-popup>

<dx-popup
  [(visible)]="isEditTransferOut"
  [width]="'75vw'"
  [height]="'90vh'"
  title="Transfer Out"
  (onHiding)="handleClose()"
>
  <ng-container *ngIf="isEditTransferOut">
    <app-transfer-out-inventory-add
      [isEditing]="true"
      [EditingResponseData]="selectedTrOut"
      [isReadOnlyMode]="isReadOnlyTrOut"
      (popupClosed)="handleClose()"
    ></app-transfer-out-inventory-add>
  </ng-container>
</dx-popup>

<dx-popup
  [(visible)]="isEditTransferIn"
  [width]="'70vw'"
  [height]="'90vh'"
  title="Transfer In"
  (onHiding)="handleClose()"
>
  <ng-container *ngIf="isEditTransferIn">
    <app-transfer-in-inventory-form
      [isEditing]="true"
      [EditingResponseData]="selectedTrIn"
      [isReadOnlyMode]="isReadOnlyTrIn"
      (popupClosed)="handleClose()"
    ></app-transfer-in-inventory-form>
