<dx-validation-group #creditNoteGroup>
  <div class="invoice-wrapper">
    <div class="salary-grid-wrapper">
      <div class="grid-container">
        <dx-data-grid
          #itemsGridRef
          [dataSource]="transferOutFormData.DETAILS"
          [showBorders]="true"
          [showColumnLines]="true"
          [columnAutoWidth]="true"
          [rowAlternationEnabled]="true"
          [allowColumnReordering]="true"
          [allowColumnResizing]="true"
          [height]="'55vh'"
          [columnResizingMode]="'nextColumn'"
          [scrolling]="{ mode: 'virtual' }"
          rowAlternationInterval="2"
          [selection]="{ mode: 'single' }"
          [editing]="{
            mode: 'cell',
            allowAdding: true,
            allowUpdating: true,
            allowDeleting: !isReadOnlyMode,
          }"
          (onEditorPreparing)="onEditorPreparing($event)"
          (onRowInserted)="onRowInserted($event)"
          (onEditorPrepared)="onEditorPrepared($event)"
        >
          <dxo-load-panel [showPane]="false"></dxo-load-panel>
          <dxo-toolbar>
            <dxi-item location="before" locateInMenu="auto">
              <div class="stacked-toolbar-group">
                <div style="display: flex; gap: 5px">
                  <dx-date-box
                    label="Date"
                    labelMode="floating"
                    [(value)]="transferOutFormData.TRANSFER_DATE"
                    [width]="200"
                    displayFormat="dd-MM-yyyy"
                    [readOnly]="true"
                  ></dx-date-box>
                  <dx-text-box
                    [(value)]="transferOutFormData.DOC_NO"
                    label="Transfer No"
                    labelMode="floating"
                    [width]="200"
                    [readOnly]="true"
                    [readOnly]="true"
                  ></dx-text-box>
                </div>

                <div style="margin-top: -4px; display: flex; gap: 5px">
                  <dx-select-box
                    [(value)]="transferOutFormData.REASON_ID"
                    [dataSource]="reasons"
                    displayExpr="DESCRIPTION"
                    valueExpr="ID"
                    [width]="200"
                    [searchEnabled]="true"
                    label="Reasons"
                    labelMode="floating"
                    [readOnly]="isReadOnlyMode"
                  ></dx-select-box>

                  <dx-select-box
                    [(value)]="StoreIDData"
                    [dataSource]="stores"
                    displayExpr="DESCRIPTION"
                    valueExpr="ID"
                    [width]="'100%'"
                    [searchEnabled]="true"
                    label="Store"
                    labelMode="floating"
                    [readOnly]="isReadOnlyMode"
                  ></dx-select-box>
                </div>
              </div>
            </dxi-item>

            <dxi-item location="after" locateInMenu="auto">
              <div class="stacked-toolbar-group">
                <dx-select-box
                  [(value)]="transferOutFormData.DEST_STORE_ID"
                  [dataSource]="transferstores"
                  displayExpr="DESCRIPTION"
                  valueExpr="ID"
                  [width]="200"
                  [searchEnabled]="true"
                  label="Transfer To"
                  labelMode="floating"
                  [readOnly]="isReadOnlyMode"
                  (onValueChanged)="onStoreChange($event)"
                ></dx-select-box>
                <div style="margin-top: 2px; text-align: left">
                  <dx-button
                    [width]="200"
                    stylingMode="contained"
                    class="blue-contained-btn"
                    (onClick)="onAddItems()"
                    [disabled]="!transferOutFormData.DEST_STORE_ID"
                    [disabled]="isReadOnlyMode"
                  >
                    <div *dxTemplate="let data of 'content'">
                      <span
                        class="iconify me-2"
                        data-icon="formkit:add"
                        data-width="20"
                        data-height="20"
                      ></span>
                      <span class="add-text">Add Items</span>
                    </div>
                  </dx-button>
                </div>
              </div>
            </dxi-item>
          </dxo-toolbar>

          <!-- Columns -->
          <dxi-column dataField="SL_NO" caption="Sl No"></dxi-column>
          <dxi-column dataField="ITEM_ID" [visible]="false"></dxi-column>

          <dxi-column dataField="BARCODE" caption="Barcode"> </dxi-column>

          <dxi-column
            dataField="DESCRIPTION"
            caption="Description"
            [allowEditing]="false"
          ></dxi-column>
          <dxi-column
            dataField="UOM"
            caption="UOM"
            [allowEditing]="false"
          ></dxi-column>
          <dxi-column
            dataField="COST"
            caption="Unit Cost"
            [allowEditing]="false"
            [visible]="!hideCost"
          ></dxi-column>
          <dxi-column
            dataField="QUANTITY_AVAILABLE"
            caption="Qty Available"
            [allowEditing]="false"
          ></dxi-column>
          <dxi-column
            dataField="QUANTITY"
            caption="Qty Issued"
            [allowEditing]="!isReadOnlyMode"
            [validationRules]="[
              { type: 'required', message: 'Quantity is required' },
              {
                type: 'custom',
                validationCallback: validateQtyIssued,
                message: 'Qty cannot be greater than Qty Available',
              },
            ]"
          ></dxi-column>

          <dxi-column
            dataField="netAmount"
            caption="Total Cost"
            [allowEditing]="false"
            [visible]="!hideCost"
            [calculateCellValue]="calculateNetAmount"
          ></dxi-column>

          <dxo-summary>
            <dxi-total-item
              column="QUANTITY"
              summaryType="sum"
              displayFormat="Net Qty Issued: {0}"
              alignment="right"
            ></dxi-total-item>
            <dxi-total-item
              column="netAmount"
              summaryType="sum"
              valueFormat="#,##0.00"
              displayFormat="Net Amount: {0}"
              alignment="right"
            ></dxi-total-item>
          </dxo-summary>
        </dx-data-grid>

        <div class="form-footer">
          <!-- Narration stays in left -->
          <div class="footer-left">
            <dx-text-box
              #narrationRef
              [(value)]="transferOutFormData.NARRATION"
              label="Narration"
              labelMode="floating"
              class="narration-box"
              [readOnly]="isReadOnlyMode"
            ></dx-text-box>
          </div>

          <!-- Buttons + Approve checkbox grouped together -->
          <div class="footer-right">
            <!-- <dx-text-box
              class="right-align-textbox"
              [value]="transferOutFormData.NET_AMOUNT | number: '1.2-2'"
              label="Net Amount"  
              labelMode="floating"
              [readOnly]="true"
              [inputAttr]="{ style: 'text-align: right;' }"
            ></dx-text-box> -->
            <div class="approve-container">
              <dx-check-box
                *ngIf="
                  !isEditing ||
                  (selectedDocStatus == 'OPEN' && ActionStatus == 'EditScreen')
                "
                [value]="
                  isReadOnlyMode ? true : transferOutFormData.IS_APPROVED
                "
                (valueChange)="
                  !isReadOnlyMode
                    ? (transferOutFormData.IS_APPROVED = $event)
                    : null
                "
                [text]="isReadOnlyMode ? 'Approved' : 'Approve'"
                [readOnly]="isReadOnlyMode"
                stylingMode="outlined"
              >
              </dx-check-box>
            </div>

            <div class="footer-actions">
              <dx-button
                text="Cancel"
                (onClick)="cancel()"
                stylingMode="outlined"
                type="normal"
              ></dx-button>
              <dx-button
                [text]="
                  isReadOnlyMode
                    ? 'PDF'
                    : selectedDocStatus == 'VERIFY' || isApproved
                      ? 'Approve'
                      : selectedDocStatus == 'OPEN' &&
                          ActionStatus == 'VerifyScreen'
                        ? 'Verify'
                        : isEditing
                          ? 'Update'
                          : 'Save'
                "
                (onClick)="isReadOnlyMode ? openPDF() : saveTransferOut()"
                stylingMode="contained"
                type="default"
                [width]="120"
              ></dx-button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</dx-validation-group>
<dx-popup
  [(visible)]="isPopupVisible"
  [width]="800"
  [height]="500"
  [showTitle]="true"
  title="Items"
  [dragEnabled]="true"
  [closeOnOutsideClick]="true"
  (onHiding)="onPopupHiding()"
>
  <div *dxTemplate="let data of 'content'">
    <dx-data-grid
      #popupGridRef
      [dataSource]="items"
      [showBorders]="true"
      [showRowLines]="true"
      [showColumnLines]="true"
      [columnAutoWidth]="false"
      [wordWrapEnabled]="false"
      [rowAlternationEnabled]="true"
      [headerFilter]="{ visible: true, allowSearch: true }"
      [allowColumnReordering]="true"
      [showColumnHeaders]="true"
      [columnAutoWidth]="true"
      [allowColumnResizing]="true"
      [height]="'60vh'"
      [columnResizingMode]="'nextColumn'"
      [scrolling]="{ mode: 'virtual' }"
      rowAlternationInterval="2"
      [selection]="{ mode: 'multiple', showCheckBoxesMode: 'always' }"
    >
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <dxo-load-panel [showPane]="false"></dxo-load-panel>
      <dxo-scrolling mode="standard"></dxo-scrolling>
      <dxo-filter-row
        [visible]="isFilterRowVisible"
        [applyFilter]="auto"
      ></dxo-filter-row>

      <dxo-toolbar>
        <div
          class="stacked-toolbar-group"
          style="display: flex; flex-direction: column; gap: 2px"
        ></div>
        <dxi-item location="before" locateInMenu="auto"> </dxi-item>

        <dxi-item location="after">
          <div class="toolbar-button-wrapper">
            <dx-button
              text="Select Items"
              icon="check"
              (onClick)="onSelectItems()"
              class="select-item-btn"
            ></dx-button>
          </div>
        </dxi-item>

        <dxi-item location="after" locateInMenu="auto"> </dxi-item>
      </dxo-toolbar>
      <dxi-column dataField="BARCODE" caption="Barcode"></dxi-column>

      <dxi-column dataField="DESCRIPTION" caption="Description"></dxi-column>
      <dxi-column dataField="UOM" caption="UOM"></dxi-column>
      <dxi-column
        dataField="COST"
        caption="Unit Cost"
        [visible]="!hideCost"
      ></dxi-column>
      <dxi-column
        dataField="QUANTITY_AVAILABLE"
        caption="Qty Available"
      ></dxi-column>
      <!-- <dxi-column
        dataField="TOTAL_PAIR_QTY"
        caption="Qty"
        dataType="number"
      ></dxi-column> -->
    </dx-data-grid>
  </div>
</dx-popup>
