<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      class="grid theme-dependent"
      [dataSource]="VatClassDataSource"
      (onRowRemoving)="onRowRemoving($event)"
      [showBorders]="true"
      [allowColumnReordering]="true"
      [width]="'100%'"
      [height]="'82vh'"
      [showColumnHeaders]="true"
      [columnAutoWidth]="true"
      [allowColumnResizing]="true"
      [rowAlternationEnabled]="true"
      [showColumnLines]="true"
      (onExporting)="onExporting($event)"
      [scrolling]="{ mode: 'virtual' }"
      (onEditingStart)="OnEditingStartVatReturn($event)"
    >
      <dxo-filter-row [visible]="isFilterRowVisible"></dxo-filter-row>
      <dxo-header-filter [visible]="showHeaderFilter"></dxo-header-filter>
      <dxo-export [enabled]="true" [formats]="['xlsx']"> </dxo-export>
      <dxo-paging [pageSize]="10"></dxo-paging>

      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>

      <dxo-editing mode="popup" [allowUpdating]="canEdit" [allowDeleting]="canDelete">
        <dxo-popup
          title="Edit Vat Class"
          [showTitle]="true"
          [width]="450"
          [height]="353"
        >
        </dxo-popup>
        <dxo-form [colCount]="1"></dxo-form>
      </dxo-editing>

      <dxo-toolbar>
        <dxi-item location="before">
          <div class="grid-header">VAT Class</div>
        </dxi-item>

        <dxi-item location="after" locateInMenu="auto"> </dxi-item>

        <dxi-item
          location="after"
          widget="dxButton"
          [options]="searchButtonOptions"
        ></dxi-item>

        <dxi-item
          location="after"
          locateInMenu="auto"
          widget="dxButton"
          [options]="refreshButtonOptions"
        ></dxi-item>

        <dxi-item location="after">
          <div class="toolbar-divider"></div>
        </dxi-item>

        <dxi-item
          name="exportButton"
          location="after"
          cssClass="export-btn"
        ></dxi-item>

        <dxi-item
          location="after"
          widget="dxButton"
          [options]="addButtonOptions"
          [visible]="canAdd"
        ></dxi-item>
      </dxo-toolbar>

      <dxi-column dataField="CODE" caption="Code"> </dxi-column>
      <dxi-column dataField="VAT_NAME" [caption]="'Name'"> </dxi-column>
      <dxi-column
        dataField="VAT_PERC"
        [caption]="'Percentage'"
        alignment="left"
      >
      </dxi-column>
    </dx-data-grid>
  </div>
</div>

<form-popup
  [(visible)]="isAddVatclassPopupOpened"
  (save)="onClickSaveVatclass()"
  titleText="New VAT Class"
  [showApprove]="false"
>
  <app-vat-calss-finance-form
    (formClosed)="handleClose()"
  ></app-vat-calss-finance-form>
</form-popup>

<dx-popup
  [(visible)]="isEditVatclassPopupOpened"
  title="Edit VAT Class"
  height="auto"
  width="35vw"
>
  <div>
    <app-vat-calss-finance-edit
      [selectedData]="selected_data"
      (formClosed)="handleClose()"
      [vatClassList]="vatClassArray"
    >
    </app-vat-calss-finance-edit>
  </div>
</dx-popup>
