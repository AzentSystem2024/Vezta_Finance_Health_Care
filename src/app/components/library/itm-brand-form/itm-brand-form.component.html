<dx-form class="plain-styled-form" >
    <dxi-item itemType="group">
      <dxo-col-count-by-screen
        [xs]="1"
        [sm]="1"
        [md]="1"
        [lg]="1"
      ></dxo-col-count-by-screen>
      <dxi-item>
        <div *dxTemplate>
          <dx-text-box
            label="Code"
            [(value)]="newBrand.CODE"
            labelMode="floating"
          >

          <dx-validator>
          <dxi-validation-rule
            type="required"
            message="Code is required"
          ></dxi-validation-rule>

          <dxi-validation-rule
            type="pattern"
            [pattern]="'^[a-zA-Z0-9]+$'"
            message="Code should be alphanumeric only"
          ></dxi-validation-rule>

          <dxi-validation-rule
              type="custom"
              [validationCallback]="validateBrandCode"
              message="Code already exists"
            ></dxi-validation-rule>
        </dx-validator>
     
          </dx-text-box>
        </div>
      </dxi-item>
  
      <dxi-item>
        <div *dxTemplate>
          <dx-text-box
            label="Brand Name"
            [(value)]="newBrand.BRAND_NAME"
            labelMode="floating"
          >
          <dx-validator>
          <dxi-validation-rule
            type="required"
            message="Brand Name is required"
          ></dxi-validation-rule>
          </dx-validator>
          </dx-text-box>
        </div>
      </dxi-item>

    </dxi-item>
  </dx-form>
