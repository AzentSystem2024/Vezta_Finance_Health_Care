<div class="view-wrapper list-page">
  <div class="grid-container">
    <dx-data-grid
      class="grid theme-dependent"
      [dataSource]="reasons"
      (onRowRemoving)="onRowRemoving($event)"
      [showBorders]="true"
      [allowColumnReordering]="true"
      [allowColumnResizing]="true"
      [showColumnLines]="true"
      [width]="'100%'"
      [height]="'82vh'"
      (onExporting)="onExporting($event)"
      (onEditingStart)="OnEditingStartReason($event)"
    >
      <dxo-filter-row [visible]="showFilterRow"></dxo-filter-row>

      <dxo-header-filter [visible]="showHeaderFilter"></dxo-header-filter>

      <dxo-scrolling mode="virtual"></dxo-scrolling>

      <dxo-export [enabled]="true" [formats]="['xlsx']"> </dxo-export>
      <dxo-editing
        mode="popup"
        [allowUpdating]="canEdit"
        [allowDeleting]="canDelete"
        [allowAdding]="canAdd"
      >
      </dxo-editing>
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <!-- <dxo-editing mode="popup" [allowUpdating]="true" [allowDeleting]="true">
  
    </dxo-editing> -->

      <dxo-toolbar>
        <dxi-item location="before">
          <div
            class="grid-header"
            style="
              font-weight: 600;
              font-size: 20px;
              margin-left: 12px;
              padding: -3px;
              margin-right: 3px;
            "
          >
            Reasons
          </div>
        </dxi-item>

        <dxi-item
          location="after"
          widget="dxButton"
          [options]="searchButtonOptions"
        ></dxi-item>

        <!-- Refresh -->
        <dxi-item
          location="after"
          widget="dxButton"
          [options]="refreshButtonOptions"
        ></dxi-item>

        <!-- Export (built-in, kept) -->
        <!-- Divider -->
        <dxi-item location="after">
          <div class="toolbar-divider"></div>
        </dxi-item>
        <dxi-item
          name="exportButton"
          location="after"
          cssClass="toolbar-icon-btn export-btn"
        ></dxi-item>

        <dxi-item
          location="after"
          widget="dxButton"
          [options]="addButtonOptions"
          [visible]="canAdd"
        ></dxi-item>
      </dxo-toolbar>
      <dxi-column dataField="CODE" caption="Code" width="150"> </dxi-column>
      <dxi-column dataField="DESCRIPTION" caption="Description"> </dxi-column>
      <!-- <dxi-column dataField="ARABIC_DESCRIPTION" caption="Arabic Description">
        <dxi-validation-rule

          <dxi-validation-rule type="pattern" message="Description is required">
          </dxi-validation-rule>
        </dxi-validation-rule>
      </dxi-column> -->
      <dxi-column dataField="REASON_TYPE" caption="Reason Type">
        <dxo-lookup
          [dataSource]="reasontype"
          displayExpr="DESCRIPTION"
          valueExpr="ID"
        >
        </dxo-lookup>
      </dxi-column>
      <!-- <dxi-column dataField="DISCOUNT_TYPE" caption="Discount Type">

    </dx-data-grid>
  </div>
</div>
<form-popup
  [(visible)]="isAddReasonsPopupOpened"
  [width]="800"
  [height]="550"
  (save)="onClickSaveReasons()"
  titleText="New Reasons"
  [showApprove]="false"
>
  <app-reasons-form #addForm></app-reasons-form>
</form-popup>

<form-popup
  [(visible)]="isEditReasonsPopupOpened"
  [width]="800"
  [height]="550"
  (save)="onClickSaveReasons()"
  titleText="Edit Reasons"
  [showApprove]="false"
>
  <app-reasons-form
    #editForm
    [formData]="selected_Data"
  ></app-reasons-form>
</form-popup>
