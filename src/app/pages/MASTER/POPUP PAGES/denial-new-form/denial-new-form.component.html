<dx-form class="plain-styled-form">
  <dxi-item itemType="group">
    <dxo-col-count-by-screen
      [xs]="1"
      [sm]="1"
      [md]="1"
      [lg]="1"
    ></dxo-col-count-by-screen>
    <dxi-item [colSpan]="2">
      <div *dxTemplate>
        <dx-text-box
          label="Code"
          labelMode="floating"
          [(value)]="newDenial.DenialCode"
        >
          <dx-validator>
            <dxi-validation-rule
              type="required"
              message="Code is required"
            ></dxi-validation-rule>
            <dxi-validation-rule
              type="async"
              [validationCallback]="checkDuplicateDenial"
              message="Denial already exists"
            ></dxi-validation-rule>
          </dx-validator>
        </dx-text-box>
      </div>
    </dxi-item>

    <dxi-item [colSpan]="2">
      <div *dxTemplate>
        <dx-select-box
          class="inputBox"
          [items]="Denial_Type_DropDownData"
          displayExpr="DESCRIPTION"
          valueExpr="ID"
          label="Type"
          labelMode="floating"
          [(value)]="newDenial.DenialTypeID"
        >
          <dx-validator>
            <dxi-validation-rule
              type="required"
              message="Type is required"
            ></dxi-validation-rule> </dx-validator
        ></dx-select-box>
      </div>
    </dxi-item>

    <dxi-item [colSpan]="2">
      <div *dxTemplate>
        <dx-select-box
          class="inputBox"
          [items]="Denial_Category_DropDownData"
          displayExpr="DESCRIPTION"
          valueExpr="ID"
          label="Category"
          labelMode="floating"
          [(value)]="newDenial.DenialCategoryID"
        >
          <dx-validator>
            <dxi-validation-rule
              type="required"
              message="Category is required"
            ></dxi-validation-rule> </dx-validator
        ></dx-select-box>
      </div>
    </dxi-item>
    <dxi-item [colSpan]="2">
      <div *dxTemplate>
        <dx-text-area
          label="Description"
          labelMode="floating"
          [(value)]="newDenial.Description"
          [height]="160"
          [width]="'100%'"
          [maxHeight]="250"
          [minHeight]="50"
          [autoResizeEnabled]="true"
          placeholder="Enter a description..."
        >
          <dx-validator>
            <dxi-validation-rule
              type="required"
              message="Description is required"
            ></dxi-validation-rule>
          </dx-validator>
        </dx-text-area>
      </div>
    </dxi-item>
  </dxi-item>
</dx-form>
