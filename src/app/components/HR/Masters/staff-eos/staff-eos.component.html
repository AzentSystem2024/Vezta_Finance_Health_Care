<div class="view-wrapper list-page">
  <div *ngIf="isLoading" class="loading-overlay">
    <div class="spinner"></div>
  </div>
  <dx-data-grid
    #dataGrid
    class="grid theme-dependent"
    [dataSource]="staffEosSource"
    [remoteOperations]="false"
    [allowColumnReordering]="true"
    [rowAlternationEnabled]="true"
    [width]="'100%'"
    [height]="'80vh'"
    noDataText=" "
    (onEditingStart)="onEditingStart($event)"
    [scrolling]="{ mode: 'standard' }"
    rowAlternationInterval="2"
    (onRowRemoved)="deleteData($event)"
    [editing]="{ allowUpdating: true, allowDeleting: true }"
  >
    <dxo-paging [pageSize]="10"></dxo-paging>

    <dxo-pager
      [visible]="true"
      [displayMode]="displayMode"
      [showPageSizeSelector]="showPageSizeSelector"
      [showInfo]="true"
      [showNavigationButtons]="true"
    ></dxo-pager>

    <dxo-scrolling mode="standard"></dxo-scrolling>

    <dxo-header-filter [visible]="true"></dxo-header-filter>

    <dxo-toolbar>
      <dxi-item location="before">
        <div class="grid-header">Staff End of Service</div>
      </dxi-item>

      <dxi-item>
        <dx-select-box
          [(value)]="selectedRange"
          [dataSource]="dateRanges"
          displayExpr="label"
          valueExpr="value"
          (onValueChanged)="onDateRangeChange($event)"
          placeholder="Date Range"
        ></dx-select-box>
      </dxi-item>
      <dxi-item
        *ngIf="canAdd"
        location="after"
        locateInMenu="auto"
        widget="dxButton"
        [options]="addButtonOptions"
      ></dxi-item>

      <dxi-item
        location="after"
        locateInMenu="auto"
        widget="dxButton"
        [options]="refreshButtonOptions"
      >
      </dxi-item>

      <dxi-item location="after" locateInMenu="never">
        <dx-button icon="search" (onClick)="toggle()"> </dx-button>
      </dxi-item>
    </dxo-toolbar>

    <!-- <dxo-filter-row [visible]="isFilterVisible"></dxo-filter-row> -->
    <dxo-filter-row [visible]="true" *ngIf="isFilterVisible"></dxo-filter-row>
    <dxo-editing
      mode="popup"
      [allowUpdating]="canEdit"
      [allowDeleting]="canDelete"
    >
      <dxo-form [colCount]="1"> </dxo-form>
    </dxo-editing>
    <dxi-column
      dataField="DOC_NO"
      caption="Doc.No"
      alignment="left"
      [allowEditing]="true"
      [allowFiltering]="false"
      [width]="100"
    ></dxi-column>
    <dxi-column dataField="DATE" caption="Date" [width]="100"></dxi-column>
    <dxi-column
      dataField="EMP_NO"
      caption="Employee No"
      alignment="left"
      [width]="150"
    ></dxi-column>
    <dxi-column
      dataField="EMP_NAME"
      caption="Employee Name"
      [width]="150"
    ></dxi-column>
    <dxi-column dataField="REASON" caption="Reason " [width]="150"></dxi-column>
    <dxi-column
      dataField="REMARKS"
      caption="Remarks "
      [width]="150"
    ></dxi-column>
    <!-- 
    <dxi-column
      dataField="STATUS"
      caption="Status"
      alignment="right"
      fixedPosition="right"
      cellTemplate="statusCellTemplate"
      width="100"
      fixedPosition="right"
    >
    </dxi-column>
    <div *dxTemplate="let cellData of 'statusCellTemplate'">
      <i
        class="fas fa-flag"
        [ngClass]="getStatusFlagClass(cellData.value)"
        [attr.title]="cellData.value"
        style="margin-left: 10px; cursor: default"
      ></i>
            
    </div>
    <dxi-column
      type="buttons"
      [buttons]="allActionButtons"
      fixed="true"
      fixedPosition="right"
      width="150"
    ></dxi-column> -->

    <dxi-column
      caption="Status"
      dataField="STATUS"
      [width]="80"
      [cellTemplate]="statusCellRender"
      [allowHeaderFiltering]="true"
      [headerFilter]="{
        dataSource: getStatusFilterData,
        encodeHtml: false,
      }"
    >
    </dxi-column>
    <!-- <dxi-column type="buttons" [buttons]="gridButtons"> </dxi-column> -->
    <dxi-column
      type="buttons"
      caption="Actions"
      [width]="140"
      cellTemplate="actionTemplate"
    >
    </dxi-column>
    <div *dxTemplate="let cellData of 'actionTemplate'">
      <!-- Edit -->
      <i
        *ngIf="canEdit"
        class="dx-icon dx-icon-edit"
        [style.opacity]="
          cellData.data.STATUS === 'Verified' ||
          cellData.data.STATUS === 'Left Service'
            ? '0.4'
            : '1'
        "
        [style.pointer-events]="
          cellData.data.STATUS === 'Verified' ||
          cellData.data.STATUS === 'Left Service'
            ? 'none'
            : 'auto'
        "
        style="cursor: pointer; margin-right: 10px"
        title="Edit"
        (click)="onEditingStart({ data: cellData.data, cancel: false })"
      ></i>

      <!-- Delete -->
      <i
        *ngIf="canDelete"
        class="dx-icon dx-icon-trash"
        [style.opacity]="
          cellData.data.STATUS === 'Verified' ||
          cellData.data.STATUS === 'Left Service'
            ? '0.4'
            : '1'
        "
        [style.pointer-events]="
          cellData.data.STATUS === 'Verified' ||
          cellData.data.STATUS === 'Left Service'
            ? 'none'
            : 'auto'
        "
        style="cursor: pointer; margin-right: 10px"
        title="Delete"
        (click)="deleteData({ data: cellData.data, cancel: false })"
      ></i>

      <!-- Verify -->
      <span
        *ngIf="
          (cellData.data.STATUS === 'Verified' && canApprove) ||
          (cellData.data.STATUS !== 'Verified' && canVerify)
        "
        style="
          position: relative;
          display: inline-block;
          width: 18px;
          height: 18px;
          margin-left: 10px;
          cursor: pointer;
          vertical-align: middle;
        "
        [title]="
          cellData.data.STATUS === 'Left Service'
            ? 'Left Service'
            : cellData.data.STATUS === 'Verified'
              ? 'Approve'
              : 'Verify'
        "
        (click)="onVerifyClick({ row: { data: cellData.data } })"
      >
        <!-- Blue badge -->
        <i
          class="fas fa-certificate"
          [style.color]="
            cellData.data.STATUS === 'Left Service'
              ? '#EF4444'
              : cellData.data.STATUS === 'Verified'
                ? '#0073D8'
                : '#FFA500'
          "
          style="font-size: 18px; position: absolute; top: 0; left: 0"
        ></i>

        <!-- White tick -->
        <i
          class="fas fa-check"
          style="
            color: white;
            font-size: 7px;
            position: absolute;
            top: 5px;
            left: 5px;
            pointer-events: none;
          "
        ></i>
      </span>
    </div>
  </dx-data-grid>
</div>

        <!-- Document No -->
        <dxi-item>

        </dxi-item>

        <dxi-item>

          placeholder="Select.."
          [(value)]="selected_data.EMP_NAME"
          labelMode="floating"
        >
          <dx-validator>
            <dxi-validation-rule
              type="required"
              message="This field is required"
            ></dxi-validation-rule>
          </dx-validator>
        </dx-text-box>
      </dxi-item>

      <dxi-item itemType="group" [colCount]="2" [colSpan]="2">
        <dxi-item>
          <dx-text-box
            label="Join Date"
            [readOnly]="true"
            [(value)]="join_date_value"
            labelMode="floating"
          ></dx-text-box>
        </dxi-item>
        <dxi-item>
          <dx-date-box
            label="Relieving Date"
            placeholder="dd/mm/yyyy"
            [showClearButton]="true"
            [useMaskBehavior]="true"
            [displayFormat]="'dd/MM/yyyy'"
            type="date"
            [inputAttr]="{ 'aria-label': 'Date' }"
            [(value)]="selected_data.RELIEVING_DATE"
            labelMode="floating"
            [readOnly]="true"
          ></dx-date-box>
        </dxi-item>
      </dxi-item>
      <dxi-item>
        <dx-number-box
          [inputAttr]="{ style: 'text-align: right;' }"
          label="Days Worked"
          [(value)]="all_workingdays"
          [readOnly]="true"
          labelMode="floating"
        ></dx-number-box>
      </dxi-item>
      <dxi-item class="select-box">
        <dx-select-box
          displayExpr="DESCRIPTION"
          valueExpr="ID"
          [items]="reson_data"
          label="Reason"
          [searchEnabled]="true"
          placeholder="Select.."
          [items]="reson_data"
          [(value)]="selected_data.REASON_ID"
          labelMode="floating"
        >
        </dx-select-box>
      </dxi-item>

      <dxi-item>
        <dx-text-area
          label="Remarks"
          [readOnly]="true"
          valueChangeEvent="input"
          [(value)]="selected_data.REMARKS"
          labelMode="floating"
        >
        </dx-text-area>
      </dxi-item>

      <dxi-item style="text-align: center">
        <label
          style="
            display: block;
            text-align: left;
            text-decoration: underline;
            text-underline-offset: 4px;
          "
        >
          Payment Details:</label
        >
      </dxi-item>

      <dxi-item itemType="group" [colCount]="2" [colSpan]="2">
        <dxi-item>
          <dx-text-box
            label="Voucher No"
            [(value)]="payment_Detilas.VOUCHER_NO"
            [readOnly]="true"
            labelMode="floating"
          ></dx-text-box>
        </dxi-item>
        <dxi-item>
          <dx-date-box
            label="Voucher Date"
            [(value)]="payment_Detilas.TRANS_DATE"
            [readOnly]="true"
            labelMode="floating"
            displayFormat="dd/MM/yyyy"
          ></dx-date-box>
        </dxi-item>
      </dxi-item>

      <dxi-item itemType="group" [colCount]="2" [colSpan]="2">
        <dxi-item>
          <dx-text-box
            label="Amount paid"
            [inputAttr]="{ style: 'text-align: right;' }"
            [(value)]="payment_Detilas.AMOUNT_PAID"
            [readOnly]="true"
            placeholder="0"
            labelMode="floating"
          ></dx-text-box>
        </dxi-item>
        <dxi-item>
          <dx-text-box
            label="Payment Reference"
            [(value)]="payment_Detilas.PAYMENT_REFERENCE"
            [readOnly]="true"
            labelMode="floating"
          ></dx-text-box>
        </dxi-item>
      </dxi-item>
    </dx-form>
  </dx-popup>

  <!-- =================header filter======================== -->
  <dx-popup
    [(visible)]="isCustomDatePopupVisible"
    [width]="'400px'"
    title="Select Custom Date Range"
    [showCloseButton]="true"
    [dragEnabled]="false"
    [closeOnOutsideClick]="true"
    [height]="'250px'"
  >
    <div class="p-3">
      <dx-date-box
        [(value)]="fromDate"
        type="date"
        displayFormat="yyyy-MM-dd"
        label="From Date"
      >
      </dx-date-box>

      <dx-date-box
        [(value)]="toDate"
        type="date"
        displayFormat="yyyy-MM-dd"
        label="To Date"
      >
      </dx-date-box>

      <button class="custom-apply-btn" (click)="applyCustomDate()">
        Apply
      </button>
    </div>
  </dx-popup>
</dx-validation-group>
